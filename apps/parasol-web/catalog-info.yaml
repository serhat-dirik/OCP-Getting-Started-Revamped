# Backstage / Red Hat Developer Hub catalog entities for parasol-web (module M10).
#
# References the shared `parasol-insurance` System declared in parasol-claims's
# catalog-info.yaml. Portable (no cluster domain hardcoded); M10 injects
# environment-specific links when it registers per-user forks.
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: parasol-web
  description: Parasol claims-portal web frontend (Quarkus). The first app attendees deploy (M01).
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: parasol-web
    argocd/app-name: parasol-web
    janus-idp.io/tekton: parasol-web
  tags:
    - java
    - quarkus
    - frontend
  links:
    - url: https://quarkus.io/guides/
      title: Quarkus guides
      icon: docs
spec:
  type: website
  lifecycle: production
  owner: parasol
  system: parasol-insurance
  providesApis:
    - parasol-web-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: parasol-web-api
  description: Read-only seeded claims summary that backs the portal landing page.
  tags:
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: parasol
  system: parasol-insurance
  definition: |
    openapi: 3.0.3
    info:
      title: Parasol Web API
      version: "1.1"
      description: Seeded claims summary for the Parasol claims portal.
    paths:
      /api/claims:
        get:
          summary: The five seeded portal claims (CLM-1001..CLM-1005)
          responses:
            "200": { description: A fixed list of five claims }
