# Git-based BuildConfig for parasol-web (Docker strategy).
#
# NOT applied during the M01 build. For the initial image we use a BINARY build
# (oc new-build --binary + oc start-build --from-dir) because the source is not
# yet in the public repo. This manifest exists for later CI-driven rebuilds once
# apps/parasol-web is committed and pushed: apply it and run `oc start-build
# parasol-web-git -n ogsr-parasol-images` (or wire a webhook) to rebuild from Git.
#
# Kept separate from the binary build (different metadata.name) so the two do not
# collide in the same namespace.
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: parasol-web
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-web
    app.kubernetes.io/part-of: parasol
# Holds the built image tags (latest, 1.0). Shared by both build strategies.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: parasol-web-git
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-web
    app.kubernetes.io/part-of: parasol
spec:
  # Rebuild when the ImageStream base or the pushed config change.
  triggers:
    - type: ConfigChange
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
      ref: main
    # The app lives in a subdirectory of the monorepo.
    contextDir: apps/parasol-web
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: parasol-web:latest
