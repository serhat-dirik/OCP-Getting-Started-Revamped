# Lets workshop attendees pull the parasol-web image from the parasol-images
# namespace so M01 can deploy it into each user's own namespace.
#
# Grants the built-in `system:image-puller` ClusterRole (get/list imagestreams +
# pull layers) to the `workshop-attendees` group, scoped to parasol-images only.
# Applied by the app-developer as part of the parasol-web build.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: parasol-web-image-puller
  namespace: parasol-images
  labels:
    app.kubernetes.io/name: parasol-web
    app.kubernetes.io/part-of: parasol
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: workshop-attendees
