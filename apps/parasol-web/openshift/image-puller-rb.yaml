# Lets workshop attendees pull the parasol-web image from the ogsr-parasol-images
# namespace so M01 can deploy it into each user's own namespace.
#
# Grants the built-in `system:image-puller` ClusterRole (get/list imagestreams +
# pull layers) to the `workshop-attendees` group, scoped to ogsr-parasol-images only.
# Applied by the app-developer as part of the parasol-web build.
#
# IMPORTANT (open decision for PM / platform-engineer — do not silently widen):
#   A pod pulls a cross-namespace image using its OWN namespace ServiceAccount,
#   not the human user's identity (the smoke test confirmed this: it needed a
#   grant to system:serviceaccount:<ns>:default). So this human-group grant alone
#   does NOT let an attendee's Deployment in {user}-dev pull the image at pod
#   runtime. To make the shared image pullable by attendee workloads, ONE of:
#     a) grant system:image-puller to each per-user SA group
#        (system:serviceaccounts:{user}-dev) from the M01 entry-state, OR
#     b) grant it to the broad `system:serviceaccounts` group here (matches the
#        `workshop.redhat.com/shared=true` label; broadest, simplest), OR
#     c) have workshop-config manage this centrally.
#   Left to the RBAC owner to choose; this file intentionally ships only the
#   requested workshop-attendees grant.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: parasol-web-image-puller
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-web
    app.kubernetes.io/part-of: parasol
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: workshop-attendees
