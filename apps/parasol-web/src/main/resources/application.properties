# Parasol Insurance - Claims Portal (web frontend)
quarkus.application.name=parasol-web

# Bind all interfaces on 8080 (the port the OpenShift Service and Route target).
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Observability is curriculum - health and metrics ship ON by default via their
# extensions and are exposed under the management path /q:
#   /q/health/live    liveness probe   (used in M01, M04)
#   /q/health/ready   readiness probe  (used in M01, M04)
#   /q/metrics        Prometheus text  (used in M11)
# Keep the HTTP server binder on so M11 dashboards can group request metrics by app.
quarkus.micrometer.binder.http-server.enabled=true

# ---------------------------------------------------------------------------
# OIDC - staged for M29 (parasol-web = confidential web-app client). Ships
# DISABLED so the portal stays anonymous for M01-M28 and no auth server is
# contacted at boot (module independence). M29 sets, per user, via env:
#   QUARKUS_OIDC_TENANT_ENABLED=true
#   QUARKUS_OIDC_AUTH_SERVER_URL=https://sso-workshop.<domain>/realms/realm-<user>
#   QUARKUS_OIDC_CLIENT_ID / QUARKUS_OIDC_CREDENTIALS_SECRET
# ---------------------------------------------------------------------------
quarkus.oidc.tenant-enabled=false
quarkus.oidc.application-type=web-app
# Keycloak realm roles live under realm_access.roles (not groups) - inert until enabled.
quarkus.oidc.roles.role-claim-path=realm_access/roles
# Never auto-start a Keycloak Dev Services container in dev/test.
quarkus.keycloak.devservices.enabled=false
