# Git-based BuildConfig for mcp-agent-cli (Docker strategy).
#
# NOT applied during the initial build. For the first prebuilt image we use a
# BINARY build (oc new-build --binary + oc start-build --from-dir) because the
# source is streamed straight from apps/mcp-agent-cli. This manifest is for later
# CI-driven rebuilds from Git once the monorepo is published: apply it and run
# `oc start-build mcp-agent-cli-git -n ogsr-parasol-images` (or wire a webhook).
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: mcp-agent-cli
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: mcp-agent-cli
    app.kubernetes.io/part-of: parasol
    app.kubernetes.io/component: agent-cli
# Holds the built image tags. Shared by the binary and Git build strategies.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mcp-agent-cli-git
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: mcp-agent-cli
    app.kubernetes.io/part-of: parasol
    app.kubernetes.io/component: agent-cli
spec:
  triggers:
    - type: ConfigChange
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
      ref: main
    # The app lives in a subdirectory of the monorepo.
    contextDir: apps/mcp-agent-cli
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: mcp-agent-cli:latest
