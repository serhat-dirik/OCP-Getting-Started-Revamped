# Parasol Insurance - mcp-agent-cli (Quarkus command-mode + LangChain4j)
# The assistant-neutral MCP client M24 hands every attendee: prompt -> MCP tools -> MaaS model ->
# tool-call trace + answer. Reuses parasol-agent's (M23) model + MCP wiring verbatim, re-pointed
# from the claims MCP servers to the platform kubernetes-mcp-server.
quarkus.application.name=mcp-agent-cli

# This is a one-shot CLI, not a service: no HTTP server, no health/metrics endpoint. Keep the
# framework quiet so stdout is just the agent's header, trace, and answer. (Raise the level via
# QUARKUS_LOG_LEVEL=INFO to see LangChain4j's request/response logs during a lab.)
quarkus.banner.enabled=false
quarkus.log.level=WARN

# ===========================================================================
# Model provider - OpenAI-compatible, fully ENV-DRIVEN and MODEL-AGNOSTIC.
# ---------------------------------------------------------------------------
# Identical to parasol-agent: the workshop injects these three at run time (from the per-user
# maas-config ConfigMap + maas-credentials Secret). The code assumes NOTHING about the model, so the
# same image runs against qwen3-14b or llama-scout-17b - only the env changes. The committed defaults
# are harmless LOCAL-DEV placeholders (an Ollama-style endpoint) - never workshop infra, never a key.
#
#   GENAI_ENDPOINT   e.g. https://maas-example.apps.<domain>/v1   (OpenAI-compatible)
#   GENAI_API_KEY    the MaaS virtual key; short-lived on RHDP
#   GENAI_MODEL      the served model id, e.g. qwen3-14b
# ===========================================================================
quarkus.langchain4j.openai.base-url=${GENAI_ENDPOINT:http://localhost:11434/v1}
quarkus.langchain4j.openai.api-key=${GENAI_API_KEY:not-set}
quarkus.langchain4j.openai.chat-model.model-name=${GENAI_MODEL:llama3.2}

# Deterministic runs: temperature 0 (project directive - seeded, reproducible tool-calling).
quarkus.langchain4j.openai.chat-model.temperature=0
# A model + tool round-trip loop can take a while; give it room.
quarkus.langchain4j.openai.timeout=60s
# Model wire logging OFF by default (it would bury the printed tool-call trace). Turn on with
# QUARKUS_LANGCHAIN4J_OPENAI_LOG_REQUESTS=true / _LOG_RESPONSES=true to watch the raw model traffic.
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.log-responses=false

# ===========================================================================
# MCP server (the platform kubernetes-mcp-server) over HTTP/SSE.
# ---------------------------------------------------------------------------
# One MCP client named "platform". transport-type=http connects to the Go kubernetes-mcp-server's SSE
# endpoint at /sse (its Streamable-HTTP endpoint is /mcp) - the same HTTP/SSE transport parasol-agent
# uses against claims-db, but note the PATH differs from that Quarkus server's /mcp/sse. The URL is the
# ONLY thing that changes between the local default below and the in-cluster MCP Service - injected via
# MCP_SERVER_URL. The agent
# holds only this URL: no kubeconfig, no admin token. The MCP server runs as the scoped mcp-agent
# ServiceAccount, and RBAC on that SA - not this client - is the security boundary (M14/M24).
# ===========================================================================
quarkus.langchain4j.mcp.platform.transport-type=http
quarkus.langchain4j.mcp.platform.url=${MCP_SERVER_URL:http://localhost:8080/sse}
quarkus.langchain4j.mcp.platform.log-requests=false
quarkus.langchain4j.mcp.platform.log-responses=false

# ===========================================================================
# CLI behaviour.
# ---------------------------------------------------------------------------
# Read-only-first is the safety posture M24 teaches: by default the client hides mutating tools from
# the model entirely (see ReadOnlyToolFilter). Set MCP_READ_ONLY=false (or pass --allow-writes) to
# offer them - at which point RBAC is what actually stops a disallowed write.
mcp-agent.read-only=${MCP_READ_ONLY:true}
# Cap the agentic loop (plan -> tool calls -> observe -> ...) - each turn re-sends the full tool
# schema, so this bounds token spend against the per-user MaaS quota.
mcp-agent.max-steps=${MCP_MAX_STEPS:10}
# Per-run memory window: ample headroom for one multi-tool round-trip (system + prompt + several
# tool call/result pairs) without eviction mid-answer.
mcp-agent.memory-window-messages=40
# Optional override of the read-only denylist (comma/space separated write-verb tokens). Blank uses
# ReadOnlyToolPolicy.DEFAULT_MUTATING_TOKENS.
mcp-agent.mutating-tokens=${MCP_MUTATING_TOKENS:}

# ===========================================================================
# OpenTelemetry (optional "observe the agent" beat): the model call + each MCP tool call become
# spans. Exporter is OFF until a collector exists - the always-on audit surface is the tool-call
# trace this CLI prints. Turn on with QUARKUS_OTEL_SDK_DISABLED=false + OTEL_EXPORTER_OTLP_ENDPOINT.
# ===========================================================================
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
