# Git-based BuildConfig for parasol-agent (Docker strategy).
#
# NOT applied during the initial build. For the first prebuilt image we use a
# BINARY build (oc new-build --binary + oc start-build --from-dir) because the
# source is streamed straight from apps/parasol-agent. This manifest is for later
# CI-driven rebuilds from Git once the monorepo is published: apply it and run
# `oc start-build parasol-agent-git -n ogsr-parasol-images` (or wire a webhook).
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: parasol-agent
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-agent
    app.kubernetes.io/part-of: parasol
    app.kubernetes.io/component: agent
# Holds the built image tags. Shared by the binary and Git build strategies.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: parasol-agent-git
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-agent
    app.kubernetes.io/part-of: parasol
    app.kubernetes.io/component: agent
spec:
  triggers:
    - type: ConfigChange
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
      ref: main
    # The app lives in a subdirectory of the monorepo.
    contextDir: apps/parasol-agent
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: parasol-agent:latest
