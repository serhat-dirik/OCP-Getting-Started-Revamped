# Parasol Insurance - parasol-agent (Quarkus + LangChain4j)
# Calls an OpenAI-compatible model (MaaS), grounds answers with RAG, and uses the
# claims-db + policy-docs MCP servers as tools. Star of M23 - Agentic AI on OpenShift.
quarkus.application.name=parasol-agent

quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# ===========================================================================
# Model provider - OpenAI-compatible, fully ENV-DRIVEN and MODEL-AGNOSTIC.
# ---------------------------------------------------------------------------
# The workshop injects these three at deploy time (from the per-user maas-config
# ConfigMap + maas-credentials Secret): the code assumes NOTHING about the model,
# so the same image runs against qwen3-14b (cluster 1) or llama-scout-17b
# (cluster 2). The committed defaults are harmless LOCAL-DEV placeholders (an
# Ollama-style endpoint) - never workshop infra, never a real key.
#
#   GENAI_ENDPOINT   e.g. https://maas-example.apps.<domain>/v1   (OpenAI-compatible)
#   GENAI_API_KEY    the MaaS virtual key (sk-...); short-lived on RHDP
#   GENAI_MODEL      the served model id, e.g. qwen3-14b
# ===========================================================================
quarkus.langchain4j.openai.base-url=${GENAI_ENDPOINT:http://localhost:11434/v1}
quarkus.langchain4j.openai.api-key=${GENAI_API_KEY:not-set}
quarkus.langchain4j.openai.chat-model.model-name=${GENAI_MODEL:llama3.2}

# Deterministic demos: temperature 0 (project directive - seeded, reproducible).
quarkus.langchain4j.openai.chat-model.temperature=0
# Per-request memory window (AgentResource passes a fresh @MemoryId per call). 40 messages is
# ample headroom for a multi-tool round-trip (system + question + several tool call/result pairs)
# so nothing is evicted mid-answer.
quarkus.langchain4j.chat-memory.memory-window.max-messages=40
# MaaS + tool round-trips can take a while; give the call room.
quarkus.langchain4j.openai.timeout=60s
# Log the model traffic so attendees can SEE the tool-call reasoning in the pod log.
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# ===========================================================================
# MCP tool providers over HTTP-SSE (the two Parasol MCP servers).
# ---------------------------------------------------------------------------
# In-cluster the agent targets the Services claims-db:8080 / policy-docs:8080;
# override per environment via CLAIMS_DB_MCP_URL / POLICY_DOCS_MCP_URL. The URL is
# the legacy SSE endpoint (/mcp/sse) that transport-type=http connects to.
# ===========================================================================
quarkus.langchain4j.mcp.claims-db.transport-type=http
quarkus.langchain4j.mcp.claims-db.url=${CLAIMS_DB_MCP_URL:http://localhost:8081/mcp/sse}
quarkus.langchain4j.mcp.policy-docs.transport-type=http
quarkus.langchain4j.mcp.policy-docs.url=${POLICY_DOCS_MCP_URL:http://localhost:8082/mcp/sse}
# MCP wire logging is OFF by default: the periodic readiness ping would otherwise flood the
# log and bury the real tool calls. What the agent called is reported cleanly in the
# POST /agent/ask response (toolCalls) and as spans in the OTel trace (M12). Flip these to
# true (e.g. via env QUARKUS_LANGCHAIN4J_MCP_CLAIMS_DB_LOG_REQUESTS=true) to watch the raw
# MCP JSON-RPC during a lab.
quarkus.langchain4j.mcp.claims-db.log-requests=false
quarkus.langchain4j.mcp.claims-db.log-responses=false
quarkus.langchain4j.mcp.policy-docs.log-requests=false
quarkus.langchain4j.mcp.policy-docs.log-responses=false

# ===========================================================================
# Observability is curriculum and ships ON by default under /q:
#   /q/health/live, /q/health/ready   SmallRye Health   (probes; readiness also
#                                      pings BOTH MCP servers, so a Ready agent has
#                                      proven its tool wiring - M11)
#   /q/metrics                         Micrometer/Prom   (M11/M12 dashboards)
# ===========================================================================
quarkus.micrometer.binder.http-server.enabled=true

# OpenTelemetry: the model call + each MCP tool call become spans in the agent
# trace (M12 - observe the agent). Exporter OFF until a collector exists; turned on
# to Tempo with QUARKUS_OTEL_SDK_DISABLED=false and OTEL_EXPORTER_OTLP_ENDPOINT.
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}

# Unit tests are plain JUnit (no app boot), so they need no model/MCP config here. The
# end-to-end REST path (which needs a live model + both MCP servers) is validated by the
# documented on-cluster smoke, not by an in-JVM test - booting the app without the MCP
# servers makes the langchain4j MCP client block the event loop retrying dead endpoints.
