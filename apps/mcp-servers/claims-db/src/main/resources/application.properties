# Parasol Insurance - claims-db MCP server
# Exposes the seeded claims dataset as MCP tools over HTTP-SSE. Consumed by parasol-agent (M23).
quarkus.application.name=claims-db

# Bind all interfaces on 8080 (the port the OpenShift Service and the agent target).
# The MCP endpoints are served at /mcp (Streamable HTTP) and /mcp/sse (legacy SSE);
# the agent's langchain4j MCP client connects over SSE at http://claims-db:8080/mcp/sse.
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
# In local dev run the two MCP servers on 8081/8082 so all three services coexist.
%dev.quarkus.http.port=8081

# ---------------------------------------------------------------------------
# Deterministic, self-contained datastore: embedded H2 seeded at boot from
# import.sql with the exact CLM-1001..CLM-1030 dataset (same shape + seed as
# parasol-claims). drop-and-create reloads the fixed rows on every boot, so the
# tools return byte-for-byte identical results across runs - which temperature-0
# demos rely on. The server is READ-ONLY over this data.
#
# To back the tools with the shared claims PostgreSQL instead (an option the M23
# entry-state may choose), override at deploy time:
#   QUARKUS_DATASOURCE_DB_KIND=postgresql
#   QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://parasol-db:5432/parasol
#   QUARKUS_DATASOURCE_USERNAME / _PASSWORD
#   QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY=none   (do not reseed a shared DB)
# (add the postgresql JDBC driver to the pom when you do - see README).
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:claims;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# ---------------------------------------------------------------------------
# Observability is curriculum and ships ON by default under /q:
#   /q/health/live, /q/health/ready   SmallRye Health   (probes)
#   /q/metrics                         Micrometer/Prom   (M11/M12 dashboards)
# ---------------------------------------------------------------------------
quarkus.micrometer.binder.http-server.enabled=true

# OpenTelemetry: a tool call becomes its own span in the agent->claims-db trace
# (M12). Exporter is OFF until a collector exists; M12 turns it on to Tempo with
# QUARKUS_OTEL_SDK_DISABLED=false and OTEL_EXPORTER_OTLP_ENDPOINT.
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
