# Parasol Insurance - policy-docs MCP server
# Exposes RAG-style retrieval over the seeded Parasol policy corpus as MCP tools
# over HTTP-SSE. Consumed by parasol-agent (M23).
quarkus.application.name=policy-docs

# Bind all interfaces on 8080 (the port the OpenShift Service and the agent target).
# MCP endpoints are served at /mcp (Streamable HTTP) and /mcp/sse (legacy SSE);
# the agent connects over SSE at http://policy-docs:8080/mcp/sse.
quarkus.http.host=0.0.0.0
quarkus.http.port=8080
# In local dev run the two MCP servers on 8081/8082 so all three services coexist.
%dev.quarkus.http.port=8082

# The policy corpus is embedded and retrieval is in-memory + deterministic (no DB,
# no vector store, no model call) - see PolicyRetriever. The production pgvector/Milvus
# retriever is a later platform phase; the search_policies tool contract stays identical.

# ---------------------------------------------------------------------------
# Observability is curriculum and ships ON by default under /q:
#   /q/health/live, /q/health/ready   SmallRye Health   (probes)
#   /q/metrics                         Micrometer/Prom   (M11/M12 dashboards)
# ---------------------------------------------------------------------------
quarkus.micrometer.binder.http-server.enabled=true

# OpenTelemetry: a retrieval call becomes its own span in the agent->policy-docs
# trace (M12). Exporter is OFF until a collector exists; M12 turns it on to Tempo
# with QUARKUS_OTEL_SDK_DISABLED=false and OTEL_EXPORTER_OTLP_ENDPOINT.
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
