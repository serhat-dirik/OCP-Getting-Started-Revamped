# Backstage / Red Hat Developer Hub catalog entities for parasol-notifications (module M10).
#
# References the shared `parasol-insurance` System declared in parasol-claims's
# catalog-info.yaml. This is the polyglot service (Node OR Python, same API), so the
# Component is language-agnostic. Portable (no cluster domain hardcoded).
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: parasol-notifications
  description: Notifications service — the polyglot moment (Node or Python, identical API). M02/M25.
  annotations:
    backstage.io/kubernetes-id: parasol-notifications
    argocd/app-name: parasol-notifications
    janus-idp.io/tekton: parasol-notifications
  tags:
    - polyglot
    - nodejs
    - python
  links:
    - url: https://nodejs.org/docs/latest/api/
      title: Node.js API docs
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: parasol
  system: parasol-insurance
  providesApis:
    - parasol-notifications-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: parasol-notifications-api
  description: Record and list claim notifications (in-memory demo notifier).
  tags:
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: parasol
  system: parasol-insurance
  definition: |
    openapi: 3.0.3
    info:
      title: Parasol Notifications API
      version: "1.0"
      description: Records and lists claim notifications. In-memory (resets on restart).
    paths:
      /api/notifications:
        get:
          summary: Every notification recorded since startup
          responses:
            "200": { description: A list of notifications }
      /api/notify:
        post:
          summary: Record a notification for a claim
          responses:
            "201": { description: The recorded notification }
            "400": { description: claimNumber and message are required }
      /health:
        get:
          summary: Health check
          responses:
            "200": { description: UP }
