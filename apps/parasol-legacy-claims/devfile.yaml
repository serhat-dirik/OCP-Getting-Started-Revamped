schemaVersion: 2.2.0
metadata:
  name: parasol-legacy-claims
  displayName: Parasol Legacy Claims (MTA modernization)
  description: Legacy Spring-on-Tomcat claims service — open in Dev Spaces to modernize with MTA + Developer Lightspeed
  language: java
  projectType: maven
  tags:
    - Java
    - Maven
    - MTA
projects:
  - name: parasol-legacy-claims
    zip:
      # Populated by Dev Spaces from the workspace's own repo context; the git remote is the
      # attendee's Gitea fork {user}/parasol-legacy-claims (entry state seeds it).
      location: ""
components:
  - name: tools
    container:
      # Universal developer image ships OpenJDK 17 + Maven + the tooling MTA's VS Code extension needs.
      # 8Gi per the MTA Developer Lightspeed prereqs (analysis + LLM refactor run in-workspace).
      image: quay.io/devfile/universal-developer-image:latest
      memoryRequest: 2Gi
      memoryLimit: 8Gi
      cpuRequest: 500m
      cpuLimit: "2"
      mountSources: true
      env:
        # [ADS] Developer Lightspeed for MTA wiring. The MaaS key, model, and endpoint are NOT hardcoded
        # here: the M22 entry state mounts them from the maas-credentials Secret in this namespace
        # (labeled controller.devfile.io/mount-to-devworkspace) as GENAI_API_KEY + GENAI_MODEL +
        # GENAI_ENDPOINT — so a cluster whose MaaS key is scoped to a different model (e.g. llama-scout-17b)
        # gets the right model without editing this seeded file. Graceful degradation: with no Secret
        # mounted the [OCP] MTA assess/analyze flow is unaffected. GENAI_PROVIDER is the one constant.
        - name: GENAI_PROVIDER
          value: openai
commands:
  - id: package
    exec:
      label: "Package the legacy WAR (mvn package)"
      component: tools
      commandLine: "mvn -B -DskipTests package"
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
