schemaVersion: 2.2.0
metadata:
  name: parasol-legacy-claims
  displayName: Parasol Legacy Claims (MTA modernization)
  description: Legacy Spring-on-Tomcat claims service — open in Dev Spaces to modernize with MTA + Developer Lightspeed
  language: java
  projectType: maven
  tags:
    - Java
    - Maven
    - MTA
projects:
  - name: parasol-legacy-claims
    zip:
      # Populated by Dev Spaces from the workspace's own repo context; the git remote is the
      # attendee's Gitea fork {user}/parasol-legacy-claims (entry state seeds it).
      location: ""
components:
  - name: tools
    container:
      # Universal developer image ships OpenJDK 17 + Maven + the tooling MTA's VS Code extension needs.
      # 8Gi per the MTA Developer Lightspeed prereqs (analysis + LLM refactor run in-workspace).
      image: quay.io/devfile/universal-developer-image:latest
      memoryRequest: 2Gi
      memoryLimit: 8Gi
      cpuRequest: 500m
      cpuLimit: "2"
      mountSources: true
      env:
        # [ADS] Developer Lightspeed for MTA wiring — the OpenAI-compatible MaaS endpoint + model.
        # The Bearer key is NOT here: it is mounted from the maas-credentials Secret in this namespace
        # (labeled controller.devfile.io/mount-to-devworkspace by the M22 entry state) as GENAI_API_KEY.
        # Graceful degradation: with no key mounted, the [OCP] MTA assess/analyze flow is unaffected.
        - name: GENAI_PROVIDER
          value: openai
        - name: GENAI_MODEL
          value: qwen3-14b
commands:
  - id: package
    exec:
      label: "Package the legacy WAR (mvn package)"
      component: tools
      commandLine: "mvn -B -DskipTests package"
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
