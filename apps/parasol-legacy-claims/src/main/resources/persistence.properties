# Legacy datasource config baked into the WAR (MTA flags: externalize configuration).
# ISSUE: hardcoded database IP address — no service discovery, no DNS, no per-environment override.
# ISSUE: proprietary Oracle driver + dialect pin the app to a licensed database engine.
# ISSUE: database credentials in plaintext in a versioned file (belongs in a Secret).
# ISSUE: hibernate create-drop rebuilds (and destroys) the schema on every startup.
jdbc.driverClassName=oracle.jdbc.driver.OracleDriver
jdbc.url=jdbc:oracle:thin:@10.14.221.9:1521/CLAIMSDB
jdbc.user=claims
jdbc.password=claims
hibernate.hbm2ddl.auto=create-drop
hibernate.dialect=org.hibernate.dialect.OracleDialect
