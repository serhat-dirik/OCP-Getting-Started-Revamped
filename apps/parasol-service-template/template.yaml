# Red Hat Developer Hub / Backstage Software Template — the Parasol golden path.
#
# Scaffolds a minimal Quarkus 3.33 / JDK-21 service (health + metrics + OTel on, a
# UBI9 Containerfile, a devfile, and a catalog-info.yaml) matching the parasol-claims
# conventions, then publishes it as a new repo in the attendee's Gitea org and registers
# it in the software catalog. Publishing uses publish:gitea (dynamic plugin loaded by the
# portal stack) against the in-cluster Gitea service address, so the template is portable
# across clusters. The repo carries a PaC .tekton/ pipeline and can be wired to Argo CD in
# the lab — "modules 2-9 behind one button".
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: parasol-service-template
  title: New Parasol microservice
  description: >-
    Scaffold a paved-road Quarkus (Java 21) service that already has health probes,
    Prometheus metrics, OpenTelemetry, a UBI9 Containerfile, and a Dev Spaces devfile.
  tags:
    - recommended
    - quarkus
    - java
    - parasol
spec:
  owner: parasol
  type: service

  parameters:
    - title: Provide service details
      required:
        - name
        - orgName
        - owner
      properties:
        name:
          title: Name
          type: string
          description: Unique lowercase service name (e.g. parasol-policy).
          pattern: '^[a-z][a-z0-9-]{2,40}$'
          ui:autofocus: true
        orgName:
          title: Your Gitea organization
          type: string
          # publish:gitea publishes into a Gitea ORGANIZATION (verified: it rejects a user namespace).
          # Each attendee owns a dedicated scaffold org named <username>-svcs (materialized by the M11
          # entry state). Enter yours, e.g. user1-svcs.
          description: Your personal scaffold org, named <your-username>-svcs (e.g. user1-svcs).
          pattern: '^[a-z][a-z0-9-]{2,60}$'
        owner:
          title: Owner
          type: string
          description: The Backstage group that will own the new service.
          default: parasol

  steps:
    - id: fetch
      name: Fetch skeleton and substitute values
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}

    # Publish the scaffolded service into the attendee's Gitea org via publish:gitea
    # (@backstage/plugin-scaffolder-backend-module-gitea, loaded as a dynamic plugin by the
    # portal stack — verified live 2026-07-11: repo + full skeleton pushed end to end).
    # The host is the IN-CLUSTER Gitea SERVICE address (gitea.ogsr-gitea.svc:3000) — stable on any
    # cluster, so this template needs no per-cluster host injection (RHDH, Dev Spaces, and the
    # workshop terminal all reach it in-cluster). The gitea integration for this host is
    # configured in the portal's app-config-rhdh.
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        # publish:gitea requires an ORGANIZATION owner (it rejects a user namespace) — the
        # attendee's own <username>-svcs org, materialized by the M11 entry state.
        repoUrl: gitea.ogsr-gitea.svc:3000?owner=${{ parameters.orgName }}&repo=${{ parameters.name }}
        description: '${{ parameters.name }} — scaffolded from parasol-service-template'
        defaultBranch: main

    - id: register
      name: Register in the software catalog
      action: catalog:register
      input:
        # Register the FULL catalog-info URL (branch included). Verified live 2026-07-11: the
        # repoContentsUrl+catalogInfoPath form re-derives the URL through the gitea integration and
        # drops the branch (…/src/branch/ → 400); passing catalogInfoUrl with the explicit
        # /src/branch/main/ path registers cleanly. Internal host = portable across clusters.
        catalogInfoUrl: http://gitea.ogsr-gitea.svc:3000/${{ parameters.orgName }}/${{ parameters.name }}/src/branch/main/catalog-info.yaml

  output:
    links:
      - title: Open the new repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in the software catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
    text:
      - title: Scaffolded
        content: |
          Service `${{ parameters.name }}` was scaffolded from the Parasol golden-path
          template and published to `${{ parameters.orgName }}` in Gitea, then registered
          in the software catalog. Open it in Dev Spaces or the workshop terminal to make
          your first change.
