# Red Hat Developer Hub / Backstage Software Template — the Parasol golden path.
#
# Scaffolds a minimal Quarkus 3.33 / JDK-21 service (health + metrics + OTel on, a
# UBI9 Containerfile, a devfile, and a catalog-info.yaml) matching the parasol-claims
# conventions, then — once the M10 builder wires the publish step — creates the repo,
# PaC pipeline, and Argo app in the user's Gitea org.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: parasol-service-template
  title: New Parasol microservice
  description: >-
    Scaffold a paved-road Quarkus (Java 21) service that already has health probes,
    Prometheus metrics, OpenTelemetry, a UBI9 Containerfile, and a Dev Spaces devfile.
  tags:
    - recommended
    - quarkus
    - java
    - parasol
spec:
  owner: parasol
  type: service

  parameters:
    - title: Provide service details
      required:
        - name
        - owner
      properties:
        name:
          title: Name
          type: string
          description: Unique lowercase service name (e.g. parasol-policy).
          pattern: '^[a-z][a-z0-9-]{2,40}$'
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          description: The Backstage group that will own the new service.
          default: parasol

  steps:
    - id: fetch
      name: Fetch skeleton and substitute values
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}

    # -------------------------------------------------------------------------
    # TODO(M10 builder): PUBLISH + REGISTER — target intentionally UNRESOLVED.
    #
    # Do NOT guess the publish action. Publishing into the workshop Gitea needs
    # ONE of the following, decided at RHDH build time:
    #   a) publish:gitea — requires the community dynamic plugin
    #      `scaffolder-backend-module-gitea` to be loaded in RHDH 1.10 (support
    #      status TODO-verify per m10-build-note). Preferred if it loads.
    #   b) publish:git   — generic git publish; works without the Gitea plugin
    #      (robust fallback).
    #
    # When decided, uncomment the matching block below, set the Gitea host from the
    # cluster domain, and wire catalog:register to the publish output. Example shape
    # (publish:gitea):
    #
    # - id: publish
    #   name: Publish to Gitea
    #   action: publish:gitea
    #   input:
    #     repoUrl: gitea-gitea.<cluster_domain>:443/?owner=${{ parameters.owner }}&repo=${{ parameters.name }}
    #     description: '${{ parameters.name }} — scaffolded from parasol-service-template'
    #     defaultBranch: main
    #
    # - id: register
    #   name: Register in the software catalog
    #   action: catalog:register
    #   input:
    #     repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
    #     catalogInfoPath: /catalog-info.yaml
    # -------------------------------------------------------------------------

  output:
    text:
      - title: Scaffolded
        content: |
          Service `${{ parameters.name }}` was scaffolded from the Parasol
          golden-path template. Once the M10 publish step is wired, links to the
          new Gitea repository, its PaC pipeline, and its Argo application will
          appear here.
    # links:
    #   - title: Open the new repository
    #     url: ${{ steps.publish.output.remoteUrl }}
    #   - title: Open in the catalog
    #     icon: catalog
    #     entityRef: ${{ steps.register.output.entityRef }}
