# Dev Spaces workspace definition for ${{ values.name }} (devfile 2.2.0).
#
# "Open in Dev Spaces" lands in a Java 21 workspace with Quarkus dev mode wired up.
# Mirrors the Parasol convention: the UDI defaults to Java 17, so JAVA_HOME is
# pinned to 21 (pom release=21).
schemaVersion: 2.2.0
metadata:
  name: ${{ values.name }}
  displayName: ${{ values.name }}
  description: Quarkus service scaffolded from the Parasol golden-path template.
  language: Java
  projectType: Quarkus
  tags:
    - Java
    - Quarkus
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:3.29
      memoryLimit: 3Gi
      cpuLimit: "2"
      mountSources: true
      env:
        - name: QUARKUS_HTTP_HOST
          value: 0.0.0.0
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-21
        - name: PATH
          value: /usr/lib/jvm/java-21/bin:/home/user/.local/bin:/home/user/.java/current/bin:/home/user/node_modules/.bin/:/home/user/.npm-global/bin/:/opt/app-root/src/.npm-global/bin/:/usr/share/maven/bin:/usr/bin:/home/user/go/bin:/home/tooling/.local/bin:/home/tooling/.java/current/bin:/home/tooling/node_modules/.bin/:/home/tooling/.npm-global/bin/:/home/tooling/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      endpoints:
        - name: quarkus-http
          targetPort: 8080
          exposure: public
          protocol: http
commands:
  - id: package
    exec:
      label: Package (skip tests)
      component: tools
      commandLine: ./mvnw -B -ntp -DskipTests clean package
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: dev
    exec:
      label: Quarkus dev mode (live reload)
      component: tools
      commandLine: ./mvnw quarkus:dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
