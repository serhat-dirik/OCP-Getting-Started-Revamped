# Git-based BuildConfig for ${{ values.name }} (Docker strategy).
#
# Apply once the scaffolded repo is populated to enable in-cluster rebuilds from
# Git. The initial image is typically built by the PaC pipeline the golden path
# also scaffolds.
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ${{ values.name }}
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: parasol
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ${{ values.name }}
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: parasol
spec:
  triggers:
    - type: ConfigChange
  runPolicy: Serial
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: ${{ values.name }}:latest
