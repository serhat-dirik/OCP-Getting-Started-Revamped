# ${{ values.name }} - scaffolded from the Parasol golden-path template (Quarkus, JDK 21)
quarkus.application.name=${{ values.name }}

# Bind all interfaces on 8080 (the port the OpenShift Service and Route target).
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Observability ships ON by default under /q (curriculum: M04 probes, M11):
#   /q/health/live, /q/health/ready   SmallRye Health
#   /q/metrics                        Micrometer/Prometheus
quarkus.micrometer.binder.http-server.enabled=true

# OpenTelemetry: REST auto-instrumentation is built in; the OTLP exporter is OFF
# by default (no collector before M11). M11 turns it on:
#   QUARKUS_OTEL_SDK_DISABLED=false
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://<tempo-otlp>:4317
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
