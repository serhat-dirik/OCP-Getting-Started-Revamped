# Git-based BuildConfig for parasol-claims (Docker strategy).
#
# NOT applied during the initial build. For the first prebuilt image we use a
# BINARY build (oc new-build --binary + oc start-build --from-dir) because the
# source is streamed straight from apps/parasol-claims. This manifest is for
# later CI-driven rebuilds from Git once the monorepo is published: apply it and
# run `oc start-build parasol-claims-git -n ogsr-parasol-images` (or wire a webhook).
#
# M02 attendees build the SAME source a different way - the S2I strategy against
# their in-cluster Gitea fork of parasol/parasol-claims (README "Build paths").
# Kept separate from the binary build (different metadata.name) so they do not
# collide in the same namespace.
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: parasol-claims
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-claims
    app.kubernetes.io/part-of: parasol
# Holds the built image tags (latest, 1.0). Shared by both build strategies.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: parasol-claims-git
  namespace: ogsr-parasol-images
  labels:
    app.kubernetes.io/name: parasol-claims
    app.kubernetes.io/part-of: parasol
spec:
  # Rebuild when the ImageStream base or the pushed config change.
  triggers:
    - type: ConfigChange
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
      ref: main
    # The app lives in a subdirectory of the monorepo.
    contextDir: apps/parasol-claims
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: parasol-claims:latest
