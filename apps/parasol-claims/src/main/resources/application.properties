# Parasol Insurance - Claims service (REST + PostgreSQL, Quarkus)
quarkus.application.name=parasol-claims

# Bind all interfaces on 8080 (the port the OpenShift Service and Route target).
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# ---------------------------------------------------------------------------
# HTTP security response headers (curriculum: M27 DevSecOps DAST gate). Quarkus
# adds each header to every HTTP response via quarkus.http.header.<key>.value.
# A ZAP (Zed Attack Proxy) baseline scan flags any of these as MISSING, so this
# block is what turns the M27 DAST gate from red to green. Harmless to every
# other module (a JSON API is unaffected by CSP/nosniff/frame headers).
#   X-Content-Type-Options  stop MIME-type sniffing
#   Content-Security-Policy  lock the origin; frame-ancestors 'none' = no framing
#   X-Frame-Options          belt-and-suspenders anti-clickjacking
#   Referrer-Policy          never leak the URL in the Referer header
#   Permissions-Policy       deny powerful browser features this API never uses
#   Strict-Transport-Security  force HTTPS at the edge (checked over TLS only)
#   Cache-Control              don't let a browser store claim data (ZAP flags cacheable content)
#   Cross-Origin-Resource-Policy  block cross-origin embedding of API responses (ZAP rule 90004)
# ---------------------------------------------------------------------------
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."Content-Security-Policy".value=default-src 'self'; frame-ancestors 'none'
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Referrer-Policy".value=no-referrer
quarkus.http.header."Permissions-Policy".value=geolocation=(), camera=(), microphone=()
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains
quarkus.http.header."Cache-Control".value=no-store
quarkus.http.header."Cross-Origin-Resource-Policy".value=same-origin

# ---------------------------------------------------------------------------
# Graceful shutdown. On SIGTERM (a rollout, or `oc scale` to 0) Quarkus stops
# accepting new requests and drains in-flight ones for at most this long before
# exiting. A short bound means a scaled-down pod dies crisply and well within a
# small terminationGracePeriodSeconds - which is what M21's cross-site failover
# relies on when it "fails a site" by scaling its Deployment to zero.
# ---------------------------------------------------------------------------
quarkus.shutdown.timeout=2S

# ---------------------------------------------------------------------------
# Site awareness (curriculum: M21). The GET / landing (RootResource) carries a
# compact "site":"<SITE>" marker when the SITE env var is set, so a cross-site
# failover client can log which site served each request; the marker is absent
# for the single-site modules that leave SITE unset. The root never touches the
# datasource, so M21 can run this same image DB-free as its per-site responder
# by setting QUARKUS_DATASOURCE_ACTIVE=false and QUARKUS_HIBERNATE_ORM_ACTIVE=false
# (the /api/claims data endpoints are inactive in that mode; M21 does not use them).
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Datasource. db-kind is PostgreSQL everywhere except tests. Every production
# value is env-overridable so the SAME image runs across dev/stage/prod with
# only config changing - this is the app M04 teaches config externalization on.
# Defaults point at a Service named 'parasol-db' in the same namespace.
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${POSTGRESQL_USER:parasol}
%prod.quarkus.datasource.password=${POSTGRESQL_PASSWORD:parasol}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRESQL_HOST:parasol-db}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DATABASE:parasol}

# Schema + deterministic seed. drop-and-create reloads the 30 fixed claims
# (CLM-1001..CLM-1030) from import.sql on every boot, so labs get reproducible
# output. For the persistence exercises in M05+ (data must survive a restart),
# override QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY=update (or none).
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# ---------------------------------------------------------------------------
# Observability is curriculum and ships ON by default under the /q path:
#   /q/health/live, /q/health/ready   SmallRye Health   (M04 probes, M11)
#   /q/metrics                         Micrometer/Prom   (M11 dashboards)
# Keep the HTTP server binder on so M11 can group request metrics by app.
# ---------------------------------------------------------------------------
quarkus.micrometer.binder.http-server.enabled=true

# OpenTelemetry: REST + JDBC auto-instrumentation is built into the image. The
# OTLP exporter is switched OFF by default (no collector exists before M11); M11
# turns it on against Tempo with:
#   QUARKUS_OTEL_SDK_DISABLED=false
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://<tempo-otlp>:4317
# Keeping it off here means clean logs for every module before M11.
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}

# ---------------------------------------------------------------------------
# OIDC - this is a bearer-only resource server (curriculum: M29). It ships
# DISABLED so the API stays anonymous for M01-M28 and no auth server is contacted
# at boot (module independence). M29 sets, per user, via env:
#   QUARKUS_OIDC_TENANT_ENABLED=true
#   QUARKUS_OIDC_AUTH_SERVER_URL=https://sso-workshop.<domain>/realms/realm-<user>
#   QUARKUS_OIDC_CLIENT_ID / QUARKUS_OIDC_CREDENTIALS_SECRET
# and adds @RolesAllowed("claims-adjuster") on the guarded ClaimResource method.
# ---------------------------------------------------------------------------
quarkus.oidc.tenant-enabled=false
quarkus.oidc.application-type=service
# Keycloak realm roles live under realm_access.roles (not groups) - set so
# @RolesAllowed(...) matches Keycloak realm roles once the tenant is enabled. Inert now.
quarkus.oidc.roles.role-claim-path=realm_access/roles
# Never auto-start a Keycloak Dev Services container in dev/test - the workshop
# always points OIDC at the shared rhbk via env (M29). Keeps dev mode and CI offline.
quarkus.keycloak.devservices.enabled=false

# ---- %dev: `mvn quarkus:dev` just works. With a container runtime (Podman /
# Dev Spaces) Quarkus Dev Services starts a throwaway PostgreSQL automatically.
# In M03 you point dev mode at the in-cluster PostgreSQL instead by exporting
# QUARKUS_DATASOURCE_JDBC_URL / _USERNAME / _PASSWORD.

# ---- %test: in-memory H2, so the build and CI never need a PostgreSQL. ----
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:claims;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
