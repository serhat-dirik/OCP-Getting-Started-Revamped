# Backstage / Red Hat Developer Hub catalog entities for parasol-claims (module M10).
#
# Declares the shared `parasol-insurance` System once (here, on the core service),
# then the parasol-claims Component and its API. parasol-web and
# parasol-notifications reference this same System from their own catalog-info.yaml.
#
# Kept portable (no cluster domain hardcoded): the integrations are driven by
# annotations, and RHDH derives the source + "Open in Dev Spaces" links from the
# catalog location. Environment-specific links (pipeline/Argo/Dev Spaces URLs) are
# injected by the M10 entry state when it registers per-user forks.
#   TODO(M10): confirm the exact Tekton annotation key for RHDH 1.10
#   (janus-idp.io/tekton vs tektonci/*) when the RHDH build lands.
---
# The owning team. Every Parasol Component/API/System/Template sets `owner: parasol`; declaring the
# Group here (alongside the shared System) makes those ownership links resolve in the RHDH catalog
# instead of showing as dangling references.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: parasol
  description: The Parasol Insurance engineering team — owner of every Parasol service and API.
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: parasol-insurance
  description: Parasol Insurance claims platform — the services behind the workshop story.
  tags:
    - parasol
    - insurance
spec:
  owner: parasol
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: parasol-claims
  description: Core claims service (REST + PostgreSQL, Quarkus). Owns the CLM-1001..CLM-1030 dataset.
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: parasol-claims
    argocd/app-name: parasol-claims
    janus-idp.io/tekton: parasol-claims
  tags:
    - java
    - quarkus
    - rest
    - postgresql
  links:
    - url: https://quarkus.io/guides/
      title: Quarkus guides
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: parasol
  system: parasol-insurance
  providesApis:
    - parasol-claims-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: parasol-claims-api
  description: Parasol claims REST API — claims CRUD, status workflow, and audit history.
  tags:
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: parasol
  system: parasol-insurance
  definition: |
    openapi: 3.0.3
    info:
      title: Parasol Claims API
      version: "1.1"
      description: Core claims service for Parasol Insurance.
    paths:
      /api/claims:
        get:
          summary: List claims (optional page & size)
          responses:
            "200": { description: A list of claims }
        post:
          summary: Create a claim
          responses:
            "201": { description: The created claim }
            "400": { description: Invalid claimant or type }
      /api/claims/{claimNumber}:
        get:
          summary: Get one claim by its number
          parameters:
            - { name: claimNumber, in: path, required: true, schema: { type: string } }
          responses:
            "200": { description: The claim }
            "404": { description: No such claim }
      /api/claims/{claimNumber}/history:
        get:
          summary: A claim's audit timeline
          parameters:
            - { name: claimNumber, in: path, required: true, schema: { type: string } }
          responses:
            "200": { description: The claim and its ordered events }
            "404": { description: No such claim }
      /api/claims/{claimNumber}/status:
        put:
          summary: Advance a claim's workflow status
          parameters:
            - { name: claimNumber, in: path, required: true, schema: { type: string } }
          responses:
            "200": { description: The updated claim }
            "400": { description: Invalid status }
