# Dev Spaces workspace definition for parasol-claims (devfile 2.2.0).
#
# STARTER for module M03 (Dev Spaces & the Inner Loop): it makes "Open in Dev
# Spaces" from the Gitea repo land in a Java 21 workspace with Quarkus dev mode
# wired up. M03 has attendees EXTEND this file (add a command, add a component
# such as a sidecar), so it is deliberately minimal.
#
# NOTE: verify in Dev Spaces during the M03 build (the app-developer could not
# drive the Dev Spaces UI when authoring this). The universal developer image
# ships several JDKs; confirm Java 21 is selected for the Maven build.
schemaVersion: 2.2.0
metadata:
  name: parasol-claims
  displayName: Parasol Claims Service
  description: Quarkus claims service - inner-loop development with live reload against an in-cluster PostgreSQL.
  language: Java
  projectType: Quarkus
  tags:
    - Java
    - Quarkus
    - PostgreSQL
components:
  - name: tools
    container:
      # Red Hat universal developer image (the Dev Spaces default); includes JDK + Maven.
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 3Gi
      cpuLimit: "2"
      mountSources: true
      env:
        # Bind Quarkus to all interfaces so the workspace endpoint can reach it.
        - name: QUARKUS_HTTP_HOST
          value: 0.0.0.0
      endpoints:
        - name: quarkus-http
          targetPort: 8080
          exposure: public
          protocol: http
commands:
  - id: package
    exec:
      label: Package (skip tests)
      component: tools
      commandLine: ./mvnw -B -ntp -DskipTests clean package
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: dev
    exec:
      label: Quarkus dev mode (live reload)
      component: tools
      commandLine: ./mvnw quarkus:dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
