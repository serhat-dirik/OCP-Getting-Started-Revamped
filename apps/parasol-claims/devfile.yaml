# Dev Spaces workspace definition for parasol-claims (devfile 2.2.0).
#
# STARTER for module M03 (Dev Spaces & the Inner Loop): it makes "Open in Dev
# Spaces" from the Gitea repo land in a Java 21 workspace with Quarkus dev mode
# wired up. M03 has attendees EXTEND this file (add a command, add a component
# such as a sidecar), so it is deliberately minimal.
#
# Verified on Dev Spaces 3.29 (OCP 4.21) during the M03 build, 2026-07-09:
# workspace starts, project clones, `./mvnw quarkus:dev` live-reloads against the
# in-cluster claims-db. The UDI bundles JDK 8/11/17/21 but DEFAULTS to 17, while
# this project targets 21 (pom release=21) — so JAVA_HOME is pinned to 21 below.
schemaVersion: 2.2.0
metadata:
  name: parasol-claims
  displayName: Parasol Claims Service
  description: Quarkus claims service - inner-loop development with live reload against an in-cluster PostgreSQL.
  language: Java
  projectType: Quarkus
  tags:
    - Java
    - Quarkus
    - PostgreSQL
components:
  - name: tools
    container:
      # Red Hat Dev Spaces universal developer image (the productized default editor's tools
      # image); bundles JDK 8/11/17/21 + Maven. Tag tracks the Dev Spaces version (3.29).
      image: registry.redhat.io/devspaces/udi-rhel9:3.29
      memoryLimit: 3Gi
      cpuLimit: "2"
      mountSources: true
      env:
        # Bind Quarkus to all interfaces so the workspace endpoint can reach it.
        - name: QUARKUS_HTTP_HOST
          value: 0.0.0.0
        # The UDI defaults to Java 17; this project needs Java 21 (pom release=21). Maven
        # resolves the JDK from JAVA_HOME, and PATH is prefixed with the JDK 21 bin so that
        # `java -version` in the terminal also reports 21 (the rest is the stock UDI 3.29 PATH).
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-21
        - name: PATH
          value: /usr/lib/jvm/java-21/bin:/home/user/.local/bin:/home/user/.java/current/bin:/home/user/node_modules/.bin/:/home/user/.npm-global/bin/:/opt/app-root/src/.npm-global/bin/:/usr/share/maven/bin:/usr/bin:/home/user/go/bin:/home/tooling/.local/bin:/home/tooling/.java/current/bin:/home/tooling/node_modules/.bin/:/home/tooling/.npm-global/bin/:/home/tooling/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      endpoints:
        - name: quarkus-http
          targetPort: 8080
          exposure: public
          protocol: http
commands:
  - id: package
    exec:
      label: Package (skip tests)
      component: tools
      commandLine: ./mvnw -B -ntp -DskipTests clean package
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: dev
    exec:
      label: Quarkus dev mode (live reload)
      component: tools
      commandLine: ./mvnw quarkus:dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
