# Parasol Insurance - Fraud scoring service (bearer-only OIDC, Quarkus)
quarkus.application.name=parasol-fraud

# Bind all interfaces on 8080 (the port the OpenShift Service and Route target).
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# ---------------------------------------------------------------------------
# OIDC - this service is a BEARER-ONLY resource server.
#
# It ships DISABLED so it behaves like every other Parasol app before M29:
# endpoints are anonymous and no auth server is contacted at boot (module
# independence - M01-M28 must be unaffected). M29 sets, per user, via env:
#   QUARKUS_OIDC_TENANT_ENABLED=true
#   QUARKUS_OIDC_AUTH_SERVER_URL=https://sso-workshop.<domain>/realms/realm-<user>
# and then this service accepts ONLY tokens carrying aud=fraud (see below), so a
# token exchanged/down-scoped by parasol-claims is accepted and an escalation is not.
# ---------------------------------------------------------------------------
quarkus.oidc.tenant-enabled=false
quarkus.oidc.application-type=service

# Never auto-start a Keycloak Dev Services container in dev/test - this workshop
# always points OIDC at the shared rhbk via env (M29), so dev mode and CI stay
# offline and fast. No effect in prod.
quarkus.keycloak.devservices.enabled=false

# Keycloak realm roles live under realm_access.roles (not groups) - set here so
# @RolesAllowed(...) matches once the tenant is enabled. Inert while disabled.
quarkus.oidc.roles.role-claim-path=realm_access/roles

# Audience enforcement is the point of the M29 exchange lesson. Kept commented so
# the disabled-tenant default never rejects a token; M29 enables the tenant and
# uncomments this (or sets QUARKUS_OIDC_TOKEN_AUDIENCE=fraud) to require aud=fraud.
# quarkus.oidc.token.audience=fraud

# ---------------------------------------------------------------------------
# Observability ships ON by default under /q (curriculum: M04 probes, M11):
#   /q/health/live, /q/health/ready   SmallRye Health
#   /q/metrics                        Micrometer/Prometheus
# ---------------------------------------------------------------------------
quarkus.micrometer.binder.http-server.enabled=true

# OpenTelemetry: REST auto-instrumentation is built in; the OTLP exporter is OFF
# by default (no collector before M11). M11/M29 turn it on to see the
# web->claims->fraud chain as a single trace:
#   QUARKUS_OTEL_SDK_DISABLED=false
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://<tempo-otlp>:4317
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
