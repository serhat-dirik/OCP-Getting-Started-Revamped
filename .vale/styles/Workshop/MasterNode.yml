# "master node(s)" -> "control plane" (04-STYLE-GUIDE §5).
# Word-boundary + case-insensitive, but only when followed by "node"/"nodes" so that
# "Master" in unrelated compounds (e.g. a product name) is not touched.
# Vale fills substitution messages as (replacement, matched) — replacement first.
extends: substitution
message: "Use '%s' instead of deprecated '%s' (04-STYLE-GUIDE §5)."
level: error
ignorecase: true
swap:
  'master nodes': "control plane nodes"
  'master node': "control plane node"
