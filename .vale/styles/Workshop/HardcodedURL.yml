# No hardcoded cluster URLs in prose — every environment URL is built from an attribute
# (04-STYLE-GUIDE §3, 01-ARCHITECTURE §2). Matches an "…apps.<domain>" hostname URL.
# Attribute-built URLs (e.g. https://console-openshift-console.{cluster_domain}) do NOT
# match because the regex needs a literal "apps." and the braces break the pattern.
extends: existence
message: "Hardcoded cluster URL '%s' — build it from an attribute like {ocp_console_url} or {cluster_domain} (04-STYLE-GUIDE §3)."
level: error
ignorecase: true
nonword: true
# raw scope: AsciiDoc auto-links bare URLs and the link target escapes vale's text scope,
# so the rule silently never fired (found during M05 G2, 2026-07-09). Raw checks the source.
scope: raw
tokens:
  - 'https?://[a-z0-9.-]*apps\.[a-z0-9.-]+'
