# Banned product names / deprecated tech -> current replacement (04-STYLE-GUIDE §5).
# Case-sensitive: these are exact product strings, and keeping case exact avoids
# false positives on unrelated words. Keys are regex; word boundaries are applied.
# Vale fills substitution messages as (replacement, matched) — replacement first.
extends: substitution
message: "Use '%s' instead of banned '%s' (04-STYLE-GUIDE §5)."
level: error
ignorecase: false
swap:
  'DeploymentConfigs?': "Deployment"
  'RH-SSO': "Red Hat build of Keycloak"
  'Red Hat SSO': "Red Hat build of Keycloak"
  '3scale': "Red Hat Connectivity Link"
  'AMQ Streams': "Streams for Apache Kafka"
  'CodeReady Workspaces': "Dev Spaces"
  'CRC': "OpenShift Local"
  'ServiceMeshControlPlane': "an Istio (Sail operator) CR"
  'SMCP': "OSSM3 Istio/Sail CRs"
  'SMMR': "OSSM3 Istio/Sail CRs"
  'Tekton Hub': "Artifact Hub / cluster resolvers"
  'RHPDS': "RHDP / demo.redhat.com"
