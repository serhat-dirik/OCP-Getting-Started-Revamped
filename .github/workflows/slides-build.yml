---
name: slides-build
# ADR-0005 structural proof: the branded decks are assembled with the redhat-deck-design
# skill locally (LibreOffice + fonts + the icon set — not reproducible in CI), so CI proves
# the SCHEMA + the template-fallback path instead: build-deck.py parses two outlines into a
# PPTX and self-checks the slide count, then we re-open the artifact and assert independently.
on:
  push:
    branches: [main]
    paths:
      - 'slides/outlines/**'
      - 'tools/slides/**'
      - 'modules.yaml'
      - '.github/workflows/slides-build.yml'
  pull_request:
    paths:
      - 'slides/outlines/**'
      - 'tools/slides/**'
      - 'modules.yaml'
      - '.github/workflows/slides-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install python-pptx (pinned)
        run: pip install "python-pptx==1.0.2"

      - name: Structural build proof (build-deck.py self-check)
        # build-deck.py builds the PPTX, reopens it, and exits non-zero if the built
        # slide count is less than what it parsed from the outlines.
        run: |
          python tools/slides/build-deck.py --out slides/dist/ci-proof.pptx \
            slides/outlines/platform-orientation.md \
            slides/outlines/gitops-fundamentals.md

      - name: Re-open artifact and assert slide count
        run: |
          python - <<'PY'
          from pptx import Presentation
          prs = Presentation("slides/dist/ci-proof.pptx")
          n = len(prs.slides)
          assert n >= 10, f"expected >= 10 slides, got {n}"
          print(f"re-opened OK: {n} slides")
          PY
