---
name: link-check
on:
  pull_request:
    paths: ['content/**']
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build workshop site
        working-directory: content
        run: npx antora --fetch site-workshop.yml

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          # Exclude local/dev-default hosts and unresolved {attribute} artifacts;
          # everything else in the rendered HTML must resolve.
          args: >-
            --no-progress
            --max-retries 3
            --exclude 'example\.com'
            --exclude 'localhost'
            --exclude '\{[a-z_]+\}'
            'www/workshop/**/*.html'
          fail: true
