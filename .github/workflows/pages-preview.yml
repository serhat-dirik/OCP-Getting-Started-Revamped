---
name: pages-preview
on:
  push:
    branches: [main]

# GitHub Pages deploy needs these; the PM enables Pages (Settings → Pages → GitHub Actions).
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build workshop site (with the Pages base URL)
        working-directory: content
        run: |
          npx antora --fetch \
            --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            site-workshop.yml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: www/workshop

      - id: deploy
        uses: actions/deploy-pages@v4
