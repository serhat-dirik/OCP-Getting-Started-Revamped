# =============================================================================
# RHDP UserInfo ConfigMap (sync-wave -1) — the `demo.redhat.com/userinfo` label
# tells RHDP to surface this ConfigMap's data keys to the requester (access URLs,
# roster, the shared non-secret password). URLs are deterministic from
# deployer.domain, so this renders early — the requester sees access info while the
# child apps are still deploying.
# =============================================================================
{{- $domain := .Values.deployer.domain }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ogsr-userinfo
  namespace: {{ .Values.namespaces.system }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    demo.redhat.com/userinfo: ""
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
data:
  demo_title: "OpenShift Application Platform — Getting Started"
  access_instructions: |
    Each attendee has their own Showroom cockpit (lab guide + in-browser terminal +
    console/tool tabs). Open your showroom_url below and log in to the OpenShift
    console with your username and the shared workshop password. Child Applications
    (platform stacks + workshop layer) keep deploying for ~15-25 min after the order
    reports Ready — track them in the Argo CD UI (argocd_url).
  console_url: "https://console-openshift-console.{{ $domain }}"
  argocd_url: "https://openshift-gitops-server-{{ .Values.argocd.namespace }}.{{ $domain }}"
  gitea_url: "https://{{ include "ogsr-bootstrap.giteaHost" . }}"
  cluster_domain: {{ $domain | quote }}
  workshop_users: {{ include "ogsr-bootstrap.userList" . | quote }}
  workshop_password: {{ .Values.workshop_user_password | quote }}
  showroom_urls: |
    {{- if .Values.multi_user.users }}
    {{- range .Values.multi_user.users }}
    {{ .username }}: https://showroom-{{ .username }}.{{ $domain }}
    {{- end }}
    {{- else }}
    {{- range $i := until (int .Values.multi_user.num_users) }}
    {{ printf "%s%d" $.Values.multi_user.userPrefix (add $i 1) }}: https://showroom-{{ printf "%s%d" $.Values.multi_user.userPrefix (add $i 1) }}.{{ $domain }}
    {{- end }}
    {{- end }}
