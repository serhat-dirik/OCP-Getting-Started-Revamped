# =============================================================================
# Bootstrap groundwork (sync-wave -20) — runs first, in the Sync phase, BEFORE
# the Job hooks (-10..-8) and the child Applications (0..2). Normal resources
# (not hooks) so the ServiceAccount persists for every subsequent sync.
# =============================================================================
# The imperative work bootstrap/install.sh does as cluster-admin (patch oauth/cluster,
# label/taint nodes, create secrets across openshift-config/-lightspeed/ogsr-gitea, write the
# uninstall-state CM) is done here by Jobs running as this SA. It is bound to cluster-admin
# because those verbs span cluster scope + several product namespaces; the Argo application
# controller that renders `field-content` is itself cluster-admin under FSC, so it can grant
# this. # TODO(verify-on-cluster): confirm the openshift-gitops controller is cluster-admin
# on the RHDP-provisioned cluster (hyperledger's operator-installing chart relies on the same).
# Backlog: replace the cluster-admin binding with a scoped ClusterRole (see docs).
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.system }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  labels:
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ogsr-bootstrap
  namespace: {{ .Values.namespaces.system }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  labels:
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
---
# cluster-admin: the bootstrap Jobs patch cluster-scoped singletons (oauth/cluster, nodes)
# and write into product namespaces — same privilege bootstrap/install.sh runs with.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ogsr-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  labels:
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ogsr-bootstrap
    namespace: {{ .Values.namespaces.system }}
