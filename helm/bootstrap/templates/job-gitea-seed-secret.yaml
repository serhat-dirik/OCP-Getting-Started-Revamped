# =============================================================================
# Gitea seed secret (Sync hook, wave 1) — the declarative twin of
# bootstrap/install.sh's [4/6] step. Publishes the shared workshop password as
# secret workshop-user-creds in the gitea namespace — the single source
# gitops/workshop-config's gitea-user-seed (and showroom) read. The gitea namespace is
# created by pp-core-devtools (wave 0, a DIFFERENT Application), so this Job POLLS for the
# namespace rather than trusting cross-Application wave timing. Idempotent (apply).
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: ogsr-gitea-seed-secret
  namespace: {{ .Values.namespaces.system }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        {{- include "ogsr-bootstrap.ownerLabels" . | nindent 8 }}
    spec:
      serviceAccountName: ogsr-bootstrap
      restartPolicy: Never
      containers:
        - name: seed
          image: {{ .Values.images.cli }}
          command: ["/bin/bash", "-c"]
          env:
            - name: GITEA_NS
              value: {{ .Values.namespaces.gitea | quote }}
            - name: OWNER
              value: {{ .Values.owner | quote }}
            # Non-secret shared workshop password by design (throwaway attendee logins).
            - name: WS_PASS
              value: {{ .Values.workshop_user_password | quote }}
          args:
            - |
              set -euo pipefail
              ok(){ echo "✅ $*"; }; info(){ echo "▶ $*"; }

              info "waiting for the ${GITEA_NS} namespace (created by pp-core-devtools, wave 0)…"
              for i in $(seq 1 90); do
                oc get namespace "$GITEA_NS" >/dev/null 2>&1 && break
                sleep 10
              done
              oc get namespace "$GITEA_NS" >/dev/null 2>&1 || { echo "❌ ${GITEA_NS} namespace absent after 15m — is pp-core-devtools syncing?"; exit 1; }

              info "publishing workshop-user-creds (shared password) into ${GITEA_NS}"
              oc create secret generic workshop-user-creds \
                --from-literal=password="$WS_PASS" -n "$GITEA_NS" \
                --dry-run=client -o yaml \
                | oc label --local -f - "workshop.redhat.com/owner=${OWNER}" --overwrite -o yaml \
                | oc apply -f - >/dev/null
              ok "workshop-user-creds applied in ${GITEA_NS}"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 512Mi
