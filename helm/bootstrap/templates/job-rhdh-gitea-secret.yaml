{{- if .Values.stacks.portal }}
# =============================================================================
# RHDH Gitea contract (Sync hook, wave 1) — the declarative twin of install.sh's
# step 4b. The portal stack's Backstage CR consumes secret rhdh/rhdh-gitea
# (components/rhdh/README.md contract). CREATE-OR-REFRESH, never create-only:
# the Gitea operator regenerates its admin password on reinstall, and a
# preserved secret fossilizes -> RHDH reads 401 on every catalog Location and
# the whole cohort sees an empty catalog (M12 G3 FAIL, found live 2026-07-19).
# Waits for the gitea CR (core-devtools, wave 0) to publish its admin password.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: ogsr-rhdh-gitea-secret
  namespace: {{ .Values.namespaces.system }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        {{- include "ogsr-bootstrap.ownerLabels" . | nindent 8 }}
    spec:
      serviceAccountName: ogsr-bootstrap
      restartPolicy: Never
      containers:
        - name: refresh
          image: {{ .Values.images.cli }}
          resources:
            requests: {memory: 512Mi, cpu: 100m}
            limits: {memory: 1Gi}
          command: ["/bin/bash", "-ceu"]
          args:
            - |
              GITEA_NS="{{ .Values.namespaces.gitea }}"
              for i in $(seq 1 60); do
                U="$(oc get gitea gitea -n "$GITEA_NS" -o jsonpath='{.spec.giteaAdminUser}' 2>/dev/null || true)"
                P="$(oc get gitea gitea -n "$GITEA_NS" -o jsonpath='{.status.adminPassword}' 2>/dev/null || true)"
                [ -n "$U" ] && [ -n "$P" ] && break
                sleep 10
              done
              if [ -z "${U:-}" ] || [ -z "${P:-}" ]; then
                echo "gitea CR admin credential not readable — giving up"; exit 1
              fi
              R="$(oc get route -n "$GITEA_NS" -o jsonpath='{.items[0].spec.host}' 2>/dev/null || true)"
              oc get ns rhdh >/dev/null 2>&1 || oc create ns rhdh || true
              oc create secret generic rhdh-gitea -n rhdh \
                --from-literal=GITEA_USERNAME="$U" \
                --from-literal=GITEA_PASSWORD="$P" \
                --from-literal=GITEA_BASEURL="https://$R" \
                --from-literal=GITEA_HOST="$R" \
                --dry-run=client -o yaml \
                | oc label --local --overwrite -f - workshop.redhat.com/owner=ogsr -o yaml \
                | oc apply -f -
              echo "rhdh-gitea refreshed from the live gitea CR"
{{- end }}
