{{- if .Values.litemaas.enabled }}
# =============================================================================
# MaaS secret (Sync hook, wave -8) — the declarative twin of bootstrap/install.sh's
# [2/6] step 2b. Materializes the OpenShift Lightspeed `credentials` Secret (key:
# apitoken) from the RHDP-injected litemaas.apiKey. GUARDED: if Lightspeed is already
# installed (olsconfig/cluster present) it carries its own provider secret — we NEVER
# overwrite it. Records lightspeed_ns_created / lightspeed_secret_created so the uninstall
# removes only what we made. Enable the ai-assist stack (stacks.lightspeed) alongside so
# the OLSConfig that consumes this secret is deployed.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: ogsr-maas-secret
  namespace: {{ .Values.namespaces.system }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-8"
  labels:
    {{- include "ogsr-bootstrap.ownerLabels" . | nindent 4 }}
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "ogsr-bootstrap.ownerLabels" . | nindent 8 }}
    spec:
      serviceAccountName: ogsr-bootstrap
      restartPolicy: Never
      containers:
        - name: maas
          image: {{ .Values.images.cli }}
          command: ["/bin/bash", "-c"]
          env:
            - name: STATE_NS
              value: {{ .Values.namespaces.system | quote }}
            - name: LS_NS
              value: {{ .Values.namespaces.lightspeed | quote }}
            - name: OWNER
              value: {{ .Values.owner | quote }}
            # Injected MaaS key — rendered straight into the in-cluster Secret (never committed).
            - name: MAAS_KEY
              value: {{ .Values.litemaas.apiKey | quote }}
          args:
            - |
              set -euo pipefail
              CM="ogsr-uninstall-state"
              ok(){ echo "✅ $*"; }; info(){ echo "▶ $*"; }
              record_once(){
                local k="$1" v="$2" cur
                cur="$(oc get configmap "$CM" -n "$STATE_NS" -o jsonpath="{.data['$k']}" 2>/dev/null || true)"
                [[ -n "$cur" ]] && return 0
                oc patch configmap "$CM" -n "$STATE_NS" --type merge -p "{\"data\":{\"$k\":\"$v\"}}" >/dev/null 2>&1 || true
              }

              if oc get olsconfig cluster >/dev/null 2>&1; then
                record_once lightspeed_preinstalled true
                ok "OpenShift Lightspeed pre-installed — leaving its provider secret untouched"
                exit 0
              fi
              [[ -n "$MAAS_KEY" ]] || { echo "❌ litemaas.enabled but litemaas.apiKey is empty"; exit 1; }

              if oc get namespace "$LS_NS" >/dev/null 2>&1; then
                record_once lightspeed_ns_created false
              else
                record_once lightspeed_ns_created true
                oc create namespace "$LS_NS" --dry-run=client -o yaml \
                  | oc label --local -f - "workshop.redhat.com/owner=${OWNER}" --overwrite -o yaml \
                  | oc apply -f - >/dev/null
              fi

              info "creating ${LS_NS}/credentials (apitoken) — MaaS token"
              oc create secret generic credentials \
                --from-literal=apitoken="$MAAS_KEY" -n "$LS_NS" \
                --dry-run=client -o yaml \
                | oc label --local -f - "workshop.redhat.com/owner=${OWNER}" --overwrite -o yaml \
                | oc apply -f - >/dev/null
              record_once lightspeed_secret_created true
              ok "MaaS credentials secret applied"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 512Mi
{{- end }}
