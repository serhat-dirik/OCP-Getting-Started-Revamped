apiVersion: v2
name: ogsr-bootstrap
description: >-
  OCP-Getting-Started FSC entrypoint. Red Hat Demo Platform (Field Sourced Content)
  points its `field-content` Application at this chart; it deploys the in-cluster Gitea
  mirror anchor, the platform-portfolio stacks and the workshop-config layer as child
  Argo CD Applications (app-of-apps), and GitOps-ifies the imperative bootstrap steps
  (htpasswd users, OAuth IdP, MaaS secret, node shaping, uninstall-state capture) as
  in-cluster Jobs. Workshop-agnostic where the portfolio is; workshop-specific on top.
type: application
version: 0.1.0
appVersion: "1.0.0"
