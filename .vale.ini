# Vale configuration — enforces 04-STYLE-GUIDE §5 terminology on workshop content.
# Rules live in .vale/styles/Workshop/. All are self-contained (no `vale sync` needed).
# Vale exits non-zero on any error-level alert, so error rules gate CI; suggestion
# rules (e.g. kubectl) surface locally without failing the build.
StylesPath = .vale/styles

# Show everything locally; CI still only fails on errors.
MinAlertLevel = suggestion

# Vale parses AsciiDoc via Asciidoctor (installed in CI); code/literal blocks are
# skipped automatically, so `[source]` command samples are not flagged.
[*.adoc]
BasedOnStyles = Workshop
