# modules.yaml — ORDERED module catalog and the SINGLE SOURCE OF TRUTH for module order.
#
# Position in this list IS the module's number (1-based): the first entry is module 1,
# the eighth is module 8, and so on. Numbers are DECOUPLED from slugs (owner decision
# 2026-07-17) — a slug never encodes its number, so a module keeps its identity when the
# catalog is reordered. To reorder or renumber: move entries here, then reorder the nav
# lines to match; tools/check-module-order.sh guards that the two stay in sync. Nothing
# else needs editing — content dirs, entry states, verify scripts, and Argo app names are
# all keyed by slug.
#
# Consumers: tools/ws/ws (ws start m08 -> position 8 -> slug; ws start <slug> direct),
# tools/slides/build-deck.py (deck order), tools/check-module-order.sh (nav-order guard).
#
# `title` is the module's display name (no number). Entitlement tags ([ADS]/[ADD-ON]) and
# the nav track groupings live in the nav/index, not here.
