---
# Antora playbook for the SA-DEMOS cockpit build (in-cluster, run by the showroom-content image /
# antora init container after the repo is cloned to /showroom/repo). Demo-flavor sibling of
# showroom/site.yml — same in-pod build contract, only the flavor attribute and title differ. Used
# ONLY by gitops/workshop-config/templates/showroom-demos.yaml (the shared SA presenter cockpit);
# the per-attendee cockpit (templates/showroom.yaml) keeps using showroom/site.yml unchanged.
#
# WHY THIS FILE EXISTS (not a direct reference to content/site-demo.yml): that playbook is the
# CI/local-preview one, built from inside content/ (`cd content && antora site-demo.yml` — see its
# own header + .github/workflows/content-build.yml's `working-directory: content`). Its
# `content.sources[0].url: ..` only resolves to the repo root when the invoking cwd is content/,
# and its `antora.extensions[].require` are bare package names resolved via node_modules two
# levels up from a real npm install. Neither holds in-pod: the entrypoint runs
# `cd $FILES_DIR (=/showroom/repo) && antora showroom/site-demo.yml` (repo ROOT, not content/), and
# the cloned mirror ships no node_modules at all. showroom/site.yml was written to survive exactly
# this environment (absolute content source, absolute extension paths); this file just carries
# that same shape with `demo: true` instead of `workshop: true`. Keep the two in lockstep — a
# change to one (extension config, ui.bundle, supplemental_files) almost always belongs in both.
site:
  title: "OpenShift Application Platform — Getting Started — Demo Guide"
  start_page: modules::index.adoc

content:
  sources:
    # Absolute path to the in-pod checkout; start_path selects content/antora.yml — the SAME
    # component showroom/site.yml and every content/site-*.yml build, just with `demo: true` so
    # nav.adoc + every ifdef::demo[] block render the presenter flavor instead of the attendee one.
    - url: /showroom/repo
      start_path: content

asciidoc:
  attributes:
    # UI macros (kbd:/btn:/menu:) and stable deep-link IDs — mirror content/antora.yml.
    experimental: true
    idprefix: ""
    idseparator: "-"
    # Flavor flag: the SA-Demos cockpit serves the DEMO rendering (presenter Say/Show/Do blocks);
    # modules/ROOT/nav.adoc includes nav-demo.adoc only when this is set. Without it the sidebar
    # renders EMPTY — same nav-wiring failure mode showroom/site.yml documents for workshop
    # (2026-07-10 finding, applies identically here).
    demo: true

antora:
  extensions:
    # Same two extensions, same config, as showroom/site.yml and content/site-demo.yml — required
    # by ABSOLUTE path from the antora-ext image (/opt/antora-ext/node_modules), since the in-pod
    # build has no repo-local node_modules. Config drift across these three playbooks is a defect.
    - require: /opt/antora-ext/node_modules/@sntke/antora-mermaid-extension
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
        # snake_case keys required — the extension mangles raw camelCase (see site-workshop.yml).
        theme: default
        theme_variables:
          font_size: "18px"
        flowchart:
          html_labels: true
          use_max_width: true
          node_spacing: 45
          rank_spacing: 50
          padding: 12
    - require: /opt/antora-ext/node_modules/@andrew-jones/antora-tabs-extension
      # Remember the presenter's CLI-vs-Console tab choice across every page (localStorage).
      sync_storage_key: preferred-tab

ui:
  bundle:
    # RHDP Showroom theme, PatternFly 6 release — same bundle the CI build and showroom/site.yml use.
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true
  # Bare path (no leading ./ or ../), resolved relative to CWD (/showroom/repo) by the in-pod
  # entrypoint — see showroom/site.yml for the full empirically-verified resolution rules (a
  # './'-prefixed or list form silently injects nothing). head-styles.hbs (mermaid sizing + tab
  # neutralization) and header-content.hbs ("You are {user}") live in content/, shared with every
  # playbook; this cockpit deliberately injects no {page-user} attribute (see
  # templates/showroom-demos.yaml) since no single attendee identity applies to a shared presenter
  # cockpit — same as the CI/local-preview builds, which never set it either.
  supplemental_files: content/supplemental-ui

runtime:
  cache_dir: ./.cache/antora

output:
  dir: /showroom/www
