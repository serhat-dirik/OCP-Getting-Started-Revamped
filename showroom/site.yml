---
# Antora playbook for the SHOWROOM deployment build (in-cluster, run by the showroom-content
# image / antora init container after the repo is cloned to /showroom/repo).
#
# Distinct from content/site-workshop.yml (the CI/preview playbook, built from inside content/):
# this one builds from the REPO ROOT so the cloned checkout resolves cleanly. The mermaid/tabs
# extensions load from ABSOLUTE paths baked into the workshop-owned antora build image
# (imagestream showroom/antora-ext, values.yaml showroom.images.antora — 2026-07-11, ends the
# "degraded tabs/diagrams in cockpit" era). The stock quay.io/rhpds/antora image CANNOT build
# this playbook (missing modules = hard failure) — keep image + playbook in lockstep.
site:
  title: "OpenShift Application Platform — Getting Started"
  start_page: modules::index.adoc

content:
  sources:
    # Absolute path to the in-pod checkout; start_path selects content/antora.yml. Antora reads
    # the local worktree, so the mirror's committed content renders as-is.
    - url: /showroom/repo
      start_path: content

asciidoc:
  attributes:
    # UI macros (kbd:/btn:/menu:) and stable deep-link IDs — mirror content/antora.yml.
    experimental: true
    idprefix: ""
    idseparator: "-"
    # Flavor flag: the cockpit serves the WORKSHOP rendering; modules/ROOT/nav.adoc selects
    # nav-workshop.adoc from this. Without it the sidebar renders EMPTY (nav wiring, 2026-07-10).
    workshop: true

antora:
  extensions:
    # Same two extensions as content/site-workshop.yml, same config — but required by ABSOLUTE
    # path from the antora-ext image (/opt/antora-ext/node_modules), since the in-pod build has
    # no repo-local node_modules. Config drift between the two playbooks is a defect.
    - require: /opt/antora-ext/node_modules/@sntke/antora-mermaid-extension
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
        # snake_case keys required — the extension mangles raw camelCase (see site-workshop.yml).
        theme: default
        theme_variables:
          font_size: "18px"
        flowchart:
          html_labels: true
          use_max_width: true
          node_spacing: 45
          rank_spacing: 50
          padding: 12
    - require: /opt/antora-ext/node_modules/@andrew-jones/antora-tabs-extension
      # Remember the attendee's CLI-vs-Console tab choice across every page (localStorage).
      sync_storage_key: preferred-tab

ui:
  bundle:
    # RHDP Showroom theme, PatternFly 6 release — same bundle the CI build uses.
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true
  # ONE directory string — the ONLY form Antora reliably globs for partials. A LIST of directory
  # strings (the previous shape) is NOT valid and silently injected NOTHING, so the cockpit shipped
  # with zero supplemental CSS: mermaid diagrams stayed tiny and [tabs] panels overlapped, because
  # head-styles.hbs never loaded (found in the first live test, 2026-07-11). Both partials —
  # head-styles.hbs (mermaid sizing + tab neutralization) and header-content.hbs ("You are {user}")
  # — now live together in content/supplemental-ui, shared with the CI build.
  # BARE path (no leading ./ or ../) — verified empirically the only form that resolves here. The
  # entrypoint runs `cd $FILES_DIR (=/showroom/repo) && antora showroom/site.yml`, and Antora
  # resolves a bare supplemental_files path relative to that CWD → /showroom/repo/content/... ✓.
  # (A './' prefix resolves against the playbook dir = showroom/content/... ✗; '../' overshoots.)
  # TWO bugs kept the cockpit CSS-less until the first live test (2026-07-11: tiny diagrams,
  # overlapping tabs — head-styles.hbs never loaded): the old value used './content/...' AND wrapped
  # it (with './showroom/...') in a LIST, but Antora only globs a SINGLE directory string here.
  # head-styles.hbs (mermaid sizing + tab neutralization) + header-content.hbs now share content/.
  supplemental_files: content/supplemental-ui

runtime:
  cache_dir: ./.cache/antora

output:
  dir: /showroom/www
