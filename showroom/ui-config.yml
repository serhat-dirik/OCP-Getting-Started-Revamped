---
# Showroom (nookbag) UI config — the attendee cockpit layout.
#
# CANONICAL / LOCAL-DEV COPY. The authoritative runtime copy is templated per-user by
# gitops/workshop-config/templates/showroom.yaml (SHOWROOM_UI_CONFIG env), which substitutes
# the real apps domain for ${DOMAIN}. Keep the two in sync; this file documents intent and
# lets `podman run ... ghcr.io/juliaaano/antora-viewer` render the shell locally.
#
# Schema: https://github.com/rhpds/nookbag/blob/main/docs/UI-CONFIG.md
type: showroom

# Left column = instructions (our Antora content); right column = terminals + tool tabs.
# 45% keeps commands readable while leaving the terminal a usable width (project ruling 2026-07-10).
default_width: 45
# Browser refresh must not reset which page/tab the attendee was on.
persist_url_state: true

# Right-edge popout to flip between Instructions-only / Split / Tabs-only (Alt+V cycles).
view_switcher:
  enabled: true
  default_mode: split

# Antora content shown in the left panel. `name` is our component (content/antora.yml → modules);
# `dir` defaults to www for type: showroom. No modules[] list — Antora's own nav-workshop.adoc
# drives navigation (27 modules eventually), so we do not duplicate the nav here.
antora:
  name: modules

tabs:
  # Two terminals (double-terminal → /tty-top + /tty-bottom on port 443, proxied to one ttyd
  # that forks a fresh shell per connection). This workshop is full of watch-in-one / act-in-the-
  # other beats, so both shells share the attendee's home and identity (logged in as {user}).
  - name: Terminal 1
    secondary_name: Terminal 2
    type: double-terminal

  # Tool tabs are external (open in a new browser tab) — one-click launchers, NOT iframes.
  # Every one of these tools sends a frame-blocking header — OCP console `X-Frame-Options: DENY`;
  # Gitea `SAMEORIGIN`; Argo CD `frame-ancestors 'self'` + `SAMEORIGIN`; Dev Spaces / RHDH /
  # SonarQube likewise — so none can be iframe-embedded cross-origin in the cockpit (verified live:
  # embedded panes render blank). Embedding them the way rhpds AgentOps does needs a cluster-wide
  # IngressController header rewrite (delete X-Frame-Options + permissive frame-ancestors) OR
  # per-tool frame-ancestors config; both change cluster/tool behavior, which we avoid so the
  # workshop drops onto an existing cluster unchanged (see the non-invasive rule). Launchers it is.
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
    external: true
  - name: Gitea
    url: 'https://gitea-gitea.${DOMAIN}'
    external: true
  - name: Dev Spaces
    url: 'https://devspaces.${DOMAIN}'
    external: true
  - name: Argo CD
    url: 'https://student-gitops-server-student-gitops.${DOMAIN}'
    external: true
  - name: Dev Hub
    url: 'https://backstage-developer-hub-rhdh.${DOMAIN}'
    external: true
  - name: SonarQube
    url: 'https://sonarqube-sonarqube.${DOMAIN}'
    external: true
  # MTA (Migration Toolkit for Applications, m23). Unlike the tools above it does NOT send a
  # frame-blocking header (AUTH_REQUIRED=false, no X-Frame-Options/CSP — verified live), so it could be
  # embedded; kept external for consistency and to avoid depending on MTA's headers staying permissive.
  # MTA auth is disabled, so the attendee needs only the URL — no login, no OpenShift RBAC grant.
  - name: Migration Toolkit
    url: 'https://mta-openshift-mta.${DOMAIN}'
    external: true
