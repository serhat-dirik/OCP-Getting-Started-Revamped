# Workshop bootstrap inputs. Copy to vars.yaml (gitignored) and fill in.
# bootstrap/install.sh reads THIS file; secrets live only here, never in git.

# Number of attendee users to provision (user1 .. userN).
users: 5

# Ingress apps domain (e.g. apps.cluster-x.example.com). Leave "" to auto-detect from the cluster.
cluster_domain: ""

# Models-as-a-Service (MaaS) LLM for OpenShift Lightspeed. endpoint + model are NOT secrets and
# live in git (the ai-assist stack app); api_key IS secret and becomes the 'credentials' Secret.
# model default is llama-scout-17b — the FSC litemaas.model contract default, and the model the
# per-user MaaS key is actually scoped to (HTTP 401 key_model_access_denied otherwise; root-caused
# live by the task #67 QA gate). Override only if your endpoint's virtual key is scoped differently.
maas:
  endpoint: https://<your-maas-endpoint>/v1   # your model-serving endpoint (OpenAI-compatible)
  api_key: CHANGEME
  model: llama-scout-17b

# Install the ai-assist stack (OpenShift Lightspeed). Set false on clusters without an LLM endpoint.
lightspeed: true

# Install the auth stack (Red Hat build of Keycloak) for M13 "Securing Apps with Keycloak". Opt-in
# (M13 is a `core+auth` module, not part of core). true → the portfolio `auth` stack is added AND
# per-user realm-{user} imports are seeded by the workshop layer. A workshop skipping M13 leaves it false.
auth: false

# Install the resilience stack (OADP/Velero, backed by in-cluster NooBaa S3) for M21 "Resilience,
# Multi-Cluster & DR". Opt-in (`core+resilience` module). PREREQ: ODF/MCG on the cluster (NooBaa is the
# S3 backup target). The RHSI (Skupper v2) add-on stays off unless the catalog offers channel stable-2 —
# enable it in platform-portfolio/stacks/resilience/kustomization.yaml. A workshop skipping M21 leaves it false.
resilience: false

# Console plugins opt-in (richer console views for Pipelines/GitOps/ACS — backlog #24). OFF by
# default: the non-invasive rule forbids changing a default cluster's console config unless asked.
# true → workshop-config's hook Job merges its known plugin names into consoles.operator.openshift.io
# .spec.plugins (append-if-absent; never touches or removes anything already present). Uninstall
# removes only the names it recorded having added. Real names + list: gitops/workshop-config/values.yaml.
console_plugins: false

# Shared password for ALL workshop users (console/CLI htpasswd login + Gitea account).
# This is a WORKSHOP password by design: one simple, memorable, SHARED value handed to every
# attendee — the users are throwaway, so it is NOT a real credential and needn't be secure.
# Keep it simple (e.g. "openshift", "redhat1!"). Set "CHANGEME" to have the installer mint a
# random one instead and record it in .credentials.local.txt.
workshop_user_password: openshift

# Source repo/revision the portfolio + in-cluster mirror pull from. Defaults to the upstream project.
repo_url: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
revision: main
