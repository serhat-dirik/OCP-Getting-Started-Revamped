# parasol-claims-pull-request — the Pipelines-as-Code (PaC) entrypoint for the M07 git-push beat.
#
# WHY THIS EXISTS: the second half of M07 evolves from "run the pipeline by hand" to "push code and
# the pipeline fires." An attendee commits this file to .tekton/ in their {user}/parasol-claims fork
# and adds a Gitea webhook + a Repository CR; PaC then starts this PipelineRun on every push / PR to
# main. It references the SAME parasol-claims-build-test-deploy Pipeline (installed by the entry
# state) — PaC only supplies the git coordinates and a per-commit image tag from the event payload.
#
# The PaC {{ ... }} tokens are expanded by Pipelines-as-Code at event time (quoted so the file stays
# valid YAML). See docs.redhat.com "Pipelines as Code" and pipelinesascode.com.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: parasol-claims-pull-request
  annotations:
    # Fire on pushes and PRs targeting main.
    pipelinesascode.tekton.dev/on-event: "[push, pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    # Keep the namespace tidy — retain only the last few runs.
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  # Resolve the Pipeline that the entry state installed IN the run namespace via the CLUSTER RESOLVER.
  # PaC resolves a bare `pipelineRef: {name: …}` only from the repo's .tekton dir or a remote-pipeline
  # annotation — NOT from the namespace — so a name-only ref fails with "cannot find referenced
  # pipeline …" (verified on-cluster 2026-07-10). {{ target_namespace }} is the Repository CR's
  # namespace ({user}-cicd), expanded by PaC at event time.
  pipelineRef:
    resolver: cluster
    params:
      - {name: kind, value: pipeline}
      - {name: name, value: parasol-claims-build-test-deploy}
      - {name: namespace, value: "{{ target_namespace }}"}
  taskRunTemplate:
    serviceAccountName: pipeline
  params:
    # Build the pushed commit of the attendee's own fork; tag the image with the commit SHA.
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ revision }}"
    - name: image
      value: "image-registry.openshift-image-registry.svc:5000/{{ target_namespace }}/parasol-claims:{{ revision }}"
    - name: max-size-mb
      value: "500"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  # No per-task memory overrides: the {user}-cicd namespace default container limit is sized for these
  # Maven/Quarkus builds (gitops/workshop-config/templates/per-user-limits.yaml), so a PaC-fired run —
  # like the console Actions -> Start run — does not OOM.
