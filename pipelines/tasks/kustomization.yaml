# Standalone install of the curated Parasol task library.
# `oc apply -k pipelines/tasks` installs both Tasks into the parasol-tasks namespace (the Tasks
# carry `namespace: parasol-tasks`). The namespace + cluster-resolver read-RBAC are owned by the
# workshop layer (gitops/workshop-config/templates/parasol-tasks.yaml), which installs the SAME
# Task bodies via GitOps — this kustomization is for local/standalone use and CI schema checks.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - image-size-report.yaml
  - maven-jdk21.yaml
  - acs-image-check.yaml
  - sonar-scan.yaml
  - trivy-scan.yaml
  - roxctl-deployment-check.yaml
  - zap-baseline.yaml
  - k6-load-test.yaml
