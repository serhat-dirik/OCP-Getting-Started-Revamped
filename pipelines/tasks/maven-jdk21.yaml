# maven-jdk21 — the second curated Parasol "company task library" Task (M07).
#
# WHY THIS EXISTS: the bundled `maven` ClusterTask replacement ships pinned to a JDK 17 runner
# image (registry.redhat.io/ubi9/openjdk-17) and exposes no image parameter — so it CANNOT build
# Parasol's JDK 21 services (`mvn` fails with "release version 21 not supported"). Rather than fork
# the pipeline, the platform team curates ONE JDK 21 Maven Task into the shared parasol-tasks
# library; every app pipeline references it by cluster resolver. This is the module's honest,
# real-world answer to "why does a platform team curate a task library?".
#
# CANONICAL SOURCE. The identical Task is installed into the shared parasol-tasks library by the
# workshop layer (gitops/workshop-config/templates/parasol-tasks.yaml) — keep the two in lockstep.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-jdk21
  namespace: parasol-tasks
  labels:
    app.kubernetes.io/part-of: parasol
    workshop.redhat.com/library: parasol-tasks
spec:
  description: >-
    Runs Maven goals against a workspace checkout using a JDK 21 runner (Red Hat UBI9 OpenJDK 21,
    Maven 3.9). The Parasol org standard for building/testing its JDK 21 services.
  params:
    - name: GOALS
      type: array
      description: Maven goals and flags to run.
      default:
        - -B
        - -ntp
        - test
    - name: SUBDIRECTORY
      type: string
      description: Path within the workspace that holds the pom.xml.
      default: "."
  workspaces:
    # The source checkout (git-clone writes here); Maven runs against it in place.
    - name: source
  steps:
    - name: mvn-goals
      # UBI9 OpenJDK 21 builder image — ships Maven 3.9 at /usr/bin/mvn; JDK 21 matches the app.
      image: registry.access.redhat.com/ubi9/openjdk-21:latest
      workingDir: $(workspaces.source.path)/$(params.SUBDIRECTORY)
      command:
        - /usr/bin/mvn
      # Array param expands to individual args (e.g. -B -ntp test); no shell involved.
      args:
        - $(params.GOALS[*])
