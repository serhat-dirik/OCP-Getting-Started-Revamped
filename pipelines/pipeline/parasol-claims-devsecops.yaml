# parasol-claims-devsecops — the app-security-testing DevSecOps CAPSTONE Pipeline (12 gated stages — 11 security + 1 perf).
#
# WHY THIS EXISTS: the reference pipeline attendees run in app-security-testing — every stage of the software supply
# chain has a security gate. It reuses the whole curated library across three renderings of "reuse":
# bundled catalog tasks (git-clone/buildah/openshift-client), the pipelines-fundamentals/trusted-supply-chain curated tasks
# (maven-jdk21, image-size-report, acs-image-check) and the net-new app-security-testing tasks (sonar-scan,
# trivy-scan, roxctl-deployment-check, zap-baseline, k6-load-test). Nothing is copy-pasted — every taskRef is a
# CLUSTER RESOLVER into the shared parasol-tasks library or openshift-pipelines.
#
#   fetch → SAST(sonar) → SCA(trivy) → unit-test → build-image → acs-image-check ┐
#                                                                 → image-report   ├→ deploy-check → deploy(+Route) → DAST(zap) → perf(k6)
#                                                                 → sign-check ─────┘
#
# GATES: sonar-scan (qualitygate.wait), trivy-scan (HIGH/CRITICAL + copyleft), unit-test, acs-image-check
# (Block-Log4Shell), sign-check (unsigned = fail), roxctl-deployment-check (enforced deploy policy),
# zap-baseline (ZAP FAIL), k6-load-test (p95 latency + error-rate budget). On CLEAN source every gate
# passes; the security seeds (per stage) make each fail deterministically — those seeds ship with the
# app-security-testing content/app pass. The perf gate has no seeded regression yet; it passes on the healthy app.
#
# Memory for the Maven/Quarkus steps is raised in the PipelineRun (taskRunSpecs), not here, so the
# Pipeline stays runtime-agnostic. LOCKSTEP: byte-identical to the app-security-testing entry-state copy
# (gitops/entry-states/app-security-testing/templates/pipeline.yaml) except for the added namespace.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: parasol-claims-devsecops
  labels:
    app.kubernetes.io/part-of: parasol-claims
    workshop.redhat.com/module: app-security-testing
    workshop.redhat.com/owner: ogsr
spec:
  params:
    - name: git-url
      type: string
      description: Source repository (defaults to the in-cluster Gitea shared repo).
      default: http://gitea.gitea.svc:3000/parasol/parasol-claims.git
    - name: git-revision
      type: string
      description: Branch, tag, or commit to build.
      default: main
    - name: image
      type: string
      description: Fully-qualified target image reference (registry/namespace/name:tag).
      # Own-namespace registry path, so this Pipeline is portable across every {user}-cicd with no edit.
      default: image-registry.openshift-image-registry.svc:5000/$(context.pipelineRun.namespace)/parasol-claims:latest
    - name: sonar-project-key
      type: string
      description: SonarQube project key (per-user recommended, e.g. parasol-claims-user1).
      default: parasol-claims
    - name: max-size-mb
      type: string
      description: Image size budget in MB, enforced (as a report) by image-size-report.
      default: "500"
  workspaces:
    # One shared PVC carries the checkout from git-clone through SAST/SCA/unit-test and the image build.
    - name: shared-workspace
    # ZAP writes its session + reports here (mounted at /zap/wrk by the zap-baseline task).
    - name: zap-work
    # k6 writes its HTML dashboard report here (the perf-k6 load-test gate).
    - name: k6-work
  results:
    - name: sast-passed
      value: $(tasks.sast-sonar.results.quality-gate-passed)
    - name: sca-passed
      value: $(tasks.sca-trivy.results.scan-passed)
    - name: image-scan-passed
      value: $(tasks.image-scan.results.check-passed)
    - name: config-check-passed
      value: $(tasks.deployment-check.results.check-passed)
    - name: dast-passed
      value: $(tasks.dast-zap.results.dast-passed)
    - name: perf-passed
      value: $(tasks.perf-k6.results.perf-passed)
  tasks:
    # 1) Clone the app source into the shared workspace (bundled task, cluster resolver).
    - name: fetch-source
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: git-clone}
          - {name: namespace, value: openshift-pipelines}
      params:
        - {name: URL, value: $(params.git-url)}
        - {name: REVISION, value: $(params.git-revision)}
      workspaces:
        - {name: output, workspace: shared-workspace}

    # 2) SAST: SonarQube analysis + quality-gate gate. Runs before SCA so the gauntlet surfaces one red
    #    security gate at a time (the source-analysis gates are sequential beats).
    - name: sast-sonar
      runAfter: [fetch-source]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: sonar-scan}
          - {name: namespace, value: parasol-tasks}
      params:
        - {name: SONAR_PROJECT_KEY, value: $(params.sonar-project-key)}
      workspaces:
        - {name: source, workspace: shared-workspace}

    # 3) SCA: Trivy filesystem scan (dependency CVEs) + CycloneDX SBOM artifact. runAfter sast-sonar.
    - name: sca-trivy
      runAfter: [sast-sonar]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: trivy-scan}
          - {name: namespace, value: parasol-tasks}
      workspaces:
        - {name: source, workspace: shared-workspace}

    # 4) Unit tests (H2-backed, self-contained) — after the source gates pass. Curated maven-jdk21.
    - name: unit-test
      runAfter: [sast-sonar, sca-trivy]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: maven-jdk21}
          - {name: namespace, value: parasol-tasks}
      params:
        - name: GOALS
          value: ["-B", "-ntp", "test"]
      workspaces:
        - {name: source, workspace: shared-workspace}

    # 5) Build the image from the Containerfile; Tekton Chains SIGNS this TaskRun's image automatically.
    - name: build-image
      runAfter: [unit-test]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: buildah}
          - {name: namespace, value: openshift-pipelines}
      params:
        - {name: IMAGE, value: $(params.image)}
        - {name: DOCKERFILE, value: ./Containerfile}
        - {name: TLS_VERIFY, value: "false"}
      workspaces:
        - {name: source, workspace: shared-workspace}

    # 6) Image scan GATE: RHACS build-time check (the trusted-supply-chain Block-Log4Shell policy) on the built image.
    - name: image-scan
      runAfter: [build-image]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: acs-image-check}
          - {name: namespace, value: parasol-tasks}
      params:
        - {name: IMAGE, value: $(params.image)}

    # 7) Image size report (report-only) — the curated org library Task in action.
    - name: image-report
      runAfter: [build-image]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: image-size-report}
          - {name: namespace, value: parasol-tasks}
      params:
        - {name: IMAGE, value: $(params.image)}
        - {name: MAX_SIZE_MB, value: $(params.max-size-mb)}

    # 8) Sign + attest: wait for Tekton Chains to sign the build TaskRun (async) and GATE if unsigned.
    #    Inline taskSpec — a small oc poll needs no curated task. cosign verify --key is the richer
    #    attendee terminal beat (trusted-supply-chain); the signed annotation is the authoritative in-pipeline signal.
    - name: sign-check
      runAfter: [build-image]
      taskSpec:
        steps:
          - name: verify-signed
            image: registry.redhat.io/openshift4/ose-cli:latest
            env:
              - name: PR_NAME
                value: $(context.pipelineRun.name)
            script: |
              #!/usr/bin/env bash
              set -uo pipefail
              echo "▶ waiting for Tekton Chains to sign + attest the build image (async)…"
              for i in $(seq 1 18); do
                SIGNED="$(oc get taskrun -l tekton.dev/pipelineRun=${PR_NAME},tekton.dev/pipelineTask=build-image \
                  -o jsonpath='{.items[0].metadata.annotations.chains\.tekton\.dev/signed}' 2>/dev/null || true)"
                if [ "$SIGNED" = "true" ]; then
                  echo "✅ build image signed + in-toto attested by Tekton Chains"
                  exit 0
                fi
                sleep 10
              done
              echo "❌ build image not signed after ~3m — is trust-signing (Tekton Chains cosign key) installed?"
              exit 1

    # 9) Config-security GATE: RHACS deploy-time check on the COMMITTED Deployment manifest (JUnit). The
    #    task reads deploy/parasol-claims-deployment.yaml from the checkout (source workspace) and fails
    #    on a deploy-policy violation — the seeded insecure manifest trips it; the hardened one passes.
    - name: deployment-check
      runAfter: [image-scan, sign-check]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: roxctl-deployment-check}
          - {name: namespace, value: parasol-tasks}
      params:
        - {name: IMAGE, value: $(params.image)}
      workspaces:
        - {name: source, workspace: shared-workspace}

    # 10) Deploy the scanned/signed image AND create the browser-facing edge Route (no manual oc expose).
    - name: deploy
      runAfter: [deployment-check]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: openshift-client}
          - {name: namespace, value: openshift-pipelines}
      params:
        - name: SCRIPT
          value: |
            if oc get deployment parasol-claims >/dev/null 2>&1; then
              oc set image deployment/parasol-claims parasol-claims="$(params.image)"
            else
              # --port=8080 puts a containerPort on the Deployment so `oc expose deployment` can
              # introspect it into a Service (the app listens on 8080).
              oc create deployment parasol-claims --image="$(params.image)" --port=8080
            fi
            # Wire the app to the ephemeral claims-db the app-security-testing entry state provides (tolerant if absent).
            if oc get secret claims-db >/dev/null 2>&1; then
              oc set env deployment/parasol-claims --from=secret/claims-db --containers=parasol-claims
            fi
            # Readiness probe so the Service/Route only front a LISTENING pod (Quarkus boots ~20-30s).
            oc set probe deployment/parasol-claims --readiness \
              --get-url=http://:8080/q/health/ready --initial-delay-seconds=5 --period-seconds=5
            # Force a fresh rollout: the image tag is :latest, so `oc set image` to the same string is a
            # no-op and a re-run's new image would never be pulled — the DAST fix (or any code fix) would
            # never reach the running pod. rollout restart pulls the new :latest every run.
            oc rollout restart deployment/parasol-claims
            oc rollout status deployment/parasol-claims --timeout=300s
            # Service first (the Route targets it), then the edge Route (edge + Allow = browser-reachable
            # over HTTPS; a plain oc expose serves HTTP-only and trips the router HSTS upgrade).
            oc get service parasol-claims >/dev/null 2>&1 || oc expose deployment parasol-claims --port=8080
            oc get route parasol-claims >/dev/null 2>&1 || \
              oc create route edge parasol-claims --service=parasol-claims --insecure-policy=Allow
            echo "▶ parasol-claims Route: https://$(oc get route parasol-claims -o jsonpath='{.spec.host}')"

    # 11) DAST GATE: ZAP baseline against the RUNNING app over the in-cluster Service DNS. FAIL_ON_WARN
    #     is true so missing security headers (a WARN-level finding) gate the build — the seeded app
    #     ships without them (red), the fix adds the Quarkus headers (green).
    - name: dast-zap
      runAfter: [deploy]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: zap-baseline}
          - {name: namespace, value: parasol-tasks}
      params:
        - {name: TARGET_URL, value: "http://parasol-claims.$(context.pipelineRun.namespace).svc:8080"}
        - {name: FAIL_ON_WARN, value: "true"}
      workspaces:
        - {name: zap-work, workspace: zap-work}

    # 12) PERF GATE: a short k6 load test against the RUNNING app over the in-cluster Service DNS. Gates
    #     on a p95 latency budget + a max error rate — k6's own non-zero exit on a breached threshold IS
    #     the gate (same shape as the DAST gate). The last gate in the gauntlet: a change can pass every
    #     security check and still regress performance.
    - name: perf-k6
      runAfter: [dast-zap]
      taskRef:
        resolver: cluster
        params:
          - {name: kind, value: task}
          - {name: name, value: k6-load-test}
          - {name: namespace, value: parasol-tasks}
      params:
        - {name: TARGET_URL, value: "http://parasol-claims.$(context.pipelineRun.namespace).svc:8080"}
        - {name: FAIL_ON_THRESHOLD, value: "true"}
      workspaces:
        - {name: k6-work, workspace: k6-work}
