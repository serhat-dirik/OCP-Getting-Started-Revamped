# parasol-claims-run — a plain PipelineRun for parasol-claims-build-test-deploy: the SAME run the
# console *Actions -> Start* form (or `tkn pipeline start --use-param-defaults`) produces. `oc create -f`
# this in a {user}-cicd namespace to start a build by hand.
#
# It carries a per-run workspace PVC (volumeClaimTemplate) — one PVC, auto-pruned with the run, well
# under the pvc:5 namespace quota; runs are serial per user. No per-task memory overrides are needed:
# the {user}-cicd namespace default container limit is sized for these Maven/Quarkus builds in
# gitops/workshop-config/templates/per-user-limits.yaml, so the Quarkus build does not OOMKill and the
# run can be started straight from the console Start form (which cannot set per-task memory).
#
# The image target is derived from the run's own namespace, so this same file works unchanged in
# any {user}-cicd namespace.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: parasol-claims-run-
  labels:
    app.kubernetes.io/part-of: parasol-claims
    workshop.redhat.com/module: m07
spec:
  pipelineRef:
    name: parasol-claims-build-test-deploy
  taskRunTemplate:
    # The operator-provisioned per-namespace SA: already bound to edit + system:image-builder,
    # so it pushes to and deploys within its own namespace with no extra RBAC.
    serviceAccountName: pipeline
  params:
    # image is intentionally omitted: the Pipeline defaults it to this run's own namespace path.
    - name: git-revision
      value: main
    - name: max-size-mb
      value: "500"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
