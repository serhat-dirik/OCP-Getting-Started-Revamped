# parasol-claims-run — an ad-hoc PipelineRun for the "run the pipeline directly" beat of M07
# (before the Pipelines-as-Code / git-push evolution). `oc create -f` this in a {user}-cicd
# namespace, or `tkn pipeline start parasol-claims-build-test-deploy`.
#
# It carries the two pieces that keep parasol-claims building inside a workshop namespace:
#   * a per-run workspace PVC (volumeClaimTemplate) — one PVC, auto-pruned with the run, well
#     under the pvc:5 namespace quota; runs are serial per user;
#   * taskRunSpecs memory for the Maven-heavy steps — 1.5Gi/2Gi on the image build and 1Gi/1.5Gi
#     on the unit tests, ABOVE the namespace LimitRange 1Gi default, so the Quarkus build does not
#     OOMKill. Both fit the namespace quota (requests 6Gi / limits 12Gi) for one serial run.
#
# The image target is derived from the run's own namespace, so this same file works unchanged in
# any {user}-cicd namespace.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: parasol-claims-run-
  labels:
    app.kubernetes.io/part-of: parasol-claims
    workshop.redhat.com/module: m07
spec:
  pipelineRef:
    name: parasol-claims-build-test-deploy
  taskRunTemplate:
    # The operator-provisioned per-namespace SA: already bound to edit + system:image-builder,
    # so it pushes to and deploys within its own namespace with no extra RBAC.
    serviceAccountName: pipeline
  params:
    # image is intentionally omitted: the Pipeline defaults it to this run's own namespace path.
    - name: git-revision
      value: main
    - name: max-size-mb
      value: "500"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  taskRunSpecs:
    - pipelineTaskName: unit-test
      computeResources:
        requests:
          memory: 1Gi
        limits:
          memory: 1536Mi
    - pipelineTaskName: build-image
      computeResources:
        requests:
          memory: 1536Mi
        limits:
          memory: 2Gi
