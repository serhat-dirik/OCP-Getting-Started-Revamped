name: modules
title: "OpenShift Application Platform — Getting Started"
version: ~
start_page: ROOT:index.adoc
nav:
  # Flavor-selecting wrapper — includes nav-{workshop,demo,instructor}.adoc per the
  # playbook's flavor attribute. Register ONLY this file (registering all three would
  # render every sidebar in every flavor).
  - modules/ROOT/nav.adoc

asciidoc:
  attributes:
    # --- Authoring / UX toggles (Showroom conventions, 01-ARCHITECTURE §2) ---
    experimental: true            # enables kbd:/btn:/menu: UI macros
    page-pagination: true         # prev/next buttons at the bottom of every page
    tabs-sync-option: ""          # CLI|Console tabs flip together site-wide — attendee picks a path ONCE (project ruling 2026-07-11)
    idprefix: ""                  # stable section IDs for deep-links
    idseparator: "-"

    # --- Zero-touch Showroom identity (overridden at RHDP deploy time) ---
    lab_name: "OpenShift Application Platform — Getting Started@"
    guid: "dev-local@"

    # --- Environment values: SAFE DEV DEFAULTS, @-soft-set so a deploy playbook
    #     (site.yml) or the Showroom deployer can override them. Content NEVER
    #     hardcodes these — pages reference {user}, {ocp_console_url}, ... only. ---
    user: "user1@"
    password: "openshift@"
    ocp_console_url: "https://console.apps.example.com@"
    cluster_domain: "apps.example.com@"
    gitea_url: "https://gitea.example.com@"
    devspaces_url: "https://devspaces.apps.example.com@"
    # RHACS (Advanced Cluster Security) Central console — used by M08 (Trusted Software Supply Chain)
    # for the instructor demo + screenshots. Route pattern on the workshop cluster:
    # central-stackrox.{cluster_domain}. Content references {acs_console_url} only.
    acs_console_url: "https://central-stackrox.apps.example.com@"
    # SonarQube (Community Build) dashboard — used by M27 (Application Security Testing) for the SAST
    # finding + screenshots. Route on the workshop cluster: sonarqube-sonarqube.{cluster_domain}.
    # Content references {sonarqube_url} only.
    sonarqube_url: "https://sonarqube-sonarqube.apps.example.com@"
    # Red Hat Developer Hub portal (M11): shared, read-mostly, guest sign-in. Content references
    # {rhdh_url} only. Route pattern on the workshop cluster: backstage-developer-hub-rhdh.{cluster_domain}
    rhdh_url: "https://backstage-developer-hub-rhdh.apps.example.com@"
    # Student Argo CD instance (M09+): attendee-writable GitOps UI, OpenShift-SSO login.
    # Route pattern on the workshop cluster: student-gitops-server-student-gitops.{cluster_domain}
    student_argo_url: "https://student-gitops-server-student-gitops.apps.example.com@"
    # Migration Toolkit for Applications (MTA 8) web console. Route on the workshop cluster:
    # mta-openshift-mta.{cluster_domain}. Content references {mta_url} only (M22).
    mta_url: "https://mta-openshift-mta.apps.example.com@"
    maas_endpoint: "https://maas.example.com/v1@"
    # MaaS model id served by {maas_endpoint}. Cluster-scoped: the primary workshop cluster's key is
    # scoped to qwen3-14b (the default below); a cluster whose key is scoped to another model overrides
    # this at deploy time (M22 also surfaces the effective model on-cluster via the maas-config ConfigMap).
    maas_model: "qwen3-14b@"

    # --- Flavor flags are INTENTIONALLY UNSET here (off by default) so that
    #     ifdef::demo[] / ifdef::instructor[] evaluate false in the workshop build.
    #     site-demo.yml sets `demo: true`; site-instructor.yml sets `instructor: true`. ---
