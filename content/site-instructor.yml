---
# Antora playbook — INSTRUCTOR rendering (internal delivery runbook).
# Identical to site-workshop.yml except: site.title suffix, `instructor: true`
# attribute (unlocks ifdef::instructor[] runbook blocks), and output.dir.
# Build from inside content/ (see site-workshop.yml for why): `npm run build:instructor`.
site:
  title: "OpenShift Application Platform — Getting Started — Instructor Guide"
  start_page: modules::index.adoc

content:
  sources:
    - url: ..
      start_path: content

asciidoc:
  attributes:
    instructor: true      # renders ifdef::instructor[] delivery-runbook blocks

ui:
  supplemental_files: ./supplemental-ui
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true

antora:
  extensions:
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
        # Legibility defaults (Serhat 2026-07-10). NOTE: keys MUST be snake_case — the
        # extension lowercases raw camelCase (themeVariables -> "themevariables", silently
        # ignored by mermaid; proven from the emitted initialize() call) but converts
        # snake_case to correct camelCase. Paired with the supplemental head-styles
        # override that scales .mermaid svg to the content column.
        theme: default
        theme_variables:
          font_size: "18px"
        flowchart:
          html_labels: true
          use_max_width: true
          node_spacing: 45
          rank_spacing: 50
          padding: 12
    - require: '@andrew-jones/antora-tabs-extension'

runtime:
  cache_dir: ./.cache/antora

output:
  dir: ../www/instructor
