---
# Antora playbook — WORKSHOP rendering (attendee guide, the default flavor).
# All three site-*.yml playbooks resolve the SAME single `modules` component and
# differ only in asciidoc.attributes (flavor flag), site.title, and output.dir.
site:
  title: "OpenShift Application Platform — Getting Started"
  start_page: modules::index.adoc

content:
  sources:
    # Antora resolves a local content-source `url` relative to the directory the
    # `antora` command is run from (the repo root — see utilities/lab-serve and CI),
    # NOT relative to this playbook's location. `.` = repo root (a git repo);
    # start_path `content` points at content/antora.yml. Antora reads the local
    # worktree, so uncommitted edits render during local preview.
    - url: ..
      start_path: content

ui:
  bundle:
    # RHDP Showroom theme, PatternFly 6 release (current OCP-console look).
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true

antora:
  extensions:
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
    - require: '@andrew-jones/antora-tabs-extension'

runtime:
  cache_dir: ./.cache/antora

output:
  # Resolved relative to the repo root -> <repo>/www/workshop.
  dir: ../www/workshop
