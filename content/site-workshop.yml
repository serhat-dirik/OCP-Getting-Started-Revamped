---
# Antora playbook — WORKSHOP rendering (attendee guide, the default flavor).
# All three site-*.yml playbooks resolve the SAME single `modules` component and
# differ only in asciidoc.attributes (flavor flag), site.title, and output.dir.
site:
  title: "OpenShift Application Platform — Getting Started"
  start_page: modules::index.adoc

content:
  sources:
    # IMPORTANT: build from inside content/ (all tooling does: `cd content && antora …`,
    # or `npm run build:workshop`, or utilities/lab-serve). Antora resolves a local
    # content-source `url` other than "." relative to the invocation directory, so
    # from content/ the `..` below points at the repo root (a git repo). `start_path`
    # then selects content/antora.yml. Antora reads the local worktree, so uncommitted
    # edits render during preview.
    - url: ..
      start_path: content

ui:
  bundle:
    # RHDP Showroom theme, PatternFly 6 release (current OCP-console look).
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true

antora:
  extensions:
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
        # Legibility defaults (Serhat 2026-07-10: diagrams rendered too small). Larger base
        # font + generous node/rank spacing so text stays readable; useMaxWidth keeps diagrams
        # responsive to the content column. Wide graph-LR diagrams still want a per-diagram
        # look during the media pass — this is the global floor, not the ceiling.
        theme: default
        themeVariables:
          fontSize: "18px"
        flowchart:
          htmlLabels: true
          useMaxWidth: true
          nodeSpacing: 45
          rankSpacing: 50
          padding: 12
    - require: '@andrew-jones/antora-tabs-extension'

runtime:
  cache_dir: ./.cache/antora

output:
  # Built from content/, so `../www/workshop` lands at the repo root: <repo>/www/workshop.
  dir: ../www/workshop
