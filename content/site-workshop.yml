---
# Antora playbook — WORKSHOP rendering (attendee guide, the default flavor).
# All three site-*.yml playbooks resolve the SAME single `modules` component and
# differ only in asciidoc.attributes (flavor flag), site.title, and output.dir.
site:
  title: "OpenShift Application Platform — Getting Started"
  start_page: modules::index.adoc

asciidoc:
  attributes:
    # Flavor flag: selects nav-workshop.adoc via modules/ROOT/nav.adoc (every playbook
    # sets exactly one flavor attribute; pages also key ifdef blocks off these).
    workshop: true
    # Freshness stamp rendered on the home page. CI overrides it per deploy
    # (pages-preview passes --attribute "build-info=Site build <sha> · <utc>");
    # this default marks local previews so staleness is never ambiguous again
    # (an already-current site was twice read as "not updated", 2026-07-10).
    build-info: Local preview build (unstamped)

content:
  sources:
    # IMPORTANT: build from inside content/ (all tooling does: `cd content && antora …`,
    # or `npm run build:workshop`, or utilities/lab-serve). Antora resolves a local
    # content-source `url` other than "." relative to the invocation directory, so
    # from content/ the `..` below points at the repo root (a git repo). `start_path`
    # then selects content/antora.yml. Antora reads the local worktree, so uncommitted
    # edits render during preview.
    - url: ..
      start_path: content

ui:
  supplemental_files: ./supplemental-ui
  bundle:
    # RHDP Showroom theme, PatternFly 6 release (current OCP-console look).
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true

antora:
  extensions:
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
        # Legibility defaults (project ruling 2026-07-10). NOTE: keys MUST be snake_case — the
        # extension lowercases raw camelCase (themeVariables -> "themevariables", silently
        # ignored by mermaid; proven from the emitted initialize() call) but converts
        # snake_case to correct camelCase. Paired with the supplemental head-styles
        # override that scales .mermaid svg to the content column.
        theme: default
        theme_variables:
          font_size: "18px"
        flowchart:
          html_labels: true
          use_max_width: true
          node_spacing: 45
          rank_spacing: 50
          padding: 12
    - require: '@andrew-jones/antora-tabs-extension'
      # Remember the attendee's CLI-vs-Console tab choice across every page (localStorage).
      sync_storage_key: preferred-tab

runtime:
  cache_dir: ./.cache/antora

output:
  # Built from content/, so `../www/workshop` lands at the repo root: <repo>/www/workshop.
  dir: ../www/workshop
