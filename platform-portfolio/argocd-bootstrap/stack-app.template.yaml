# Stack Application template — rendered by install.sh (__STACK__/__REPO_URL__/__REVISION__).
# One Application per stack; the stack dir contains child Applications (app-of-apps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-__STACK__
  namespace: openshift-gitops
  labels:
    portfolio.redhat.com/stack: "__STACK__"
spec:
  project: default
  source:
    repoURL: __REPO_URL__
    targetRevision: __REVISION__
    path: platform-portfolio/stacks/__STACK__
    # Rewrite child Applications to the same fork/revision as this parent,
    # so --repo-url works without editing every child manifest.
    kustomize:
      patches:
        - target:
            kind: Application
          patch: |-
            - op: replace
              path: /spec/source/repoURL
              value: __REPO_URL__
            - op: replace
              path: /spec/source/targetRevision
              value: __REVISION__
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
