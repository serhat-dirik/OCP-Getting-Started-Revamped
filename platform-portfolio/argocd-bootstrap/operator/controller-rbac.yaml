# The portfolio's stacks manage cluster-scoped resources (namespaces, Subscriptions,
# ClusterRoles), so the default Argo CD instance's application-controller gets cluster-admin.
# Applied by install.sh AFTER the instance exists (the SA is operator-created).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-gitops-application-controller-cluster-admin
  labels:
    # Owner label: this CRB is always ours (custom name). Uninstall removes it, restoring the
    # app-controller's prior RBAC — safe whether GitOps was adopted or created by us.
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
