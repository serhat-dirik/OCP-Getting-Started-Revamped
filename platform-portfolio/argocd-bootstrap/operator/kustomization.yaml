apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
# Owner label on the GitOps operator objects. install.sh applies this base ONLY in the create branch
# (it skips `oc apply -k operator/` when the subscription already exists), so the label lands only when
# WE install GitOps — never on an adopted operator. Uninstall still gates removal on the state record.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
