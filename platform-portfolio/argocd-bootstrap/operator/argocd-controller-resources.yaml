# Raise the default openshift-gitops application-controller memory above the operator
# default (2Gi limit / 1Gi request): cohort-scale concurrent entry-state materializations
# (5+ heavy Argo syncs at once) exhaust 2Gi and OOM-wedge the controller — reconcile freezes,
# readiness probes time out (observed at G4, 2026-07-12). 6Gi gives headroom for the sync
# backlog + concurrency; request stays low (2Gi) so it schedules on any 4.20+ cluster.
# Applied imperatively by install.sh via the operator path AFTER the instance is Available —
# never as an Argo Application, because a wedged controller cannot self-heal its own resources.
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  controller:
    resources:
      limits:
        cpu: "2"
        memory: 6Gi
      requests:
        cpu: 250m
        memory: 2Gi
