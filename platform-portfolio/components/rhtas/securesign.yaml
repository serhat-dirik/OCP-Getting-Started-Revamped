# Securesign — the full sigstore stack (Trillian+DB, Rekor transparency log, Fulcio CA, CTlog, TUF,
# TSA). One shared instance powering M08's instructor-demo keyless-signing beat (short-lived Fulcio
# cert + Rekor transparency entry). The operator generates all certs/keys and the TUF root from this
# CR (Trillian database.create=true; tuf.rootKeySecretRef names the secret the operator creates).
#
# Fulcio OIDC = the cluster's own ServiceAccount-token issuer (Type kubernetes,
# https://kubernetes.default.svc) so a Tekton pipeline SA token is a valid keyless identity — the
# documented keyless-from-CI path. Keyless per-user wiring stays DEMO-ONLY (build-note verdict); the
# M08 LAB signs key-based via Tekton Chains + the trust-signing cosign key, which needs none of this.
apiVersion: rhtas.redhat.com/v1alpha1
kind: Securesign
metadata:
  name: securesign
  namespace: trusted-artifact-signer
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/part-of: trusted-artifact-signer
spec:
  ctlog:
    monitoring:
      enabled: true
  fulcio:
    certificate:
      commonName: fulcio.trusted-artifact-signer
      organizationName: Parasol Workshop
      organizationEmail: workshop@parasol.local
    config:
      OIDCIssuers:
        - ClientID: trusted-artifact-signer
          Issuer: https://kubernetes.default.svc
          IssuerURL: https://kubernetes.default.svc
          Type: kubernetes
    externalAccess:
      enabled: true
    monitoring:
      enabled: true
  rekor:
    externalAccess:
      enabled: true
    monitoring:
      enabled: true
  trillian:
    database:
      create: true
    monitoring:
      enabled: true
  tsa:
    externalAccess:
      enabled: true
    monitoring:
      enabled: true
    ntpMonitoring:
      enabled: true
    signer:
      certificateChain:
        rootCA:
          commonName: tsa.trusted-artifact-signer-root
          organizationName: Parasol Workshop
          organizationEmail: workshop@parasol.local
        intermediateCA:
          - commonName: tsa.trusted-artifact-signer-intermediate
            organizationName: Parasol Workshop
            organizationEmail: workshop@parasol.local
        leafCA:
          commonName: tsa.trusted-artifact-signer-leaf
          organizationName: Parasol Workshop
          organizationEmail: workshop@parasol.local
  tuf:
    externalAccess:
      enabled: true
    keys:
      - name: rekor.pub
      - name: ctfe.pub
      - name: fulcio_v1.crt.pem
      - name: tsa.certchain.pem
    pvc:
      accessModes:
        - ReadWriteOnce
      retain: true
      size: 100Mi
    rootKeySecretRef:
      name: tuf-root-keys
    signingConfigURLMode: external
