# Red Hat Trusted Artifact Signer operator (M08 keyless-signing demo). Channel `stable` = current
# v1.4.x line (v1.4.2 live 2026-07-11; versions.yaml history had 1.4.1 — channel-pinned so the
# minor bump is automatic). Automatic approval keeps it on the stable head.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhtas-operator
  namespace: trusted-artifact-signer
spec:
  channel: stable
  installPlanApproval: Automatic
  name: rhtas-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
