# UIPlugin: enables the console "Observe -> Traces" view; discovers TempoStack/TempoMonolithic instances (the tempo component).
# Verified on install 2026-07-11 (COO v1.5.1): spec.type enum confirms "DistributedTracing" casing, and the
# plugin reconciled "successfully" with type ALONE (no spec.distributedTracing sub-object) — COO auto-discovers
# the Tempo instances, so no explicit Tempo reference is needed.
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: distributed-tracing
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # UIPlugin CRD arrives with COO — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: DistributedTracing
