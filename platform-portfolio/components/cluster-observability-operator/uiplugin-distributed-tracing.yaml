# UIPlugin: enables the console "Observe -> Traces" view; discovers TempoStack/TempoMonolithic instances (the tempo component).
# GVK confirmed live via CSV owned-CRDs; spec.type casing ("DistributedTracing") per docs.redhat.com COO 1-latest.
# TODO(verify-on-install): oc explain uiplugin.spec — confirm DistributedTracing needs no explicit Tempo reference in COO v1.5.1.
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: distributed-tracing
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # UIPlugin CRD arrives with COO — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: DistributedTracing
