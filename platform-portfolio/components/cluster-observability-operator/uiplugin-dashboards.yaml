# UIPlugin: enables the console "Observe -> Dashboards" (Perses) view served by COO.
# Verified on install 2026-07-11 (COO v1.5.1): the CRD enum for spec.type is
# [Dashboards, TroubleshootingPanel, DistributedTracing, Logging, Monitoring], so "Dashboards" is
# the exact casing; the Dashboards plugin needs no sub-config object (reconciled "successfully").
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: dashboards
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # UIPlugin CRD arrives with COO — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: Dashboards
