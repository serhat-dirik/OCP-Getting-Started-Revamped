# UIPlugin: enables the console "Observe -> Dashboards" (Perses) view served by COO.
# GVK observability.openshift.io/v1alpha1 UIPlugin confirmed live via CSV owned-CRDs (COO v1.5.1);
# COO ships no alm-example for UIPlugin and the CRD is not installed at authoring, so the exact
# spec.type casing ("Dashboards") is per docs.redhat.com COO 1-latest.
# TODO(verify-on-install): oc explain uiplugin.spec.type — confirm enum casing + that Dashboards needs no sub-config.
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: dashboards
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # UIPlugin CRD arrives with COO — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: Dashboards
