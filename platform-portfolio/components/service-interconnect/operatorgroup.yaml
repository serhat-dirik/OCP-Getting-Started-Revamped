# AllNamespaces OperatorGroup (no targetNamespaces) — the Skupper v2 operator watches the whole cluster so
# it can reconcile Site CRs in any per-user namespace. // TODO(verify-on-cluster): confirm the install mode
# on a catalog that actually offers channel stable-2 (Skupper v2); C2's catalog tops out at stable-1.9.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: skupper-operator
  namespace: skupper
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  upgradeStrategy: Default
