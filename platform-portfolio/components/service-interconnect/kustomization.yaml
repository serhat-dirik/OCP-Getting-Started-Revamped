# Red Hat Service Interconnect (Skupper v2) operator — the ADD-ON connectivity layer for M22's optional
# cross-site section. Cluster-scoped operator only; the per-user Site/Connector/Listener CRs are the M22
# lab / entry state on top. OPT-IN: only wired into stacks/resilience where the catalog offers stable-2.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
