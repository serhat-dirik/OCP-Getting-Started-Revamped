# Red Hat Service Interconnect / Skupper operator. Channel MUST be `stable-2` = Skupper v2
# (skupper.io/v2alpha1: Site/Listener/Connector/Link/AccessGrant/AccessToken). CHANNEL TRAP: bare `stable`
# and `stable-1`/`stable-1.x` install LEGACY Skupper v1 (v1.9.x) whose CRs + `skupper init` CLI are
# INCOMPATIBLE with v2 — never copy the gitops-catalog overlay, which mis-pins `stable`. // TODO(verify-on-
# cluster): stable-2 is absent from C2's (km7vw) catalog snapshot (only alpha/stable/stable-1..stable-1.9);
# sync this component only on a cluster whose skupper-operator packagemanifest lists channel stable-2.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: skupper-operator
  namespace: skupper
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable-2
  installPlanApproval: Automatic
  name: skupper-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
