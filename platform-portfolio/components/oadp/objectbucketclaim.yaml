# In-cluster S3 backup target — a NooBaa (ODF MCG) bucket claimed via ObjectBucketClaim, so OADP needs
# NO external AWS S3 (build-note watchout #1, solved in-cluster). PREREQ: ODF/MCG present (StorageClass
# openshift-storage.noobaa.io). A fixed bucketName keeps the BackupStorageLocation fully declarative in
# git (a generateBucketName would only be known at runtime); the OBC still emits a Secret + ConfigMap
# named after THIS OBC (openshift-adp/oadp-backups) carrying the S3 access keys the glue Job transforms.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: oadp-backups
  namespace: openshift-adp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  bucketName: parasol-oadp-backups
  storageClassName: openshift-storage.noobaa.io
