# OwnNamespace OperatorGroup — OADP supports OwnNamespace ONLY (verified live 2026-07-13: installModes
# OwnNamespace=true, all others false), so targetNamespaces must list exactly its own namespace.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-adp
  namespace: openshift-adp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - openshift-adp
