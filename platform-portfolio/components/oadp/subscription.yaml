# OADP operator (Velero for OpenShift) — channel `stable` is the ONLY channel (verified live on the
# 4.21 redhat-operators catalog 2026-07-13: currentCSV oadp-operator.v1.5.7, no maxOpenShiftVersion cap).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: redhat-oadp-operator
  namespace: openshift-adp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: redhat-oadp-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
