# OADP (OpenShift API for Data Protection / Velero) — operator + a DataProtectionApplication backed by an
# in-cluster NooBaa (ODF MCG) S3 bucket. Sync waves: 0 operator (ns/OG/Sub) + glue RBAC → 1 OBC →
# 2 BSL glue Job (OBC creds → cloud-credentials Secret + label a CSI VolumeSnapshotClass) → 3 the DPA.
# PREREQ: ODF/MCG (NooBaa) present on the cluster (StorageClass openshift-storage.noobaa.io). See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - bsl-glue-rbac.yaml
  - objectbucketclaim.yaml
  - bsl-glue.yaml
  - dataprotectionapplication.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
