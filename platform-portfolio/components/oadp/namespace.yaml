# OADP operator install namespace — OwnNamespace install mode requires the operator, its OperatorGroup,
# and its Velero/nodeAgent workloads to live in one namespace (openshift-adp is the OADP convention).
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-adp
  labels:
    portfolio.redhat.com/component: oadp
