# The Istio CNI plugin (per-node DaemonSet in istio-cni). MANDATORY on OpenShift: the restricted-v2 SCC
# forbids the sidecar init-container's NET_ADMIN traffic-redirection, so the CNI does it at pod creation
# instead. Cluster-scoped Sail CR; version tracks the Istio CR. sync-wave 1 + SkipDryRunOnMissingResource
# for the same post-operator-install reason as istio.yaml. Needed for BOTH sidecar and (future) ambient.
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    portfolio.redhat.com/component: service-mesh
spec:
  namespace: istio-cni
  version: v1.28.6
