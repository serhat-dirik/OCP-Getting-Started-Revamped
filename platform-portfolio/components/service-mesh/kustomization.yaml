# OpenShift Service Mesh 3 (OSSM3, Sail operator) — the shared, workshop-agnostic mesh control plane.
# One servicemeshoperator3 Subscription + a single cluster-wide Istio (istiod in istio-system) and
# IstioCNI (istio-cni). Sidecar-default per ADR-0003 (no ZTunnel — ambient is a concept + optional
# exercise). Coexists with the ingress-operator Gateway API istiod in openshift-ingress: OSSM3 3.x
# does NOT conflict with Gateway API (only OSSM 2.x does — verified live 2026-07-13 + Red Hat docs),
# and meshConfig.discoverySelectors scopes this istiod to mesh namespaces only. SMCP/SMMR do NOT exist
# in 3.x (ban-clean). Version pinned via the Istio/IstioCNI CR spec.version (see istio.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - istio.yaml
  - istiocni.yaml
