# The three namespaces OSSM3 needs: the operator's own namespace, the control-plane namespace
# (istiod), and the CNI namespace (per-node DaemonSet). All at sync-wave 0 so they exist before the
# Subscription/CRs. The Sail operator does NOT auto-create the control-plane/CNI namespaces — we own them.
---
# why: dedicated namespace for the servicemeshoperator3 operator (AllNamespaces install mode — matches
# the tempo/openshift-tempo-operator pattern; keeps the operator out of the shared openshift-operators OG).
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-service-mesh-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: service-mesh
---
# why: the mesh control-plane namespace — the Istio CR deploys istiod here (spec.namespace), and the
# Kiali CR lives here too. Not discovery-labeled: the Istio root namespace is always in-mesh regardless.
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: service-mesh
---
# why: the Istio CNI namespace — the istio-cni-node DaemonSet runs here to wire pod traffic redirection
# (mandatory on OpenShift: the restricted SCC forbids the init-container NET_ADMIN path, so the CNI does
# it). Needs privileged Pod Security admission because the CNI DaemonSet mounts host paths / runs
# privileged; the Sail operator grants the SCC, but PSA is a separate gate we must open at the namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: istio-cni
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: service-mesh
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
