# AllNamespaces OperatorGroup (no targetNamespaces) — servicemeshoperator3 supports AllNamespaces ONLY
# (verified live 2026-07-13: OwnNamespace/SingleNamespace/MultiNamespace all false). Same shape as the
# tempo component's OperatorGroup.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-service-mesh-operator
  namespace: openshift-service-mesh-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  upgradeStrategy: Default
