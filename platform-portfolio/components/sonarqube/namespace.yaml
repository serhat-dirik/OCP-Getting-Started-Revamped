# Workload namespace for the shared SonarQube service (SAST) + its external PostgreSQL. Named
# `sonarqube` so the in-cluster service DNS the pipeline task reads is stable (sonarqube.sonarqube.svc).
apiVersion: v1
kind: Namespace
metadata:
  name: sonarqube
  labels:
    portfolio.redhat.com/component: sonarqube
  annotations:
    # Created before the Postgres/chart/RBAC below so namespaced applies never race a missing namespace.
    argocd.argoproj.io/sync-wave: "-2"
