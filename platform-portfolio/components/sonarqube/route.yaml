# why: browser-facing edge Route to the SonarQube web UI (the attendee's SAST dashboard). Edge + no
# spec.host so the router auto-assigns <name>-<ns>.<ingress-domain> (domain-agnostic — the portfolio
# installs on any cluster). insecureEdgeTerminationPolicy Redirect: HTTP → HTTPS, the browser-route
# pattern (a plain oc expose serves HTTP-only and trips HSTS "Application is not available").
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sonarqube
  namespace: sonarqube
  labels:
    app: sonarqube
    portfolio.redhat.com/component: sonarqube
spec:
  to:
    kind: Service
    name: sonarqube
  port:
    targetPort: 9000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
