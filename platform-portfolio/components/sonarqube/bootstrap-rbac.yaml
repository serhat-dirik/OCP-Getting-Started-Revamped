# The sonar-bootstrap hook Job runs as this SA: it reads the sonarqube-admin password Secret and
# writes the minted CI-token Secret (sonar-ci-token) — all secret verbs, scoped to the sonarqube
# namespace only. Same least-privilege shape as the RHACS init-bundle SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sonar-bootstrap
  namespace: sonarqube
  labels:
    portfolio.redhat.com/component: sonarqube
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sonar-bootstrap
  namespace: sonarqube
  labels:
    portfolio.redhat.com/component: sonarqube
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sonar-bootstrap
  namespace: sonarqube
  labels:
    portfolio.redhat.com/component: sonarqube
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sonar-bootstrap
subjects:
  - kind: ServiceAccount
    name: sonar-bootstrap
    namespace: sonarqube
---
# why: SonarQube's built-in `admin` account password. SonarQube forces a change away from the default
# admin/admin on first use; the bootstrap Job performs that change TO this value, then authenticates
# with it to mint the CI token. Internal, non-attendee, disposable — a fixed value is fine (keycloak-db
# precedent). Attendees never log in as admin; they read dashboards (anonymous read is enabled on the
# chart via sonar.forceAuthentication=false). Must satisfy SonarQube's password policy (>=12 chars,
# upper + lower + digit + special) or change_password returns HTTP 400.
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-admin
  namespace: sonarqube
  labels:
    portfolio.redhat.com/component: sonarqube
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  password: Sonar-Admin-2026
