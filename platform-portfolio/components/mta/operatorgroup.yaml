# OwnNamespace OperatorGroup — mta-operator supports OwnNamespace/SingleNamespace/MultiNamespace but
# NOT AllNamespaces (verified live 2026-07-13), so targetNamespaces MUST be set (an empty/AllNamespaces
# OperatorGroup would leave the Subscription unresolved). Scopes the operator to openshift-mta only.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-mta
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - openshift-mta
