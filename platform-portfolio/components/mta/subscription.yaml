# Migration Toolkit for Applications (MTA 8) operator. Channel PINNED to stable-v8.1 (== the default
# channel, currentCSV mta-operator.v8.1.2 — verified live via packagemanifest 2026-07-13). Catalog is
# redhat-operators; the community konveyor-operator / windup-operator are BANNED (community-operators).
# installPlanApproval Automatic so z-stream patches inside 8.1 land without a manual gate.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: mta-operator
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable-v8.1
  installPlanApproval: Automatic
  name: mta-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
