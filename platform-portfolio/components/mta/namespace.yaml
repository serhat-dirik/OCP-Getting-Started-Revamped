# why: the Migration Toolkit for Applications operator + its Tackle Hub live in openshift-mta (the
# operator's suggested-namespace — verified live 2026-07-13). OwnNamespace install mode: the operator
# and the Tackle CR share this one namespace. sync-wave 0 so it exists before the OperatorGroup/Subscription.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: mta
