# Migration Toolkit for Applications (MTA 8) — the shared, workshop-agnostic modernization platform.
# One mta-operator Subscription (OwnNamespace, openshift-mta) + a single Tackle CR that stands up the
# Hub (assess/analyze/report UI). Net-new, like the mesh/serverless stacks. Community konveyor/windup
# operators are BANNED (community-operators); this uses the Red Hat redhat-operators catalog. Channel
# pinned via subscription.yaml (stable-v8.1 = v8.1.2). PoC-reusable: `--stacks mta` on any OCP 4.20+.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - tackle.yaml
