# The Tackle CR — the single install CR that stands up the MTA Hub (portfolio inventory, questionnaire
# assessment, analysis, reports, UI) in openshift-mta. Shared + workshop-agnostic: one Hub for the whole
# cluster; per-user isolation is name-prefixed Applications + per-user Git repos in the workshop layer
# (MTA has no strong per-user UI RBAC — see the M23 build note tenancy note). sync-wave 1 so it applies
# AFTER the operator Subscription (wave 0) installs the tackles.tackle.konveyor.io CRD;
# SkipDryRunOnMissingResource because that CRD only exists post-operator-install.
#
# feature_auth_required=false: an OPEN Hub (no MTA login) — the simplest attendee on-ramp for a shared
# teaching cluster; access is fronted by the OpenShift route. Flip to "true" to enable MTA's embedded
# Keycloak for stronger tenancy (a PM/content decision — see the build report).
#
# LLM/genAI (Developer Lightspeed for MTA, [ADS]): NOT configured here. The operator's canonical Tackle
# alm-example (v8.1.2, read 2026-07-13) exposes only feature_auth_required — no genAI provider/model
# fields — so the LLM is wired in the VS Code extension settings per workspace, fed the MaaS endpoint/
# model (devfile env) + key (maas-credentials automount) by the M23 entry state. Confirm the full spec
# with `oc explain tackle.spec` once the Hub is installed. See the build report (a build-note delta).
apiVersion: tackle.konveyor.io/v1alpha1
kind: Tackle
metadata:
  name: tackle
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    portfolio.redhat.com/component: mta
spec:
  feature_auth_required: "false"
