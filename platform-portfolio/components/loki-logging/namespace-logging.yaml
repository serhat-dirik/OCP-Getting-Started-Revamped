# Suggested namespace of Red Hat OpenShift Logging (cluster-logging) — home to the LokiStack, the log
# collector (Vector) ServiceAccount, the ClusterLogForwarder, and the object-bucket claim.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-logging
  labels:
    portfolio.redhat.com/component: loki-logging
    openshift.io/cluster-monitoring: "true"
