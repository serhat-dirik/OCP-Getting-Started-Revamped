# Grant the collector SA permission to read application + infrastructure logs. The referenced ClusterRoles are
# created by the cluster-logging operator (forward reference is valid — the bindings activate once the roles exist).
# TODO(verify-on-install): confirm ClusterRole names collect-application-logs / collect-infrastructure-logs in Logging 6.5.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: log-collector-application-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
  - kind: ServiceAccount
    name: log-collector
    namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: log-collector-infrastructure-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-infrastructure-logs
subjects:
  - kind: ServiceAccount
    name: log-collector
    namespace: openshift-logging
