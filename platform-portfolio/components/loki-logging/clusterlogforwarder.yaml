# Collect application + infrastructure pod logs (Vector) and forward them to the LokiStack. Shape taken verbatim
# from the live cluster-logging v6.5.1 alm-example (observability.openshift.io/v1 — the Logging 6.x API, NOT the
# retired logging.openshift.io/v1). Deploys the Vector collector DaemonSet once reconciled.
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # ClusterLogForwarder CRD arrives with the cluster-logging operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  serviceAccount:
    name: log-collector
  outputs:
    - name: logging-loki
      type: lokiStack
      lokiStack:
        authentication:
          token:
            from: serviceAccount
        target:
          name: logging-loki
      tls:
        ca:
          configMapName: openshift-service-ca.crt
          key: service-ca.crt
  pipelines:
    - name: logs-to-loki
      inputRefs:
        - application
        - infrastructure
      outputRefs:
        - logging-loki
