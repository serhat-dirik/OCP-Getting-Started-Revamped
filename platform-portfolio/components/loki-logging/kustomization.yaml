# OPTIONAL / capacity-gated log-aggregation tier (M13 T3): Loki Operator + Red Hat OpenShift Logging +
# a shared LokiStack (NooBaa-backed) + Vector ClusterLogForwarder + the COO Logging console plugin.
# Heaviest observability add (Vector DaemonSet 1 pod/node + ~Loki pods). Requires the logging-loki-s3 Secret
# contract (see README.md). Left OUT of the observability stack by default — opt in via stacks/observability.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace-operators-redhat.yaml
  - namespace-logging.yaml
  - operatorgroup-loki.yaml
  - operatorgroup-logging.yaml
  - subscription-loki.yaml
  - subscription-logging.yaml
  - objectbucketclaim.yaml
  - collector-serviceaccount.yaml
  - collector-rbac.yaml
  - lokistack.yaml
  - clusterlogforwarder.yaml
  - uiplugin-logging.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
