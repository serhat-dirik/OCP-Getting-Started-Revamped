# All-namespaces OperatorGroup for the Loki Operator (loki-operator supports AllNamespaces only, verified live 2026-07-09).
# Drop this file if openshift-operators-redhat already carries an OperatorGroup on the target cluster (see namespace comment).
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-operators-redhat
  namespace: openshift-operators-redhat
spec:
  upgradeStrategy: Default
