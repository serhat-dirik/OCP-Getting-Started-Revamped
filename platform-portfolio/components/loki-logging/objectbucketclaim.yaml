# S3 bucket for LokiStack object storage, provisioned from ODF NooBaa. Creates a bucket plus a ConfigMap and
# Secret (both named logging-loki-bucket) holding the bucket name/host/port and access keys. Those outputs are
# assembled into the LokiStack storage Secret (logging-loki-s3) by the consumer layer — see README.md (secret contract).
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: logging-loki-bucket
  namespace: openshift-logging
spec:
  generateBucketName: logging-loki
  storageClassName: openshift-storage.noobaa.io
