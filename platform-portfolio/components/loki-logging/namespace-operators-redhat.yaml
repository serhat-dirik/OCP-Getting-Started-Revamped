# Install namespace of the Loki Operator (suggested-namespace openshift-operators-redhat, AllNamespaces).
# CAVEAT (replicability): some clusters pre-create this namespace WITH an AllNamespaces OperatorGroup for other
# Red Hat operators. A second OperatorGroup breaks OLM (TooManyOperatorGroups) — if the target cluster already
# has one here, drop operatorgroup-loki.yaml from the kustomization and reuse the existing OG. See README.md.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-operators-redhat
  labels:
    portfolio.redhat.com/component: loki-logging
    # Let cluster monitoring scrape Red Hat operator metrics from this namespace (RH-operator convention).
    openshift.io/cluster-monitoring: "true"
