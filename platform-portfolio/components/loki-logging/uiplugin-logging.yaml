# COO UIPlugin: enables the console "Observe -> Logs" view backed by this LokiStack. Requires COO (the
# cluster-observability-operator component) — this stack app is sequenced after it, so the UIPlugin CRD exists.
# Verified on install 2026-07-11 (COO v1.5.1): spec.type enum includes "Logging" (exact casing), and
# spec.logging.lokiStack takes {name, namespace} (oc explain) — reconciled "successfully" with the shape below.
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: logging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: Logging
  logging:
    lokiStack:
      name: logging-loki
      namespace: openshift-logging
