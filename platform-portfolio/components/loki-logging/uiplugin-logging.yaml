# COO UIPlugin: enables the console "Observe -> Logs" view backed by this LokiStack. Requires COO (the
# cluster-observability-operator component) — this stack app is sequenced after it, so the UIPlugin CRD exists.
# TODO(verify-on-install): oc explain uiplugin.spec.logging — confirm spec.type "Logging" casing + the lokiStack ref shape in COO v1.5.1.
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: logging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  type: Logging
  logging:
    lokiStack:
      name: logging-loki
      namespace: openshift-logging
