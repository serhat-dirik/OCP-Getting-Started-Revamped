# Loki Operator (Red Hat log store) — owns LokiStack. Channel stable-6.5 verified 2026-07-09 on the redhat-operators
# catalog. NOTE: a community "loki-operator" (alpha only) shares the package name — source=redhat-operators pins the Red Hat build.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators-redhat
spec:
  channel: stable-6.5
  installPlanApproval: Automatic
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
