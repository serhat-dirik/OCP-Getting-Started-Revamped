# Shared log store. size 1x.demo = smallest footprint (the alm-example ships 1x.small). Object storage via the
# NooBaa S3 Secret contract (logging-loki-s3, assembled from the OBC outputs — see README.md, never in git);
# component PVCs use the cluster's default block class. tenants.mode openshift-logging is required for the
# ClusterLogForwarder lokiStack output's serviceAccount-token auth.
# TODO(verify-on-install): size enum (1x.demo vs 1x.small), spec.storage.schemas requirement, tenants.mode, and the
# logging-loki-s3 secret key names for NooBaa S3 — LokiStack CRD is not installed at authoring.
apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: logging-loki
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # LokiStack CRD arrives with the Loki operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  size: 1x.demo
  storage:
    schemas:
      - version: v13
        effectiveDate: "2024-01-01"
    secret:
      name: logging-loki-s3
      type: s3
  storageClassName: ocs-external-storagecluster-ceph-rbd
  tenants:
    mode: openshift-logging
