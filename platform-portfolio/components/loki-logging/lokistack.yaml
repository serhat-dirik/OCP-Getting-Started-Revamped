# Shared log store. Object storage via the NooBaa S3 Secret contract (logging-loki-s3, assembled from
# the OBC outputs — see README.md, never in git); component PVCs use the named block class below.
# Verified on install 2026-07-11 (loki-operator 6.5.1, LokiStack reconciled Ready=True):
#   - spec.size enum is [1x.demo, 1x.pico, 1x.extra-small, 1x.small, 1x.medium] → 1x.demo is the smallest.
#   - spec.storage.schemas is required; version enum [v11, v12, v13] with effectiveDate (required) → v13 current.
#   - spec.tenants.mode enum [static, dynamic, openshift-logging, openshift-network] → openshift-logging is
#     required for the ClusterLogForwarder lokiStack output's serviceAccount-token auth.
#   - logging-loki-s3 keys (access_key_id, access_key_secret, bucketnames, endpoint) work against NooBaa S3.
apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: logging-loki
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # LokiStack CRD arrives with the Loki operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  size: 1x.demo
  storage:
    schemas:
      - version: v13
        effectiveDate: "2024-01-01"
    secret:
      name: logging-loki-s3
      type: s3
  storageClassName: ocs-external-storagecluster-ceph-rbd
  tenants:
    mode: openshift-logging
