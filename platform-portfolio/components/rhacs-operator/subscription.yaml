# Red Hat Advanced Cluster Security operator (M08 trust stack). Channel `stable` is the current
# 4.x line (v4.11.1, verified live 2026-07-09) — NOT `latest`, which holds the stale 3.74.9 (a
# recorded catalog trap in versions.yaml). Automatic approval keeps it on the stable head.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhacs-operator
  namespace: rhacs-operator
spec:
  channel: stable
  installPlanApproval: Automatic
  name: rhacs-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
