# All-namespaces OperatorGroup — the RHACS operator watches every namespace (it manages Central in
# `stackrox` and the SecuredCluster sensor cluster-wide). Empty spec = AllNamespaces (verified live).
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhacs-operator
  namespace: rhacs-operator
spec:
  upgradeStrategy: Default
