# CheCluster — the Dev Spaces workspace server. CRD ships with the operator, so it syncs late.
apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  name: devspaces
  namespace: openshift-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # CheCluster CRD arrives with the operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    # Default cheServer config — the workshop needs no custom control-plane tuning.
    cheServer: {}
  devEnvironments:
    # Cap concurrent workspaces per user so ~30 attendees fit the workshop cluster.
    maxNumberOfRunningWorkspacesPerUser: 2
