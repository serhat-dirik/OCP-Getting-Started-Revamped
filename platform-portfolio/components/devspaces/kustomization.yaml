# OpenShift Dev Spaces — operator (global) + control-plane namespace + CheCluster,
# plus the in-cluster Gitea SCM registration (so factory-URL workspaces resolve devfiles
# over the wildcard-covered path host, not an uncovered raw.<host> — SW-1 / M03 blocker).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - subscription.yaml
  - checluster.yaml
  - gitea-scm-integration.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
