# Red Hat build of OpenTelemetry — collector that ingests OTLP from apps and exports to Tempo. Channel verified 2026-07-09.
# NOTE: the community "opentelemetry-operator" package is also in the catalog — source=redhat-operators pins the Red Hat build.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: opentelemetry-product
  namespace: openshift-opentelemetry-operator
spec:
  channel: stable
  installPlanApproval: Automatic
  name: opentelemetry-product
  source: redhat-operators
  sourceNamespace: openshift-marketplace
