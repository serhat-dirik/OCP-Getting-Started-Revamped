# Shared OTLP collector for the workshop tracing pipeline. Deployment mode -> Service otel-collector
# in observability-workshop; apps send traces to http://otel-collector.observability-workshop.svc.cluster.local:4317
# (the OTEL_EXPORTER_OTLP_ENDPOINT seam M12's entry state wires onto parasol-claims). Exports to TempoMonolithic
# "traces" over OTLP gRPC (in-cluster plaintext, tls.insecure). Structured v1beta1 config shape from the live
# opentelemetry-operator v0.152.0-1 alm-example; receiver endpoints pinned to 0.0.0.0 so other pods can reach it.
# Verified on install 2026-07-11 (opentelemetry-operator v0.152.0-1, collector 0.152.1): the operator names the
# Service "otel-collector" (from the "otel" CR, deployment mode) exposing :4317 gRPC / :4318 HTTP, and the live
# config exports to tempo-traces.observability-workshop.svc.cluster.local:4317 (tls.insecure) — collector Ready 1/1.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: observability-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # OpenTelemetryCollector CRD arrives with the operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: deployment
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      # Export to the TempoMonolithic OTLP gRPC endpoint (Service tempo-traces in the same namespace).
      otlp:
        endpoint: tempo-traces.observability-workshop.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
