# RHACS Central — the scanning/policy brain (UI, API, central-db, Scanner V4). One shared instance
# for the whole workshop; the M08 pipeline scan gate + admission demo talk to it. Route exposed so
# the console + roxctl/API are reachable. Scanner analyzers/indexer/matcher pinned to a single
# replica (autoscaling off) to keep the shared footprint small — the cluster has ample headroom but
# a workshop never needs scanner to scale out. Operator-default resources otherwise (verified live
# 2026-07-11: node requests ~50% with plenty free, so no aggressive request trimming that risks OOM).
apiVersion: platform.stackrox.io/v1alpha1
kind: Central
metadata:
  name: stackrox-central-services
  namespace: stackrox
  annotations:
    # CRD arrives with the operator (separate Argo app/wave) — don't dry-run against a missing CRD.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  central:
    exposure:
      route:
        enabled: true
  scanner:
    analyzer:
      scaling:
        autoScaling: Disabled
        replicas: 1
  scannerV4:
    indexer:
      scaling:
        autoScaling: Disabled
        replicas: 1
    matcher:
      scaling:
        autoScaling: Disabled
        replicas: 1
