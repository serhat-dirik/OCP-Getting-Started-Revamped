# A declarative RHACS gate that FAILS THE BUILD when an image carries CVE-2021-44228 (Log4Shell).
# Generic hardening any cluster benefits from — and it makes the trust stack self-sufficient for the
# M08 scan-gate lab: the seeded log4j-core 2.14.1 in the vulnerable fork trips this deterministically
# (feed-independent of severity thresholds; clean images lack the CVE → they pass). Build enforcement
# only affects `roxctl image check` (CI); it never blocks a running workload. The operator's
# config-controller syncs this CR into Central.
apiVersion: config.stackrox.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: block-log4shell-at-build
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "3"
spec:
  policyName: "Block Log4Shell (CVE-2021-44228) at build"
  description: >-
    Fails a build-time image check when the image contains CVE-2021-44228 (Log4Shell) in Apache
    log4j-core. Powers the M08 Trusted Software Supply Chain scan gate.
  rationale: >-
    Log4Shell is a critical, trivially-exploitable RCE. Catching it at build keeps a known-vulnerable
    dependency from ever being promoted.
  categories:
    - "Vulnerability Management"
  lifecycleStages:
    - BUILD
  severity: CRITICAL_SEVERITY
  enforcementActions:
    - FAIL_BUILD_ENFORCEMENT
  policySections:
    - sectionName: log4shell
      policyGroups:
        - fieldName: CVE
          booleanOperator: OR
          negate: false
          values:
            - value: "CVE-2021-44228"
