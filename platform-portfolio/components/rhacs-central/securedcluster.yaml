# SecuredCluster — deploys the sensor + collector (DaemonSet) + admission controller that let RHACS
# watch THIS cluster and enforce admission policies (the instructor-demo "block unsigned images" beat).
# Needs the Central-minted init-bundle TLS secrets (sensor-tls/collector-tls/admission-control-tls),
# created by the init-bundle hook Job at wave 2 — so this CR is wave 3. clusterName is a generic
# display label (kept workshop-agnostic; the scan gate doesn't depend on it). centralEndpoint is the
# in-cluster service (Central is in this same namespace).
apiVersion: platform.stackrox.io/v1alpha1
kind: SecuredCluster
metadata:
  name: stackrox-secured-cluster-services
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterName: workshop-cluster
  centralEndpoint: central.stackrox.svc:443
