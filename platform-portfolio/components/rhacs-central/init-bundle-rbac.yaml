# The init-bundle hook Job runs as this SA. It reads the operator-generated admin password
# (central-htpasswd) and writes the Central-minted init-bundle TLS secrets + a CI scan token into
# stackrox — all secret verbs, scoped to the stackrox namespace only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhacs-init-bundle
  namespace: stackrox
  labels:
    portfolio.redhat.com/component: rhacs-central
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhacs-init-bundle
  namespace: stackrox
  labels:
    portfolio.redhat.com/component: rhacs-central
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhacs-init-bundle
  namespace: stackrox
  labels:
    portfolio.redhat.com/component: rhacs-central
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhacs-init-bundle
subjects:
  - kind: ServiceAccount
    name: rhacs-init-bundle
    namespace: stackrox
