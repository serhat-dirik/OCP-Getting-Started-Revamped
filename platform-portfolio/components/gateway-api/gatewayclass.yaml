# Activates the OpenShift Gateway API implementation: creating this GatewayClass makes the cluster
# ingress operator install a lightweight istiod ("sail" library, istiod-openshift-gateway in
# openshift-ingress) that reconciles Gateways/HTTPRoutes. Gateway API standard CRDs + the
# GatewayAPI/GatewayAPIController/GatewayAPIWithoutOLM feature gates are already GA/default-on in
# OCP 4.19+, so no operator Subscription is needed — this single cluster-scoped CR is the whole
# activation. Verified live on Cluster 2 (2026-07-12): Accepted=True, ControllerInstalled=True
# (istiod v1.27.3), CRDsReady=True. NOTE: on a cluster without a LoadBalancer provider (bare-metal,
# no MetalLB) Gateways created against this class stay Programmed=False (no external address) — the
# GatewayClass activates correctly but Gateway data planes need an LB provider; see the M15 build note.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: openshift-default
spec:
  controllerName: openshift.io/gateway-controller/v1
