# OpenShift Gateway API activation — the openshift-default GatewayClass (istiod-backed, no
# Subscription). Workshop-agnostic: any cluster wanting Gateway API installs this one CR.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gatewayclass.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
