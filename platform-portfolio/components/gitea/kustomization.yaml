# Gitea operator is NOT in OperatorHub — installed from the rhpds/gitea-operator
# OLMDeploy kustomization, pinned to a commit SHA (main is rolling; verified 2026-07-08).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - https://github.com/rhpds/gitea-operator/OLMDeploy?ref=77cdc2b884c160663f7ef0b9040c35898d3ebcce
  - gitea-cr.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
