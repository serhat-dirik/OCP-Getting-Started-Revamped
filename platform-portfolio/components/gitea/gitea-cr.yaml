# The in-cluster git service. Admin credentials are operator-generated (never in git);
# API-consuming jobs (git-mirror, workshop seeding) discover them from the operator's outputs.
apiVersion: pfe.rhpds.com/v1
kind: Gitea
metadata:
  name: gitea
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # CRD arrives with the operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  giteaSsl: true
  giteaAdminUser: gitea-admin
  giteaAdminEmail: gitea-admin@parasol.example.com
  # Users are NOT created here — user seeding is a consumer-layer concern (workshop),
  # keeping this portfolio component workshop-agnostic.
  giteaCreateUsers: false
  postgresqlVolumeSize: 4Gi
  giteaVolumeSize: 4Gi
