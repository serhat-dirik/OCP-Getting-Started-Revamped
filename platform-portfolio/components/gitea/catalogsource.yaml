# Community Gitea operator (Red Hat GPTE/RHDP-maintained) — not in the default catalogs.
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: gitea-catalog
  namespace: openshift-marketplace
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  sourceType: grpc
  image: quay.io/gpte-devops-automation/gitea-catalog:latest
  displayName: Gitea Operator (GPTE)
  publisher: Red Hat GPTE
  updateStrategy:
    registryPoll:
      interval: 30m
