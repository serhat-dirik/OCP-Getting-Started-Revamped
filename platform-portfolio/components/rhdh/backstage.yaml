# The Backstage instance (Red Hat Developer Hub). rhdh.redhat.com/v1alpha4 is the current served
# version (operator also serves v1alpha5). The operator deploys a bundled local PostgreSQL and creates
# the route (backstage-developer-hub) with the app/backend baseUrls auto-configured from it — so no
# cluster domain is hardcoded here.
apiVersion: rhdh.redhat.com/v1alpha4
kind: Backstage
metadata:
  name: developer-hub
  namespace: rhdh
  labels:
    portfolio.redhat.com/component: rhdh
spec:
  application:
    # The workshop app-config (guest auth, gitea integration, Parasol catalog) is appended to the
    # operator's base config.
    appConfig:
      configMaps:
        - name: app-config-rhdh
    # Adds the Gitea scaffolder module on top of the default plugin set.
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    # Gitea credentials for the scaffolder + catalog reader (secret contract — see README).
    extraEnvs:
      secrets:
        - name: rhdh-gitea
    route:
      enabled: true
