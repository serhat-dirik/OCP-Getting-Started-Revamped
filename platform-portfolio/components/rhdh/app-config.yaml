# RHDH application configuration, appended to the operator's base app-config (spec.application.appConfig).
# Everything here is workshop-agnostic in MECHANISM; the one workshop-specific part is the Parasol
# catalog.locations block (see the comment there).
#
# Gitea is addressed by its IN-CLUSTER SERVICE URL (gitea.ogsr-gitea.svc:3000) for BOTH catalog reads and
# scaffolder publishes — stable on any cluster, so this component needs no per-cluster host/domain
# injection (RHDH's backend, Dev Spaces, and the workshop terminal all reach it in-cluster). Trade-off:
# "view source" / scaffolded-repo links render as in-cluster URLs (not browser-clickable). To make them
# browser-friendly, add a second gitea integration on the external route host discovered at runtime —
# tracked as an enhancement.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: rhdh
  labels:
    portfolio.redhat.com/component: rhdh
data:
  app-config-rhdh.yaml: |
    app:
      title: Parasol Developer Hub
    auth:
      # development keeps the built-in Guest sign-in; the explicit flag is required because the RHDH
      # image runs NODE_ENV=production (the guest provider refuses to start otherwise). Guest = the
      # simplest honest workshop auth: no per-attendee login friction, all attendees read the shared
      # catalog and run templates. Hardening path (documented in README): OpenShift OAuth sign-in.
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
    integrations:
      gitea:
        # In-cluster Gitea service — the scaffolder (publish:gitea) and catalog reader authenticate with
        # these creds (the rhdh-gitea secret contract, mounted via extraEnvs — see README).
        - host: gitea.ogsr-gitea.svc:3000
          baseUrl: http://gitea.ogsr-gitea.svc:3000
          username: ${GITEA_USERNAME}
          password: ${GITEA_PASSWORD}
    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Template, Group, User]
      # --- WORKSHOP CONTENT (Parasol) — the one non-generic block --------------------------------
      # These locations register THIS workshop's catalog (the parasol/* Gitea repos + the golden-path
      # template). Per the platform/workshop split they ideally live in the workshop layer; kept here
      # for now because pp-portal was scoped (build note) to ship the Parasol catalog. Flagged for a
      # follow-up move to a workshop-layer catalog registration. Reads are server-side (in-cluster URL).
      locations:
        - type: url
          target: http://gitea.ogsr-gitea.svc:3000/parasol/parasol-claims/raw/branch/main/catalog-info.yaml
        - type: url
          target: http://gitea.ogsr-gitea.svc:3000/parasol/parasol-web/raw/branch/main/catalog-info.yaml
        - type: url
          target: http://gitea.ogsr-gitea.svc:3000/parasol/parasol-notifications/raw/branch/main/catalog-info.yaml
        - type: url
          target: http://gitea.ogsr-gitea.svc:3000/parasol/parasol-service-template/raw/branch/main/template.yaml
