# Dynamic plugins for RHDH (spec.application.dynamicPluginsConfigMapName). Includes the operator's
# default plugin set (TechDocs, catalog, scaffolder core, …) and adds the Gitea scaffolder module so
# the golden-path template can publish:gitea.
#
# @backstage/plugin-scaffolder-backend-module-gitea is a FIRST-PARTY @backstage/* core module (not a
# third-party community plugin) — it is NOT bundled in the RHDH 1.10.2 image, so it is installed as an
# external dynamic plugin from npm (integrity-pinned). Version 0.2.19 is version-matched to RHDH 1.10.2:
# it declares @backstage/plugin-scaffolder-node ^0.13.0, satisfied by the image's 0.13.1 (0.2.20+ want
# ^0.13.2+, which the image does not satisfy). Verified live 2026-07-11: the plugin loads clean and
# publish:gitea + catalog:register run end to end. Re-pin on RHDH upgrades (match scaffolder-node).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: rhdh
  labels:
    portfolio.redhat.com/component: rhdh
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: "@backstage/plugin-scaffolder-backend-module-gitea@0.2.19"
        integrity: "sha512-wFtDjPrJQQOwrSic+LxJWzI3wXkjrEYmag6glF5KbLAH3Jurj14bYDxWMgihUXayrH2l8a76Wj0aDCozsA8w3w=="
        disabled: false
