# Cluster-scoped Argo Rollouts controller — the one RolloutManager per cluster (PM decision
# 2026-07-09; no other module claims Rollouts). Rollouts ships WITH the OpenShift GitOps operator
# (GA since GitOps 1.13), so this provisions the controller from the already-installed operator —
# no separate Subscription, no operator image pin.
#
# Lives in openshift-gitops (the operator's DEFAULT instance namespace): the operator implicitly
# allows a cluster-scoped RolloutManager here without adding the namespace to the subscription's
# CLUSTER_SCOPED_ARGO_ROLLOUTS_NAMESPACES allowlist. Verified live 2026-07-11: the same CR in a
# non-default namespace is rejected (status InvalidRolloutManagerNamespace) unless that env is set;
# in openshift-gitops it goes Available with no Subscription edit — so this component stays purely
# declarative and never touches the fable-owned bootstrap operator install.
#
# namespaceScoped:false → one controller watches Rollout/AnalysisTemplate CRs in EVERY namespace,
# so all {user}-prod canaries are served by this single instance. Controller image + version are
# defaulted by the operator (RELATED_IMAGE_ARGO_ROLLOUTS_IMAGE) — never hardcode a tag, so the
# operator upgrade path stays intact.
#
# No traffic/metric plugins: the core lab uses pod-ratio canary weighting + a job-provider
# AnalysisTemplate (both self-contained, no external plugin binary to download at controller
# start). See the progressive-delivery stack README for the rationale and the OpenShift Route
# traffic-plugin enhancement note.
apiVersion: argoproj.io/v1alpha1
kind: RolloutManager
metadata:
  name: argo-rollouts
  namespace: openshift-gitops
  labels:
    portfolio.redhat.com/component: argo-rollouts
spec:
  namespaceScoped: false
  controllerResources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
