# OLSConfig 'cluster' — binds Lightspeed to an LLM provider. The generic MaaS url/model here are
# PLACEHOLDERS overridden per-cluster by the ai-assist stack's kustomize patches; the API token
# stays in the 'credentials' Secret contract (never in git). See README.md. Name MUST be 'cluster'.
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    # OLSConfig CRD arrives with the operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  llm:
    providers:
      - name: maas
        type: rhoai_vllm
        url: https://maas.example.com/v1
        credentialsSecretRef:
          name: credentials
        models:
          - name: example-model
  ols:
    defaultProvider: maas
    defaultModel: example-model
    logLevel: INFO
