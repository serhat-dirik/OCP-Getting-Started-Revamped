# Default mirror set: this project's upstream repo. Consumers (e.g. the workshop layer)
# add THEIR repos by creating additional ConfigMaps with the same label — the job mirrors
# the union, so no layer ever edits another layer's objects.
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-mirror-repos-portfolio
  labels:
    git-mirror.portfolio.redhat.com/repos: "true"
data:
  org: parasol
  repos: |
    ocp-getting-started=https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
