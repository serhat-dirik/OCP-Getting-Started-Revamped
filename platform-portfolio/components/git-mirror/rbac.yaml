# The mirror job discovers the Gitea route + admin credentials at runtime (never from git).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-mirror
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-mirror
rules:
  # why: read Gitea CR status + operator-generated admin secret + route host
  # NOTE: the rhpds CRD's plural is literally "gitea" (not "giteas") — verified live 2026-07-08
  - apiGroups: ["pfe.rhpds.com"]
    resources: ["gitea"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: git-mirror
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: git-mirror
subjects:
  - kind: ServiceAccount
    name: git-mirror
