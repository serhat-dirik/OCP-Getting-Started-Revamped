# AllNamespaces OperatorGroup (no targetNamespaces) — serverless-operator supports AllNamespaces ONLY
# (verified live 2026-07-13). Same shape as the service-mesh / tempo components' OperatorGroups.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: serverless-operator
  namespace: openshift-serverless
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  upgradeStrategy: Default
