# OpenShift Serverless (Knative Serving + Eventing) — the shared, workshop-agnostic request-driven-compute
# control plane. One serverless-operator Subscription + a single cluster-wide KnativeServing (Kourier
# ingress) and KnativeEventing (in-memory broker). Net-new per-user ksvc/broker wiring is the workshop
# layer / M19 entry state ON TOP, never here. Version pinned via the Subscription channel (stable-1.37).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - knative-serving.yaml
  - knative-eventing.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
