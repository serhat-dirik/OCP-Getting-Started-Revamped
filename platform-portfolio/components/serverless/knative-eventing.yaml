# The Knative Eventing control plane (sources/brokers/triggers + the default in-memory MTChannelBasedBroker
# dispatcher). Cluster singleton CR (operator.knative.dev/v1beta1, name+ns knative-eventing). Ships the
# Broker/Trigger/PingSource CRDs the M20 eventing-taste and the M21 eventing deep-dive build on. sync-wave 1
# + SkipDryRunOnMissingResource for the same post-operator-install reason as knative-serving.yaml. No Kafka
# here — the default broker is in-memory (subscription-free); KnativeKafka is M21's optional [ADD-ON].
apiVersion: operator.knative.dev/v1beta1
kind: KnativeEventing
metadata:
  name: knative-eventing
  namespace: knative-eventing
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    portfolio.redhat.com/component: serverless
