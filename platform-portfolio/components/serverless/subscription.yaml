# OpenShift Serverless operator. Channel PINNED to stable-1.37 (== serverless-operator.v1.37.1, ships
# Knative Serving/Eventing/Kourier/kn 1.17): the bare 'stable' channel floats to the newest minor and
# WILL drift on the next release (the exact trap the M19 OSSM pin caught — 'stable' drifted to v3.4.0,
# commit 3302c14). stable-1.37 tracks z-stream patches inside 1.37 without jumping minors.
# installPlanApproval Automatic so 1.37.z patches land without a manual gate. versions.yaml `serverless`
# is the source of truth for this pin (channel stable / csv v1.37.1, verified 2026-07-12).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: serverless-operator
  namespace: openshift-serverless
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable-1.37
  installPlanApproval: Automatic
  name: serverless-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
