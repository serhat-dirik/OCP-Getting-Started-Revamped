# The Knative Serving control plane (request-driven compute: activator/autoscaler/controller/webhook +
# net-kourier ingress). Cluster singleton CR (operator.knative.dev/v1beta1, name+ns knative-serving).
# sync-wave 1 so it applies AFTER the operator Subscription (wave 0) has installed the CSV + registered
# the operator.knative.dev CRDs; SkipDryRunOnMissingResource because that CRD only exists post-install.
# Kourier is the default (and only bundled) ingress; the operator auto-creates a per-ksvc edge OpenShift
# Route in ns knative-serving-ingress, so ksvc workloads are NEVER hand-rolled with `oc create route edge`.
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: knative-serving
  namespace: knative-serving
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    portfolio.redhat.com/component: serverless
spec:
  # why: let ksvcs deploy images straight from the OpenShift internal registry by TAG. By default Knative
  # resolves an image tag to a digest at deploy time using the revision's ServiceAccount pull creds; for
  # the internal registry that adds a needless auth/CA hop. Listing the internal-registry Service here
  # skips digest resolution, so the kubelet pulls the tag at pod-start via the namespace's image-puller
  # grant (workshop-config parasol-images-pull) — deterministic, and cluster-agnostic (this Service DNS
  # is identical on every OpenShift cluster). Verified on-cluster: parasol-claims:1.1 ksvc goes Ready.
  config:
    deployment:
      registries-skipping-tag-resolving: "image-registry.openshift-image-registry.svc:5000"
