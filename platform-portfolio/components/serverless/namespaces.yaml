# The three namespaces OpenShift Serverless needs: the operator's own namespace, the Knative Serving
# control-plane namespace, and the Knative Eventing control-plane namespace. All at sync-wave 0 so they
# exist before the Subscription/CRs. The Serverless operator does NOT pre-create the serving/eventing
# namespaces — the KnativeServing/KnativeEventing CRs live in them, so we own them (redhat-cop gitops-
# catalog serverless-operator does the same). Kourier's per-ksvc ingress namespace (knative-serving-
# ingress) IS created by the operator, so it is deliberately NOT listed here.
---
# why: dedicated namespace for the serverless-operator (AllNamespaces install mode — the only mode the
# packagemanifest supports, verified live 2026-07-13: OwnNamespace/SingleNamespace/MultiNamespace all
# false). cluster-monitoring label so the operator's metrics are scraped by platform Prometheus.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-serverless
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    openshift.io/display-name: "Red Hat OpenShift Serverless"
  labels:
    openshift.io/cluster-monitoring: "true"
    portfolio.redhat.com/component: serverless
---
# why: the Knative Serving control-plane namespace — the KnativeServing CR deploys the serving stack here
# (activator, autoscaler, controller, webhook, net-kourier). Name is fixed at knative-serving.
apiVersion: v1
kind: Namespace
metadata:
  name: knative-serving
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: serverless
---
# why: the Knative Eventing control-plane namespace — the KnativeEventing CR deploys the eventing stack
# here (controller, webhook, in-memory-channel + MT-broker dispatchers). Name is fixed at knative-eventing.
apiVersion: v1
kind: Namespace
metadata:
  name: knative-eventing
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: serverless
