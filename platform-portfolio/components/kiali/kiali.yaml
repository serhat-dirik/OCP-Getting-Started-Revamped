# The Kiali console for the shared OSSM3 mesh. Lives in istio-system alongside istiod. sync-wave 1 +
# SkipDryRunOnMissingResource: the kiali.io CRD arrives with the operator (wave 0). Minimal by design —
# the platform baseline just stands Kiali up against the istio-system control plane with OpenShift OAuth
# login (attendees reach it as themselves; per-user namespace visibility follows their OpenShift RBAC).
# Mesh-metrics (Prometheus/UWM) and trace (Tempo) wiring for the full traffic graph is an M18 content
# concern layered on top — not baked into the workshop-agnostic platform stack.
apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    portfolio.redhat.com/component: kiali
spec:
  version: default
  istio_namespace: istio-system
  auth:
    # OpenShift OAuth — attendees log in with their cluster identity; Kiali scopes visible namespaces to
    # what each user can access (so user4 sees user4-mesh, not peers). No anonymous access on a shared cluster.
    strategy: openshift
  deployment:
    view_only_mode: false
    logger:
      log_level: info
