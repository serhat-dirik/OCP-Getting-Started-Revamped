# Kiali (kiali-ossm operator) — the mesh console (topology graph, mTLS badges, traffic) for M18. Kiali
# operator + a single Kiali CR pointed at the istio-system control plane. Installed AFTER the mesh stack's
# service-mesh component (the Kiali CR needs the Istio control plane + istiod present to report Healthy).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - kiali.yaml
