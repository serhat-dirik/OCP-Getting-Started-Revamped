# Kiali (kiali-ossm operator) — the mesh console (topology graph, mTLS badges, traffic) for M19. Kiali
# operator + a single Kiali CR pointed at the istio-system control plane. Installed AFTER the mesh stack's
# service-mesh component (the Kiali CR needs the Istio control plane + istiod present to report Healthy).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - kiali.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
