# Dedicated namespace for the kiali-ossm operator (AllNamespaces install mode — verified live 2026-07-13).
# The Kiali CR + workload land in istio-system (see kiali.yaml), NOT here — this holds only the operator.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-kiali-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: kiali
