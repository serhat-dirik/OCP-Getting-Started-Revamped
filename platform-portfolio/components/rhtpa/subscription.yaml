# RHTPA operator. Channel stable-v1.1 (= v1.1.6, verified live 2026-07-11) — the ONLY published channel.
# OPTIONAL / instructor-demo only: the CR (TrustedProfileAnalyzer) needs an OIDC realm, object storage
# (NooBaa OBC), and Postgres — documented as contracts in README.md, not shipped here. This component
# installs only the operator; enabling the full stack is a deliberate instructor step.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhtpa-operator
  namespace: rhtpa
spec:
  channel: stable-v1.1
  installPlanApproval: Automatic
  name: rhtpa-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
