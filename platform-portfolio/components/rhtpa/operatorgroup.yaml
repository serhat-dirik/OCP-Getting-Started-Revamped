# SingleNamespace OperatorGroup targeting rhtpa ONLY — RHTPA is OwnNamespace/SingleNamespace (verified
# live: defaultChannel stable-v1.1). An AllNamespaces OperatorGroup would fail OLM resolution.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhtpa
  namespace: rhtpa
spec:
  targetNamespaces:
    - rhtpa
