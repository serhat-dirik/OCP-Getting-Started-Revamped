# Red Hat build of Keycloak operator, workshop instance. Channel stable-v26.6 = catalog head /
# versions.yaml new-install target (rhbk-operator.v26.6.4-opr.1, verified 2026-07-09). The cluster's
# login IdP runs the OLDER v26.4.13 in ns `keycloak`; the keycloaks/keycloakrealmimports CRDs are
# cluster-scoped and shared (same k8s.keycloak.org/v2alpha1 served + stored version), so installing
# this newer operator reconciles those CRDs additively — proven non-disruptive to the running IdP
# (Keycloak `keycloak/keycloak` stayed Ready=True across this install; see stacks/auth/README.md).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: sso-workshop
  labels:
    portfolio.redhat.com/component: keycloak-operator
spec:
  channel: stable-v26.6
  installPlanApproval: Automatic
  name: rhbk-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
