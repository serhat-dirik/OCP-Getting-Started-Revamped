# Workshop-owned Red Hat build of Keycloak namespace. DISTINCT from the cluster's login-IdP
# namespace `keycloak` (that RHBK backs real console/admin logins — READ-ONLY, never touched here).
# rhbk-operator supports only OwnNamespace/SingleNamespace (verified live: installModes AllNamespaces=false),
# so this workshop instance MUST run its own operator scoped to its own namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: sso-workshop
  labels:
    portfolio.redhat.com/component: keycloak-operator
