# OwnNamespace OperatorGroup — rhbk-operator does NOT support AllNamespaces (verified live:
# packagemanifest installModes OwnNamespace/SingleNamespace supported, MultiNamespace/AllNamespaces
# false). targetNamespaces=[sso-workshop] scopes THIS operator to the workshop namespace only, so it
# never reconciles the cluster login IdP in ns `keycloak` (which has its own OwnNamespace operator).
# A dedicated namespace also sidesteps the FSC "TooManyOperatorGroups" collision (§5.4): the operator
# cannot pre-exist in a namespace this component creates.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: sso-workshop
  namespace: sso-workshop
  labels:
    portfolio.redhat.com/component: keycloak-operator
spec:
  targetNamespaces:
    - sso-workshop
