# Tempo Operator (Red Hat "tempo-product") — distributed-tracing store. Channel verified 2026-07-09.
# NOTE: the community "tempo-operator" package is also in the catalog — source=redhat-operators pins the Red Hat build.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: tempo-product
  namespace: openshift-tempo-operator
spec:
  channel: stable
  installPlanApproval: Automatic
  name: tempo-product
  source: redhat-operators
  sourceNamespace: openshift-marketplace
