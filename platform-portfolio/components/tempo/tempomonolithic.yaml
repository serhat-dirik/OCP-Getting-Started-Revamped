# Single-pod Tempo trace store for the shared workshop pipeline. Memory backend = inherently low
# retention (traces live only in the pod's memory ring), the shared-cluster-safe choice per the M12
# note's retention watchout; switch to backend: pv (+ size) if trace persistence across restarts is wanted.
# Exposes OTLP gRPC :4317 / HTTP :4318 on Service tempo-traces — the OpenTelemetryCollector exports here.
# Base fields (storage.traces.backend, jaegerui, resources) from the live tempo-operator v0.21.0-2 alm-example.
# Verified on install 2026-07-11 (tempo-operator v0.21.0-2, Tempo 2.10.5): spec.ingestion.otlp.grpc/http.enabled
# is the correct path (CR reconciled Ready=True), and the operator creates Service "tempo-traces" exposing OTLP
# gRPC :4317 / HTTP :4318 (plus 3200) — the endpoint the OpenTelemetryCollector exports to.
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: traces
  namespace: observability-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # TempoMonolithic CRD arrives with the operator — skip dry-run until it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  storage:
    traces:
      backend: memory
  ingestion:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  jaegerui:
    enabled: true
    route:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
