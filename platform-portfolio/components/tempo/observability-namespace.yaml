# Shared workload namespace for the tracing pipeline — home to the TempoMonolithic store and the
# OpenTelemetryCollector (opentelemetry component deploys into it). Owned here because Tempo is the
# pipeline anchor; the opentelemetry stack app is sequenced one wave later so this namespace exists first.
apiVersion: v1
kind: Namespace
metadata:
  name: ogsr-observability-workshop
  labels:
    portfolio.redhat.com/component: observability-shared
