# Tempo Operator + shared observability namespace + a single-pod TempoMonolithic trace store.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - observability-namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - tempomonolithic.yaml
# Non-invasive delivery (Wave 1): owner label lets an admin enumerate the footprint
# (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and ogsr-uninstall.sh find it.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
