# cert-manager Operator for Red Hat OpenShift — own namespace + OperatorGroup + Subscription.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
# Non-invasive delivery (Wave 1): stamp every workshop-created resource with the owner label so an
# admin can enumerate the footprint (oc get <kind> -A -l workshop.redhat.com/owner=ogsr) and
# bootstrap/ogsr-uninstall.sh can find it. includeSelectors:false leaves immutable spec.selectors alone.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
    includeTemplates: false
