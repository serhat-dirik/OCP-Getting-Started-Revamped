# All-namespaces OperatorGroup — RHDH supports ONLY AllNamespaces install mode (verified live via
# packagemanifest installModes). Empty spec (no selector, no targetNamespaces) = AllNamespaces, so
# the operator can reconcile a Backstage CR in any namespace (here: `rhdh`). Same shape as the
# rhacs-operator OperatorGroup; one OperatorGroup per namespace is the OLM constraint.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhdh-operator
  namespace: rhdh-operator
spec:
  upgradeStrategy: Default
