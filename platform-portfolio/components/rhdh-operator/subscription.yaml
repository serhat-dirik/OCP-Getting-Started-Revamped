# Red Hat Developer Hub operator (M12 portal stack). Channel `fast` is the ONLY release channel —
# RHDH ships no `stable` channel; `fast` == `fast-1.10` and serves rhdh-operator.v1.10.2 (verified
# live 2026-07-11, matches versions.yaml). Automatic approval keeps it on the channel head.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhdh
  namespace: rhdh-operator
spec:
  channel: fast
  installPlanApproval: Automatic
  name: rhdh
  source: redhat-operators
  sourceNamespace: openshift-marketplace
