# Operator namespace for Red Hat Developer Hub (RHDH). The operator installs AllNamespaces (the
# ONLY mode it supports — verified live: OwnNamespace/SingleNamespace/MultiNamespace all false);
# the Backstage workload lives in the separate `rhdh` namespace (components/rhdh). `rhdh-operator`
# is the operator's own suggested-namespace (packagemanifest annotation).
apiVersion: v1
kind: Namespace
metadata:
  name: rhdh-operator
  labels:
    portfolio.redhat.com/component: rhdh-operator
