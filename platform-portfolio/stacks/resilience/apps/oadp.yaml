# Wave 0: OADP operator + DataProtectionApplication backed by an in-cluster NooBaa S3 bucket. The only
# child of the resilience stack that installs everywhere (RHSI is opt-in). Backs M21 backup/restore.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-oadp
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: oadp
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/oadp
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-adp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # CreateNamespace off: the component owns openshift-adp (namespace.yaml). ServerSideApply avoids a
    # fight over the large Velero CRDs' field ownership when the operator co-manages them.
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
