# Wave 0: Red Hat Service Interconnect (Skupper v2) operator — the ADD-ON connectivity layer for M22's
# OPTIONAL cross-site section. OPT-IN: referenced only when a cluster's catalog offers channel stable-2
# (see stacks/resilience/kustomization.yaml, where it is commented out by default). No [OCP] beat depends
# on it, so OADP-only resilience is fully functional without this app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-service-interconnect
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: service-interconnect
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/service-interconnect
  destination:
    server: https://kubernetes.default.svc
    namespace: skupper
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
