# resilience stack — the M21 (Resilience, Multi-Cluster & DR) platform prerequisite. app-of-apps:
# OADP (Velero + in-cluster NooBaa S3 BSL) for backup/restore, and — OPT-IN — Red Hat Service Interconnect
# (Skupper v2) for the cross-site section. Shared single installs, never per-user; the resilient claims
# stack + {user}-site-b are the workshop layer / M21 entry state on top.
# PoC-reusable: `--stacks resilience` on any OCP 4.20+ cluster WITH ODF gives you OADP. See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/oadp.yaml
  # OPTIONAL [ADD-ON] cross-site connectivity (Skupper v2). Opt in ONLY on a cluster whose
  # skupper-operator packagemanifest offers channel `stable-2` (bare stable/stable-1.x = legacy Skupper v1,
  # incompatible). Verify: oc get packagemanifest skupper-operator -o jsonpath='{..channels[*].name}' | tr ' ' '\n' | grep stable-2
  # - apps/service-interconnect.yaml
