# resilience stack — the M21 (Resilience, Multi-Cluster & DR) platform prerequisite. app-of-apps:
# OADP (Velero + in-cluster NooBaa S3 BSL) for backup/restore, and Red Hat Service Interconnect
# (Skupper v2) for the cross-site section. Shared single installs, never per-user; the resilient claims
# stack + {user}-site-b are the workshop layer / M21 entry state on top.
# PoC-reusable: `--stacks resilience` on any OCP 4.20+ cluster WITH ODF gives you OADP (+ RHSI on a
# stable-2 catalog; comment out apps/service-interconnect.yaml if absent). See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/oadp.yaml
  # [ADD-ON] cross-site connectivity (RHSI / Skupper v2). Both workshop clusters carry skupper-operator
  # channel `stable-2` (-> v2.2.1-rh-1), so this installs cleanly. On a PoC cluster whose catalog lacks
  # stable-2 (bare stable / stable-1.x = legacy Skupper v1, CR+CLI-incompatible with v2), COMMENT THIS OUT —
  # OADP-only resilience is fully functional without it (no [OCP] beat depends on RHSI).
  # Verify a cluster first — bare-name `get packagemanifest` is UNRELIABLE when >1 catalog carries the
  # package (it silently returns one, hiding redhat-operators behind community). Enumerate with a selector:
  #   oc get packagemanifests -n openshift-marketplace --field-selector=metadata.name=skupper-operator \
  #     -o json | jq -r '.items[]|select(.status.catalogSource=="redhat-operators").status.defaultChannel'   # -> stable-2
  - apps/service-interconnect.yaml
