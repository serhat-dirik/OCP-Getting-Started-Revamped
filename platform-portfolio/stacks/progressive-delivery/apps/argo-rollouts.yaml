# Wave 0: the cluster-scoped Argo Rollouts controller (RolloutManager). Rollouts CRDs already ship
# with the GitOps operator, so this only creates the RolloutManager CR in openshift-gitops (the
# operator's blessed default namespace for cluster-scoped instances) — the operator reconciles the
# controller Deployment. One per cluster; serves every {user}-prod canary.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-argo-rollouts
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: argo-rollouts
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/argo-rollouts
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
