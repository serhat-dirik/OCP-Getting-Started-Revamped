# progressive-delivery stack — M10 (GitOps at Scale & Progressive Delivery) prerequisites.
# app-of-apps: the cluster-scoped Argo Rollouts controller (RolloutManager singleton). Workshop-
# agnostic: any OpenShift 4.20+ cluster running OpenShift GitOps 1.13+ gets a working Rollouts
# controller from this one stack. Everything M10-specific (per-user prod overlays, analysis knobs,
# ApplicationSets) lives in the workshop layer / entry states ON TOP — never here. See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/argo-rollouts.yaml
