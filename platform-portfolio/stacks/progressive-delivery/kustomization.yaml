# progressive-delivery stack — M11 (GitOps at Scale & Progressive Delivery) prerequisites.
# app-of-apps: the cluster-scoped Argo Rollouts controller (RolloutManager singleton). Workshop-
# agnostic: any OpenShift 4.20+ cluster running OpenShift GitOps 1.13+ gets a working Rollouts
# controller from this one stack. Everything M11-specific (per-user prod overlays, analysis knobs,
# ApplicationSets) lives in the workshop layer / entry states ON TOP — never here. See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/argo-rollouts.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
