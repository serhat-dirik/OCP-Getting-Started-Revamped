# serverless stack — the M19 (Serverless Zero-to-Hero) + M20 (Eventing Deep-Dive) platform prerequisite.
# app-of-apps: a single serverless component (serverless-operator + KnativeServing + KnativeEventing).
# Shared install, never per-user — the {user}-dev claims-processor ksvc + eventing wiring is the workshop
# layer / M19 entry state on top. PoC-reusable: `--stacks serverless` on any OCP 4.20+ cluster gives you
# OpenShift Serverless (Knative Serving + Eventing). See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/serverless.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
