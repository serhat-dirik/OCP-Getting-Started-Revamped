# Wave 0: OpenShift Serverless (Knative Serving + Eventing). Single shared install of the serverless-
# operator + the KnativeServing/KnativeEventing control planes — never per-user. Per-user ksvc/broker
# wiring (the {user}-dev scale-to-zero claims-processor) is the M19 entry state on top of this.
# NOTE: named pp-knative, NOT pp-serverless — the parent app-of-apps that argocd-bootstrap renders is
# pp-<stack> == pp-serverless, so the child component app MUST have a distinct name (same convention as
# the mesh stack: parent pp-mesh, children pp-service-mesh/pp-kiali). A same-name child self-overwrites
# the parent and prune oscillates it away (observed live 2026-07-13).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-knative
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: serverless
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/serverless
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-serverless
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # CreateNamespace off: the component owns its namespaces explicitly (cluster-monitoring label).
    # ServerSideApply avoids a client-side apply size fight over the large operator-managed Knative CRs.
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
