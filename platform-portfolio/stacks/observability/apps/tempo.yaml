# Wave 0: Tempo Operator + shared ogsr-observability-workshop namespace + TempoMonolithic trace store (M12).
# Creates ogsr-observability-workshop, so it precedes opentelemetry (wave 1) which deploys the collector into it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-tempo
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: tempo
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/tempo
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-tempo-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
