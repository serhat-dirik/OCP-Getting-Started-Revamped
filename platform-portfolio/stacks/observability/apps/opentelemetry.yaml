# Wave 1: OpenTelemetry Operator + shared OTLP collector (M12). One wave after tempo because the collector
# deploys into the ogsr-observability-workshop namespace tempo creates, and exports to the TempoMonolithic service
# (same rationale as core-devtools gitea wave 0 -> git-mirror wave 1: order the shared-namespace dependency, no sleep-and-hope).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-opentelemetry
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    portfolio.redhat.com/component: opentelemetry
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/opentelemetry
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-opentelemetry-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
