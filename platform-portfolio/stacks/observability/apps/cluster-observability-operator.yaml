# Wave 0: Cluster Observability Operator — console Observe plugins (Dashboards + Traces) + monitoring CRs (M12).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-cluster-observability-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: cluster-observability-operator
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/cluster-observability-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-cluster-observability-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
