# Wave 2 (OPTIONAL / capacity-gated): Loki + Red Hat OpenShift Logging — the "logs across replicas" tier (M13 T3).
# Commented OUT of this stack's kustomization by default (heaviest add; needs ODF object storage + the
# logging-loki-s3 Secret contract). Opt in by uncommenting apps/loki-logging.yaml in kustomization.yaml.
# See platform-portfolio/components/loki-logging/README.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-loki-logging
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    portfolio.redhat.com/component: loki-logging
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/loki-logging
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
