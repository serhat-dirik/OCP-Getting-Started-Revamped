# observability stack — the M12 platform prerequisite. app-of-apps: metrics come from the always-on
# monitoring-uwm component (core-devtools); this stack adds tracing (COO + Tempo + OpenTelemetry) and,
# optionally, logging (Loki). Shared single installs — never per-user. See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/cluster-observability-operator.yaml
  - apps/tempo.yaml
  - apps/opentelemetry.yaml
  # OPTIONAL / capacity-gated log-aggregation tier — opt in on a cluster with ODF object storage + spare
  # capacity, after satisfying the logging-loki-s3 Secret contract (components/loki-logging/README.md):
  # - apps/loki-logging.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
