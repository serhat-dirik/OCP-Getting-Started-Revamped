# mesh stack — the M18 (Service Mesh 3 & Advanced Gateways) platform prerequisite. app-of-apps:
# service-mesh (OSSM3 Sail: istiod + IstioCNI) then kiali (mesh console). Shared single installs, never
# per-user — the {user}-mesh enrollment + meshed app is the workshop layer / M18 entry state on top.
# PoC-reusable: `--stacks mesh` on any OCP 4.20+ cluster gives you OSSM3 + Kiali. See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/service-mesh.yaml
  - apps/kiali.yaml
