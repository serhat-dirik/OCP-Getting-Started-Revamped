# mesh stack — the M19 (Service Mesh 3 & Advanced Gateways) platform prerequisite. app-of-apps:
# service-mesh (OSSM3 Sail: istiod + IstioCNI) then kiali (mesh console). Shared single installs, never
# per-user — the {user}-mesh enrollment + meshed app is the workshop layer / M19 entry state on top.
# PoC-reusable: `--stacks mesh` on any OCP 4.20+ cluster gives you OSSM3 + Kiali. See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/service-mesh.yaml
  - apps/kiali.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
