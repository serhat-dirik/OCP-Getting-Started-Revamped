# Wave 0: OSSM3 (Sail) operator + the shared Istio (istiod) & IstioCNI control plane in istio-system /
# istio-cni. Must precede kiali (wave 1), which needs istiod present to report Healthy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-service-mesh
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: service-mesh
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/service-mesh
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-service-mesh-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # CreateNamespace off: the component owns its namespaces explicitly (istio-system/istio-cni need
    # specific labels). ServerSideApply avoids a fight over the large, ingress-operator-co-owned istio
    # CRDs — server-side field ownership lets OSSM3 and the Gateway API istiod share them cleanly.
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
