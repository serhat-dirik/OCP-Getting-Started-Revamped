# Wave 1: the Kiali mesh console — after service-mesh (wave 0), so istiod exists in istio-system when the
# Kiali CR reconciles. Its workload lands in istio-system; the operator lives in openshift-kiali-operator.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-kiali
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    portfolio.redhat.com/component: kiali
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/kiali
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-kiali-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
