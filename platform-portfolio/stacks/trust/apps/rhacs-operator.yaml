# Wave 0: RHACS operator (installed FIRST + alone — one operator at a time; rhtas waits for wave 2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-rhacs-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: rhacs-operator
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/rhacs-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: rhacs-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
