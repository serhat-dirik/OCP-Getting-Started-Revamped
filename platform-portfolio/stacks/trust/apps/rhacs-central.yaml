# Wave 1: RHACS Central + init-bundle + SecuredCluster + delegated-scanning (internal component waves
# 2/3 + PostSync). Runs after the operator (wave 0) so the CRDs exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-rhacs-central
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    portfolio.redhat.com/component: rhacs-central
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/rhacs-central
  destination:
    server: https://kubernetes.default.svc
    namespace: stackrox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 20s, factor: 2, maxDuration: 5m}
