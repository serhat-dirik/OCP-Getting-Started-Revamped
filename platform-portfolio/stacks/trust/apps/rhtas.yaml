# Wave 2: RHTAS operator + Securesign (the sigstore stack for the keyless-signing demo). Installed
# AFTER rhacs-central (wave 1) so only ONE operator's OLM install churns at a time.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-rhtas
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    portfolio.redhat.com/component: rhtas
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/rhtas
  destination:
    server: https://kubernetes.default.svc
    namespace: trusted-artifact-signer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 20s, factor: 2, maxDuration: 5m}
