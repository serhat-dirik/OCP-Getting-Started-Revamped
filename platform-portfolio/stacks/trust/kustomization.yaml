# trust stack — the M08 Trusted Software Supply Chain prerequisites. app-of-apps: RHACS (scan gate +
# admission) + trust-signing (Tekton Chains cosign key) + RHTAS (keyless-signing demo). Operators are
# wave-serialized (rhacs wave 0 -> rhtas wave 2) so OLM churns one at a time. RHTPA is a separate
# OPTIONAL trust-demo stack (heavy, instructor-only). See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/rhacs-operator.yaml
  - apps/trust-signing.yaml
  - apps/rhacs-central.yaml
  - apps/rhtas.yaml
