# Wave 0: the MTA operator + the Tackle Hub in openshift-mta. The only app in the mta stack — MTA is a
# single shared install; the per-user modernization world ({user}-modernize + the seeded legacy repo +
# the MTA Application entry) is the workshop layer / M22 entry state on top, never here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-mta
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: mta
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/mta
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-mta
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # CreateNamespace off: the component owns openshift-mta explicitly (needs the portfolio label).
    # ServerSideApply avoids a fight over the large Tackle/Addon/Task CRDs on re-sync (same reasoning
    # as the mesh stack's istio CRDs).
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
