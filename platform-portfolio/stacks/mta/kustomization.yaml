# mta stack — the M22 (Application Modernization) platform prerequisite. Single app-of-apps entry: the
# mta component (mta-operator + Tackle Hub in openshift-mta). Shared single install, never per-user —
# {user}-modernize + the seeded parasol-legacy-claims repo + the MTA Application entry are the workshop
# layer / M22 entry state on top. PoC-reusable: `--stacks mta` on any OCP 4.20+ gives you MTA 8. See README.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/mta.yaml
