# RHTPA operator only (OPTIONAL instructor-demo). Bringing up the TrustedProfileAnalyzer stack needs
# the OIDC/storage/database contracts in components/rhtpa/README.md — a deliberate instructor step.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-rhtpa
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: rhtpa
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/rhtpa
  destination:
    server: https://kubernetes.default.svc
    namespace: rhtpa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
