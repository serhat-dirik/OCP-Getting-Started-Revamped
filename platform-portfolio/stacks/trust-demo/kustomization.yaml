# trust-demo stack — OPTIONAL instructor-demo extras on top of the core `trust` stack. Currently just
# RHTPA (enterprise SBOM UI); default-off, cut-candidate (build-note + PM 2026-07-09). See
# components/rhtpa/README.md for the OIDC/storage/database contracts the CR needs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/rhtpa.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
