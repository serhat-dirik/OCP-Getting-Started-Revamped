# Wave 1: the Backstage instance (Red Hat Developer Hub) — app-config, dynamic plugins, and the
# `developer-hub` Backstage CR. Runs after the operator (wave 0) so the CRD exists.
# SkipDryRunOnMissingResource lets the CR apply before the operator has finished registering the
# CRD schema on a cold cluster (the wave already orders them, this covers the race window).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-rhdh
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    portfolio.redhat.com/component: rhdh
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/rhdh
  destination:
    server: https://kubernetes.default.svc
    namespace: rhdh
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 15
      backoff: {duration: 20s, factor: 2, maxDuration: 5m}
