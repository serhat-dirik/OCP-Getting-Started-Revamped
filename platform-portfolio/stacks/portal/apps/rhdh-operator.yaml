# Wave 0: RHDH operator (installed FIRST + alone — one operator at a time). The Backstage instance
# (wave 1, pp-rhdh) waits for this CSV so the backstages.rhdh.redhat.com CRD exists first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-rhdh-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: rhdh-operator
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/rhdh-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: rhdh-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
