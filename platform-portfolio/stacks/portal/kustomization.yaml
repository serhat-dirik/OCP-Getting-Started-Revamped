# portal stack — Red Hat Developer Hub (RHDH / Backstage) for M11 Developer Hub & Golden Paths.
# app-of-apps: the RHDH operator (wave 0) then the Backstage instance (wave 1, pp-rhdh) with the
# Parasol software catalog + the golden-path Software Template. Workshop-agnostic: the catalog
# locations + gitea host are read from a values ConfigMap the component ships; secret contracts
# (OAuth client, Gitea token, optional MaaS) are documented in components/rhdh/README.md and applied
# out-of-band (never in git). See README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/rhdh-operator.yaml
  # apps/rhdh.yaml (wave 1) is added once components/rhdh is authored against the live operator —
  # the Backstage CR shape + app-config auth/catalog keys are verified on-cluster first.
