# Wave 0: OpenShift Lightspeed — the only ai-assist component. This app patches the component's
# generic OLSConfig placeholders with THIS cluster's MaaS endpoint + model (endpoint URLs are not
# secrets and stay in git; the API token is the 'credentials' Secret contract the workshop creates).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-openshift-lightspeed
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: openshift-lightspeed
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/openshift-lightspeed
    kustomize:
      patches:
        # This project's verified MaaS endpoint + model. Overrides the component defaults; kept in
        # git because endpoint URLs are not secrets (the API token lives in the Secret contract).
        - target:
            kind: OLSConfig
            name: cluster
          patch: |-
            - op: replace
              path: /spec/llm/providers/0/url
              value: https://maas-rhdp.apps.maas.redhatworkshops.io/v1
            - op: replace
              path: /spec/llm/providers/0/models/0/name
              value: qwen3-14b
            - op: replace
              path: /spec/ols/defaultModel
              value: qwen3-14b
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-lightspeed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
