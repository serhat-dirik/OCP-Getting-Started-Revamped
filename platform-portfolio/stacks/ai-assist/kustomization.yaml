# ai-assist stack — OpenShift Lightspeed only (kept out of core-devtools so core stays green on
# clusters without an LLM endpoint). Requires the 'credentials' Secret contract (see the component).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/openshift-lightspeed.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
