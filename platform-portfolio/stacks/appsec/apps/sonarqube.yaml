# The SonarQube shared service (SAST) for M27 — DevSecOps. One self-contained Application: the
# SonarSource Community Build chart (kustomize helmCharts inflation), its external PostgreSQL, an edge
# Route, and the bootstrap hook Job (admin-password change + CI-token mint), all wave-ordered inside
# this app (Namespace -2 -> DB/RBAC -1 -> chart+Route 0 -> bootstrap hook 1). Same single-app shape as
# pp-rhacs-central. repoURL is the monorepo (rewritten by the stack template to the install --repo-url).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-sonarqube
  namespace: openshift-gitops
  labels:
    portfolio.redhat.com/component: sonarqube
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/sonarqube
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 20s, factor: 2, maxDuration: 5m}
