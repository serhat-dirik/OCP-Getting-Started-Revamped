# appsec stack — the application-security testing services for M08 (DevSecOps). Today: the shared
# SonarQube (SAST) service. The SAST/SCA/DAST/config Tekton tasks live in the workshop task library
# (gitops/workshop-config parasol-tasks) and the capstone pipeline in the M08 entry state — this stack
# owns only the standing shared SERVICE (SonarQube), the way the trust stack owns RHACS. Trivy/ZAP need
# no standing service (they run as pipeline tasks); roxctl reuses the trust stack's RHACS Central.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/sonarqube.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
