# Wave 1: the Keycloak instance + its PostgreSQL. Runs after the operator (wave 0) so the CRDs exist.
# Per-user realm imports (realm-{user}) are NOT here — they are workshop-specific and live in the
# workshop layer (gitops/workshop-config), keeping this stack workshop-agnostic and replicable.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-keycloak
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    portfolio.redhat.com/component: keycloak
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: sso-workshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 20s, factor: 2, maxDuration: 5m}
