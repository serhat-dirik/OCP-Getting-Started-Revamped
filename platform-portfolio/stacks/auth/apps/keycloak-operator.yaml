# Wave 0: Red Hat build of Keycloak operator (installed FIRST — the Keycloak/KeycloakRealmImport CRDs
# must exist before wave 1 applies the Keycloak CR). OwnNamespace-scoped to sso-workshop, so it never
# touches the cluster login IdP in ns `keycloak`.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-keycloak-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: keycloak-operator
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/keycloak-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: sso-workshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
