# auth stack — the M13 (Securing Apps with Keycloak) workshop auth backend. app-of-apps: the RHBK
# operator (wave 0) + a workshop-owned Keycloak instance & PostgreSQL (wave 1). Workshop-agnostic and
# replicable: no users, no per-user realms, no cluster domain baked in (see README.md). The cluster's
# login IdP (ns `keycloak`) is left strictly untouched — this stack stands up its OWN instance.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/keycloak-operator.yaml
  - apps/keycloak.yaml
# Non-invasive delivery (Wave 1): stamp the child pp-* Applications so uninstall can target them.
labels:
  - pairs:
      workshop.redhat.com/owner: ogsr
    includeSelectors: false
