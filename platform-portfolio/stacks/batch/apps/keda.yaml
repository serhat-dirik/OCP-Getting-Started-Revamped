# Wave 0: Custom Metrics Autoscaler (KEDA) — queue/event-driven scale exercises.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-keda
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: keda
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/keda
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
