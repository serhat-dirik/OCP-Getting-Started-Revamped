# Wave 0: Custom Metrics Autoscaler (KEDA) — queue/event-driven scale exercises.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-keda
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: keda
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/keda
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-keda
  # Narrow, evidence-based exception (task #62 item 2): on an adopted KEDA install the operator's
  # own reconcile of the KedaController CR strips metadata.labels (verified live on C2, 2026-07-18
  # — the live object's labels are empty while every other resource in this component keeps its
  # owner label fine), so Argo re-adds it every sync and never reaches Synced. Ignoring just the
  # owner-label key (not the whole labels map, so a real future label addition still syncs) — the
  # Subscription's Degraded status is a SEPARATE issue, fixed via the resourceHealthChecks override
  # in job-argocd-health-tuning.yaml / argocd-controller-resources.yaml, not here.
  ignoreDifferences:
    - group: keda.sh
      kind: KedaController
      name: keda
      namespace: openshift-keda
      jqPathExpressions:
        - '.metadata.labels["workshop.redhat.com/owner"]'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
