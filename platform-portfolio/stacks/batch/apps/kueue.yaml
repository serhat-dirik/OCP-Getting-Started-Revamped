# Wave 0: Red Hat build of Kueue — batch admission control (M06).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-kueue
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: kueue
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/kueue
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-kueue-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
