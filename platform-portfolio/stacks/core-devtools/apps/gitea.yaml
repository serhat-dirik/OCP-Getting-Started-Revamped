# Wave 0: in-cluster git first — the git-localize pattern's anchor (Decision D15).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-gitea
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    portfolio.redhat.com/component: gitea
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/gitea
  destination:
    server: https://kubernetes.default.svc
    namespace: ogsr-gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
