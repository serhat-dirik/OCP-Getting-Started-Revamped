# Wave 1: make the in-cluster Gitea pull-mirror the upstream repos (git-localize, D15).
# The job waits for Gitea itself, so wave ordering is belt-and-braces, not a hard dependency.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-git-mirror
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    portfolio.redhat.com/component: git-mirror
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/git-mirror
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
