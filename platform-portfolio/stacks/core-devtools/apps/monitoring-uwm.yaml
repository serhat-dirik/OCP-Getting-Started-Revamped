# Wave 2: enable user-workload monitoring — app metrics are curriculum (M01 logs/metrics, M11).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-monitoring-uwm
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    portfolio.redhat.com/component: monitoring-uwm
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/monitoring-uwm
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-monitoring
  syncPolicy:
    automated:
      prune: false   # never prune the shared monitoring config namespace
      selfHeal: true
    syncOptions:
      - ServerSideApply=true   # cluster-monitoring-config may pre-exist on managed clusters (RHDP)
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
