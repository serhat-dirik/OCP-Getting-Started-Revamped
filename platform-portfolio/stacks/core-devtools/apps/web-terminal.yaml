# Wave 2: Web Terminal operator — the embedded terminal every module's Showroom pane uses.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-web-terminal
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    portfolio.redhat.com/component: web-terminal
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/web-terminal
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
