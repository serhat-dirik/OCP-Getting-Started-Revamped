# Wave 2: activate the OpenShift Gateway API implementation (GatewayClass openshift-default) so
# Gateway/HTTPRoute exposure is available cluster-wide (M15+). No operator to install — the ingress
# operator installs istiod when the GatewayClass appears; this app just declares the CR GitOps-natively.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-gateway-api
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    portfolio.redhat.com/component: gateway-api
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/gateway-api
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
