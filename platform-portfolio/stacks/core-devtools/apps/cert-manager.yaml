# Wave 2: cert-manager Operator for Red Hat OpenShift — TLS issuance for lab endpoints (M15+).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pp-cert-manager
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    portfolio.redhat.com/component: cert-manager
spec:
  project: default
  source:
    repoURL: https://github.com/serhat-dirik/OCP-Getting-Started-Revamped
    targetRevision: main
    path: platform-portfolio/components/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 15
      backoff: {duration: 15s, factor: 2, maxDuration: 3m}
