# Per-user BATCH namespaces ({user}-batch, M06) — owned by the workshop layer like
# dev/stage/prod/cicd, and for the same reason: the workshop-entries AppProject deliberately
# blacklists ResourceQuota/LimitRange (quotas belong to the platform and must survive ws reset),
# so an entry chart CANNOT create them — G3-M06 F1 proved a chart-owned batch namespace never
# syncs. The m06 entry chart owns only in-namespace state (marker, LocalQueue, dataset PVC,
# MaaS credentials); everything here survives ws reset.
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add $i 1) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $user }}-batch
  labels:
    # Load-bearing: the per-user ClusterQueue cq-{user} selects namespaces by this label —
    # a LocalQueue here can only bind cq-{user} because the namespace carries it.
    workshop.redhat.com/user: {{ $user | quote }}
    # OPT-IN GATE (verified on-cluster, M06 build): Red Hat build of Kueue's Job admission
    # webhooks (mjob.kb.io / vjob.kb.io) only intercept Jobs in namespaces carrying this label.
    # Without it, a Job with a queue-name label runs immediately, unmanaged — no Workload, no quota.
    kueue.openshift.io/managed: "true"
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
---
# The attendee is admin on their own batch namespace (same as per-user-rbac for the standard four).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $user }}-batch
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $user | quote }}
---
# The default `admin` role does NOT include Kueue's workload API (the kueue.x-k8s.io CRDs carry
# no aggregate-to-admin label — verified on-cluster, M06 build). The operator ships
# kueue-batch-user-role (localqueues/workloads read + pending) — bind it per user.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-kueue-batch-user
  namespace: {{ $user }}-batch
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kueue-batch-user-role
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $user | quote }}
---
# Modest quota so a runaway batch can't consume the cluster, but DELIBERATELY generous relative
# to the M06 sample workloads: the visible admission constraint in the lab must be the Kueue
# ClusterQueue (500m / 512Mi), not this namespace quota.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workshop-quota
  namespace: {{ $user }}-batch
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
    pods: "50"
---
# Default container requests/limits so bare pods get sane values and don't trip the quota.
# Kueue sample Jobs set EXPLICIT requests in the lab so their admission math is deterministic.
apiVersion: v1
kind: LimitRange
metadata:
  name: workshop-limits
  namespace: {{ $user }}-batch
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
{{- end }}
