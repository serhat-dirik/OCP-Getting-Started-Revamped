{{- /*
  Shared secret for the Gitea -> student-Argo push webhooks. The webhooks themselves are PER-FORK,
  created by the m09/m10 fork jobs (Gitea's admin/system-webhook LIST API is unreliable on 1.26 — it
  returns [] even for a just-created hook, so system hooks can't be managed idempotently; per-repo
  hooks list correctly). Argo CD 3.4 parses Gitea via its Gogs parser, so the secret Argo validates
  against lives in argocd-secret under `webhook.gogs.secret` (verified vs the 3.4.4 source). This Job
  generates that secret once and mirrors it into a gitea-namespace Secret the fork jobs read (so the
  fork jobs never need read access to argocd-secret, which also holds the Argo admin password).
  Verified live 2026-07-11: a secured per-fork webhook re-syncs a fork commit in ~5s vs the >3min
  baseline. The argocd-server reloads webhook.gogs.secret automatically ("gogs secret modified.
  restarting"). Secret material is never echoed.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: student-argo-webhook
  namespace: student-gitops
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
---
# why: store the shared webhook secret in argocd-secret (Argo validates against it).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: student-argo-webhook
  namespace: student-gitops
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
    resourceNames: ["argocd-secret"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: student-argo-webhook
  namespace: student-gitops
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: student-argo-webhook
subjects:
  - kind: ServiceAccount
    name: student-argo-webhook
    namespace: student-gitops
---
# why: mirror the shared secret into a gitea-namespace Secret the fork jobs read (same-namespace, so
# they never need access to argocd-secret).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: student-argo-webhook-mirror
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
rules:
  # get/patch the specific mirrored secret — name-scoping is honoured for these verbs.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
    resourceNames: ["argo-webhook-secret"]
  # create CANNOT be resourceName-scoped: RBAC ignores resourceNames for create (the object name
  # isn't known at authorization time), so a name-scoped create rule authorises nothing. On a fresh
  # cluster the mirror secret doesn't exist yet and the hook MUST create it — a name-scoped create
  # rule 403s it (verified: broke a fresh cluster's first bootstrap, 2026-07-12; masked on long-lived
  # clusters where the secret already exists and the hook takes the patch path). Blast radius: one
  # purpose-built SA, one namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: student-argo-webhook-mirror
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: student-argo-webhook-mirror
subjects:
  - kind: ServiceAccount
    name: student-argo-webhook
    namespace: student-gitops
---
# Sync hook (BeforeHookCreation), wave 2 — after the student ArgoCD CR. Idempotent: argocd-secret is
# the source of truth (generate once, reuse); the gitea Secret is (re)applied to match. Fast no-op on
# re-syncs. Secret value never echoed.
apiVersion: batch/v1
kind: Job
metadata:
  name: student-argo-webhook
  namespace: student-gitops
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: student-argo-webhook
    spec:
      serviceAccountName: student-argo-webhook
      restartPolicy: Never
      containers:
        - name: webhook-secret
          image: registry.redhat.io/openshift4/ose-cli:latest
          # 512Mi: the `oc create | oc apply` mirror step runs two oc processes at once; 256Mi OOMKills.
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          env:
            - name: STUDENT_NS
              value: student-gitops
            - name: GITEA_NS
              value: {{ .Values.giteaNamespace | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              SECRET="$(oc get secret argocd-secret -n "$STUDENT_NS" -o jsonpath='{.data.webhook\.gogs\.secret}' 2>/dev/null | base64 -d || true)"
              if [[ -z "$SECRET" ]]; then
                SECRET="$(openssl rand -hex 24)"
                SB="$(printf '%s' "$SECRET" | base64 | tr -d '\n')"
                oc patch secret argocd-secret -n "$STUDENT_NS" --type merge -p "{\"data\":{\"webhook.gogs.secret\":\"${SB}\"}}" >/dev/null
                echo "▶ generated + stored webhook.gogs.secret in argocd-secret (argocd-server reloads it)"
              else
                echo "▶ reusing existing webhook.gogs.secret"
              fi
              # Mirror to the gitea-namespace Secret the fork jobs read (the 512Mi limit above covers
              # the `oc create | oc apply` two-process spike that OOMed at 256Mi).
              oc create secret generic argo-webhook-secret -n "$GITEA_NS" \
                --from-literal=secret="$SECRET" --dry-run=client -o yaml | oc apply -f - >/dev/null
              echo "✅ webhook secret ready (argocd-secret + ${GITEA_NS}/argo-webhook-secret) — fork jobs create per-fork hooks"
