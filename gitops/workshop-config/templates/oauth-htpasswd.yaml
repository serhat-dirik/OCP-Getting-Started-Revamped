# Adds an htpasswd identity provider for the workshop users. ServerSideApply because OAuth is a
# cluster SINGLETON we MERGE into, not own — kube:admin and any platform IdPs must survive.
# NOTE: the referenced Secret 'htpasswd-workshop-users' (ns openshift-config, key 'htpasswd') is
# created imperatively by bootstrap/install.sh from vars.yaml. It is a CONTRACT and is NEVER
# committed to git. This CR only names it.
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
  labels:
    workshop.redhat.com/layer: workshop-config
spec:
  identityProviders:
    - name: workshop-users
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          name: htpasswd-workshop-users
