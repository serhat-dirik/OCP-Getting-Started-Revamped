# AppProject that boxes entry-state Applications (created by `ws start`): they may create per-user
# namespaces but nothing else at cluster scope, and may NOT touch the workshop layer's quotas/limits.
# Tradeoff: sourceRepos is "*" — the in-cluster Gitea route host can't be templated reliably, so
# containment comes from the destination + resource whitelists rather than the repo allowlist.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workshop-entries
  namespace: {{ .Values.argoNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
spec:
  description: Per-user module entry states (materialized by the ws CLI)
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  # Entry charts may create their module-extra namespaces (e.g. {user}-mesh) — nothing else cluster-scoped.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  # Quotas/limits belong to the workshop layer and must survive ws reset — entry charts can't set them.
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange
