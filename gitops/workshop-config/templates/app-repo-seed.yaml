{{- /*
  App-repo seed — publishes the workshop's standalone app repos into the in-cluster Gitea by
  splitting monorepo subdirs into their own repos under the `parasol` org, so per-user entry-state
  fork jobs have something to fork. This GitOps-ifies docs/research/app-repo-publishing.md (which was
  a by-hand procedure). Design + rationale: docs/research/app-repo-seed-design.md.

  ENABLED (project-owner sign-off 2026-07-10 via decision prompt; gate history in values.yaml). The
  standard workshop pattern is repos populated automatically as part of provisioning — the monorepo
  is the enforced source of truth for the parasol/* seeds; hand-edits to them are unsupported.

  Counterpart to gitea-user-seed.yaml (same BeforeHookCreation hook so `ws git-refresh` re-seeds).
  Split-brain by design: an ose-cli INIT container does the oc-only discovery (Gitea CR admin
  password, seed map) and hands off via a memory-backed emptyDir; the MAIN container is
  git-cloner (ships git+curl+bash) talking to Gitea over the INTERNAL service URL — no route
  dependency, no TLS flags, no runtime package installs. The first live run (2026-07-10) proved
  the old single-container ubi9 approach cannot work: `dnf install git-core` needs root, and the
  restricted SCC runs the pod as a random non-root UID.
*/ -}}
{{- if .Values.appRepoSeed.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-repo-seed
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
---
# why: read the Gitea CR status (admin password), the operator admin secret, and the route host —
# the same discovery gitea-user-seed uses.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-repo-seed
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
rules:
  - apiGroups: ["pfe.rhpds.com"]
    # the rhpds CRD's plural is literally "gitea" (verified live 2026-07-08)
    resources: ["gitea"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-repo-seed
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-repo-seed
subjects:
  - kind: ServiceAccount
    name: app-repo-seed
    namespace: {{ .Values.giteaNamespace }}
---
# The repo -> monorepo-subdir map. One line per standalone app repo. Overridable via values so the
# mechanism stays workshop-agnostic (the Job reads this, not a hardcoded list).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-repo-seed-map
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    app-repo-seed.workshop.redhat.com/map: "true"
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
data:
  org: {{ .Values.mirrorOrg | quote }}
  # Source of truth = the in-cluster mirror of the monorepo (fast, no GitHub egress).
  mirrorRepo: {{ .Values.mirrorRepo | quote }}
  revision: {{ .Values.appRepoSeed.revision | default "main" | quote }}
  # repo = path/under/the/monorepo
  repos: |
    {{- range .Values.appRepoSeed.repos }}
    {{ .repo }}={{ .subdir }}
    {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: app-repo-seed
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    # before gitea-user-seed (wave 2); ordering vs. entry-state fork jobs (separate Argo apps) is
    # not needed — a fresh cluster seeds here at bootstrap, long before any `ws start` forks.
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: app-repo-seed
    spec:
      serviceAccountName: app-repo-seed
      restartPolicy: Never
      volumes:
        # Memory-backed handoff for the admin password — never a ConfigMap, never in logs,
        # gone with the pod.
        - name: shared
          emptyDir:
            medium: Memory
      initContainers:
        # The ONLY container that needs oc: read the Gitea CR admin password + the seed map,
        # hand off via /shared. ose-cli ships oc but no git; git-cloner ships git but no oc.
        - name: discover
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITEA_NS
              value: {{ .Values.giteaNamespace | quote }}
          volumeMounts:
            - name: shared
              mountPath: /shared
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              NS="${GITEA_NS}"
              echo "▶ discovering admin credentials (retry — operator writes them post-setup)…"
              ADMIN_USER="$(oc get gitea gitea -n "$NS" -o jsonpath='{.spec.giteaAdminUser}' 2>/dev/null || echo gitea-admin)"
              ADMIN_PASS=""
              for i in $(seq 1 60); do
                ADMIN_PASS="$(oc get gitea gitea -n "$NS" -o jsonpath='{.status.adminPassword}' 2>/dev/null || true)"
                [[ -n "$ADMIN_PASS" ]] && break
                sleep 10
              done
              [[ -n "$ADMIN_PASS" ]] || { echo "❌ no Gitea admin password after 10m"; exit 1; }
              {
                echo "ADMIN_USER=${ADMIN_USER}"
                echo "ADMIN_PASS=${ADMIN_PASS}"
                oc get cm app-repo-seed-map -n "$NS" -o jsonpath='ORG={.data.org}{"\n"}MIRROR_REPO={.data.mirrorRepo}{"\n"}REVISION={.data.revision}{"\n"}'
              } > /shared/seed.env
              oc get cm app-repo-seed-map -n "$NS" -o jsonpath='{.data.repos}' > /shared/repos.map
              [[ -s /shared/repos.map ]] || { echo "❌ empty seed map"; exit 1; }
              echo "  ✓ discovery complete (credentials not shown)"
      containers:
        - name: seed
          # git-cloner ships git+curl+bash prebuilt (same pinned image the Showroom stack uses) —
          # runs clean under the restricted SCC; ubi9 + runtime dnf could not (needs root).
          image: quay.io/rhpds/git-cloner:v1.1.5
          env:
            - name: GITEA_NS
              value: {{ .Values.giteaNamespace | quote }}
          volumeMounts:
            - name: shared
              mountPath: /shared
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # shellcheck disable=SC1091
              source /shared/seed.env
              [[ -n "$ORG" && -n "$MIRROR_REPO" && -n "$ADMIN_PASS" ]] || { echo "❌ incomplete discovery handoff"; exit 1; }
              AUTH="${ADMIN_USER}:${ADMIN_PASS}"
              # Internal service URL: no route dependency, no TLS, works on a disconnected cluster.
              GITEA_HOST="gitea.${GITEA_NS}.svc:3000"
              GITEA_URL="http://${GITEA_HOST}"

              echo "▶ waiting for the Gitea API at ${GITEA_URL}…"
              for i in $(seq 1 30); do
                curl -sf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null && break
                sleep 10
              done
              curl -sf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null || { echo "❌ Gitea API not answering"; exit 1; }

              # Clone the in-cluster monorepo mirror once (public repo — anonymous clone, no creds in argv).
              WORK="$(mktemp -d)"; trap 'rm -rf "$WORK"' EXIT
              REVISION="${REVISION:-main}"
              echo "▶ cloning mirror ${ORG}/${MIRROR_REPO}@${REVISION}…"
              git clone -q --depth 1 --branch "$REVISION" \
                "${GITEA_URL}/${ORG}/${MIRROR_REPO}.git" "$WORK/mono" \
                2>/dev/null || { echo "❌ mirror clone failed"; exit 1; }

              FAIL=0
              while IFS='=' read -r REPO SUBDIR; do
                REPO="$(echo "$REPO" | xargs)"; SUBDIR="$(echo "$SUBDIR" | xargs)"
                [[ -z "$REPO" || "$REPO" == \#* ]] && continue
                SRC="$WORK/mono/${SUBDIR}"
                if [[ ! -d "$SRC" ]]; then
                  echo "  ❌ ${REPO}: source '${SUBDIR}' absent in the mirror"; FAIL=$((FAIL+1)); continue
                fi

                # Ensure the target repo exists (idempotent: 200 = already there).
                CODE=$(curl -ks -o /dev/null -w '%{http_code}' -u "$AUTH" "${GITEA_URL}/api/v1/repos/${ORG}/${REPO}")
                if [[ "$CODE" == "404" ]]; then
                  echo "▶ creating ${ORG}/${REPO}…"
                  curl -ksf -u "$AUTH" -X POST "${GITEA_URL}/api/v1/orgs/${ORG}/repos" \
                    -H 'Content-Type: application/json' \
                    -d "{\"name\":\"${REPO}\",\"private\":false,\"default_branch\":\"main\",\"auto_init\":false}" >/dev/null \
                    || { echo "  ❌ create ${REPO} failed"; FAIL=$((FAIL+1)); continue; }
                fi

                # Snapshot the subdir into a fresh tree and force-push it as the repo root. Force-push
                # keeps canonical === monorepo; attendee forks do not track it, so this cannot clobber
                # attendee work. Identity is set with -c flags (no global git config touched).
                echo "▶ seeding ${ORG}/${REPO} ← ${SUBDIR}…"
                PUB="$WORK/pub-${REPO}"; rm -rf "$PUB"; mkdir -p "$PUB"
                cp -R "$SRC/." "$PUB/"
                git -C "$PUB" init -q -b main
                git -C "$PUB" -c user.email="workshop@parasol.local" -c user.name="Parasol Workshop" add -A
                git -C "$PUB" -c user.email="workshop@parasol.local" -c user.name="Parasol Workshop" \
                  commit -q -m "Seed ${REPO} from ${MIRROR_REPO}/${SUBDIR}@${REVISION}" || true
                if git -C "$PUB" push -q --force "http://${AUTH}@${GITEA_HOST}/${ORG}/${REPO}.git" main 2>/dev/null; then
                  echo "  ✓ ${ORG}/${REPO} seeded"
                else
                  echo "  ❌ push ${REPO} failed"; FAIL=$((FAIL+1))
                fi
              done < /shared/repos.map

              [[ "$FAIL" -eq 0 ]] || { echo "❌ ${FAIL} repo(s) failed"; exit 1; }
              echo "✅ app repos seeded under ${GITEA_URL}/${ORG}"
{{- end }}
