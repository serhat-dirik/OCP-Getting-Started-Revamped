# Modest per-namespace quota + container defaults so ~N attendees fit one cluster (tune later).
{{- $suffixes := list "dev" "stage" "prod" "cicd" }}
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add $i 1) }}
{{- range $suffix := $suffixes }}
---
# Caps total compute/PVCs/pods a user can request per namespace.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workshop-quota
  namespace: {{ $user }}-{{ $suffix }}
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 6Gi
    limits.cpu: "6"
    limits.memory: 12Gi
    persistentvolumeclaims: "5"
    pods: "30"
---
# Default container requests/limits so bare pods don't consume the whole quota unbounded.
apiVersion: v1
kind: LimitRange
metadata:
  name: workshop-limits
  namespace: {{ $user }}-{{ $suffix }}
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        # The -cicd namespace runs Tekton image builds (Maven + buildah on a Quarkus app), which need
        # more than the 1Gi app-namespace default or they OOMKill mid-build. Sizing the namespace
        # DEFAULT here — instead of per-PipelineRun taskRunSpecs — is what lets attendees run a pipeline
        # straight from the console *Actions -> Start* form (which cannot set per-task memory) and from a
        # plain `tkn pipeline start` / PaC push. pipelines-fundamentals/trusted-supply-chain/app-security-testing all build in -cicd. Fits the 12Gi limits
        # quota for one serial run. Other suffixes (app runtimes) keep the modest 1Gi default.
        memory: {{ if eq $suffix "cicd" }}2Gi{{ else }}1Gi{{ end }}
      defaultRequest:
        cpu: 100m
        memory: 256Mi
{{- end }}
{{- end }}
