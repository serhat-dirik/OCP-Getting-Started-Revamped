# Shared image namespace + runtime pull grants. Pods pull cross-namespace images via their
# NAMESPACE ServiceAccounts (not the logged-in user), so every per-user namespace's SA group
# gets image-puller here — centrally, once, instead of per-module (decision: PM, 2026-07-08).
apiVersion: v1
kind: Namespace
metadata:
  name: parasol-images
  labels:
    workshop.redhat.com/shared: "true"
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-image-pullers
  namespace: parasol-images
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add1 $i) }}
{{- range $suffix := list "dev" "stage" "prod" "cicd" "mesh" "resilience" "modernize" "ai" }}
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:serviceaccounts:{{ $user }}-{{ $suffix }}
{{- end }}
{{- end }}
  # the humans too (oc image ops, console image browsing)
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: workshop-attendees
