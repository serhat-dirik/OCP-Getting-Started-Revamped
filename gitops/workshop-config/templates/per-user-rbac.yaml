# Each attendee is admin on their own four namespaces (and nothing else at namespace scope).
# PLUS monitoring-edit: OpenShift's built-in `admin` ClusterRole deliberately OMITS
# monitoring.coreos.com, so without this an attendee cannot create a PrometheusRule or even read
# their own ServiceMonitor — which breaks M12 (Observability) exercises AND attendee-run
# `ws verify m12` (the 15/15 only passed because `ws prep` runs verify as admin). Found at M12 G1,
# 2026-07-11. monitoring-edit grants create/edit on servicemonitors/podmonitors/prometheusrules.
{{- $suffixes := list "dev" "stage" "prod" "cicd" }}
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add $i 1) }}
{{- range $suffix := $suffixes }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $user }}-{{ $suffix }}
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $user | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-monitoring-edit
  namespace: {{ $user }}-{{ $suffix }}
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monitoring-edit
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $user | quote }}
{{- end }}
{{- end }}
