# Each attendee is admin on their own four namespaces (and nothing else at namespace scope).
{{- $suffixes := list "dev" "stage" "prod" "cicd" }}
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add $i 1) }}
{{- range $suffix := $suffixes }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $user }}-{{ $suffix }}
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $user | quote }}
{{- end }}
{{- end }}
