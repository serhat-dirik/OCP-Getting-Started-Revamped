# platform-observer (D3): read-only cluster-scope visibility so Block C modules can INSPECT
# infrastructure (nodes, machines, ingress, cluster operators, storage, UDNs, packagemanifests)
# with zero mutate rights. Bound cluster-wide to the workshop-attendees group.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-observer
  labels:
    workshop.redhat.com/layer: workshop-config
rules:
  # Core inventory: nodes, all namespaces, and PVs (cluster storage consumption).
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Compute topology behind the cluster (M16 scaling/infrastructure inspection).
  - apiGroups: ["machine.openshift.io"]
    resources: ["machinesets", "machines"]
    verbs: ["get", "list", "watch"]
  # Ingress/router internals (M15 networking).
  - apiGroups: ["operator.openshift.io"]
    resources: ["ingresscontrollers"]
    verbs: ["get", "list", "watch"]
  # Cluster state/health surfaces (M17 cluster operators, version, infra, ingress config).
  - apiGroups: ["config.openshift.io"]
    resources: ["clusteroperators", "clusterversions", "infrastructures", "ingresses"]
    verbs: ["get", "list", "watch"]
  # StorageClasses (M05 storage — attendees inspect provisioners/default in its Ex 5).
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # User-defined networks (M15 advanced networking).
  - apiGroups: ["k8s.ovn.org"]
    resources: ["userdefinednetworks", "clusteruserdefinednetworks"]
    verbs: ["get", "list", "watch"]
  # OperatorHub catalog contents (M17 "what can this cluster install").
  - apiGroups: ["packages.operators.coreos.com"]
    resources: ["packagemanifests"]
    verbs: ["get", "list"]
