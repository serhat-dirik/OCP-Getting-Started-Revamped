# platform-observer (D3): read-only cluster-scope visibility so Block C modules can INSPECT
# infrastructure (nodes, machines, ingress, cluster operators, storage, UDNs, packagemanifests)
# with zero mutate rights. Bound cluster-wide to the workshop-attendees group.
#
# NO cluster-wide `namespaces` grant (removed 2026-07-11, first live test): listing all namespaces
# leaked every other attendee's projects into user5's console/CLI project list ("chaos" — the
# project owner). Attendees see ONLY their own projects now (the projects API filters to namespaces
# they hold a rolebinding on: their {user}-dev/stage/prod/cicd + {user}-gitops). Block C modules
# inspect specific infra (nodes/machines/operators/storage) — none needs to enumerate peer projects.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-observer
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
rules:
  # Core inventory: nodes and PVs (cluster storage consumption). NOT namespaces — see header.
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Compute topology behind the cluster (deployment-targets-scheduling scaling/infrastructure inspection).
  - apiGroups: ["machine.openshift.io"]
    resources: ["machinesets", "machines"]
    verbs: ["get", "list", "watch"]
  # The platform's own node agents (deployment-targets-scheduling DaemonSet-inspection beat: ovnkube-node / node-exporter /
  # machine-config-daemon etc. — read the cluster's node-agent pattern). Read-only, cluster-wide;
  # mirrors the machinesets grant above so `oc get ds -A` works for attendees (build note spec delta #3).
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
  # Ingress/router internals (networking-dev-devops networking).
  - apiGroups: ["operator.openshift.io"]
    resources: ["ingresscontrollers"]
    verbs: ["get", "list", "watch"]
  # Cluster state/health surfaces (registry-images-catalog-governance cluster operators, version, infra, ingress config) PLUS registry-images-catalog-governance's
  # image-governance singletons: image.config (allowedRegistriesForImport / registrySources), the CURRENT
  # mirroring APIs ImageDigestMirrorSet + ImageTagMirrorSet (NOT the deprecated ICSP), and the OperatorHub
  # source config. Read-only — the [INSTRUCTOR-DEMO] beats MUTATE these singletons; attendees only inspect.
  - apiGroups: ["config.openshift.io"]
    resources: ["clusteroperators", "clusterversions", "infrastructures", "ingresses", "images", "imagedigestmirrorsets", "imagetagmirrorsets", "operatorhubs"]
    verbs: ["get", "list", "watch"]
  # StorageClasses (storage-stateful storage — attendees inspect provisioners/default in its Ex 5).
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # User-defined networks (networking-dev-devops advanced networking).
  - apiGroups: ["k8s.ovn.org"]
    resources: ["userdefinednetworks", "clusteruserdefinednetworks"]
    verbs: ["get", "list", "watch"]
  # OperatorHub catalog contents (registry-images-catalog-governance "what can this cluster install").
  - apiGroups: ["packages.operators.coreos.com"]
    resources: ["packagemanifests"]
    verbs: ["get", "list"]
  # Cluster Samples Operator config (registry-images-catalog-governance: how the platform curates the stock developer catalog — the
  # skippedImagestreams/skippedTemplates governance surface behind build-deliver's catalog). Kind is Config.
  - apiGroups: ["samples.operator.openshift.io"]
    resources: ["configs"]
    verbs: ["get", "list", "watch"]
  # Image registry operator + auto image pruner (registry-images-catalog-governance: internal-registry config + the nightly pruning/
  # retention policy attendees are taught to reason about). Kinds Config + ImagePruner.
  - apiGroups: ["imageregistry.operator.openshift.io"]
    resources: ["configs", "imagepruners"]
    verbs: ["get", "list", "watch"]
  # The internal registry's exposed endpoint (registry-images-catalog-governance: attendees inspect the
  # registry Route as part of reasoning about how the in-cluster registry is reached — one of the
  # module's first-run commands; added 2026-07-18, SEV: it was Forbidden with no grant covering it).
  # Routes are namespaced; granted cluster-wide read-only, same tradeoff as daemonsets above (readable
  # if you already know the namespace — nothing here adds namespace ENUMERATION, so the attendee
  # project list stays own-only per the header note).
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  # The image-pruner's CronJob (registry-images-catalog-governance: attendees inspect its schedule/
  # history to reason about registry retention — the ImagePruner CR above configures the policy, this
  # is the resulting scheduled Job; added 2026-07-18 alongside the routes rule, same SEV). CronJobs are
  # namespaced; same cluster-wide/no-enumeration tradeoff as the rule above.
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  # Custom operator catalog sources (registry-images-catalog-governance: OperatorHub-source governance — e.g. the platform-added
  # redhat-rhpds-gitea catalog). CatalogSources are namespaced (operator namespaces), never per-tenant.
  - apiGroups: ["operators.coreos.com"]
    resources: ["catalogsources"]
    verbs: ["get", "list", "watch"]
  # Custom developer-catalog samples (registry-images-catalog-governance: ConsoleSample/ConsoleYAMLSample — how the platform adds tiles).
  - apiGroups: ["console.openshift.io"]
    resources: ["consolesamples", "consoleyamlsamples"]
    verbs: ["get", "list", "watch"]
  # packaging-distributing (Packaging & Distributing Your App — Helm/OLM): read-only OLM-bundle DISSECTION. Attendees
  # inspect a LIVE operator's bundle — the "what happens when a customer clicks your tile" chain — all
  # read-only: the classic OLM v0 objects (ClusterServiceVersion + Subscription + InstallPlan +
  # OperatorGroup). Cluster-wide get/list is intentional — an operator's authoritative CSV lives in its
  # OWN namespace (e.g. openshift-operators) and global operators copy their CSV into every namespace.
  # These are operator METADATA, never tenant data: NO namespaces/projects/secrets/workloads grant is
  # added, so the attendee project list stays own-only (cross-tenant-leak check re-run 2026-07-15 after
  # this rule landed — peer projects + the openshift project remain invisible). catalogsources +
  # packagemanifests are already granted above (registry-images-catalog-governance). Fully-qualify subscriptions.operators.coreos.com
  # in content/verify — the bare kind resolves to Knative's Subscription (a live trap).
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions", "subscriptions", "installplans", "operatorgroups"]
    verbs: ["get", "list", "watch"]
  # The CRDs a CSV owns (packaging-distributing: `oc get crd | grep tekton`, then read one) — cluster-scoped, read-only.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # OLM v1 "direction" beat (GA since 4.18, CLI-only on 4.21): the new catalog + install objects.
  - apiGroups: ["olm.operatorframework.io"]
    resources: ["clustercatalogs", "clusterextensions"]
    verbs: ["get", "list", "watch"]
