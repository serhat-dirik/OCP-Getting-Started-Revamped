# platform-observer (D3): read-only cluster-scope visibility so Block C modules can INSPECT
# infrastructure (nodes, machines, ingress, cluster operators, storage, UDNs, packagemanifests)
# with zero mutate rights. Bound cluster-wide to the workshop-attendees group.
#
# NO cluster-wide `namespaces` grant (removed 2026-07-11, first live test): listing all namespaces
# leaked every other attendee's projects into user5's console/CLI project list ("chaos" — the
# project owner). Attendees see ONLY their own projects now (the projects API filters to namespaces
# they hold a rolebinding on: their {user}-dev/stage/prod/cicd + {user}-gitops). Block C modules
# inspect specific infra (nodes/machines/operators/storage) — none needs to enumerate peer projects.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-observer
  labels:
    workshop.redhat.com/layer: workshop-config
rules:
  # Core inventory: nodes and PVs (cluster storage consumption). NOT namespaces — see header.
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Compute topology behind the cluster (M16 scaling/infrastructure inspection).
  - apiGroups: ["machine.openshift.io"]
    resources: ["machinesets", "machines"]
    verbs: ["get", "list", "watch"]
  # The platform's own node agents (M16 DaemonSet-inspection beat: ovnkube-node / node-exporter /
  # machine-config-daemon etc. — read the cluster's node-agent pattern). Read-only, cluster-wide;
  # mirrors the machinesets grant above so `oc get ds -A` works for attendees (build note spec delta #3).
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
  # Ingress/router internals (M15 networking).
  - apiGroups: ["operator.openshift.io"]
    resources: ["ingresscontrollers"]
    verbs: ["get", "list", "watch"]
  # Cluster state/health surfaces (M17 cluster operators, version, infra, ingress config) PLUS M17's
  # image-governance singletons: image.config (allowedRegistriesForImport / registrySources), the CURRENT
  # mirroring APIs ImageDigestMirrorSet + ImageTagMirrorSet (NOT the deprecated ICSP), and the OperatorHub
  # source config. Read-only — the [INSTRUCTOR-DEMO] beats MUTATE these singletons; attendees only inspect.
  - apiGroups: ["config.openshift.io"]
    resources: ["clusteroperators", "clusterversions", "infrastructures", "ingresses", "images", "imagedigestmirrorsets", "imagetagmirrorsets", "operatorhubs"]
    verbs: ["get", "list", "watch"]
  # StorageClasses (M05 storage — attendees inspect provisioners/default in its Ex 5).
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # User-defined networks (M15 advanced networking).
  - apiGroups: ["k8s.ovn.org"]
    resources: ["userdefinednetworks", "clusteruserdefinednetworks"]
    verbs: ["get", "list", "watch"]
  # OperatorHub catalog contents (M17 "what can this cluster install").
  - apiGroups: ["packages.operators.coreos.com"]
    resources: ["packagemanifests"]
    verbs: ["get", "list"]
  # Cluster Samples Operator config (M17: how the platform curates the stock developer catalog — the
  # skippedImagestreams/skippedTemplates governance surface behind M02's catalog). Kind is Config.
  - apiGroups: ["samples.operator.openshift.io"]
    resources: ["configs"]
    verbs: ["get", "list", "watch"]
  # Image registry operator + auto image pruner (M17: internal-registry config + the nightly pruning/
  # retention policy attendees are taught to reason about). Kinds Config + ImagePruner.
  - apiGroups: ["imageregistry.operator.openshift.io"]
    resources: ["configs", "imagepruners"]
    verbs: ["get", "list", "watch"]
  # Custom operator catalog sources (M17: OperatorHub-source governance — e.g. the platform-added
  # redhat-rhpds-gitea catalog). CatalogSources are namespaced (operator namespaces), never per-tenant.
  - apiGroups: ["operators.coreos.com"]
    resources: ["catalogsources"]
    verbs: ["get", "list", "watch"]
  # Custom developer-catalog samples (M17: ConsoleSample/ConsoleYAMLSample — how the platform adds tiles).
  - apiGroups: ["console.openshift.io"]
    resources: ["consolesamples", "consoleyamlsamples"]
    verbs: ["get", "list", "watch"]
