# The attendee group — platform-observer and the shared-namespace view are bound to this group,
# not to individual users, so scaling to N users is just this list growing.
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: workshop-attendees
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
users:
{{- range $i := until (int .Values.userCount) }}
  - {{ printf "%s%d" $.Values.userPrefix (add $i 1) | quote }}
{{- end }}
