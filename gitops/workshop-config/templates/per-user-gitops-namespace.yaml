# Per-user {user}-gitops namespace (M09/M10) — owned by the workshop layer like dev/stage/prod/cicd,
# and for the same reason: the workshop-entries AppProject blacklists ResourceQuota/LimitRange so an
# entry chart cannot create them, and this namespace + its RBAC must survive `ws reset`.
# ADR-0002 amendment 1 (option B): attendee Argo CD Application CRs do NOT live here — they live in
# the student-gitops control-plane namespace (the operator won't do apps-in-any-namespace on a
# namespace-scoped instance). So {user}-gitops is a per-user WORKSPACE/marker namespace: it holds the
# M09 entry marker + any kustomize scratch the attendee makes. It runs NO workloads (claims deploys
# land in {user}-dev/stage), so the quota is a small guard, not a sizing constraint.
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add1 $i) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $user }}-gitops
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
---
# The attendee is admin on their own gitops workspace namespace (same as the standard four).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $user }}-gitops
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $user | quote }}
---
# Small guard quota (no workloads expected here — see header). Generous enough never to be the
# visible constraint in the lab; the real caps are on {user}-dev/stage where claims actually runs.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workshop-quota
  namespace: {{ $user }}-gitops
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
spec:
  hard:
    pods: "10"
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
---
# Paired with the quota above (which constrains cpu/memory): defaults so a bare pod here — the M09
# solve Job, or an attendee's kustomize scratch pod — gets requests/limits and is not quota-rejected.
apiVersion: v1
kind: LimitRange
metadata:
  name: workshop-limits
  namespace: {{ $user }}-gitops
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi
{{- end }}
