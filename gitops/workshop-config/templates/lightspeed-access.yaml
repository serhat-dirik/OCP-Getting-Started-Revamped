# Lightspeed query access for ALL attendees (G3 finding F1: the operator's query-access
# ClusterRole was bound per-user — only user1 — so every other attendee got HTTP 403 at
# the module's marquee "ask the cluster" moment). Group-level, so user count never matters.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lightspeed-query-access-workshop-attendees
  labels:
    workshop.redhat.com/layer: workshop-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lightspeed-operator-query-access
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: workshop-attendees
