# Attendee self-service prep (SEV1-A) must delete the attendee's OWN student-gitops Application/
# ApplicationSet survivors, which attendees can reach ONLY through the STUDENT ARGO API (they have no
# k8s RBAC in student-gitops — deliberately, ADR-0002). `ws` opens that API session as the per-user
# local Argo account, whose password is the SHARED workshop password (non-secret — the same memorable
# value attendees type to log in; cooperative attendees on a disposable cluster). This grant lets `ws`
# read that password to authenticate the cleanup call; Argo RBAC then bounds the delete to proj-{user}
# (a cross-project delete is refused — the boundary M10's negative test proves). Scope is
# resourceName-restricted to the ONE password secret (nothing else in the gitea namespace becomes
# attendee-readable) and bound to the attendee group. Mirrors the showroom SA's showroom-read-creds
# grant on the same secret. If you rotate the workshop to a real secret, replace this with a per-user
# Argo apiKey token instead of a shared password.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: attendee-read-workshop-password
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["workshop-user-creds"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: attendee-read-workshop-password
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/layer: workshop-config
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: attendee-read-workshop-password
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: {{ .Values.attendeeGroup | default "workshop-attendees" }}
