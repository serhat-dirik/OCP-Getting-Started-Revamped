# Per-user namespaces (dev/stage/prod/cicd) — owned by the workshop layer and SURVIVE ws reset
# (entry-state charts own only in-namespace state; see gitops/entry-states/README.md §2).
{{- $suffixes := list "dev" "stage" "prod" "cicd" }}
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add $i 1) }}
{{- range $suffix := $suffixes }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $user }}-{{ $suffix }}
  labels:
    workshop.redhat.com/user: {{ $user | quote }}
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
    {{- if ne $suffix "cicd" }}
    # ADR-0002 amendment 1: the namespace-scoped student-gitops instance may deploy only into
    # namespaces carrying this label (the operator then creates its controller/server RBAC here).
    # gitops-fundamentals/gitops-at-scale deploy claims into dev/stage/prod via the student instance; cicd stays pipeline-only (pipelines-fundamentals).
    # VALUE MUST BE THE INSTANCE'S NAMESPACE, NOT ITS NAME: the operator's managed-by enrollment
    # keys off the ArgoCD CR's namespace (ogsr-student-gitops, student-argocd.yaml), not .metadata.name
    # (which stays 'student-gitops' unprefixed for Route-host stability). A bare 'student-gitops'
    # here matches nothing, so the operator never creates the RoleBindings — SEV1 2026-07-18.
    argocd.argoproj.io/managed-by: {{ $.Values.studentArgoNamespace }}
    {{- end }}
{{- end }}
{{- end }}
