# Binds platform-observer cluster-wide to every attendee (via the workshop-attendees group).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-observer
  labels:
    workshop.redhat.com/layer: workshop-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-observer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: workshop-attendees
---
# 'view' in the shared 'openshift' namespace — lets attendees inspect the cluster's shared
# ImageStreams (M02 image lifecycle, M17 build inputs) without any broader grant.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-attendees-view
  namespace: openshift
  labels:
    workshop.redhat.com/layer: workshop-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: workshop-attendees
