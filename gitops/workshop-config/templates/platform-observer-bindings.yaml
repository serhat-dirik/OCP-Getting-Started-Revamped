# Binds platform-observer cluster-wide to every attendee (via the workshop-attendees group).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-observer
  labels:
    workshop.redhat.com/layer: workshop-config
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-observer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: workshop-attendees
# NOTE: no RoleBinding on the shared 'openshift' namespace. It was added to let attendees INSPECT
# shared ImageStreams, but it made 'openshift' appear in every attendee's `oc get projects` /
# console project list (project-owner review 2026-07-11: attendees must see ONLY their own
# projects). Nothing needs a RoleBinding here: build-deliver's S2I build PULLS openshift/java-21 via
# the build ServiceAccount (cluster-default image-puller on the openshift namespace), not via an
# attendee grant. registry-images-catalog-governance DOES read the openshift namespace (`oc get is
# java-21 -n openshift`, its ws-meta smokeCommands) — but via the STOCK, pre-existing
# `shared-resource-viewer` ClusterRole/binding to system:authenticated that every OpenShift cluster
# ships (developer-catalog shared templates/imagestreams), never via a grant this chart adds — so it
# doesn't change the conclusion here (corrected 2026-07-18: an earlier version of this note claimed
# "no module inspects the openshift namespace", which was already false the moment that smoke command
# existed). If a future module needs a workshop-ADDED grant scoped to the openshift namespace, add a
# narrow, module-scoped RoleBinding in that module's entry state rather than a standing workshop-wide
# binding.
