# Binds platform-observer cluster-wide to every attendee (via the workshop-attendees group).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-observer
  labels:
    workshop.redhat.com/layer: workshop-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-observer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: workshop-attendees
# NOTE: no RoleBinding on the shared 'openshift' namespace. It was added to let attendees INSPECT
# shared ImageStreams, but it made 'openshift' appear in every attendee's `oc get projects` /
# console project list (project-owner review 2026-07-11: attendees must see ONLY their own
# projects). Nothing needs it: M02's S2I build PULLS openshift/java-21 via the build ServiceAccount
# (cluster-default image-puller on the openshift namespace), not via an attendee grant, and no
# module inspects the openshift namespace. If a future module must inspect it, add a narrow,
# module-scoped grant in that module's entry state rather than a standing workshop-wide binding.
