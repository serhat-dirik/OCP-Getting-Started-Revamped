# Batch admission scaffolding for M06 (research-verified layout, 2026-07-09): shared flavor +
# two priorities + PER-USER ClusterQueues (LocalQueues hold no quota — isolation needs one CQ
# per user; no cohort = no cross-user borrowing). Quota sized so the lesson is VISIBLE:
# ~2 sample pods admit, the 3rd pends, a high-priority job preempts a low one.
# The {user}-batch namespace + LocalQueue arrive with M06's entry state (module-scoped).
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: default-flavor
  labels:
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: batch-low
  labels:
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
value: 100
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: batch-high
  labels:
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
value: 1000
{{- range $i := until (int .Values.userCount) }}
{{- $user := printf "%s%d" $.Values.userPrefix (add1 $i) }}
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: cq-{{ $user }}
  labels:
    {{- include "workshop-config.ownerLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespaceSelector:
    matchLabels:
      workshop.redhat.com/user: {{ $user | quote }}
  preemption:
    withinClusterQueue: LowerPriority
    reclaimWithinCohort: Never
  resourceGroups:
    - coveredResources: [cpu, memory]
      flavors:
        - name: default-flavor
          resources:
            - name: cpu
              nominalQuota: "500m"
            - name: memory
              nominalQuota: "512Mi"
{{- end }}
