# JDK 21 S2I builder for the developer catalog (project directive 2026-07-09: new-workshop apps
# build on the latest LTS). The cluster's stock 'java' imagestream tops out at openjdk-17-ubi8,
# so the workshop ships its own builder stream — which is itself the M17 catalog-governance lesson.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: java-21
  namespace: openshift
  labels:
    workshop.redhat.com/layer: workshop-config
  annotations:
    openshift.io/display-name: "Java 21 (UBI 9)"
spec:
  tags:
    - name: latest
      annotations:
        openshift.io/display-name: "Java 21 (UBI 9, S2I)"
        description: "Build and run Java 21 applications (Quarkus, Spring Boot, plain Maven) from source on UBI 9."
        iconClass: icon-rh-openjdk
        tags: "builder,java,openjdk,parasol"
        supports: "java:21,java"
        sampleRepo: "https://github.com/jboss-openshift/openshift-quickstarts"
        version: "21"
      from:
        kind: DockerImage
        name: registry.access.redhat.com/ubi9/openjdk-21:latest
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Local
