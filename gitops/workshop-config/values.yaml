# Injected by bootstrap/install.sh (helm parameters userCount, clusterDomain); the rest are stable
# defaults. Local dev: `helm template gitops/workshop-config --set userCount=2`.
userCount: 5
userPrefix: user
# Ingress apps domain (e.g. apps.cluster-x.example.com); "" is fine — currently informational only.
clusterDomain: ""
# Where the in-cluster git service and its user-seeding job live.
giteaNamespace: gitea
mirrorOrg: parasol
mirrorRepo: ocp-getting-started
# Argo CD instance that owns the entry-state AppProject (platform instance per ADR-0002).
argoNamespace: openshift-gitops

# App-repo seed: publishes the standalone parasol/* app repos into Gitea by splitting monorepo
# subdirs, so entry-state fork jobs have something to fork. Design: docs/research/app-repo-seed-design.md.
# DISABLED by default — a force-push into the shared seed repos is a sign-off decision, not automatic
# (see the guard rationale in the design note). Enable with --set appRepoSeed.enabled=true after sign-off.
appRepoSeed:
  enabled: false
  revision: main
  repos:
    - repo: parasol-claims
      subdir: apps/parasol-claims
    - repo: parasol-notifications
      subdir: apps/parasol-notifications
    - repo: parasol-web
      subdir: apps/parasol-web
    - repo: parasol-fraud
      subdir: apps/parasol-fraud
    - repo: parasol-service-template
      subdir: apps/parasol-service-template
    - repo: claims-config-template
      subdir: gitops/promotion/claims-config-template

# Showroom cockpit: per-attendee RHDP Showroom shell (instructions + embedded terminals + tool tabs),
# rendered by templates/showroom.yaml. Serves OUR content from the in-cluster mirror; terminals log
# the attendee in as {user}. See showroom/ui-config.yml for the canonical UI layout.
showroom:
  enabled: true
  # Two-phase rollout gate: when set, deploy Showroom for ONLY this user (pilot). The PM verifies the
  # pilot before it scales. Set to "" (empty) to render one instance per user (1..userCount).
  pilotUser: "user1"
  namespace: showroom
  # Git ref the deployer clones/builds from the mirror (matches the workshop-config app revision).
  contentRef: main
  # Per-attendee terminal home PVC (kubeconfig + scratch work; survives pod restarts).
  homeStorage: 5Gi
  # nookbag UI bundle overlaid by the content image (verified latest release 2026-07-10).
  nookbagBundle: https://github.com/rhpds/nookbag/releases/download/nookbag-v0.3.7/nookbag-v0.3.7.zip
  # Pinned image tags — all verified current on quay.io/github 2026-07-10 (verify-never-recall).
  images:
    gitCloner: quay.io/rhpds/git-cloner:v1.1.5
    antora: quay.io/rhpds/antora:v1.3.0
    content: quay.io/rhpds/showroom-content:v1.4.2
    terminal: quay.io/rhpds/openshift-showroom-terminal-ocp:2026-04-07
    nginx: quay.io/rhpds/nginx:1.25
  # Small footprint (Rule 13): the terminal is the only sized container; nginx/content stay tiny.
  terminalResources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
