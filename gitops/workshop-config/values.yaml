# Injected by bootstrap/install.sh (helm parameters userCount, clusterDomain); the rest are stable
# defaults. Local dev: `helm template gitops/workshop-config --set userCount=2`.
userCount: 5
userPrefix: user
# Ingress apps domain (e.g. apps.cluster-x.example.com); "" is fine — currently informational only.
clusterDomain: ""
# Where the in-cluster git service and its user-seeding job live.
giteaNamespace: gitea
mirrorOrg: parasol
mirrorRepo: ocp-getting-started
# Argo CD instance that owns the entry-state AppProject (platform instance per ADR-0002).
argoNamespace: openshift-gitops

# App-repo seed: publishes the standalone parasol/* app repos into Gitea by splitting monorepo
# subdirs, so entry-state fork jobs have something to fork. Design: docs/research/app-repo-seed-design.md.
# DISABLED by default — a force-push into the shared seed repos is a sign-off decision, not automatic
# (see the guard rationale in the design note). Enable with --set appRepoSeed.enabled=true after sign-off.
appRepoSeed:
  enabled: false
  revision: main
  repos:
    - { repo: parasol-claims,           subdir: apps/parasol-claims }
    - { repo: parasol-notifications,    subdir: apps/parasol-notifications }
    - { repo: parasol-web,              subdir: apps/parasol-web }
    - { repo: parasol-fraud,            subdir: apps/parasol-fraud }
    - { repo: parasol-service-template, subdir: apps/parasol-service-template }
    - { repo: claims-config-template,   subdir: gitops/promotion/claims-config-template }
