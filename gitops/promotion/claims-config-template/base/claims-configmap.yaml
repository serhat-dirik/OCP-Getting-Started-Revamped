# Non-secret configuration for the claims app AND its database. This is the "config" half of
# config-vs-secret: hostnames, ports, database name, an environment marker, and the log level —
# nothing here is sensitive, so it lives in a ConfigMap that overlays freely override per env.
apiVersion: v1
kind: ConfigMap
metadata:
  name: claims-config
data:
  # Datasource wiring the %prod profile interpolates into quarkus.datasource.jdbc.url.
  POSTGRESQL_HOST: claims-db
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_DATABASE: parasol
  # Environment marker — inert to the app, but proves per-env config differs (oc set env --list).
  # Overlays override this to dev / stage / prod.
  APP_ENV: dev
  # Root log level — a real, runtime-observable per-env difference (overlays set DEBUG/INFO/WARN).
  QUARKUS_LOG_LEVEL: INFO
