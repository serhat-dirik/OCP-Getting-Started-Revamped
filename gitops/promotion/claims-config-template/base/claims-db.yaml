# Per-environment PostgreSQL for the claims app. Each promoted environment (stage, prod) gets
# its OWN ephemeral database, initialized from claims-creds (user/password) + claims-config
# (database name) — so config and secrets drive the DB the same way they drive the app.
# Ephemeral (emptyDir): persistence is a later module (Storage & Stateful Apps).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-db
  labels:
    app: claims-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claims-db
  template:
    metadata:
      labels:
        app: claims-db
    spec:
      containers:
        - name: postgresql
          image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
          ports:
            - containerPort: 5432
          envFrom:
            # POSTGRESQL_DATABASE (config) + POSTGRESQL_USER/_PASSWORD (secret). Extra keys such
            # as POSTGRESQL_HOST are ignored by the image — harmless.
            - configMapRef:
                name: claims-config
            - secretRef:
                name: claims-creds
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: claims-db
  labels:
    app: claims-db
spec:
  selector:
    app: claims-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
