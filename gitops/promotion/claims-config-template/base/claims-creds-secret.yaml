# The SECRET half of config-vs-secret: only the database username and password. Kept apart
# from the ConfigMap so credentials can be rotated, RBAC-scoped, and (in a real org) sourced
# from a secret manager. base64 here is encoding, NOT encryption — the module says so plainly;
# the [OPTIONAL] External Secrets section is where real per-env secret sourcing would plug in.
apiVersion: v1
kind: Secret
metadata:
  name: claims-creds
type: Opaque
stringData:
  POSTGRESQL_USER: parasol
  POSTGRESQL_PASSWORD: parasol
