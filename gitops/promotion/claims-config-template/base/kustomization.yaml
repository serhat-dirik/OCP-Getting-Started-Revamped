# Base: one claims environment as code — config, secret, database, app, service, route.
# Overlays (dev/stage/prod) set the namespace, replica count, and per-env ConfigMap values.
# The image is defined once here and never changes across environments — that is the whole
# point of "promote the same artifact, change only config".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# labels (not commonLabels) so these land on metadata only, never on the immutable
# Deployment selector (kustomize v5 convention).
labels:
  - pairs:
      app.kubernetes.io/part-of: parasol-claims
      workshop.redhat.com/module: m04
    includeSelectors: false

resources:
  - claims-configmap.yaml
  - claims-creds-secret.yaml
  - claims-db.yaml
  - claims-app.yaml
