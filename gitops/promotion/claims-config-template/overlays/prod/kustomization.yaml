# PROD overlay — the real thing. 3 replicas for availability, quiet logging (WARN),
# APP_ENV=prod. Still the SAME image as dev and stage — promotion changed only config.
# `oc apply -k overlays/prod` targets YOUR prod namespace.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: __user__-prod

resources:
  - ../../base

replicas:
  - name: parasol-claims
    count: 3

patches:
  - target:
      kind: ConfigMap
      name: claims-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: prod
      - op: replace
        path: /data/QUARKUS_LOG_LEVEL
        value: WARN
