# DEV overlay — where you iterate. 1 replica, verbose logging, APP_ENV=dev.
# This overlay is personalized to your username at fork time, so
# `oc apply -k overlays/dev` targets YOUR dev namespace.
# NOTE: in the config-multienv lab you build dev by hand and PROMOTE to stage/prod; this overlay captures
# "dev as code" for reference and for GitOps convergence in later modules.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: __user__-dev

resources:
  - ../../base

replicas:
  - name: parasol-claims
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: claims-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: dev
      - op: replace
        path: /data/QUARKUS_LOG_LEVEL
        value: DEBUG
