# STAGE overlay — production-like, for verification. 2 replicas, normal logging, APP_ENV=stage.
# Same image as dev and prod; only this config differs. `oc apply -k overlays/stage` targets
# YOUR stage namespace (personalized to your username when your fork is created).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: __user__-stage

resources:
  - ../../base

replicas:
  - name: parasol-claims
    count: 2

patches:
  - target:
      kind: ConfigMap
      name: claims-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: stage
      - op: replace
        path: /data/QUARKUS_LOG_LEVEL
        value: INFO
