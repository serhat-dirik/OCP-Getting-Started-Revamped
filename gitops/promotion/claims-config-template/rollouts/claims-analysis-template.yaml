# Automated canary analysis for the claims Rollout — a JOB-provider AnalysisTemplate (no external
# metric backend to authenticate to, so it installs cleanly on any cluster and stays deterministic
# for a timed lab; see the progressive-delivery stack README for why job-provider over a Prometheus
# provider against thanos-querier). Each run launches a short Job under the claims-analysis SA (the
# gitops-at-scale entry state creates that SA + a configmaps-read Role in {user}-prod):
#   1. reads the gitops-at-scale-canary-control ConfigMap verdict knob — verdict=fail forces a failed assessment
#      (the deterministic "ship a bad release" beat: flip it, watch the canary auto-roll-back);
#   2. otherwise probes the REAL canary Service /q/health/ready (200 also proves DB connectivity,
#      since readiness gates on the datasource) — a genuinely bad canary fails here too.
# failureLimit 0 + count 2: two clean probes to promote; one failure aborts.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: claims-canary-analysis
spec:
  args:
    - name: canary-service
  metrics:
    - name: canary-health
      count: 2
      interval: 15s
      failureLimit: 0
      provider:
        job:
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: 120
            template:
              spec:
                serviceAccountName: claims-analysis
                restartPolicy: Never
                containers:
                  - name: probe
                    image: registry.redhat.io/openshift4/ose-cli:latest
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 128Mi
                    command: ["/bin/bash", "-c"]
                    args:
                      - |
                        set -euo pipefail
                        V="$(oc get configmap gitops-at-scale-canary-control -o jsonpath='{.data.verdict}' 2>/dev/null || echo pass)"
                        if [[ "$V" == "fail" ]]; then
                          echo "❌ gitops-at-scale-canary-control verdict=fail → simulated bad release, failing analysis"
                          exit 1
                        fi
                        echo "▶ probing canary http://{{args.canary-service}}:8080/q/health/ready"
                        for i in $(seq 1 5); do
                          code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://{{args.canary-service}}:8080/q/health/ready" || echo 000)"
                          echo "  probe $i → HTTP $code"
                          [[ "$code" == "200" ]] || { echo "❌ canary not ready (HTTP $code)"; exit 1; }
                          sleep 2
                        done
                        echo "✅ canary healthy"
