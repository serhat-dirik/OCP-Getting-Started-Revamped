# M10 beat 1 — ONE ApplicationSet replaces the hand-created per-env Applications. A LIST generator
# enumerates the three environments and, for each, the folder that describes it ("folders, not
# branches"): dev and stage deploy the plain overlays, and PROD deploys the rollouts/ overlay so it
# runs progressive delivery (an Argo Rollout) while the lower envs stay plain Deployments — the same
# ONE object, environments that legitimately differ. Applied to the student-gitops instance under the
# attendee's own project. The repoURL is the Gitea ROUTE host (matching the dev/stage Applications the
# entry state creates) so the Gitea->student-Argo push webhook — which reports route-based URLs — also
# refreshes these appset-generated apps within seconds. The M10 fork job personalizes __user__ AND
# __gitea_host__ (the route host it already discovers).
# Needs the ApplicationSet controller on the student instance (workshop-config student-argocd.yaml
# spec.applicationSet) + the applicationsets RBAC in the per-user student policy. On creation it ADOPTS
# the two hand-created dev/stage Applications the entry state left (matching names + paths) and
# generates the new prod Application — three apps managed by one object.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: claims-__user__
  namespace: student-gitops
  labels:
    workshop.redhat.com/user: __user__
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # A LIST generator: each element is one environment and the folder in Git that describes it.
    # Swap this for a git-directories or cluster generator later — the template below is unchanged.
    - list:
        elements:
          - env: dev
            path: overlays/dev
          - env: stage
            path: overlays/stage
          # prod points at rollouts/ (the Rollout + analysis + wave-ordered migration), not
          # overlays/prod — this is how ONE ApplicationSet gives prod progressive delivery.
          - env: prod
            path: rollouts
  template:
    metadata:
      # one Application per environment: claims-dev-__user__, claims-stage-__user__, claims-prod-__user__
      name: 'claims-{{.env}}-__user__'
      labels:
        workshop.redhat.com/user: __user__
    spec:
      project: proj-__user__
      source:
        repoURL: https://__gitea_host__/__user__/claims-config.git
        targetRevision: main
        path: '{{.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '__user__-{{.env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
