# M10 beat 1 — ONE ApplicationSet replaces the hand-created per-env Applications: a git
# DIRECTORIES generator over overlays/* discovers dev/stage/prod ("folders, not branches") and
# templates one Application per environment. Applied to the student-gitops instance under the
# attendee's own project. The repoURL is the CLUSTER-INTERNAL Gitea service (gitea.gitea.svc:3000)
# so this source file carries no cluster domain — the M10 fork job personalizes only __user__.
# Needs the ApplicationSet controller on the student instance (workshop-config student-argocd.yaml
# spec.applicationSet) + the applicationsets RBAC in the per-user student policy.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: claims-__user__
  namespace: student-gitops
  labels:
    workshop.redhat.com/user: __user__
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: http://gitea.gitea.svc:3000/__user__/claims-config.git
        revision: main
        directories:
          - path: overlays/*
  template:
    metadata:
      # one Application per env folder: claims-dev-__user__, claims-stage-__user__, claims-prod-__user__
      name: 'claims-{{.path.basename}}-__user__'
      labels:
        workshop.redhat.com/user: __user__
    spec:
      project: proj-__user__
      source:
        repoURL: http://gitea.gitea.svc:3000/__user__/claims-config.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '__user__-{{.path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
