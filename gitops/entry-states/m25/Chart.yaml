name: m25-entry
description: "M25 Packaging & Distributing Your App (Helm/OLM) — the per-user packaging world in the workshop-owned {user}-dev namespace: an entry marker, a Gitea fork {user}/parasol-notifications (the Helm target — polyglot Node/Python, port 8080, GET /health, SITE env, no DB), and a prebuilt parasol-notifications:1.0 istag S2I-built into {user}-dev from the parasol org seed so `helm install` has a pullable image WITHOUT assuming M02 built it (compose-don't-chain). The OLM half is a read-only dissection of a LIVE operator (Pipelines) via the workshop-layer platform-observer ClusterRole (extended for CSV/Subscription/InstallPlan/CRD/ClusterCatalog reads) — this chart installs no operator. {user}-dev (quota/limits/RBAC) is workshop-layer (per-user-namespaces.yaml), NOT this chart. ws solve materializes the END state: the notifications app deployed to {user}-dev (the outcome of the helm install/upgrade/rollback lab)."
type: application
version: 0.1.0
