# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally materializes the gitops-at-scale END state: a THIRD student Application
# (claims-prod-{user}) that deploys the rollouts/ overlay so {user}-prod runs claims as an Argo
# Rollout (canary + analysis), then BLOCKS until it is Synced/Healthy. The demo/instructor end state
# = "prod is progressive-delivery-managed" on top of the always-materialized gitops-fundamentals end state (dev+stage).
# See solve-endstate.yaml.
solve: false
# The student Argo CD instance's namespace = where attendee Application CRs live (ADR-0002 amend 1,
# option B). The gitops-fundamentals-end-state hook AND solve create their apps here; ws-meta purgeAppsNamespace
# matches it so reset reclaims them by project.
studentArgoNamespace: student-gitops
# In-cluster Gitea coordinates: where the promotion template lives and what each user forks. The fork
# job forks {sourceOrg}/{sourceRepo} into {user}/{forkRepo} and ASSERTS canonical content (base +
# overlays + rollouts + applicationset, personalized __user__ → {user}) on every run — the SAME
# repo/idiom as config-multienv/gitops-fundamentals (compose, don't chain: gitops-at-scale owns its own fork job; a pre-existing fork is
# re-asserted to factory-fresh, not left as-is).
giteaNamespace: gitea
sourceOrg: parasol
sourceRepo: claims-config-template
forkRepo: claims-config
