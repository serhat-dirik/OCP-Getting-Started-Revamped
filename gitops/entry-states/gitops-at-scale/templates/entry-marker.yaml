# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
# Lives in {user}-gitops (gitops-at-scale's home namespace: where the attendee's Argo CD Applications live).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-gitops-at-scale
  namespace: {{ .Values.user }}-gitops
  labels:
    workshop.redhat.com/module: gitops-at-scale
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: gitops-at-scale
  materializedFor: {{ .Values.user | quote }}
