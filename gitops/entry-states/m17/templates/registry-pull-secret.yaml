# A SAMPLE private-registry credential for the "deploy from a private registry" beat. The attendee links
# it to a ServiceAccount for pull (`oc secrets link deployer parasol-registry-creds --for=pull`) or names
# it in a pod's imagePullSecrets. INERT by design: the host is a placeholder ({{ .Values.sampleRegistryHost }})
# and the password is a non-secret teaching sample (rule 7 — no real credential, so no vars.yaml), exactly
# like the ephemeral-DB passwords the other entry charts hardcode. It exists so the pull-secret mechanics
# are hands-on WITHOUT standing up a real private registry — that shared registry is bootstrap/portfolio
# substrate, never this per-user chart (Rule 13). ws solve renders a Deployment that consumes it.
apiVersion: v1
kind: Secret
metadata:
  name: parasol-registry-creds
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m17
    workshop.redhat.com/owner: ogsr
type: kubernetes.io/dockerconfigjson
stringData:
  # auth = base64("parasol-puller:parasol"); sample only — the host does not resolve.
  .dockerconfigjson: |
    {"auths":{"{{ .Values.sampleRegistryHost }}":{"username":"parasol-puller","password":"parasol","auth":"cGFyYXNvbC1wdWxsZXI6cGFyYXNvbA==","email":"puller@parasol.example.com"}}}
