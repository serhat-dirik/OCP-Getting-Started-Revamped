# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M17's entire world lives in {user}-dev: the seeded parasol-claims ImageStream (+ the attendee's promoted
# tag), the sample private-registry pull Secret, the attendee's scheduled-import ext-ubi ImageStream, the
# namespaced custom catalog Template, and (solve) the pull-secret demo Deployment. `oc delete all` clears
# the ImageStreams + Deployments (imagestreams ARE in the `all` category, verified 2026-07-13); the engine
# also purges namespaced Templates (NOT in `all`, so a leftover would survive reset and red-fail the next
# entry verify — the same class as the PDB/NetworkPolicy purge gaps; purge_ns extended in the same slice).
# The cluster-wide governance surface M17 inspects (image.config, samples Config, ImagePruner, IDMS/ITMS,
# OperatorHub sources, ConsoleSamples) is READ-ONLY substrate reached via platform-observer — never
# chart-owned, so reset never touches it (Rule 13). Quotas/limits/RBAC are workshop-layer, untouched.
purgeNamespaces:
  - "${USER}-dev"
# M17 materializes into the SAME {user}-dev the dev-namespace modules own (m01-m05, m09-m16), so their
# entry apps would deadlock on SharedResourceWarning if they coexisted (ADR-0001 amendment). Same-namespace
# modules are MUTUAL conflicts: ws start/prep/solve evicts the conflicting entry app and purges {user}-dev
# first. Each module below lists m17 back (reciprocity completed in this same slice). m06 ({user}-batch)
# and m07/m08 ({user}-cicd) are disjoint namespaces → they coexist with m17 untouched.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m11
  - m12
  - m13
  - m14
  - m15
  - m16
  - m19
  - m20
  - m24
  - m25
# Representative M17 muscle the generic battery does NOT cover — the two supply chains the module teaches,
# both run as {user} in the live cockpit: (1) the cluster governance surface is READABLE via the extended
# platform-observer role (the inspect-governance beat — fail-loud if the workshop-config platform-observer
# extension never landed, so the attendee can't see what they're taught to inspect); (2) the shared java-21
# builder ImageStream (openshift ns) the referencePolicy-Local read beat inspects is present + readable.
# Both are attendee-visible reads outside {user}-dev, so they live here (smokeCommands) rather than in the
# namespace-scoped verify script (rule 10). ${USER} resolves per-run.
smokeCommands:
  - "oc get images.config.openshift.io cluster -o name"
  - "oc get is java-21 -n openshift -o name"
