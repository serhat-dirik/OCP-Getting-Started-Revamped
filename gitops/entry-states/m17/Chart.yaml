description: "M17 Registry, Images & Catalog Governance — seeds {user}-dev with a per-user ImageStream (parasol-claims @ the seed tag, a pull-through/referencePolicy-Local reference to the shared parasol-images build) for the tag/promote beat, a SAMPLE private-registry pull Secret (inert, example.com — the deploy-from-private-registry beat), and the entry marker. The cluster-wide governance surface it inspects (image.config, samples Config, ImagePruner, IDMS/ITMS, OperatorHub sources, ConsoleSamples) is READ-ONLY substrate reached via the workshop-config platform-observer role — never chart-owned (ADR-0001 Rule 13; allowed-registries/mirroring are [INSTRUCTOR-DEMO] cluster singletons). ws solve materializes the END state: the promoted parasol-claims:{promoteTag} istag, an ext-ubi scheduled-import ImageStream, a namespaced custom catalog Template in {user}-dev, and a Deployment wired to pull with the sample registry secret."
