# ws reset purges user-created leftovers from these namespaces before re-materializing.
# service-mesh-advanced-gateways's in-namespace state lives entirely in {user}-mesh: the un-meshed parasol-web/claims/fraud +
# ephemeral claims-db, the demo-client verification pod, the legacy-partner TCP backend, and (solve /
# lab) the mesh CRs the attendee creates — PeerAuthentication, DestinationRule, VirtualService,
# AuthorizationPolicy, Gateway, EnvoyFilter. `oc delete all` clears the Deployments/Services; the ws
# engine's purge_ns ALSO deletes the istio config CRs and STRIPS the istio-injection / istio.io/rev
# namespace labels the attendee added when enrolling (else a re-materialized entry state would inject
# sidecars into the "un-meshed" app and red-fail the next entry verify — the mesh analog of the
# PDB/NetworkPolicy/Template purge gaps).
# NOTE: the {user}-mesh NAMESPACE, its istio-discovery=enabled label, quota, LimitRange and RBAC are
# WORKSHOP-LAYER-owned (gitops/workshop-config/templates/per-user-mesh.yaml — the workshop-entries
# AppProject blacklists ResourceQuota/LimitRange, AND a discovery-scoped shared istiod needs the label
# stable). Like {user}-dev/stage/prod/cicd/partner, the namespace SURVIVES reset with the same UID and
# keeps its istio-discovery label; the entry Application owns only the in-namespace objects.
purgeNamespaces:
  - "${USER}-mesh"
# NO conflictsWith: service-mesh-advanced-gateways is the ONLY module that materializes into {user}-mesh (a dedicated namespace, like
# jobs-batch-kueue's {user}-batch and pipelines-fundamentals/trusted-supply-chain's {user}-cicd). It shares no namespace with any other module, so its
# entry app coexists with every dev-namespace module untouched — no reciprocal edits needed (ADR-0001
# same-namespace policy). Key omitted deliberately (meta_list returns empty).
# Representative service-mesh-advanced-gateways muscle the generic battery does NOT cover: exec the in-cluster demo-client (the
# verification substrate every mTLS / reachability / raw-TCP probe leans on) and prove it carries curl +
# openssl. Touches only {user}-mesh (attendee is admin) and no parasol image, so it stays green
# regardless of the parasol-image build state. ${USER} resolves per-run.
smokeCommands:
  - "oc exec deploy/demo-client -n ${USER}-mesh -- sh -c 'command -v curl >/dev/null && command -v openssl >/dev/null'"
