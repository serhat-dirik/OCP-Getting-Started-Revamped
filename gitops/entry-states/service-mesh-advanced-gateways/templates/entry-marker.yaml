# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-service-mesh-advanced-gateways
  namespace: {{ .Values.user }}-mesh
  labels:
    workshop.redhat.com/module: service-mesh-advanced-gateways
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: service-mesh-advanced-gateways
  materializedFor: {{ .Values.user | quote }}
  # The single namespace this module spans — service-mesh-advanced-gateways's mesh world lives entirely in {user}-mesh.
  meshNamespace: {{ .Values.user }}-mesh
