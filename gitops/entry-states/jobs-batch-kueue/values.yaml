# Injected by ws start (helm parameters); defaults here serve local `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally renders the module END state (instructor/demo mode):
# a suspended nightly-statement CronJob + one already-completed monthly-statement Job, i.e.
# what the attendee's world looks like after finishing the CronJob and Job exercises.
solve: false

# --- Kueue wiring (workshop layer contract) --------------------------------------------------
# The per-user ClusterQueue cq-{user} + shared ResourceFlavor + batch-low/batch-high
# WorkloadPriorityClasses are owned by the workshop layer (gitops/workshop-config/templates/
# kueue-queues.yaml) and are cluster-scoped. This chart only adds the namespaced LocalQueue
# that points a name in {user}-batch at that ClusterQueue.
clusterQueue: ""          # defaults to cq-{user} when empty (see _helpers)

# --- Shared dataset storage ------------------------------------------------------------------
# claims-data is READ CONCURRENTLY by parallel Job pods (parallelism 3 / 2) that the scheduler
# spreads across nodes, so it MUST be ReadWriteMany — the default block class (RWO) would
# Multi-Attach-fail across nodes. Point this at an RWX-capable class for your cluster.
datasetStorageClass: ocs-external-storagecluster-cephfs
datasetAccessMode: ReadWriteMany
datasetSize: 1Gi

# --- MaaS batch-inference credentials (copied from the platform, never stored in git) --------
# The batch-inference exercise calls a Models-as-a-Service endpoint. The Bearer token is copied
# at sync time from the platform Lightspeed secret into {user}-batch by a hook Job (RBAC below);
# the endpoint + model are not secrets and travel in a ConfigMap. Default model llama-scout-17b:
# the per-user MaaS key is model-scoped and only grants this model (HTTP 401 key_model_access_denied
# against the prior qwen3-14b default — root-caused live by the task #67 QA gate); matches the FSC
# litemaas.model contract default (docs/research/field-sourced-content-note.md §3).
maasEndpoint: https://maas-rhdp.apps.maas.redhatworkshops.io/v1
maasModel: llama-scout-17b
maasSourceNamespace: openshift-lightspeed
maasSourceSecret: credentials
maasSourceKey: apitoken
