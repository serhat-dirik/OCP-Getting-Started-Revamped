# Batch-inference credentials for {user}-batch. The endpoint + model are NOT secrets and live in
# a ConfigMap; the Bearer token IS a secret and is COPIED at sync time from the platform Lightspeed
# secret (openshift-lightspeed/credentials key apitoken) into a maas-credentials Secret here, by a
# hook Job with its own ServiceAccount and least-privilege RBAC (get on THAT ONE named source
# secret; create/update secrets + patch maas-config in this namespace). Same discovery pattern as the
# workshop layer's gitea jobs, suffixed -jobs-batch-kueue-{user} so it never collides. Names are per-user
# because the source read must be granted to a subject in the attendee's namespace.
#
# PER-CLUSTER MODEL/ENDPOINT (the app-modernization idiom): the Job ALSO reads model + endpoint from the
# SAME source secret and converges the maas-config ConfigMap to them, falling back to the chart values
# (values.yaml maasModel/maasEndpoint) when the source keys are absent. WHY prefer the secret: the
# per-user MaaS key is model-scoped and the two clusters' keys are scoped to OPPOSITE models
# (llama-scout-17b vs qwen3-14b — inverted-scope incident 2026-07-19), so any hardcoded chart default
# breaks one cluster. One chart, every cluster, no edit.
---
# why: endpoint + model for the batch-inference Job to read (attendee-editable, not sensitive).
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-config
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  endpoint: {{ .Values.maasEndpoint | quote }}
  model: {{ .Values.maasModel | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read ONLY the one named source secret in the platform Lightspeed namespace (resourceNames
# pins it to `credentials` — no blanket secret read in a shared namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.maasSourceSecret | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
    namespace: {{ include "jobs-batch-kueue.namespace" . }}
---
# why: let the copy Job write the resulting maas-credentials secret AND converge the maas-config
# ConfigMap's model/endpoint — both in {user}-batch (create + update for idempotent re-runs).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    # patch maas-config with the model/endpoint the copy Job resolves (from the source secret or fallback).
    resources: ["configmaps"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
    namespace: {{ include "jobs-batch-kueue.namespace" . }}
---
# Sync-hook Job: copies the apitoken into maas-credentials (key GENAI_API_KEY). Re-runs on every
# sync (BeforeHookCreation) and is idempotent (apply of the same Secret). Wave 1 = after the RBAC.
# The token is never decoded or logged — the base64 value is passed straight through into the
# target Secret's .data field. GENAI_API_KEY matches the contract every other MaaS-consuming
# entry state uses (app-modernization/ai-assisted-development/agentic-ai) — ai-assisted-development's
# devfile comment explains why: the Devfile 2.2.0 schema forbids secretKeyRef, so DevWorkspace
# auto-mount (1:1 key=env-var name) is the only path for those; this Job's own consumer remaps via
# secretKeyRef either way, so there is no reason for this one entry state to carry a different key.
apiVersion: batch/v1
kind: Job
metadata:
  name: maas-copy-jobs-batch-kueue-{{ .Values.user }}
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: maas-copy
        workshop.redhat.com/module: jobs-batch-kueue
    spec:
      serviceAccountName: maas-copy-jobs-batch-kueue-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: copy
          # ose-cli ships oc; no custom image to maintain (same choice as the gitea jobs).
          image: registry.redhat.io/openshift4/ose-cli:latest
          # `oc` is a large Go binary — 128Mi OOMKills it; 512Mi limit gives it headroom.
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          env:
            - name: SRC_NS
              value: {{ .Values.maasSourceNamespace | quote }}
            - name: SRC_SECRET
              value: {{ .Values.maasSourceSecret | quote }}
            - name: SRC_KEY
              value: {{ .Values.maasSourceKey | quote }}
            - name: DST_NS
              value: {{ include "jobs-batch-kueue.namespace" . | quote }}
            # Fallback used when the source Lightspeed secret does NOT carry model/endpoint keys.
            - name: FALLBACK_MODEL
              value: {{ .Values.maasModel | quote }}
            - name: FALLBACK_ENDPOINT
              value: {{ .Values.maasEndpoint | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ waiting for read access to ${SRC_NS}/${SRC_SECRET}…"
              TOKEN_B64=""
              for i in $(seq 1 30); do
                TOKEN_B64="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath="{.data.${SRC_KEY}}" 2>/dev/null || true)"
                [[ -n "$TOKEN_B64" ]] && break
                sleep 5
              done
              [[ -n "$TOKEN_B64" ]] || { echo "❌ could not read ${SRC_NS}/${SRC_SECRET} key ${SRC_KEY} after 150s"; exit 1; }
              # Source MODEL + ENDPOINT from the SAME Lightspeed secret when the platform set them; fall
              # back to the chart values when absent. WHY prefer the secret: the per-user MaaS key is
              # model-scoped and the two clusters' keys are scoped to OPPOSITE models (llama-scout-17b vs
              # qwen3-14b — inverted-scope incident 2026-07-19), so any hardcoded chart default breaks one
              # cluster. Model + endpoint are NOT secret; the apitoken is never decoded (base64 passthrough).
              SRC_MODEL="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.model}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              SRC_ENDPOINT="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.endpoint}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              MODEL="${SRC_MODEL:-$FALLBACK_MODEL}"
              ENDPOINT="${SRC_ENDPOINT:-$FALLBACK_ENDPOINT}"
              if [[ -n "$SRC_MODEL" ]]; then
                echo "▶ model/endpoint sourced from ${SRC_NS}/${SRC_SECRET}: model=${MODEL}"
              else
                echo "▶ source secret carries no model key — using chart fallback: model=${MODEL}"
              fi
              # Converge the attendee-readable maas-config ConfigMap to the effective values (Helm rendered
              # it with the fallback). selfHeal is off for entry Apps → Argo keeps this edit; ws reset re-converges.
              oc patch configmap maas-config -n "${DST_NS}" --type merge \
                -p "{\"data\":{\"model\":\"${MODEL}\",\"endpoint\":\"${ENDPOINT}\"}}"
              echo "▶ materializing maas-credentials in ${DST_NS} (token passed through as base64, never logged)…"
              # Build the target Secret with the base64 value inline and apply — idempotent.
              oc apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: maas-credentials
                namespace: ${DST_NS}
                labels:
                  workshop.redhat.com/module: jobs-batch-kueue
                  workshop.redhat.com/user: {{ .Values.user }}
              type: Opaque
              data:
                GENAI_API_KEY: ${TOKEN_B64}
              EOF
              echo "✅ maas-credentials ready in ${DST_NS}"
