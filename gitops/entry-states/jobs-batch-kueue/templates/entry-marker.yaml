# Proves the entry-state engine ran for this user+module; ws verify checks it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-jobs-batch-kueue
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  labels:
    workshop.redhat.com/module: jobs-batch-kueue
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: jobs-batch-kueue
  materializedFor: {{ .Values.user | quote }}
  # The batch world lives here, not in {user}-dev — this module's namespace is {user}-batch.
  namespace: {{ include "jobs-batch-kueue.namespace" . }}
  localQueue: user-queue
  clusterQueue: {{ include "jobs-batch-kueue.clusterQueue" . | quote }}
