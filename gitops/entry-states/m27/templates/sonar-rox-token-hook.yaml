# Per-user DevSecOps wiring: copy the two SHARED CI tokens into {user}-cicd so the capstone's SAST +
# image/config gates work without cross-namespace reads at run time:
#   • sonarqube/sonar-ci-token → {user}-cicd/sonar-auth      (the sonar-scan task reads it)
#   • stackrox/rox-api-token   → {user}-cicd/rox-api-token   (acs-image-check + roxctl-deployment-check)
# Least-privilege cross-namespace RBAC: read ONLY those two named Secrets; write only in {user}-cicd.
# Token values are moved base64-to-base64 (never echoed). Reuses the M08 rox-cosign-hook pattern.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: m27-secrets
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
---
# read the shared SonarQube CI token (sonarqube), scoped to that one Secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: m27-read-sonar-token-{{ .Values.user }}
  namespace: {{ .Values.sonarqubeNamespace }}
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sonar-ci-token"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: m27-read-sonar-token-{{ .Values.user }}
  namespace: {{ .Values.sonarqubeNamespace }}
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: m27-read-sonar-token-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: m27-secrets
    namespace: {{ .Values.user }}-cicd
---
# read the shared RHACS CI token (stackrox), scoped to that one Secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: m27-read-rox-token-{{ .Values.user }}
  namespace: {{ .Values.stackroxNamespace }}
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rox-api-token"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: m27-read-rox-token-{{ .Values.user }}
  namespace: {{ .Values.stackroxNamespace }}
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: m27-read-rox-token-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: m27-secrets
    namespace: {{ .Values.user }}-cicd
---
# write the two copies in the attendee's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: m27-write-secrets
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: m27-write-secrets
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: m27-write-secrets
subjects:
  - kind: ServiceAccount
    name: m27-secrets
    namespace: {{ .Values.user }}-cicd
---
# Argo Sync hook (BeforeHookCreation): re-runs every ws start / ws reset so the copies stay fresh
# (e.g. if the appsec/trust stack rotated a token). Idempotent (apply). Wave 0 — before the pipeline runs.
apiVersion: batch/v1
kind: Job
metadata:
  name: m27-secrets-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: m27-secrets-{{ .Values.user }}
    spec:
      serviceAccountName: m27-secrets
      restartPolicy: Never
      containers:
        - name: copy
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: NS
              value: {{ .Values.user }}-cicd
            - name: SONAR_NS
              value: {{ .Values.sonarqubeNamespace | quote }}
            - name: ROX_NS
              value: {{ .Values.stackroxNamespace | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "▶ waiting for the shared SonarQube CI token (${SONAR_NS}/sonar-ci-token)…"
              for i in $(seq 1 60); do
                oc get secret sonar-ci-token -n "$SONAR_NS" >/dev/null 2>&1 && break
                sleep 10
              done
              oc get secret sonar-ci-token -n "$SONAR_NS" >/dev/null 2>&1 \
                || { echo "❌ ${SONAR_NS}/sonar-ci-token missing — is the appsec stack installed?"; exit 1; }
              # Move the token base64-to-base64 (never echoed) into a Secret named sonar-auth.
              B64TOK="$(oc get secret sonar-ci-token -n "$SONAR_NS" -o jsonpath='{.data.sonar-token}')"
              B64URL="$(oc get secret sonar-ci-token -n "$SONAR_NS" -o jsonpath='{.data.sonar-host-url}')"
              cat <<EOF | oc apply -f - >/dev/null
              apiVersion: v1
              kind: Secret
              metadata:
                name: sonar-auth
                namespace: ${NS}
                labels:
                  workshop.redhat.com/module: m27
              type: Opaque
              data:
                sonar-token: ${B64TOK}
                sonar-host-url: ${B64URL}
              EOF
              echo "  ✓ sonar-auth copied into ${NS} (value not shown)"

              echo "▶ waiting for the shared RHACS CI token (${ROX_NS}/rox-api-token)…"
              for i in $(seq 1 60); do
                oc get secret rox-api-token -n "$ROX_NS" >/dev/null 2>&1 && break
                sleep 10
              done
              oc get secret rox-api-token -n "$ROX_NS" >/dev/null 2>&1 \
                || { echo "❌ ${ROX_NS}/rox-api-token missing — is the trust stack installed?"; exit 1; }
              B64RTOK="$(oc get secret rox-api-token -n "$ROX_NS" -o jsonpath='{.data.rox-api-token}')"
              B64REP="$(oc get secret rox-api-token -n "$ROX_NS" -o jsonpath='{.data.rox-central-endpoint}')"
              cat <<EOF | oc apply -f - >/dev/null
              apiVersion: v1
              kind: Secret
              metadata:
                name: rox-api-token
                namespace: ${NS}
                labels:
                  workshop.redhat.com/module: m27
              type: Opaque
              data:
                rox-api-token: ${B64RTOK}
                rox-central-endpoint: ${B64REP}
              EOF
              echo "  ✓ rox-api-token copied into ${NS} (value not shown)"
              echo "✅ M27 per-user DevSecOps wiring ready in ${NS}"
