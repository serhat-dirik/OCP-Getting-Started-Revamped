{{- if .Values.solve }}
# END state for instructor demos (`ws solve m27`): run the DevSecOps capstone on the CLEAN main branch
# so EVERY gate passes (SAST/SCA/image-scan/sign/config-check/DAST) and the scanned+signed image is
# deployed with its edge Route — the module's green outcome really exists. The PostSync hook Job
# launches the PipelineRun and WAITS for it: "demo-ready" must not print while the pipeline still has
# minutes to go (the m07/m08 lesson — a blocking hook keeps the Argo sync OPERATION Running, which ws's
# wait gates on, sized by ws-meta waitSeconds). backoffLimit 0: a retry would launch a SECOND run.
apiVersion: v1
kind: ConfigMap
metadata:
  name: m27-solve-run-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  pipelinerun.yaml: |
    apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: solve-devsecops-
      labels:
        app.kubernetes.io/part-of: parasol-claims
        workshop.redhat.com/module: m27
    spec:
      pipelineRef:
        name: parasol-claims-devsecops
      params:
        # The CLEAN branch — every gate passes, image deployed + Route created (the fixed end state).
        - name: git-revision
          value: main
        # Per-user Sonar project key: Community Build has no branch analysis, so N users sharing one
        # project would overwrite each other's results. Each solve writes its own project.
        - name: sonar-project-key
          value: parasol-claims-{{ .Values.user }}
      taskRunTemplate:
        serviceAccountName: pipeline
      workspaces:
        - name: shared-workspace
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
        - name: zap-work
          emptyDir: {}
      taskRunSpecs:
        - pipelineTaskName: sast-sonar
          computeResources:
            requests:
              memory: 1Gi
            limits:
              memory: 1536Mi
        - pipelineTaskName: unit-test
          computeResources:
            requests:
              memory: 1Gi
            limits:
              memory: 1536Mi
        - pipelineTaskName: build-image
          computeResources:
            requests:
              memory: 1536Mi
            limits:
              memory: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: m27-solve-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m27
    workshop.redhat.com/user: {{ .Values.user | quote }}
  annotations:
    # PostSync: run after the pipeline + the copied tokens + claims-db have synced, so the run finds them.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app: m27-solve-{{ .Values.user }}
    spec:
      # The operator-provisioned pipeline SA (edit) can create PipelineRuns in its own namespace.
      serviceAccountName: pipeline
      restartPolicy: Never
      volumes:
        - name: solve
          configMap:
            name: m27-solve-run-{{ .Values.user }}
      containers:
        - name: solve
          image: registry.redhat.io/openshift4/ose-cli:latest
          volumeMounts:
            - name: solve
              mountPath: /solve
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ launching the DevSecOps capstone on main (solve end-state)…"
              PR="$(oc create -o name -f /solve/pipelinerun.yaml)"
              echo "  ✓ started ${PR#*/} — waiting (SAST + SCA + build + scans + sign + deploy + DAST ≈ 15 min)…"
              for i in $(seq 1 170); do
                s="$(oc get "$PR" -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || true)"
                case "$s" in
                  True)
                    echo "  ✓ pipeline Succeeded — parasol-claims scanned clean, signed, deployed with its Route"
                    exit 0;;
                  False)
                    echo "  ❌ pipeline FAILED — inspect: tkn pipelinerun logs ${PR##*/}"
                    exit 1;;
                esac
                sleep 10
              done
              echo "  ❌ pipeline still not finished after ~28 min — inspect: oc get ${PR}"
              exit 1
{{- end }}
