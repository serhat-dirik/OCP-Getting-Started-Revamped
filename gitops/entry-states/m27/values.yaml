# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally runs the capstone on the CLEAN main branch (every gate passes,
# image deployed + Route created): the demo/instructor END state. See solve-endstate.yaml.
solve: false
# In-cluster Gitea coordinates: the capstone builds this shared repo's clean main by default. (The
# per-user seeded-vulnerable fork + the SAST/SCA/DAST break-fix seeds arrive with the M27 content/app
# pass; the pipeline RUNS today on clean source — every gate passes — which is the entry state.)
giteaNamespace: gitea
upstreamOrg: parasol
# Shared platform namespaces the per-user hook copies the CI tokens FROM (workshop-agnostic contracts):
#   sonarqube/sonar-ci-token  → the SonarQube analysis token (minted by the appsec stack)
#   stackrox/rox-api-token    → the RHACS CI token (minted by the trust stack)
sonarqubeNamespace: sonarqube
stackroxNamespace: stackrox
