# ws reset purges user-created leftovers from these namespaces before re-materializing.
# observability-health-scale's entire world lives in {user}-dev: the instrumented parasol-claims + claims-db + load
# generator + the per-user ServiceMonitor, and (solve/lab) the HPA, PrometheusRule and PDB the
# attendee creates. `oc delete all,pvc` clears the workloads; the engine also purges the
# ServiceMonitor/PrometheusRule/HPA/PDB the lab leaves behind (they are namespaced, not
# platform-owned) so a reset returns {user}-dev to the entry baseline. The workshop-layer
# quota/limitrange/rbac are untouched (Rule 13 — this chart never ships them).
purgeNamespaces:
  - "${USER}-dev"
# observability-health-scale materializes the SAME claims stack into {user}-dev that platform-orientation-storage-stateful own (parasol-claims/claims-db),
# so coexisting entry apps deadlock on SharedResourceWarning (G3-config-multienv). Same-namespace modules are
# MUTUAL conflicts (ADR-0001 amendment, 2026-07-10 policy): ws start/prep/solve evicts the conflicting
# entry app and purges {user}-dev before materializing. platform-orientation-storage-stateful + gitops-fundamentals/gitops-at-scale/developer-hub-golden-paths all live in {user}-dev
# and now list observability-health-scale back (both-directions reciprocity completed 2026-07-12 — before that observability-health-scale listed them
# but not vice-versa, so observability-health-scale→{those} left a dormant entry-observability-health-scale orphan; G4 SEV2). securing-apps-keycloak also reciprocates.
# jobs-batch-kueue ({user}-batch) and pipelines-fundamentals/trusted-supply-chain ({user}-cicd) are disjoint namespaces → they truly coexist untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
