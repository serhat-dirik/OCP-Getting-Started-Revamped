# The INSTRUMENTED claims service (shared image tag 1.1 — the build that carries the /q/metrics
# custom counter claims_created_total, the deliberate N+1 GET /api/claims/{n}/history, and built-in
# OpenTelemetry REST+JDBC auto-instrumentation). Unlike the pre-observability-health-scale tags, OTLP export is switched ON
# here and pointed at the shared collector, so every request emits a web->claims->db-style trace to
# Tempo. Runs the SHARED prebuilt image so observability-health-scale never depends on a per-user build.
---
# why: the running, instrumented claims REST API; %prod datasource is env-driven at Service claims-db.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: observability-health-scale
    workshop.redhat.com/owner: ogsr
spec:
  # Entry = 1 replica. Solve raises the floor to 2 so the PodDisruptionBudget + node-drain demo has
  # quorum and the HPA (minReplicas 2) does not fight a lower Deployment replica count on first sync.
  replicas: {{ if .Values.solve }}2{{ else }}1{{ end }}
  selector:
    matchLabels:
      app: parasol-claims
  template:
    metadata:
      labels:
        app: parasol-claims
        workshop.redhat.com/module: observability-health-scale
    spec:
      containers:
        - name: parasol-claims
          # Shared instrumented image (tag 1.1) built once into parasol-images (commit 2b76a6b):
          # N+1 /history endpoint + claims_created counter + OTLP auto-instrumentation.
          image: image-registry.openshift-image-registry.svc:5000/ogsr-parasol-images/parasol-claims:1.1
          ports:
            - name: http
              containerPort: 8080
          env:
            # Point the %prod datasource at the claims-db Service in this namespace.
            - name: POSTGRESQL_HOST
              value: claims-db
            # Flip the OpenTelemetry SDK ON (the image ships it OFF for module independence) and export
            # to the shared collector — this is the single seam that lights up Observe -> Traces for observability-health-scale.
            - name: QUARKUS_OTEL_SDK_DISABLED
              value: "false"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelEndpoint | quote }}
            # Name the trace source so it reads "parasol-claims" in Tempo/Observe -> Traces.
            - name: OTEL_SERVICE_NAME
              value: parasol-claims
          envFrom:
            # POSTGRESQL_USER / _PASSWORD / _DATABASE — the same Secret the DB was initialized with.
            - secretRef:
                name: claims-db
          # Explicit CPU request is what the solve HPA computes utilization against (autoscaling/v2
          # Utilization = actual / request); without a request the HPA cannot scale on CPU.
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            # failureThreshold x periodSeconds = 3 x 10s = ~30s is the window the failing app keeps
            # serving 5xx (and being scraped) after the DB dies, BEFORE readiness pulls it from the
            # router. The alert beat (Ex3) depends on this window staying materially wider than the
            # ServiceMonitor scrape interval (10s, see servicemonitor.yaml) so rate() reliably sees a
            # RISING 5xx counter. This is the default value, pinned so a future edit can't silently
            # shrink the window and re-introduce the G3 alert-never-fires flake.
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the claims API (port NAME http — the ServiceMonitor scrapes by
# this name, so it must not change).
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: observability-health-scale
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: parasol-claims
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# why: publishes the claims API at parasol-claims-{user}-dev.{clusterDomain} (host auto-generated) so
# the attendee can drive traffic + read /q/metrics from a browser/terminal.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: observability-health-scale
    workshop.redhat.com/owner: ogsr
spec:
  to:
    kind: Service
    name: parasol-claims
  port:
    targetPort: http
