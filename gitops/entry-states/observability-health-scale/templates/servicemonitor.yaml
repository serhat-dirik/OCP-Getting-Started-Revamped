# Per-user ServiceMonitor — tells user-workload monitoring (already cluster-wide via the
# monitoring-uwm component) to scrape parasol-claims /q/metrics. UWM auto-discovers ServiceMonitors
# in user namespaces, so no platform change is needed; this is the ONLY per-user metrics wiring observability-health-scale
# adds. Selects the parasol-claims Service by label and scrapes its named http port (8080) at /q/metrics
# — the endpoint that exposes http_server_requests_seconds* and the custom claims_created_total.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: observability-health-scale
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    matchLabels:
      app: parasol-claims
  endpoints:
    - port: http
      path: /q/metrics
      interval: 30s
