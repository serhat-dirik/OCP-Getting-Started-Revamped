# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally renders the module END state (instructor/demo mode): a CPU
# HorizontalPodAutoscaler on parasol-claims (min 2 so the PDB/drain demo has quorum), an error-rate
# PrometheusRule alert, and a PodDisruptionBudget — the outcomes the attendee builds by hand in the
# scale + resilience beats. Mirrors the storage-stateful solve split.
solve: false
# The shared OTLP collector the observability portfolio stack stands up (Service otel-collector in
# namespace ogsr-observability-workshop; gRPC :4317). The entry state only CONSUMES this endpoint — it never
# installs the pipeline. Verified live 2026-07-11 (see docs/research/m12-build-note.md install deltas).
otelEndpoint: http://otel-collector.ogsr-observability-workshop.svc.cluster.local:4317
