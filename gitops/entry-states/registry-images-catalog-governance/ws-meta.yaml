# ws reset purges user-created leftovers from these namespaces before re-materializing.
# registry-images-catalog-governance's entire world lives in {user}-dev: the seeded parasol-claims ImageStream (+ the attendee's promoted
# tag), the sample private-registry pull Secret, the attendee's scheduled-import ext-ubi ImageStream, the
# namespaced custom catalog Template, and (solve) the pull-secret demo Deployment. `oc delete all` clears
# the ImageStreams + Deployments (imagestreams ARE in the `all` category, verified 2026-07-13); the engine
# also purges namespaced Templates (NOT in `all`, so a leftover would survive reset and red-fail the next
# entry verify — the same class as the PDB/NetworkPolicy purge gaps; purge_ns extended in the same slice).
# The cluster-wide governance surface registry-images-catalog-governance inspects (image.config, samples Config, ImagePruner, IDMS/ITMS,
# OperatorHub sources, ConsoleSamples) is READ-ONLY substrate reached via platform-observer — never
# chart-owned, so reset never touches it (Rule 13). Quotas/limits/RBAC are workshop-layer, untouched.
purgeNamespaces:
  - "${USER}-dev"
# registry-images-catalog-governance materializes into the SAME {user}-dev the dev-namespace modules own (platform-orientation-storage-stateful, gitops-fundamentals-deployment-targets-scheduling), so their
# entry apps would deadlock on SharedResourceWarning if they coexisted (ADR-0001 amendment). Same-namespace
# modules are MUTUAL conflicts: ws start/prep/solve evicts the conflicting entry app and purges {user}-dev
# first. Each module below lists registry-images-catalog-governance back (reciprocity completed in this same slice). jobs-batch-kueue ({user}-batch)
# and pipelines-fundamentals/trusted-supply-chain ({user}-cicd) are disjoint namespaces → they coexist with registry-images-catalog-governance untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# Representative registry-images-catalog-governance muscle the generic battery does NOT cover — attendee-visible
# reads outside {user}-dev, so they live here (smokeCommands) rather than in the namespace-scoped verify
# script (rule 10). ${USER} resolves per-run. Four commands, TWO different RBAC sources — kept distinct
# below because an earlier version of this comment conflated them and mis-attributed #4:
#   #1-3: the cluster governance surface (the image.config singleton, the internal registry's Route, and
#     the image-pruner CronJob) is READABLE via the EXTENDED platform-observer role
#     (workshop-config platform-observer-clusterrole.yaml). #2/#3 are cluster-wide route/cronjob read
#     grants added 2026-07-18 alongside this pair of smoke commands — closing the exact gap that made
#     both Forbidden on a fresh cockpit run (m18's first two commands, the SEV this smoke addition
#     catches next time). Fail-loud if that extension never landed, so the attendee can't see what
#     they're taught to inspect.
#   #4: the shared java-21 builder ImageStream (openshift ns) the referencePolicy-Local read beat
#     inspects is readable via the STOCK, out-of-the-box `shared-resource-viewer` ClusterRole bound to
#     system:authenticated that every OpenShift cluster ships (developer-catalog shared
#     templates/imagestreams in the openshift namespace) — NOT via platform-observer, which grants no
#     image.openshift.io rule at all (checked: platform-observer-clusterrole.yaml has no imagestreams
#     rule). So #4 fails differently from #1-3: Forbidden here means the java-21 ImageStream itself is
#     missing, or something disabled a cluster default we never touch — never "the platform-observer
#     extension didn't land."
smokeCommands:
  - "oc get images.config.openshift.io cluster -o name"
  - "oc get route -n openshift-image-registry"
  - "oc get cronjob image-pruner -n openshift-image-registry"
  - "oc get is java-21 -n openshift -o name"
