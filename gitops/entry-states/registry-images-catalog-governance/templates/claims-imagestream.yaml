# The per-user ImageStream the attendee tags & promotes — registry-images-catalog-governance's core "ImageStreams still matter" object.
# ENTRY (solve=false): only the {{ .Values.seedTag }} tag, a pull-through reference (referencePolicy Local)
# to the shared parasol-images build. The attendee promotes it with
#   oc tag {{ .Values.user }}-dev/parasol-claims:{{ .Values.seedTag }} {{ .Values.user }}-dev/parasol-claims:{{ .Values.promoteTag }}
# ws solve renders the promoted {{ .Values.promoteTag }} tag inline below (the graded end outcome).
# referencePolicy Local = the internal registry serves the bits (pull-through), so the istag resolves for
# every {user}-* SA (image-puller on parasol-images) with NO external pull secret — the registry-images-catalog-governance teaching point.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: registry-images-catalog-governance
    workshop.redhat.com/owner: ogsr
spec:
  # local:false — importing/promoting resolves against the source registry, not this stream's own name.
  lookupPolicy:
    local: false
  tags:
    # why: the seed tag the attendee promotes — imported from the shared parasol-images build via the
    # internal registry Service, cached locally (referencePolicy Local).
    - name: {{ .Values.seedTag | quote }}
      from:
        kind: DockerImage
        name: {{ .Values.sourceImageStream }}:{{ .Values.seedTag }}
      referencePolicy:
        type: Local
    {{- if .Values.solve }}
    # SOLVE — the promoted tag the attendee creates with `oc tag …:{{ .Values.seedTag }} …:{{ .Values.promoteTag }}`;
    # it references the local seed istag (promotion within one stream), so no re-import is needed.
    - name: {{ .Values.promoteTag | quote }}
      from:
        kind: ImageStreamTag
        name: parasol-claims:{{ .Values.seedTag }}
      referencePolicy:
        type: Local
    {{- end }}
