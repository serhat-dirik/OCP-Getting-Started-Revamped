# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-registry-images-catalog-governance
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: registry-images-catalog-governance
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: registry-images-catalog-governance
  materializedFor: {{ .Values.user | quote }}
  # The single namespace this module spans — registry-images-catalog-governance's registry/catalog world lives entirely in {user}-dev.
  devNamespace: {{ .Values.user }}-dev
