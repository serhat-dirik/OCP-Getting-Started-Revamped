{{- if .Values.solve }}
# END state for instructor demos / `ws solve registry-images-catalog-governance` / testing — the objects the attendee produces in the
# three namespaced, non-disruptive beats (the promoted parasol-claims:{{ .Values.promoteTag }} tag lives
# INLINE in claims-imagestream.yaml, a tag on that same stream). Verify asserts OUTCOMES (the ext-ubi
# stream exists with a scheduled tag; a custom Template exists in {user}-dev; the sample pull secret is
# referenced for pull), never the exact mechanism, so any correct attendee solution stays green (rule 14).
# The cluster-wide beats (allowed-registries / IDMS-ITMS mirroring / samples-skip / ConsoleSample) are
# [INSTRUCTOR-DEMO] singletons and are deliberately NOT here (Rule 13).
---
# why: the scheduled-import outcome — an ImageStream that periodically re-imports a PUBLIC external image
# (UBI, no pull secret). Mirrors the attendee's `oc import-image {{ .Values.user }}-dev/{{ .Values.externalImportStream }}
# --from={{ .Values.externalImportRef }} --scheduled --confirm`.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ .Values.externalImportStream }}
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: registry-images-catalog-governance
    workshop.redhat.com/owner: ogsr
spec:
  lookupPolicy:
    local: false
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: {{ .Values.externalImportRef }}
      # scheduled:true is the graded flag — periodic re-import (the "scheduled import" lesson).
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Source
---
# why: the custom catalog Template the attendee adds to their OWN namespace — it appears only in {user}-dev's
# developer catalog (namespaced governance, attendee-safe; contrast the cluster-wide samples operator). A
# plain OpenShift Template: its ${PARAM} tokens are processed by `oc process`, not Helm (no Go actions).
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: parasol-claims-quickstart
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: registry-images-catalog-governance
    workshop.redhat.com/owner: ogsr
  annotations:
    openshift.io/display-name: "Parasol Claims Quickstart"
    openshift.io/provider-display-name: "Parasol Insurance"
    description: >-
      A one-click Parasol claims service (Deployment + Service) for the developer catalog. Added to a single
      namespace by a developer — it appears only in THIS project's catalog, not cluster-wide.
    tags: "parasol,claims,quickstart"
    iconClass: "icon-openshift"
message: >-
  The Parasol claims quickstart "${APP_NAME}" is deploying in this namespace.
parameters:
  - name: APP_NAME
    displayName: Application name
    value: claims-quickstart
    required: true
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ${APP_NAME}
      labels:
        app: ${APP_NAME}
        app.kubernetes.io/part-of: parasol
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ${APP_NAME}
      template:
        metadata:
          labels:
            app: ${APP_NAME}
        spec:
          containers:
            - name: claims
              image: {{ .Values.sourceImageStream }}:{{ .Values.seedTag }}
              ports:
                - containerPort: 8080
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
  - apiVersion: v1
    kind: Service
    metadata:
      name: ${APP_NAME}
      labels:
        app: ${APP_NAME}
    spec:
      selector:
        app: ${APP_NAME}
      ports:
        - name: http
          port: 8080
          targetPort: 8080
---
# why: the deploy-from-private-registry outcome — a workload that PULLS with the sample registry secret
# (pod-level imagePullSecrets is the GitOps-clean form; the attendee may instead `oc secrets link` it to a
# SA — verify accepts either). Runs the internal claims image so the pod is genuinely Ready (the sample
# host does not resolve); the secret reference is the graded artifact.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-registry-demo
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-registry-demo
    workshop.redhat.com/module: registry-images-catalog-governance
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-registry-demo
  template:
    metadata:
      labels:
        app: parasol-registry-demo
        workshop.redhat.com/module: registry-images-catalog-governance
    spec:
      # The graded reference: this pod is configured to authenticate to the private registry with the
      # sample secret. (The image itself is internal + pullable so the Deployment stays Healthy.)
      imagePullSecrets:
        - name: parasol-registry-creds
      containers:
        - name: claims
          image: {{ .Values.sourceImageStream }}:{{ .Values.seedTag }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
{{- end }}
