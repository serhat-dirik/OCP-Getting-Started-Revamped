# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): the promoted
# parasol-claims:{promoteTag} istag, an ext-ubi scheduled-import ImageStream, a namespaced custom catalog
# Template in {user}-dev, and a Deployment wired to pull with the sample registry secret. Entry (false) =
# the pre-lab world: only the seed ImageStream + the sample pull Secret, which the attendee acts on.
solve: false
# The shared prebuilt-image ImageStream the seeded tag references (workshop-config owns ns parasol-images
# and grants every {user}-* SA system:image-puller on it — parasol-images-pull.yaml). Reached by the
# in-cluster registry Service; NOT chart-owned. The content builder may repoint this at any populated tag.
sourceImageStream: image-registry.openshift-image-registry.svc:5000/ogsr-parasol-images/parasol-claims
# The tag seeded into {user}-dev/parasol-claims at entry — the attendee promotes it to promoteTag with
# `oc tag {user}-dev/parasol-claims:{seedTag} {user}-dev/parasol-claims:{promoteTag}`. Live on the build
# cluster parasol-images/parasol-claims carries 1.0 (verified 2026-07-13).
seedTag: "1.0"
# The tag the attendee promotes to (the tag/promote outcome verify grades at end).
promoteTag: prod
# The scheduled-import beat's external source: PUBLIC UBI (no pull secret, egress-reachable on RHDP).
# ws solve renders the ext-ubi ImageStream that imports it on a schedule; the attendee runs the
# equivalent `oc import-image {user}-dev/ext-ubi --from=... --scheduled --confirm`.
externalImportRef: registry.access.redhat.com/ubi9/ubi:latest
externalImportStream: ext-ubi
# SAMPLE private-registry host for the pull-secret beat — a believable but INERT placeholder (example.com).
# The credential is a non-secret teaching sample (like the ephemeral-DB passwords in the other charts), so
# it is NOT a vars.yaml secret (rule 7). A real shared private registry is bootstrap/portfolio substrate,
# never this per-user chart (Rule 13).
sampleRegistryHost: registry.parasol.example.com
