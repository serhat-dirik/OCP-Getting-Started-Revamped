# ws reset purges user-created leftovers from these namespaces before re-materializing.
# app-security-testing lives ENTIRELY in {user}-cicd: the parasol-claims-devsecops capstone Pipeline, an ephemeral
# claims-db, the copied sonar-auth + rox-api-token Secrets, and (in the lab) the PipelineRuns +
# deployed parasol-claims + its Route. `oc delete all,pvc` + the engine's pipelinerun cleanup clear it
# back to the entry state (the platform-owned quota/limitrange/rbac and the pipeline SA are untouched).
purgeNamespaces:
  - "${USER}-cicd"
# app-security-testing shares {user}-cicd with pipelines-fundamentals and trusted-supply-chain (all three materialize a parasol-claims pipeline + claims-db
# there), so the three are MUTUAL conflicts (ADR-0001 amendment 4: same-namespace modules must declare
# each other, both directions). Starting/preparing app-security-testing evicts pipelines-fundamentals/trusted-supply-chain's entry app + purges {user}-cicd,
# and vice versa. the {user}-dev modules and jobs-batch-kueue ({user}-batch) are disjoint → they coexist with app-security-testing.
conflictsWith:
  - pipelines-fundamentals
  - trusted-supply-chain
# The solve hook BLOCKS while the 11-stage capstone runs on clean main (SAST + SCA + build + scans +
# sign + deploy + DAST ≈ 15 min; cold cluster longer), so ws start/solve wait windows must outlive it.
# Engine default is 300s; the solve Job's own activeDeadlineSeconds (1800) is the hard stop.
waitSeconds: 1800
