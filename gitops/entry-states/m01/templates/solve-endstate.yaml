{{- if .Values.solve }}
# END state for instructor demos (`ws solve m01`): the lab completed — parasol-web at 3 replicas
# behind a Route, exactly what an attendee finishes with.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: m01
spec:
  replicas: 3
  selector:
    matchLabels:
      deployment: parasol-web
  template:
    metadata:
      labels:
        deployment: parasol-web
        app: parasol-web
    spec:
      containers:
        - name: parasol-web
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-web:1.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: {path: /q/health/ready, port: 8080}
          livenessProbe:
            httpGet: {path: /q/health/live, port: 8080}
---
apiVersion: v1
kind: Service
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: m01
spec:
  selector:
    deployment: parasol-web
  ports:
    - name: 8080-tcp
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: m01
spec:
  to:
    kind: Service
    name: parasol-web
  port:
    targetPort: 8080-tcp
{{- end }}
