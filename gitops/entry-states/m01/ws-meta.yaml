# ws reset purges user-created leftovers (workloads/services/routes/pvcs) from these
# namespaces before re-materializing — M01's entry state is "an EMPTY dev namespace".
purgeNamespaces:
  - "${USER}-dev"
# Same-namespace modules are CONFLICTS by policy (2026-07-10): purge-based prep/reset wipes
# namespace cohabitants, and with selfHeal off their apps go silently stale (proven live —
# an m01 app reported Synced/Healthy while its workload was gone after an m05 prep).
# m02-m05 all materialize into {user}-dev alongside m01's parasol-web. Only cross-namespace
# modules (m06 in {user}-batch) truly coexist. ws prep/start/solve evicts these.
conflictsWith:
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m11
  - m12
  - m13
  - m14
  - m15
