# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M08 lives ENTIRELY in {user}-cicd: the build→scan→sign pipeline, the copied RHACS token + Chains
# public key, and (in the lab) the attendee's ImagePolicy admission beat + deployed signed image.
# `oc delete all,pvc` + the engine's imagepolicy/pipelinerun cleanup clear it back to the entry state
# (the platform-owned quota/limitrange/rbac and the pipeline SA are untouched). The per-user Gitea
# fork is re-created idempotently by the fork job and is NOT purged (attendees push to it).
purgeNamespaces:
  - "${USER}-cicd"
# M08 shares {user}-cicd with M07 and re-materializes into it, so the two are MUTUAL conflicts
# (ADR-0001 amendment 4: same-namespace modules must declare each other, both directions). Starting
# or preparing M08 evicts M07's entry app + purges {user}-cicd, and vice versa. M01–M05 ({user}-dev)
# and M06 ({user}-batch) are disjoint namespaces → they coexist untouched (M08 deliberately keeps its
# ImagePolicy admission beat in {user}-cicd, NOT {user}-dev, to stay self-contained — see build-note
# deviation).
conflictsWith:
  - m07
  - m27
# The solve hook BLOCKS while the build→scan→sign pipeline runs on the clean branch (build + RHACS
# scan + Chains signing ≈ 10 min; cold cluster longer), so ws start/solve wait windows must outlive
# it. Engine default is 300s; the solve Job's own activeDeadlineSeconds (1500) is the hard stop.
waitSeconds: 1500
