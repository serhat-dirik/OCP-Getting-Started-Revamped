{{- if .Values.solve }}
# END state for instructor demos (`ws solve m08`): run the supply-chain pipeline on the CLEAN main
# branch (base 1.23, no log4j) so the scan gate PASSES and Tekton Chains signs the built image — the
# module's green outcome (a scanned, signed image) really exists. The PostSync hook Job launches the
# PipelineRun and WAITS for it: "demo-ready" must not print while the pipeline still has minutes to go
# (the m07 lesson — blocking hook keeps the Argo sync OPERATION Running, which ws's wait gates on,
# sized by ws-meta waitSeconds). backoffLimit 0: a retry would launch a SECOND PipelineRun — fail loud.
#
# Building main (not seed-vulnerable) is deliberate: solve demonstrates the FIXED pipeline. The lab's
# entry default builds seed-vulnerable → scan fails → attendee fixes → re-runs green; solve short-cuts
# to that green end state for a demo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: m08-solve-run-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m08
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  pipelinerun.yaml: |
    apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: solve-supply-chain-
      labels:
        app.kubernetes.io/part-of: parasol-claims
        workshop.redhat.com/module: m08
    spec:
      pipelineRef:
        name: parasol-claims-supply-chain
      params:
        # The CLEAN branch — scan passes, image is signed (the fixed end state).
        - name: git-revision
          value: main
      taskRunTemplate:
        serviceAccountName: pipeline
      workspaces:
        - name: shared-workspace
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
      taskRunSpecs:
        - pipelineTaskName: sbom-report
          computeResources:
            requests:
              memory: 1Gi
            limits:
              memory: 1536Mi
        - pipelineTaskName: build-image
          computeResources:
            requests:
              memory: 1536Mi
            limits:
              memory: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: m08-solve-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m08
    workshop.redhat.com/user: {{ .Values.user | quote }}
  annotations:
    # PostSync: run after the pipeline + the copied rox-api-token have synced, so the run finds them.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 1500
  template:
    metadata:
      labels:
        app: m08-solve-{{ .Values.user }}
    spec:
      # The operator-provisioned pipeline SA (edit) can create PipelineRuns in its own namespace.
      serviceAccountName: pipeline
      restartPolicy: Never
      volumes:
        - name: solve
          configMap:
            name: m08-solve-run-{{ .Values.user }}
      containers:
        - name: solve
          image: registry.redhat.io/openshift4/ose-cli:latest
          volumeMounts:
            - name: solve
              mountPath: /solve
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ launching the build→scan→sign pipeline on main (solve end-state)…"
              PR="$(oc create -o name -f /solve/pipelinerun.yaml)"
              echo "  ✓ started ${PR#*/} — waiting (build + RHACS scan + Chains signing ≈ 10 min)…"
              for i in $(seq 1 140); do
                s="$(oc get "$PR" -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || true)"
                case "$s" in
                  True)
                    echo "  ✓ pipeline Succeeded — parasol-claims scanned clean and Chains-signed"
                    exit 0;;
                  False)
                    echo "  ❌ pipeline FAILED — inspect: tkn pipelinerun logs ${PR##*/}"
                    exit 1;;
                esac
                sleep 10
              done
              echo "  ❌ pipeline still not finished after ~23 min — inspect: oc get ${PR}"
              exit 1
{{- end }}
