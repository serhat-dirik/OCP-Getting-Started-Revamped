# The synthetic identities the attendee governs. Always rendered (entry AND solve) — they are the
# subjects the RBAC hands-on grants roles to, and the workload identity the SCC beat targets. All live
# in {user}-dev (the team's home namespace); RoleBindings in other team namespaces reference them by
# their {user}-dev namespace. Entry ships them UNGOVERNED (no bindings) — the pre-lab premise.
---
# why: teammate #1 — a developer identity. The lab binds it `edit` in {user}-dev and `view` in
# {user}-prod (different access per environment — the cross-namespace RBAC lesson).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-ci
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: multi-tenancy-workload-security
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: teammate #2 — a CI/automation identity. The lab binds it a custom `deployer` Role (manage
# Deployments, but NO secrets read) — the "least-privilege custom Role" beat.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-ops
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: multi-tenancy-workload-security
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: the workload identity for the root-demanding Deployment, kept SEPARATE from the two governance
# teammates so the `[INSTRUCTOR-DEMO]` scoped-SCC grant (RoleBinding → system:openshift:scc:nonroot-v2)
# can target exactly this SA — least-privilege, not the namespace `default`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: root-demander
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: multi-tenancy-workload-security
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
