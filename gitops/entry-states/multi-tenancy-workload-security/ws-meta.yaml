# ws reset purges user-created leftovers from these namespaces before re-materializing. multi-tenancy-workload-security's whole
# sandbox lives in {user}-dev: the 3 ServiceAccounts (payments-ci/payments-ops/root-demander) and the
# root-demander Deployment are chart-owned (pruned by the Argo finalizer on reset); the solve-only
# view RoleBinding in {user}-prod is likewise chart-owned and pruned by that finalizer. `oc delete
# all,pvc` clears the scaled-up root-demander workload the attendee runs.
#
# KNOWN LIMITATION (reported to PM 2026-07-12): purge_ns clears workloads/secrets/configmaps but NOT
# RoleBindings/Roles. multi-tenancy-workload-security is the first module whose attendees CREATE RBAC as the core exercise, so
# an attendee's own lab-authored RoleBindings/Roles survive `ws reset`. They are inert leftovers (they
# re-bind the same synthetic SAs) and do NOT fail the entry checks; the impersonation-guarded entry
# check "teammate SAs are ungoverned" makes the condition VISIBLE to CI/instructor if it ever matters.
purgeNamespaces:
  - "${USER}-dev"
# multi-tenancy-workload-security materializes into {user}-dev alongside every other dev module (platform-orientation-storage-stateful, gitops-fundamentals-securing-apps-keycloak). It ships no
# claims stack — its resources are uniquely named — but the same-namespace conflict policy still binds:
# purge-based prep/reset wipes namespace cohabitants, and with selfHeal off a cohabitant's app goes
# silently stale (Synced/Healthy while its workload is gone). So multi-tenancy-workload-security and every dev module are MUTUAL
# conflicts (reciprocal entries added to their ws-meta). jobs-batch-kueue ({user}-batch) and pipelines-fundamentals/trusted-supply-chain ({user}-cicd)
# are disjoint → they coexist untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# Representative attendee command the module leans on: minting a bound SA token for a teammate SA
# (the "inspect a bound SA token" workload-identity beat — legacy auto-generated token secrets are OFF
# on 4.21, so `oc create token` is the real path). ${USER} resolves to the target user.
smokeCommands:
  - "oc create token payments-ci -n ${USER}-dev --duration=10m"
