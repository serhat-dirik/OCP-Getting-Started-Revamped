# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M12's entire world lives in {user}-dev: the instrumented parasol-claims + claims-db + load
# generator + the per-user ServiceMonitor, and (solve/lab) the HPA, PrometheusRule and PDB the
# attendee creates. `oc delete all,pvc` clears the workloads; the engine also purges the
# ServiceMonitor/PrometheusRule/HPA/PDB the lab leaves behind (they are namespaced, not
# platform-owned) so a reset returns {user}-dev to the entry baseline. The workshop-layer
# quota/limitrange/rbac are untouched (Rule 13 — this chart never ships them).
purgeNamespaces:
  - "${USER}-dev"
# M12 materializes the SAME claims stack into {user}-dev that m01-m05 own (parasol-claims/claims-db),
# so coexisting entry apps deadlock on SharedResourceWarning (G3-M04). Same-namespace modules are
# MUTUAL conflicts (ADR-0001 amendment, 2026-07-10 policy): ws start/prep/solve evicts the conflicting
# entry app and purges {user}-dev before materializing. m01-m05 + m09/m10/m11 all live in {user}-dev
# and now list m12 back (both-directions reciprocity completed 2026-07-12 — before that m12 listed them
# but not vice-versa, so M12→{those} left a dormant entry-m12 orphan; G4 SEV2). m13 also reciprocates.
# m06 ({user}-batch) and m07/m08 ({user}-cicd) are disjoint namespaces → they truly coexist untouched.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m11
  - m13
  - m14
  - m15
  - m16
  - m17
  - m19
  - m20
  - m24
  - m25
