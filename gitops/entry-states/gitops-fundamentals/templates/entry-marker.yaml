# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
# Lives in {user}-gitops (gitops-fundamentals's home namespace: where the attendee's Argo CD Applications live).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-gitops-fundamentals
  namespace: {{ .Values.user }}-gitops
  labels:
    workshop.redhat.com/module: gitops-fundamentals
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: gitops-fundamentals
  materializedFor: {{ .Values.user | quote }}
