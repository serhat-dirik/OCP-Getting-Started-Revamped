# Forks {sourceOrg}/{sourceRepo} (the claims-config promotion template) into the attendee's own
# Gitea account as {user}/{forkRepo}, then ASSERTS canonical content (base + overlays, overlays
# personalized to {user}-*) so their first Argo CD Application (pointed at overlays/dev) deploys
# into {user}-dev. Independent of any other module: this is gitops-fundamentals's own Job (names suffixed
# -gitops-fundamentals-{user}) using the SAME admin-credential-discovery + Sudo-header technique as config-multienv's fork job,
# so the two never collide even when both forks target the same {user}/claims-config repo
# (compose, don't chain).
#
# Idempotent AND assertive: the fork is created once (skipped if it exists), and on EVERY run the
# lab-touched files are re-asserted to the upstream template content — so a reset/prep is truly
# factory-fresh even after the attendee edited the fork during the lab (G3-gitops-fundamentals SEV2: a stale
# stage overlay at replicas 3 broke Exercise D on re-runs). PUT fires only when a file differs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-fork-gitops-fundamentals-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: gitops-fundamentals
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read the Gitea CR status (admin password) + admin secret + route host to call the API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-fork-gitops-fundamentals-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: gitops-fundamentals
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: ["pfe.rhpds.com"]
    # the rhpds CRD's plural is literally "gitea" (not "giteas") — verified live 2026-07-09
    resources: ["gitea"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-fork-gitops-fundamentals-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: gitops-fundamentals
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-fork-gitops-fundamentals-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: gitea-fork-gitops-fundamentals-{{ .Values.user }}
    namespace: {{ .Values.giteaNamespace }}
---
# Argo Sync hook: re-runs on every entry-state sync (ws start / reset). BeforeHookCreation
# clears the prior Job so a re-sync always re-fires. Every step is idempotent, so re-runs are
# safe. Wave 1 = after the RBAC above.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-fork-gitops-fundamentals-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: gitops-fundamentals
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: gitea-fork-gitops-fundamentals-{{ .Values.user }}
    spec:
      serviceAccountName: gitea-fork-gitops-fundamentals-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: fork
          # ose-cli ships oc + curl + python3 on every connected cluster; no custom image.
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITEA_NS
              value: {{ .Values.giteaNamespace | quote }}
            - name: SOURCE_ORG
              value: {{ .Values.sourceOrg | quote }}
            - name: SOURCE_REPO
              value: {{ .Values.sourceRepo | quote }}
            - name: FORK_USER
              value: {{ .Values.user | quote }}
            - name: FORK_REPO
              value: {{ .Values.forkRepo | quote }}
            - name: STUDENT_WEBHOOK
              value: "https://student-gitops-server-student-gitops.{{ .Values.clusterDomain }}/api/webhook"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              NS="${GITEA_NS}"

              echo "▶ waiting for the Gitea route…"
              for i in $(seq 1 60); do
                HOST="$(oc get route gitea -n "$NS" -o jsonpath='{.spec.host}' 2>/dev/null || true)"
                [[ -n "$HOST" ]] && break
                sleep 5
              done
              [[ -n "${HOST:-}" ]] || { echo "❌ gitea route not found after 5m"; exit 1; }
              GITEA_URL="https://${HOST}"

              echo "▶ discovering admin credentials (CR status is authoritative; secret is a fallback)…"
              ADMIN_USER="$(oc get gitea gitea -n "$NS" -o jsonpath='{.spec.giteaAdminUser}' 2>/dev/null || echo gitea-admin)"
              ADMIN_PASS=""
              for i in $(seq 1 60); do
                ADMIN_PASS="$(oc get gitea gitea -n "$NS" -o jsonpath='{.status.adminPassword}' 2>/dev/null || true)"
                [[ -z "$ADMIN_PASS" ]] && ADMIN_PASS="$(oc get secret gitea-admin-credentials -n "$NS" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)"
                [[ -n "$ADMIN_PASS" ]] && break
                sleep 5
              done
              [[ -n "$ADMIN_PASS" ]] || { echo "❌ no Gitea admin password after 5m"; exit 1; }
              AUTH="${ADMIN_USER}:${ADMIN_PASS}"

              echo "▶ waiting for the Gitea API…"
              for i in $(seq 1 30); do
                curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null && break
                sleep 5
              done
              curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null || { echo "❌ Gitea API not answering (or admin creds wrong)"; exit 1; }

              # --- fork (idempotent): skip when {user}/{forkRepo} already exists ---------------
              CODE="$(curl -ks -o /dev/null -w '%{http_code}' "${GITEA_URL}/api/v1/repos/${FORK_USER}/${FORK_REPO}")"
              if [[ "$CODE" == "200" ]]; then
                echo "✅ ${FORK_USER}/${FORK_REPO} already exists — skipping fork"
              else
                echo "▶ forking ${SOURCE_ORG}/${SOURCE_REPO} → ${FORK_USER}/${FORK_REPO} (Sudo: ${FORK_USER})…"
                BODY="$(mktemp)"; trap 'rm -f "$BODY"' EXIT
                HTTP="$(curl -ks -o "$BODY" -w '%{http_code}' -u "$AUTH" -X POST \
                  "${GITEA_URL}/api/v1/repos/${SOURCE_ORG}/${SOURCE_REPO}/forks" \
                  -H 'Content-Type: application/json' -H "Sudo: ${FORK_USER}" \
                  -d "{\"name\":\"${FORK_REPO}\"}")"
                case "$HTTP" in
                  200|201|202|409) echo "✅ fork requested for ${FORK_USER} (HTTP ${HTTP})";;
                  *) echo "❌ fork failed (HTTP ${HTTP}): $(cat "$BODY")"; exit 1;;
                esac
                echo "▶ waiting for the fork to materialize…"
                for i in $(seq 1 30); do
                  RC="$(curl -ks -o /dev/null -w '%{http_code}' "${GITEA_URL}/api/v1/repos/${FORK_USER}/${FORK_REPO}")"
                  [[ "$RC" == "200" ]] && break
                  sleep 3
                done
                [[ "$RC" == "200" ]] || { echo "❌ fork did not appear after ~90s"; exit 1; }
              fi

              # --- ASSERT canonical fork content (factory-fresh contract) ----------------------
              # Re-asserts the lab-touched files (base + dev/stage/prod overlays) to the UPSTREAM
              # template content on EVERY run — NOT just when __user__ is still present. This is what
              # `ws prep` advertises ("factory-fresh copy"): after an attendee edits the fork during
              # the lab (e.g. beat D bumps stage replicas 2→3, or the break-fix beat edits base), a
              # reset/prep restores canonical so the exercises' premises hold on re-runs (G3-gitops-fundamentals SEV2).
              # Safe by design: gitops-fundamentals conflicts with platform-orientation-storage-stateful, so any prior work in the SAME fork was
              # already evicted/purged before gitops-fundamentals prepped. Overlays are personalized (__user__ →
              # user); base has no placeholder. PUT only when the fork differs (no spurious commits);
              # the fork itself is never deleted. python3 ships in ose-cli (no jq/git needed).
              echo "▶ asserting canonical fork content for ${FORK_USER}…"
              GITEA_URL="$GITEA_URL" AUTH="$AUTH" FORK_USER="$FORK_USER" FORK_REPO="$FORK_REPO" \
                SOURCE_ORG="$SOURCE_ORG" SOURCE_REPO="$SOURCE_REPO" python3 - <<'PY'
              import base64, json, os, ssl, urllib.request, urllib.error

              base = os.environ["GITEA_URL"].rstrip("/")
              auth = os.environ["AUTH"]
              user = os.environ["FORK_USER"]
              repo = os.environ["FORK_REPO"]
              src = os.environ["SOURCE_ORG"] + "/" + os.environ["SOURCE_REPO"]
              ctx = ssl._create_unverified_context()

              def hdr(sudo):
                  h = {"Authorization": "Basic " + base64.b64encode(auth.encode()).decode(),
                       "Content-Type": "application/json"}
                  if sudo:
                      h["Sudo"] = user  # commit authored as the attendee
                  return h

              def api(method, path, body=None, sudo=False):
                  data = json.dumps(body).encode() if body is not None else None
                  req = urllib.request.Request(base + path, data=data, headers=hdr(sudo), method=method)
                  try:
                      with urllib.request.urlopen(req, context=ctx) as r:
                          return r.status, json.loads(r.read().decode() or "{}")
                  except urllib.error.HTTPError as e:
                      return e.code, {}

              # base files carry no placeholder; overlays get __user__ → user.
              base_files = ["base/kustomization.yaml", "base/claims-configmap.yaml",
                            "base/claims-creds-secret.yaml", "base/claims-db.yaml",
                            "base/claims-app.yaml"]
              overlays = ["overlays/dev/kustomization.yaml", "overlays/stage/kustomization.yaml",
                          "overlays/prod/kustomization.yaml"]
              asserted = 0
              for p in base_files + overlays:
                  st, up = api("GET", f"/api/v1/repos/{src}/contents/{p}?ref=main")
                  if st != 200:
                      print(f"  ! upstream {p} missing (HTTP {st}) — skip")
                      continue
                  canon = base64.b64decode(up["content"]).decode()
                  if p in overlays:
                      canon = canon.replace("__user__", user)
                  st2, cur = api("GET", f"/api/v1/repos/{user}/{repo}/contents/{p}?ref=main")
                  if st2 == 200 and base64.b64decode(cur["content"]).decode() == canon:
                      continue  # already factory-fresh — no commit
                  body = {"message": f"Assert canonical {p} for {user}",
                          "content": base64.b64encode(canon.encode()).decode(), "branch": "main"}
                  if st2 == 200:
                      body["sha"] = cur["sha"]
                      api("PUT", f"/api/v1/repos/{user}/{repo}/contents/{p}", body, sudo=True)
                  else:
                      api("POST", f"/api/v1/repos/{user}/{repo}/contents/{p}", body, sudo=True)
                  asserted += 1
                  print(f"  ✓ asserted canonical {p}")
              print(f"✅ fork factory-fresh ({asserted} file(s) re-asserted)")
              PY

              # --- ensure a per-fork PUSH webhook → student Argo -------------------------------
              # Kills the ~3-min fork-commit detection latency on the student instance (verified ~5s).
              # Per-repo hooks list reliably (idempotent). Argo parses Gitea via its Gogs parser and
              # validates the shared secret the workshop layer mirrored to gitea/argo-webhook-secret
              # (never echoed). Skip if the secret is not present yet (Argo would reject an unsigned hook).
              echo "▶ ensuring push webhook → student Argo…"
              WSECRET="$(oc get secret argo-webhook-secret -n "$NS" -o jsonpath='{.data.secret}' 2>/dev/null | base64 -d || true)"
              if [[ -z "$WSECRET" ]]; then
                echo "  ! argo-webhook-secret not present in ${NS} yet — skipping webhook (will register on a later run)"
              else
                HAVE="$(curl -ks -u "$AUTH" "${GITEA_URL}/api/v1/repos/${FORK_USER}/${FORK_REPO}/hooks" \
                  | STUDENT_WEBHOOK="$STUDENT_WEBHOOK" python3 -c 'import sys,json,os; print("yes" if any(h.get("config",{}).get("url")==os.environ["STUDENT_WEBHOOK"] for h in json.load(sys.stdin)) else "no")' 2>/dev/null || echo no)"
                if [[ "$HAVE" == "yes" ]]; then
                  echo "  ✓ push webhook already present"
                else
                  HC="$(curl -ks -o /dev/null -w '%{http_code}' -u "$AUTH" -X POST \
                    "${GITEA_URL}/api/v1/repos/${FORK_USER}/${FORK_REPO}/hooks" -H 'Content-Type: application/json' \
                    -d "{\"type\":\"gogs\",\"config\":{\"url\":\"${STUDENT_WEBHOOK}\",\"content_type\":\"json\",\"secret\":\"${WSECRET}\"},\"events\":[\"push\"],\"active\":true}")"
                  case "$HC" in
                    201) echo "  ✓ push webhook created → fork commits now sync in seconds";;
                    *) echo "  ! push webhook create returned HTTP ${HC} (non-fatal)";;
                  esac
                fi
              fi
              echo "✅ ${FORK_USER}/${FORK_REPO} ready — create your first Argo CD Application against overlays/dev"
