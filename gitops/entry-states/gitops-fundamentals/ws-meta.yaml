# ws reset purges user-created leftovers from these namespaces before re-materializing.
# gitops-fundamentals's entry state is a per-user {user}/claims-config fork + an EMPTY {user}-gitops/{user}-dev/
# {user}-stage. During the lab the attendee creates their OWN Argo CD Application on the
# student-gitops instance; it deploys claims into {user}-dev, then {user}-stage. Reset must clear
# (a) the claims workloads in dev/stage — purgeNamespaces below — and (b) the attendee's Application
# CRs, which under ADR-0002 amendment 1 (option B) live in the student-gitops CONTROL PLANE, not in
# a purge namespace — purgeApps* below. The fork is NOT purged (entry state), but the fork job
# RE-ASSERTS its canonical content on every start/reset (base + overlays back to factory-fresh, so
# an attendee's lab edits don't survive a reset). {user}-prod is left out: gitops-fundamentals only reaches dev+stage.
# {user}-gitops is purged too (workspace/marker ns) so any kustomize scratch is cleared; purge_ns
# keeps the current module's marker.
purgeNamespaces:
  - "${USER}-gitops"
  - "${USER}-dev"
  - "${USER}-stage"
# Attendee-created Argo apps live outside every purge namespace (student-gitops control plane), so
# the engine deletes them by AppProject: ws reset AND conflict eviction call purge_apps, which
# removes every Application in purgeAppsNamespace whose .spec.project == purgeAppsProject. Attendees
# create apps in a UI and cannot be relied on to label them — project is the reliable selector.
purgeAppsNamespace: student-gitops
purgeAppsProject: proj-${USER}
# gitops-fundamentals's lab deploys claims into {user}-dev/stage, the SAME namespaces platform-orientation-storage-stateful own (parasol-claims/
# claims-db). Starting gitops-fundamentals evicts those entry apps AND their attendee apps (gc calls purge_apps for
# each conflicting module too) and purges dev/stage, so the attendee's first Application lands in a
# clean namespace. platform-orientation-storage-stateful reciprocally list gitops-fundamentals (PM edit 2026-07-10), so switching either direction
# is clean. jobs-batch-kueue ({user}-batch) and pipelines-fundamentals ({user}-cicd) are disjoint and truly coexist.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# The solve hook BLOCKS while two student Applications deploy claims into {user}-dev and {user}-stage
# via the student-gitops instance (~4-6 min cold: image pull + claims-db + app startup, both envs).
# ws start/solve wait windows must outlive it; the solve Job's activeDeadlineSeconds (900) is the hard stop.
waitSeconds: 900
