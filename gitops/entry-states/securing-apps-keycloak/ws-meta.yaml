# ws reset purges user-created leftovers from these namespaces before re-materializing.
# securing-apps-keycloak's whole world lives in {user}-dev: parasol-web + parasol-claims + claims-db (entry), plus the
# parasol-fraud service the solve/lab adds. `oc delete all,pvc` clears the workloads; secrets/configmaps
# the attendee created are purged too (ws engine). The per-user realm-{user} in ns sso-workshop is
# workshop-layer state (seeded once, import-once) and is deliberately NOT touched by reset — like every
# other per-user platform object it survives (Rule 13; this chart never ships it).
purgeNamespaces:
  - "${USER}-dev"
# securing-apps-keycloak materializes the SAME {user}-dev claims stack (parasol-web/parasol-claims/claims-db) that platform-orientation-storage-stateful
# and gitops-fundamentals-observability-health-scale own, so their entry apps would deadlock on SharedResourceWarning if they coexisted. Same-
# namespace modules are MUTUAL conflicts (ADR-0001 amendment): ws start/prep/solve evicts the conflicting
# entry app and purges {user}-dev first. jobs-batch-kueue ({user}-batch) and pipelines-fundamentals/trusted-supply-chain ({user}-cicd) are disjoint → they
# coexist untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
