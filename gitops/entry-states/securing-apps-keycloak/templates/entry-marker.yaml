# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-securing-apps-keycloak
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: securing-apps-keycloak
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: securing-apps-keycloak
  materializedFor: {{ .Values.user | quote }}
  # The OIDC issuer the solve/lab points the apps at (workshop Keycloak + this user's realm). Recorded
  # here so the verify script and the attendee can see the exact auth-server-url without a cross-ns read.
  authServerUrl: "https://{{ .Values.ssoRoutePrefix }}.{{ .Values.clusterDomain }}/realms/realm-{{ .Values.user }}"
