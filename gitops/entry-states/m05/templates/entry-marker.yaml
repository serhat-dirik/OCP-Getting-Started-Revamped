# Proves the entry-state engine ran for this user+module; ws verify checks it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m05
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m05
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
# The entry DB is EPHEMERAL (emptyDir); the persistence exercises replace it with a PVC, and
# `ws solve m05` renders that persistent end state. Keep exactly two data keys so the marker's
# DATA column reads 2, as the shared prereq partial tells attendees to expect.
data:
  module: m05
  materializedFor: {{ .Values.user | quote }}
