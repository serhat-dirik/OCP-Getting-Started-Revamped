{{- if .Values.solve }}
# END state for instructor demos / `ws solve m16` / testing: the PodDisruptionBudget the attendee adds in
# the availability beat. The placement/strategy/graceful-shutdown hardening lives INLINE in
# parasol-claims.yaml + statement-batch.yaml (those are Deployment-spec fields, not separate objects);
# this file holds the one NET-NEW object. Assert OUTCOMES in verify (a PDB exists; the batch worker runs
# on the pool; claims span >= 2 nodes), never the exact field wording, so any correct solution stays
# green (template rule 14).
---
# why: keep >= 1 claims pod serving during a voluntary disruption (the [INSTRUCTOR-DEMO] node drain). With
# replicas at {{ .Values.claimsReplicas }}, minAvailable 1 lets a drain evict one pod while quorum holds —
# minAvailable == replicas would DEADLOCK the drain (the unhealthyPodEvictionPolicy subtlety taught in
# content).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m16
    workshop.redhat.com/owner: ogsr
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: parasol-claims
{{- end }}
