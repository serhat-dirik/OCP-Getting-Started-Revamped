# The claims REST API — the "api" tier and the star of M16's placement + strategy + graceful-shutdown
# beats. Shared prebuilt image (tag 1.1). ENTRY (solve=false): {{ .Values.claimsReplicas }} replicas with
# NO scheduling shaping — default strategy (RollingUpdate 25%/25%), no affinity/TSC, no preStop/grace, no
# PDB. The attendee ADDS every hardening field in the lab; ws solve renders the END state inline below.
---
# why: the running claims API; the workload the attendee spreads (anti-affinity/TSC), rolls under load
# (tuned RollingUpdate + graceful shutdown), and protects with a PDB (solve-endstate.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m16
spec:
  replicas: {{ .Values.claimsReplicas }}
  {{- if .Values.solve }}
  # SOLVE — zero-downtime rollout: surge one new pod, never drop below desired (maxUnavailable 0). Entry
  # ships no strategy block (Deployment defaults to RollingUpdate 25%/25%), which the lab tunes.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{- end }}
  selector:
    matchLabels:
      app: parasol-claims
  template:
    metadata:
      labels:
        app: parasol-claims
        workshop.redhat.com/module: m16
    spec:
      {{- if .Values.solve }}
      # SOLVE — graceful shutdown, the missing half of zero-downtime: the grace period lets in-flight
      # requests drain after SIGTERM. The Quarkus-side quarkus.shutdown.timeout that finishes the recipe
      # is app-developer work (build note appendix — // TODO(verify-on-cluster) the measured drain).
      terminationGracePeriodSeconds: 45
      # SOLVE — hard spread: no two claims replicas on the same node (the anti-affinity "force apart"
      # beat). Required (not preferred) so the distinct-node outcome is deterministic; M16 assumes a
      # multi-node cluster (>= claimsReplicas schedulable non-batch nodes — true here: 5 available).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: parasol-claims
              topologyKey: kubernetes.io/hostname
      # SOLVE — even topology spread. spreadTopologyKey defaults to kubernetes.io/hostname (always
      # present); flip it to workshop.redhat.com/zone (synthesized at bootstrap) for the "across zones"
      # narrative. ScheduleAnyway keeps it a soft, portfolio-safe layer on top of the hard anti-affinity.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ .Values.spreadTopologyKey }}
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: parasol-claims
      {{- end }}
      containers:
        - name: parasol-claims
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRESQL_HOST
              value: claims-db
          envFrom:
            # POSTGRESQL_USER / _PASSWORD / _DATABASE — the same Secret the DB was initialized with.
            - secretRef:
                name: claims-db
          {{- if .Values.solve }}
          # SOLVE — preStop sleep: hold SIGTERM ~10s so kube-proxy/OVN drop this pod from the Service
          # endpoints BEFORE the JVM starts shutting down (closes the connection-reset window in a roll).
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          {{- end }}
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the claims API — the load generator and parasol-web target this.
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m16
spec:
  selector:
    app: parasol-claims
  ports:
    - name: http
      port: 8080
      targetPort: http
