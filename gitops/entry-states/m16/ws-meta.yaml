# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M16's entire world lives in {user}-dev: the multi-component claims app (parasol-web/parasol-claims/
# claims-db), the statement-batch worker, the load generator, and (solve/lab) the anti-affinity/TSC/
# strategy/preStop the attendee adds to parasol-claims + the toleration/nodeSelector on statement-batch
# + the PodDisruptionBudget. `oc delete all` clears the workloads; the engine also purges the PDB the
# lab leaves behind (namespaced, not platform-owned) so a reset returns {user}-dev to the entry baseline.
# The batch-pool node label/taint and any synthetic zones are CLUSTER-SCOPED bootstrap substrate — never
# chart-owned, so reset never touches them (Rule 13). The workshop-layer quota/limits/rbac are untouched.
purgeNamespaces:
  - "${USER}-dev"
# M16 materializes the SAME {user}-dev claims stack (parasol-web/parasol-claims/claims-db) that m01-m05,
# m09-m13 own and that m14/m15 also share {user}-dev with, so their entry apps would deadlock on
# SharedResourceWarning if they coexisted (ADR-0001 amendment). Same-namespace modules are MUTUAL
# conflicts: ws start/prep/solve evicts the conflicting entry app and purges {user}-dev first. Each of
# the modules below lists m16 back (reciprocity completed in the same slice). m06 ({user}-batch) and
# m07/m08 ({user}-cicd) are disjoint namespaces → they coexist untouched.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m11
  - m12
  - m13
  - m14
  - m15
  - m17
  - m19
  - m20
# Representative M16 muscle the generic battery does NOT cover: (1) the dedicated batch pool is visible
# to the attendee via platform-observer (proves the cluster-scoped bootstrap substrate M16 leans on is
# present — fail-closed if it was never created or a node recycled); (2) the batch worker substrate is a
# real, execable pod. Both run as {user} (nodes read via platform-observer; {user}-dev admin) on
# always-present images, so they stay green regardless of the parasol-images build. ${USER} resolves
# per-run.
smokeCommands:
  - "oc get nodes -l workshop.redhat.com/pool=batch -o name | grep -q ."
  - "oc exec deploy/statement-batch -n ${USER}-dev -- true"
