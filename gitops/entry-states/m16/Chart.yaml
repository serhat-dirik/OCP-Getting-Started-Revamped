name: m16-entry
description: "M16 Deployment Targets & Scheduling — a multi-component claims app in {user}-dev (parasol-web + parasol-claims @ 2 replicas + ephemeral claims-db) with NO scheduling shaping, a statement-batch worker with NO toleration/nodeSelector (the attendee pins it onto the dedicated batch pool), and a dropped-request-tallying load generator against the claims API. The batch pool (a labeled+tainted worker) and any synthetic zones are CLUSTER-SCOPED workshop substrate created ONCE at bootstrap — never by this per-user chart (ADR-0001 Rule 13). ws solve materializes the END state: parasol-claims gains required podAntiAffinity (distinct hostnames) + topologySpreadConstraints + a tuned zero-downtime RollingUpdate + preStop/terminationGracePeriodSeconds; statement-batch gains the toleration + batch-pool nodeSelector; and a PodDisruptionBudget protects the claims API during a node drain."
type: application
version: 0.1.0
