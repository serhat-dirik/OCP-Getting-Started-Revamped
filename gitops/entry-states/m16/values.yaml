# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): parasol-claims hardened
# with required podAntiAffinity (distinct hostnames) + topologySpreadConstraints + a zero-downtime
# RollingUpdate + preStop/terminationGracePeriodSeconds, statement-batch pinned onto the dedicated batch
# pool (toleration + nodeSelector), and a PodDisruptionBudget on the claims API. Entry (false) = the
# pre-lab world: the app runs with default scheduling and the batch worker unpinned, which the attendee
# shapes by hand.
solve: false
# parasol-claims replica count — 2 so the anti-affinity/topology-spread beats have something to spread
# and the PDB (minAvailable 1) has quorum to protect. The lab may scale past this; verify uses `>=`.
claimsReplicas: 2
# Topology key for the solve topologySpreadConstraints. Defaults to kubernetes.io/hostname — the
# ALWAYS-TRUE spread story (every node carries it; needs no node shaping, so the entry state is
# cluster-independent and portfolio-replicable). For the "spread across zones" narrative, flip this to
# workshop.redhat.com/zone AFTER the bootstrap node-shaping step has synthesized those labels (the
# coordinated, workshop-namespaced failure-domain scheme shared with M21 — deliberately NOT the
# well-known topology.kubernetes.io/zone, which controllers would mistake for a real cloud AZ).
spreadTopologyKey: kubernetes.io/hostname
# The dedicated batch pool's node label/taint key+value (coordinated workshop.redhat.com scheme). The
# labeled+tainted worker itself is created ONCE at bootstrap (cluster-scoped — Rule 13 keeps it out of
# this per-user chart); here they parameterize the solve toleration + nodeSelector that pin the batch
# worker onto it. Must match bootstrap/install.sh's node-shaping step.
batchPoolLabelKey: workshop.redhat.com/pool
batchPoolLabelValue: batch
# Always-present internal imagestream (curl + bash, restricted-v2 friendly, no external pull secret) for
# the batch worker and load generator — the schedulable/traffic substrate that runs on ANY cluster,
# independent of the parasol-images build. The content builder may swap these for purpose-built images.
toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
