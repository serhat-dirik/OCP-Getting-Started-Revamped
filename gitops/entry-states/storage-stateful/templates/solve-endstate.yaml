{{- if .Values.solve }}
# END state for instructor demos / `ws solve storage-stateful`: the standalone 2-replica PostgreSQL
# StatefulSet the attendee builds in the stateful-workload exercise, with its headless Service
# and per-pod PVCs (volumeClaimTemplates). This is a SEPARATE storage exercise from the claims
# DB — deliberately PostgreSQL 16 (the claims DB is 15). It teaches StatefulSet mechanics
# (stable identity pg-sts-0/1, per-pod volumes, headless DNS), not database replication:
# the two Pods are independent PostgreSQL instances that happen to share a definition.
---
# why: credentials for the StatefulSet's PostgreSQL instances (SCL env contract).
apiVersion: v1
kind: Secret
metadata:
  name: pg-sts
  namespace: {{ .Values.user }}-dev
  labels:
    app: pg-sts
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
type: Opaque
stringData:
  POSTGRESQL_USER: parasol
  POSTGRESQL_PASSWORD: parasol
  POSTGRESQL_DATABASE: parasoldb
---
# why: a HEADLESS Service (clusterIP: None) gives each StatefulSet Pod stable DNS —
# pg-sts-0.pg-sts.{user}-dev.svc / pg-sts-1.pg-sts.{user}-dev.svc — instead of one load-balanced IP.
apiVersion: v1
kind: Service
metadata:
  name: pg-sts
  namespace: {{ .Values.user }}-dev
  labels:
    app: pg-sts
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
spec:
  clusterIP: None
  selector:
    app: pg-sts
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
---
# why: the stateful workload — 2 Pods with stable identities and their OWN persistent volumes.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pg-sts
  namespace: {{ .Values.user }}-dev
  labels:
    app: pg-sts
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
spec:
  serviceName: pg-sts
  replicas: 2
  selector:
    matchLabels:
      app: pg-sts
  # RollingUpdate is the default; the lab sets rollingUpdate.partition to stage an update.
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: pg-sts
        workshop.redhat.com/module: storage-stateful
    spec:
      containers:
        - name: postgresql
          # PostgreSQL 16 from registry.redhat.io, digest-pinned (resolved on-cluster 2026-07-09).
          # The in-cluster imagestream tops out at 15-el9, so 16 comes from the Red Hat registry.
          image: registry.redhat.io/rhel9/postgresql-16@sha256:1149c78dbc442a419d6d9073dd5b60dd40d5639070b8cd8cd8dfab30ef88a913
          ports:
            - name: postgresql
              containerPort: 5432
          envFrom:
            - secretRef:
                name: pg-sts
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
  # why: each Pod gets its OWN PVC (data-pg-sts-0, data-pg-sts-1) on the default StorageClass.
  # These PVCs SURVIVE StatefulSet deletion — ws reset purges them explicitly (ws-meta.yaml).
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: pg-sts
          workshop.redhat.com/module: storage-stateful
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
{{- end }}
