# PostgreSQL for the claims service. In the ENTRY state its data volume is an emptyDir, so
# deleting the Pod loses everything (the data-loss lesson). `ws solve` swaps that emptyDir for
# a PersistentVolumeClaim so the data survives — exactly the change the attendee makes by hand.
---
# why: the claims datasource credentials, consumed by BOTH the DB (to init) and the app (to connect).
apiVersion: v1
kind: Secret
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
type: Opaque
stringData:
  POSTGRESQL_USER: parasol
  POSTGRESQL_PASSWORD: parasol
  POSTGRESQL_DATABASE: parasol
{{- if .Values.solve }}
---
# why (solve/end state only): the persistent claim for the DB. Default StorageClass (omit
# storageClassName), RWO, 2Gi — this is what `oc set volume ... --add -t pvc` creates by hand.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claims-db-data
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
{{- end }}
---
# why: the PostgreSQL 15 server the claims app reads/writes; env-driven from the Secret above.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  # Recreate: a single writer to one RWO volume — never run two Pods on the same PVC at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claims-db
  template:
    metadata:
      labels:
        app: claims-db
        workshop.redhat.com/module: storage-stateful
    spec:
      containers:
        - name: postgresql
          # Internal imagestream tag (RHEL9 PostgreSQL 15) — already cached, no external pull secret.
          image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: claims-db
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
        {{- if .Values.solve }}
          # Persistent (end state): the same PVC `oc set volume` binds during the lab.
          persistentVolumeClaim:
            claimName: claims-db-data
        {{- else }}
          # Ephemeral on purpose — deleting this Pod loses all data (the pain storage-stateful fixes with a PVC).
          emptyDir: {}
        {{- end }}
---
# why: the stable in-cluster address the app resolves — claims-db.{user}-dev.svc:5432.
apiVersion: v1
kind: Service
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: storage-stateful
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: claims-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
