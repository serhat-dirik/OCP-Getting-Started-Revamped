# ws reset purges user-created leftovers from these namespaces before re-materializing.
# storage-stateful's entire lesson is storage, so the purge MUST remove the PVCs the attendee creates:
#   - claims-db-data          the Deployment PVC added with `oc set volume` (persistence exercise)
#   - data-pg-sts-0 / -pg-sts-1  the StatefulSet volumeClaimTemplate PVCs
# The StatefulSet PVCs are the important case: they SURVIVE `oc delete statefulset` (Kubernetes
# never garbage-collects volumeClaimTemplate PVCs), so a naive delete leaks storage. The ws CLI
# runs `oc delete all,pvc --all` in each namespace below, which removes every PVC here — proving
# on reset that a fresh entry state has zero PVCs in {user}-dev.
purgeNamespaces:
  - "${USER}-dev"
# Same claims-stack workloads as build-deliver/devspaces-inner-loop/config-multienv — coexisting entry apps deadlock (G3-config-multienv);
# ws start/solve evicts these before materializing; platform-orientation is listed too (shares {user}-dev — same-namespace = conflict, 2026-07-10 policy). Only cross-namespace modules (jobs-batch-kueue) truly coexist.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
