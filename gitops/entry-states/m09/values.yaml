# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally creates the attendee's END state: two Argo CD Applications
# (claims-dev-{user}, claims-stage-{user}) on the student-gitops instance that deploy the claims app
# GitOps-managed into {user}-dev and {user}-stage, then BLOCKS until both are Synced/Healthy (the
# demo/instructor end state = "app GitOps-managed in dev+stage", which M10 builds on). Under ADR-0002
# amendment 1 (option B) the Application CRs live in the student-gitops namespace. See solve-endstate.yaml.
solve: false
# The student Argo CD instance's namespace = where attendee Application CRs live (option B). solve
# creates its apps here; ws-meta purgeAppsNamespace matches it so reset reclaims them by project.
studentArgoNamespace: student-gitops
# In-cluster Gitea coordinates: where the promotion template lives and what each user forks.
# The fork job forks {sourceOrg}/{sourceRepo} into {user}/{forkRepo} and personalizes the overlay
# namespaces (__user__ → {user}) — the SAME repo/idiom as M04 (compose, don't chain: M09 owns its
# own fork job; a pre-existing fork is a safe no-op).
giteaNamespace: gitea
sourceOrg: parasol
sourceRepo: claims-config-template
forkRepo: claims-config
