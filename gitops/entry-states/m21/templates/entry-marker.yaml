# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m21
  namespace: {{ include "m21.resilienceNs" . }}
  labels:
    workshop.redhat.com/module: m21
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m21
  materializedFor: {{ .Values.user | quote }}
  # The two namespaces this module spans — the resilient stack + persistent DB, and the remote site.
  resilienceNamespace: {{ include "m21.resilienceNs" . }}
  siteBNamespace: {{ include "m21.siteBNs" . }}
