# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m21
  namespace: {{ include "m21.resilienceNs" . }}
  labels:
    workshop.redhat.com/module: m21
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m21
  materializedFor: {{ .Values.user | quote }}
  # The two namespaces this module spans — the resilient stack + persistent DB, and the remote site.
  resilienceNamespace: {{ include "m21.resilienceNs" . }}
  siteBNamespace: {{ include "m21.siteBNs" . }}
---
# M21 is the first module to own TWO namespaces (resilience + site-b). `ws prep` iterates every namespace
# in ws-meta purgeNamespaces and flags any that has workloads but no ws-entry-<module> marker as "foreign
# leftover" — so site-b (a claims-db Deployment + its seed Job) needs its OWN marker or prep never converges
# (G1 smoke defect, 2026-07-13). The verify script asserts the marker only in the resilience ns (the
# primary); this second marker is what makes site-b legibly m21-owned to the prep heuristic.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m21
  namespace: {{ include "m21.siteBNs" . }}
  labels:
    workshop.redhat.com/module: m21
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m21
  materializedFor: {{ .Values.user | quote }}
  role: site-b
  resilienceNamespace: {{ include "m21.resilienceNs" . }}
  siteBNamespace: {{ include "m21.siteBNs" . }}
