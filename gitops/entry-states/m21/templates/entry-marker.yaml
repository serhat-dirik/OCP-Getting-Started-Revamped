# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it. M21 spans THREE
# namespaces (client + site-a + site-b). `ws prep` iterates every namespace in ws-meta purgeNamespaces and
# flags any that has workloads but no ws-entry-<module> marker as a "foreign leftover" — so EACH of the
# three needs its own marker or prep never converges (the two-namespace lesson from the prior M21 build).
# The verify script asserts the marker only in the client ns (the primary); the site markers make site-a /
# site-b legibly m21-owned to the prep heuristic.
{{- range $ns := list (include "m21.clientNs" .) (include "m21.siteANs" .) (include "m21.siteBNs" .) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m21
  namespace: {{ $ns }}
  labels:
    workshop.redhat.com/module: m21
    workshop.redhat.com/user: {{ $.Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: m21
  materializedFor: {{ $.Values.user | quote }}
  clientNamespace: {{ include "m21.clientNs" $ }}
  siteANamespace: {{ include "m21.siteANs" $ }}
  siteBNamespace: {{ include "m21.siteBNs" $ }}
{{- end }}
