{{- if .Values.solve }}
# ws solve (instructor/demo/testing) END-STATE marker. M21's real end state — a namespace backed up, deleted,
# and restored via the shared Velero (cluster-admin path, since NonAdminBackup is Tech-Preview) — is driven
# with OADP tooling in the content lab, not materialized by this per-user chart (Rule 13 + the backup actor
# is cluster-admin). This attendee-visible marker stands in for "the DR exercise completed"; the verify
# script's END mode asserts it alongside the SURVIVING seeded rows (data intact after restore). Entry omits it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-solve-m21
  namespace: {{ include "m21.resilienceNs" . }}
  labels:
    workshop.redhat.com/module: m21
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m21
  state: solved
  # What the end state represents: backup→delete→restore verified, resilient stack + seeded data intact.
  note: 'DR exercise complete — {{ include "m21.resilienceNs" . }} backed up and restored; seeded rows survived.'
{{- end }}
