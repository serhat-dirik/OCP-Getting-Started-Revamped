{{- if .Values.solve }}
# END state for `ws solve m21` / instructor demos / testing — the cross-site FAILOVER routing the attendee
# builds by hand in the lab, rendered here so `ws verify` (end) and the demo start from a wired world. These
# three CRs live in the CLIENT namespace and program the ingress gateway's Envoy:
#   • ServiceEntry  — one logical host (claims.parasol.internal) whose two DNS endpoints are the site-a and
#     site-b claims Services, each tagged with its SITE locality (east/site-a, east/site-b).
#   • DestinationRule — locality-aware load balancing (prefer the gateway's own locality = site-a) + outlier
#     detection (eject a site whose requests start failing). Locality makes site-a PRIMARY, site-b failover.
#   • VirtualService — attaches to the ingress Gateway and routes the stable endpoint to that host, with
#     retries so the brief transition at failover is invisible to the client (it keeps getting 200s).
# Verify asserts these OUTCOMES exist AND actively proves failover (site-a down -> served by site-b), never
# the exact CR wording, so any correct attendee solution stays green (rule 14).
---
# why: the single logical claims host spanning BOTH sites. resolution DNS -> Envoy resolves each site's
# in-cluster Service; the per-endpoint locality is what the DestinationRule uses to prefer/fail-over.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: claims-global
  namespace: {{ include "m21.clientNs" . }}
  labels:
    workshop.redhat.com/module: m21
spec:
  hosts:
    - claims.parasol.internal
  location: MESH_INTERNAL
  ports:
    - number: 8080
      name: http
      protocol: HTTP
  resolution: DNS
  endpoints:
    - address: claims.{{ include "m21.siteANs" . }}.svc.cluster.local
      locality: east/site-a
      ports:
        http: 8080
    - address: claims.{{ include "m21.siteBNs" . }}.svc.cluster.local
      locality: east/site-b
      ports:
        http: 8080
---
# why: prefer the gateway's own locality (site-a) and fail over to site-b only when site-a's endpoints stop
# answering. localityLbSetting.enabled turns on locality priority; outlierDetection ejects a failing site
# after a single gateway/5xx error so failover is fast.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: claims-global
  namespace: {{ include "m21.clientNs" . }}
  labels:
    workshop.redhat.com/module: m21
spec:
  host: claims.parasol.internal
  trafficPolicy:
    loadBalancer:
      localityLbSetting:
        enabled: true
    outlierDetection:
      consecutive5xxErrors: 1
      consecutiveGatewayErrors: 1
      interval: 5s
      # 30s keeps the failed primary ejected through a typical outage (no mid-outage re-probe blip), yet
      # returns traffic to site-a within ~30s of its recovery.
      baseEjectionTime: 30s
      maxEjectionPercent: 100
---
# why: attach to the ingress Gateway and route the stable endpoint to the claims host. retries make the
# failover transition seamless — a request that hits the just-failed site is retried onto the healthy one,
# so the external client never sees an error, only the SITE marker flipping A -> B.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: claims-edge
  namespace: {{ include "m21.clientNs" . }}
  labels:
    workshop.redhat.com/module: m21
spec:
  hosts:
    - "*"
  gateways:
    - claims-gateway
  http:
    - route:
        - destination:
            host: claims.parasol.internal
            port:
              number: 8080
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "connect-failure,refused-stream,reset,gateway-error,5xx"
---
# ws solve END-STATE marker — attendee-visible proof the failover exercise completed. Verify's END mode
# asserts it alongside the live failover proof. Entry omits it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-solve-m21
  namespace: {{ include "m21.clientNs" . }}
  labels:
    workshop.redhat.com/module: m21
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m21
  state: solved
  note: 'Cross-site failover configured — stable endpoint routes primary->site-a with automatic failover->site-b.'
{{- end }}
