# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): the cross-site FAILOVER
# routing the attendee builds by hand — a ServiceEntry declaring both sites (with per-site localities), a
# DestinationRule (locality-aware load balancing + outlier detection), and a VirtualService on the ingress
# gateway (retries so failover is seamless) — plus a ws-solve-m21 marker. Entry (false) = the pre-lab
# world: three namespaces, the resilient site-a/site-b claims services and the client + gateway up, but NO
# failover routing yet (the stable endpoint returns 404 until the attendee wires it).
solve: false
# Lightweight env-driven "claims" responder: a tiny Node HTTP service that echoes its SITE (from the SITE
# env) in every response, so the client can log which site served each request. The real parasol-claims
# image needs a Postgres and cannot self-identify its origin site (which a failover demo requires), so the
# resilient site services run this responder — named parasol-claims to preserve the narrative. Always-cached
# openshift/nodejs imagestream; restricted-SCC safe; no external pull secret.
claimsResponderImage: image-registry.openshift-image-registry.svc:5000/openshift/nodejs:20-ubi9
# The external-client image (curl) — the always-present RHEL tools imagestream, restricted-SCC safe.
clientImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
# Resilient tier sizing (BOTH sites): PDB minAvailable = replicas-1, HPA minReplicas = replicas, max = 2x.
# >=2 so a single-pod kill never breaches the PDB (the in-site resiliency beat).
siteReplicas: 3
