# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): a ws-solve-m21 marker in
# {user}-resilience standing in for "the DR exercise completed (namespace backed up, deleted, restored)"
# alongside the surviving seeded rows. Entry (false) = the pre-lab world: the resilient stack up, the DB
# seeded, no backup taken yet.
solve: false
# The claims API tier (the resilient Deployment the chaos drill kills and PDB/spread/HPA absorb). Shared
# prebuilt image (tag 1.1), reached via the in-cluster registry Service; the content builder may repoint it.
claimsImage: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
# PostgreSQL for BOTH the {user}-resilience persistent claims-DB and the {user}-site-b remote DB. Internal
# imagestream tag (RHEL9 PostgreSQL 15) — always cached, no external pull secret, restricted-SCC safe.
dbImage: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
# The resilient tier's replica floor. PDB minAvailable=2 and HPA minReplicas=3 are derived from this;
# the chaos drill needs >=2 so a single-pod kill never breaches the PDB.
claimsReplicas: 3
# Deterministic seed row count in parasol_claims_seed — the restore-verification anchor. The verify script
# asserts EXACTLY this many rows survive an OADP restore.
seedRows: 25
# Persistent claims-DB PVC (the backup/restore anchor). Empty storageClassName → the cluster default SC
# (portable). RWO is correct for a single Postgres writer; the default block class (Ceph-RBD here) is RWO.
dbStorageClass: ""
dbAccessMode: ReadWriteOnce
dbSize: 1Gi
