# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): the ksvc morphs to a
# second revision (parasol-claims-v2) with tuned autoscaling + an 80/20 tag-based blue/green traffic
# split across v1/v2, and the eventing taste (in-memory Broker <- PingSource + Trigger -> the ksvc) is
# wired. Entry (false) = the pre-lab world: a single-revision scale-to-zero ksvc the attendee tunes,
# splits and wires by hand.
solve: false
# Shared prebuilt image (populated by the workshop image-load step; reached via the in-cluster registry
# Service). The content builder may repoint. parasol-claims is the "claims-processor" (Quarkus REST +
# PostgreSQL, /api/claims, health probes on /q/health/*). Referenced by TAG — the platform KnativeServing
# skips tag→digest resolution for the internal registry, so the kubelet pulls at pod-start via the
# {user}-dev image-puller grant.
claimsImage: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
# In-cluster load/verification pod image (curl/openssl) — the RHEL tools imagestream is always present,
# needs no external pull secret, and admits under the restricted-v2 SCC with a random UID. Drives the
# scale-from-zero beat pod-to-pod, with NO external LoadBalancer/DNS dependency (bare-metal C1 lacks one).
demoClientImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
