apiVersion: v2
name: m19-entry
description: "M19 Serverless Zero-to-Hero — a scale-to-zero claims-processor Knative Service (parasol-claims, serving.knative.dev/v1, revision parasol-claims-v1) deployed in the workshop-owned {user}-dev namespace against the pre-built parasol-images/parasol-claims:1.1 image on port 8080, backed by an ephemeral claims-db (PostgreSQL) so /q/health/ready + /api/claims work, plus an in-cluster demo-client load pod (curl) for the scale-from-zero beat. Knative AUTO-CREATES the edge OpenShift Route (ns knative-serving-ingress, Kourier); ksvc.status.url is the browser URL — the ksvc is NEVER hand-rolled with oc create route edge. The shared OpenShift Serverless control plane (KnativeServing + KnativeEventing) is installed by the platform-portfolio serverless stack, NOT this chart; {user}-dev + quota/limits/RBAC + the parasol-images image-puller grant are workshop-layer (Rule 13), NOT this chart. ws solve materializes the END state: a second revision (parasol-claims-v2) with a tag-based 80/20 blue/green traffic split + tuned autoscaling (target concurrency), and the eventing taste (in-memory Broker <- PingSource + Trigger -> the parasol-claims ksvc)."
type: application
version: 0.1.0
