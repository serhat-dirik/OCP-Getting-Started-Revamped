# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M04's entry state is a claims app + DB in {user}-dev (composed directly) plus empty
# {user}-stage / {user}-prod. The lab hand-configures dev (ConfigMap, Secret, probes,
# resources, a quota-busting deployment) and PROMOTES the app into stage and prod, so all
# three namespaces accumulate user-created workloads — purge all three back to entry.
# The DBs are ephemeral (emptyDir), so no PVCs survive; `oc delete all,cm,secret` clears the
# ConfigMaps/Secrets the lab creates (the platform-owned quota/limitrange/rbac are untouched).
purgeNamespaces:
  - "${USER}-dev"
  - "${USER}-stage"
  - "${USER}-prod"
# Same claims-stack workloads as m02/m03/m05 — coexisting entry apps deadlock (G3-M04);
# ws start/solve evicts these before materializing; m01 is listed too (shares {user}-dev — same-namespace = conflict, 2026-07-10 policy). Only cross-namespace modules (m06) truly coexist.
conflictsWith:
  - m01
  - m02
  - m03
  - m05
  - m09
  - m10
