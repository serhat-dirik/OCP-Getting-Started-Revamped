{{- if .Values.solve }}
# END STATE (ws solve m04) — what a completed lab looks like, so the demo runs from here and
# `ws verify m04` (end checks) passes. Rendered ONLY when solve=true.
#
#   dev:   the claims app fully externalized — claims-config ConfigMap + claims-creds Secret
#          (the dev app itself, with probes + resources, comes from parasol-claims.yaml's
#          solve branch);
#   stage: the promoted environment — 2 replicas, APP_ENV=stage, log INFO;
#   prod:  the promoted environment — 3 replicas, APP_ENV=prod,  log WARN.
#
# Same image in every namespace; only config and scale differ — the module's whole point.
---
# why: dev's non-secret config, as the lab's ConfigMap exercise produces it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: claims-config
  namespace: {{ .Values.user }}-dev
  labels:
    app.kubernetes.io/part-of: parasol-claims
    workshop.redhat.com/module: m04
    workshop.redhat.com/owner: ogsr
data:
  POSTGRESQL_HOST: claims-db
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_DATABASE: parasol
  APP_ENV: dev
  QUARKUS_LOG_LEVEL: INFO
---
# why: dev's DB credentials, as the lab's Secret exercise produces them.
apiVersion: v1
kind: Secret
metadata:
  name: claims-creds
  namespace: {{ .Values.user }}-dev
  labels:
    app.kubernetes.io/part-of: parasol-claims
    workshop.redhat.com/module: m04
    workshop.redhat.com/owner: ogsr
type: Opaque
stringData:
  POSTGRESQL_USER: parasol
  POSTGRESQL_PASSWORD: parasol
# stage + prod: the promoted environments (full stack per namespace).
{{ include "claims.stack" (dict "ns" (printf "%s-stage" .Values.user) "replicas" 2 "appEnv" "stage" "logLevel" "INFO") }}
{{ include "claims.stack" (dict "ns" (printf "%s-prod" .Values.user) "replicas" 3 "appEnv" "prod" "logLevel" "WARN") }}
{{- end }}
