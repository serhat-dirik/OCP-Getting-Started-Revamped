# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
# Lives in {user}-dev (developer-hub-golden-paths's home namespace: where the golden-path scaffolds a service).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-developer-hub-golden-paths
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: developer-hub-golden-paths
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: developer-hub-golden-paths
  materializedFor: {{ .Values.user | quote }}
