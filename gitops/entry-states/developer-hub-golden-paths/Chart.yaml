apiVersion: v2
name: developer-hub-golden-paths-entry
description: "Developer Hub & Golden Paths — per-user entry state for the SHARED Red Hat Developer Hub portal (platform pp-portal stack). RHDH, the Parasol software catalog, and the golden-path Software Template are shared platform (installed once), so the per-user entry state is light: it materializes the {user}-dev marker and guarantees a CLEAN, idempotent scaffold slate — on every ws start/reset a hook clears the user's previously scaffolded Gitea repos (any repo in the {user} Gitea namespace stamped with the golden-path template's provenance description) so re-running the 'New Parasol microservice' template never 409s. purgeNamespaces + purgeApps clear {user}-dev and the user's proj-{user} Argo apps, where a scaffolded service deploys via the workshop student-gitops instance. Assumes: the pp-portal stack (RHDH + catalog + template) and the workshop-layer student-gitops instance + proj-{user} AppProject + Gitea user seeding."
type: application
version: 0.1.0
