# ws reset purges user-created leftovers from these namespaces before re-materializing.
# developer-hub-golden-paths (Developer Hub & Golden Paths) uses the SHARED RHDH portal; its per-user footprint is (a) a
# {user}-dev marker, (b) whatever the attendee scaffolds during the lab. The golden-path template
# creates a new Gitea repo + an in-cluster BuildConfig the attendee builds and runs (the template ships NO Argo Application — a deploy/ overlay + register-app step is a queued template revision) into
# {user}-dev (the same student-instance model as gitops-fundamentals/gitops-at-scale). Reset must clear (a) the scaffolded
# workloads in {user}-dev — purgeNamespaces — and (b) the attendee's scaffolded Application CRs, which
# live in the student-gitops CONTROL PLANE (ADR-0002 amendment 1), not in a purge namespace —
# purgeApps* below. The scaffolded GITEA repos AND the RHDH catalog Location(s) they registered are
# cleared by the entry chart's own cleanup hook (gitea-scaffold-org.yaml — it creates/empties the
# {user}-svcs org AND deregisters its catalog entries on the shared portal), which runs on every
# start/reset. Neither a Gitea repo nor a catalog Location is a k8s object, so purge_ns can't reach them.
purgeNamespaces:
  - "${USER}-dev"
# Attendee-created Argo Applications (the scaffolded service's deploy app) live in the student-gitops
# control plane and carry .spec.project == proj-{user}; the engine deletes them by project on reset and
# on conflict eviction. This project overlaps gitops-fundamentals/gitops-at-scale's (same student instance) — CORRECT: purge is
# per-project, and developer-hub-golden-paths conflicts with gitops-fundamentals/gitops-at-scale, so switching between them cleans attendee apps either way.
purgeAppsNamespace: student-gitops
purgeAppsProject: proj-${USER}
# developer-hub-golden-paths's scaffolded service deploys into {user}-dev — the SAME namespace platform-orientation-storage-stateful own AND gitops-fundamentals/gitops-at-scale reach.
# Starting developer-hub-golden-paths evicts those entry apps + their attendee apps and purges {user}-dev, so the attendee
# starts from a clean dev namespace to scaffold into. platform-orientation-storage-stateful AND gitops-fundamentals/gitops-at-scale reciprocally list developer-hub-golden-paths
# (PM-sanctioned both-directions edit 2026-07-11), so switching either direction is clean. jobs-batch-kueue
# ({user}-batch) and pipelines-fundamentals ({user}-cicd) are disjoint.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# The entry hook (gitea-scaffold-org) calls the Gitea API + the RHDH catalog API — quick. solve copies the template
# skeleton into {user}/parasol-golden via the API (~1 min). 300s comfortably outlives both; it is the
# hard ceiling for wait_healthy, not an expected duration.
waitSeconds: 300
