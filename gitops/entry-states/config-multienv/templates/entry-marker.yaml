# Proves the entry-state engine ran for this user+module; ws verify checks it.
# config-multienv spans three namespaces: the app lives in {user}-dev, while {user}-stage and
# {user}-prod start EMPTY (they are owned by the workshop layer and already exist) —
# a marker in each lets verify assert both the dev app AND the clean stage/prod state
# the promotion exercise fills in.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-config-multienv
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: config-multienv
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: config-multienv
  materializedFor: {{ .Values.user | quote }}
  role: dev
  # The dev claims app ships WITHOUT probes or explicit resources on purpose — adding
  # them is the lab. The stage/prod markers below prove those namespaces start empty.
  note: "claims app + PostgreSQL run here; stage/prod are empty until you promote"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-config-multienv
  namespace: {{ .Values.user }}-stage
  labels:
    workshop.redhat.com/module: config-multienv
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: config-multienv
  materializedFor: {{ .Values.user | quote }}
  role: stage
  note: "empty until you run: oc apply -k overlays/stage from your claims-config fork"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-config-multienv
  namespace: {{ .Values.user }}-prod
  labels:
    workshop.redhat.com/module: config-multienv
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: config-multienv
  materializedFor: {{ .Values.user | quote }}
  role: prod
  note: "empty until you run: oc apply -k overlays/prod from your claims-config fork"
