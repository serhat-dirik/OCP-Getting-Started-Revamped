# Injected by ws start (helm parameters); defaults here serve local `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → render the END state a completed lab produces (see solve-endstate.yaml):
# the dev claims Deployment carries a ConfigMap + Secret wiring, all three probes, and explicit
# requests/limits; {user}-stage and {user}-prod each run the promoted claims app + DB. This lets
# `ws solve config-multienv` stand up a demo-ready world and lets the verify script assert the end state.
solve: false
# Where the in-cluster Gitea lives and which repo each user forks for the promotion exercise.
# The template repo is published once (parasol/claims-config-template); each user forks it to
# {user}/claims-config and the fork job personalizes the overlay namespaces to {user}-{env}.
giteaNamespace: gitea
sourceOrg: parasol
sourceRepo: claims-config-template
forkRepo: claims-config
