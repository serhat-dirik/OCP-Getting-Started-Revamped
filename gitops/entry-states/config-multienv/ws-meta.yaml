# ws reset purges user-created leftovers from these namespaces before re-materializing.
# config-multienv's entry state is a claims app + DB in {user}-dev (composed directly) plus empty
# {user}-stage / {user}-prod. The lab hand-configures dev (ConfigMap, Secret, probes,
# resources, a quota-busting deployment) and PROMOTES the app into stage and prod, so all
# three namespaces accumulate user-created workloads — purge all three back to entry.
# The DBs are ephemeral (emptyDir), so no PVCs survive; `oc delete all,cm,secret` clears the
# ConfigMaps/Secrets the lab creates (the platform-owned quota/limitrange/rbac are untouched).
purgeNamespaces:
  - "${USER}-dev"
  - "${USER}-stage"
  - "${USER}-prod"
# Same claims-stack workloads as build-deliver/devspaces-inner-loop/storage-stateful — coexisting entry apps deadlock (G3-config-multienv);
# ws start/solve evicts these before materializing; platform-orientation is listed too (shares {user}-dev — same-namespace = conflict, 2026-07-10 policy). Only cross-namespace modules (jobs-batch-kueue) truly coexist.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
