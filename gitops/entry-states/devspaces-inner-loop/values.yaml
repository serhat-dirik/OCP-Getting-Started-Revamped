# Injected by ws start (helm parameters); defaults here serve local `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → devspaces-inner-loop has NO extra END state to render: its end state is a running
# Dev Spaces workspace + a code change (human/IDE artifacts that can't be materialized as
# manifests), so `ws solve devspaces-inner-loop` == `ws start devspaces-inner-loop`. The demo is performed live from here.
# The key must exist so `ws solve` doesn't refuse the module.
solve: false
# Where the in-cluster Gitea lives and which repo each user forks (independent of build-deliver).
giteaNamespace: ogsr-gitea
sourceOrg: parasol
sourceRepo: parasol-claims
