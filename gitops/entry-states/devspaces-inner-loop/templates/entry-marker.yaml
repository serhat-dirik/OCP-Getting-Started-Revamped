# Proves the entry-state engine ran for this user+module; ws verify checks it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-devspaces-inner-loop
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: devspaces-inner-loop
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: devspaces-inner-loop
  materializedFor: {{ .Values.user | quote }}
  # Reminder for graders/humans: the workspace itself lives in {user}-devspaces, not here.
  workspaceNamespace: {{ .Values.user }}-devspaces
