# ws reset purges user-created leftovers from these namespaces before re-materializing.
# devspaces-inner-loop's entry state is "claims app + DB in {user}-dev" (build-deliver end state, composed directly).
# {user}-devspaces holds the Dev Spaces workspace the attendee starts during the lab — purge
# it too so reset removes the workspace pod + PVC (the namespace is auto-provisioned by the
# Dev Spaces dashboard on first login, so it may not exist yet; the purge no-ops if absent).
purgeNamespaces:
  - "${USER}-dev"
  - "${USER}-devspaces"
# Same claims-stack workloads as build-deliver/config-multienv/storage-stateful — coexisting entry apps deadlock (G3-config-multienv);
# ws start/solve evicts these before materializing; platform-orientation is listed too (shares {user}-dev — same-namespace = conflict, 2026-07-10 policy). Only cross-namespace modules (jobs-batch-kueue) truly coexist.
conflictsWith:
  - platform-orientation
  - build-deliver
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
