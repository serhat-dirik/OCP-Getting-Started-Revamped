description: "M18 Service Mesh 3 & Advanced Gateways — the multi-service Parasol app (parasol-web -> parasol-claims -> parasol-fraud -> ephemeral claims-db) deployed UN-MESHED in the workshop-owned {user}-mesh namespace on ClusterIP-only Services, a demo-client UDI pod pinned OUT of the mesh (sidecar.istio.io/inject=false) as the in-cluster verification substrate, and a legacy-partner raw-TCP claim-feed backend for the advanced-ingress exercises. The shared OSSM3 control plane (Istio + IstioCNI + Kiali in istio-system) is installed by the platform-portfolio mesh stack, NOT this chart; {user}-mesh is created + istio-discovery-labelled by the workshop layer (per-user-mesh.yaml), NOT this chart (Rule 13). ws solve materializes the END state: the app tier enrolled (per-pod injection), STRICT mTLS PeerAuthentication, a fraud v2 Deployment + DestinationRule subsets, a 90/10 weighted + header-routed VirtualService with timeout/retry/circuit-breaker/outlierDetection, and an AuthorizationPolicy allowing only claims -> fraud."
