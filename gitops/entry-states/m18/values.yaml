# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): the app tier meshed
# (per-pod sidecar.istio.io/inject=true — materializes the meshed outcome WITHOUT toggling the namespace
# label the attendee uses, so the workshop-owned namespace stays untouched), STRICT mTLS, fraud v2 +
# subsets, weighted/header VirtualService with resilience policy, and the claims→fraud AuthorizationPolicy.
# Entry (false) = the pre-lab world: the un-meshed 3-hop app on ClusterIP-only Services, which the
# attendee enrolls and shapes by hand.
solve: false
# Shared prebuilt images (populated by the workshop image-load step; reached via the in-cluster registry
# Service). The content builder may repoint these. parasol-fraud is the NEW M18 tier (fraud scoring that
# claims calls); v1 at entry, v2 (visible marker) is app-work seeded at solve via fraudImageV2.
webImage: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-web:1.1
claimsImage: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
fraudImage: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-fraud:1.0
# fraud v2 for the weighted-shift beat. No distinguishable v2 image exists yet (app-work gap, m18 build
# note) — solve runs the same image with a version:v2 label + FRAUD_VERSION marker env so the mesh has two
# subsets to route between; swap for a real v2 image when app-developer ships one.
fraudImageV2: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-fraud:1.0
# In-cluster verification pod image (curl/openssl/nc) — the RHEL tools imagestream is always present, needs
# no external pull secret, handles the restricted-v2 random UID. Pinned OUT of the mesh so it stays a clean
# external client for mTLS / reachability / raw-TCP probes even after the attendee enrolls the namespace.
demoClientImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
# The legacy-partner raw-TCP claim-feed backend port (advanced-ingress: the ingress gateway's raw-TCP
# listener forwards here; demo-client validates it in-cluster — no external LB, the D18 pattern).
partnerTcpPort: 9000
