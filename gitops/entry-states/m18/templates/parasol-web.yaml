# The Parasol web frontend — the "web" tier and the front of the chain. Shared prebuilt image (tag 1.1).
# ENTRY: ClusterIP Service only, UN-MESHED — the attendee enrolls the namespace in the first lab beat and
# watches the Kiali graph light up. Wired to the claims API (CLAIMS_SERVICE_URL). SOLVE: per-pod injection.
---
# why: the running frontend; calls parasol-claims, the entry point of the meshed chain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-mesh
  labels:
    app: parasol-web
    workshop.redhat.com/module: m18
    version: v1
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-web
      version: v1
  template:
    metadata:
      labels:
        app: parasol-web
        version: v1
        workshop.redhat.com/module: m18
        {{- if .Values.solve }}
        # solve: mesh this tier per-pod via the injection LABEL (webhook objectSelector matches the label,
        # not an annotation). No namespace-label toggle — the workshop-owned namespace is untouched.
        sidecar.istio.io/inject: "true"
        {{- end }}
    spec:
      containers:
        - name: parasol-web
          image: {{ .Values.webImage }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CLAIMS_SERVICE_URL
              value: http://parasol-claims:8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the frontend; the demo-client curls parasol-web.{user}-mesh.svc:8080
# to drive traffic through the chain (and, in the advanced-ingress beat, via the istio ingress gateway).
apiVersion: v1
kind: Service
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-mesh
  labels:
    app: parasol-web
    workshop.redhat.com/module: m18
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: parasol-web
  ports:
    - name: http
      port: 8080
      targetPort: http
