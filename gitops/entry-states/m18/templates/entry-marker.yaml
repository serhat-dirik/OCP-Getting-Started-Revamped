# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m18
  namespace: {{ .Values.user }}-mesh
  labels:
    workshop.redhat.com/module: m18
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: m18
  materializedFor: {{ .Values.user | quote }}
  # The single namespace this module spans — M18's mesh world lives entirely in {user}-mesh.
  meshNamespace: {{ .Values.user }}-mesh
