# The "legacy partner claim feed" — a raw-TCP backend for M18's advanced-ingress trio (re-implemented from
# serhat-dirik/ossm-gateway-demo's tcp-echo, D18). Story: Parasol's partner bureaus send claim feeds over
# raw TCP (not HTTP), so the lab fronts THIS with the istio ingress gateway's raw-TCP listener (:9000
# forward) and TLS-passthrough listener — the paths Routes and HTTP-only Gateway API can't serve. A tiny
# Python TCP server that ACKs with a recognizable banner so the demo-client can prove the raw-TCP hop
# in-cluster (no external LB). Pinned OUT of the mesh: the raw-TCP passthrough path must stay L4-honest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: partner-tcp-backend
  namespace: {{ .Values.user }}-mesh
  labels:
    app: partner-tcp-backend
    workshop.redhat.com/module: m18
spec:
  replicas: 1
  selector:
    matchLabels:
      app: partner-tcp-backend
  template:
    metadata:
      labels:
        app: partner-tcp-backend
        workshop.redhat.com/module: m18
      annotations:
        # Raw-TCP backend stays out of the mesh so the passthrough/raw-TCP ingress path is genuine L4.
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: tcp-backend
          # RHEL tools imagestream — always present, carries python3; no external pull secret.
          image: {{ .Values.demoClientImage }}
          command:
            - python3
            - -c
            - |
              import socket, os
              port = int(os.environ.get("PARTNER_PORT", "9000"))
              s = socket.socket()
              s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              s.bind(("0.0.0.0", port))
              s.listen(8)
              print("partner TCP claim feed listening on %d" % port, flush=True)
              while True:
                  # Guard every connection: the tcpSocket probe (and any partner) may connect then close
                  # without exchanging bytes, which would BrokenPipe an unguarded sendall and crash the server.
                  try:
                      c, _ = s.accept()
                      d = c.recv(2048)
                      c.sendall(b"PARASOL-PARTNER-FEED-ACK ")
                      if d:
                          c.sendall(d)
                      c.close()
                  except OSError:
                      try:
                          c.close()
                      except OSError:
                          pass
          env:
            - name: PARTNER_PORT
              value: {{ .Values.partnerTcpPort | quote }}
          ports:
            - name: tcp-feed
              containerPort: {{ .Values.partnerTcpPort }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: {{ .Values.partnerTcpPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
# why: stable in-cluster address for the raw-TCP feed — the istio ingress gateway forwards :9000 here, and
# the demo-client connects to partner-tcp-backend.{user}-mesh.svc:9000 to validate the raw-TCP path.
apiVersion: v1
kind: Service
metadata:
  name: partner-tcp-backend
  namespace: {{ .Values.user }}-mesh
  labels:
    app: partner-tcp-backend
    workshop.redhat.com/module: m18
spec:
  selector:
    app: partner-tcp-backend
  ports:
    - name: tcp-feed
      port: {{ .Values.partnerTcpPort }}
      targetPort: tcp-feed
