# The in-cluster verification substrate (pattern adopted from serhat-dirik/ossm-gateway-demo, D18): a
# long-lived pod with curl/openssl so every M18 exercise — Kiali-graph traffic, mTLS checks, weighted-shift
# loops, cascade timing, the raw-TCP / TLS-passthrough advanced-ingress probes — is validated pod-to-pod,
# byte-equivalent to production, with NO dependency on an external LoadBalancer/DNS (which bare-metal C1
# lacks). Deployment (not a bare Pod) so `oc exec deploy/demo-client` is stable across restarts.
#
# Pinned OUT of the mesh (sidecar.istio.io/inject=false) even after the attendee enrolls the namespace: it
# must stay a clean EXTERNAL client so the mesh beats are honest — an un-meshed caller shows plaintext vs
# mTLS, and is the AuthorizationPolicy "denied" source (only claims may call fraud; demo-client must NOT).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-client
  namespace: {{ .Values.user }}-mesh
  labels:
    app: demo-client
    workshop.redhat.com/module: m18
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-client
  template:
    metadata:
      labels:
        app: demo-client
        workshop.redhat.com/module: m18
        # Never meshed (injection LABEL, matched by the webhook objectSelector) — stays a clean external
        # client for mTLS / reachability / raw-TCP / authz-deny probes even after the attendee enrolls the ns.
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: client
          # RHEL tools imagestream — always present, no external pull secret, carries curl + openssl.
          image: {{ .Values.demoClientImage }}
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # restricted-v2 compliant (random non-root UID) so it admits without any SCC exception.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
