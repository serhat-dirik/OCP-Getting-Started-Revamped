# ws reset purges user-created leftovers (workloads/services/routes/pvcs) from these
# namespaces before re-materializing — platform-orientation's entry state is "an EMPTY dev namespace".
purgeNamespaces:
  - "${USER}-dev"
# Same-namespace modules are CONFLICTS by policy (2026-07-10): purge-based prep/reset wipes
# namespace cohabitants, and with selfHeal off their apps go silently stale (proven live —
# an platform-orientation app reported Synced/Healthy while its workload was gone after an storage-stateful prep).
# build-deliver-storage-stateful all materialize into {user}-dev alongside platform-orientation's parasol-web. Only cross-namespace
# modules (jobs-batch-kueue in {user}-batch) truly coexist. ws prep/start/solve evicts these.
conflictsWith:
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
