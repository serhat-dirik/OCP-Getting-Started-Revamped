# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it. sync-wave 2 so
# it lands AFTER the ksvc/db workloads (waves 0-1) — a present marker means the whole entry state synced.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-serverless-zero-to-hero
  namespace: {{ .Values.user }}-dev
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    workshop.redhat.com/module: serverless-zero-to-hero
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: serverless-zero-to-hero
  materializedFor: {{ .Values.user | quote }}
  # The single namespace this module spans — serverless-zero-to-hero's serverless world lives entirely in {user}-dev.
  devNamespace: {{ .Values.user }}-dev
