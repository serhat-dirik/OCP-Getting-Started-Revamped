# ws reset purges user-created leftovers from these namespaces before re-materializing.
# serverless-zero-to-hero's entire world lives in {user}-dev: the scale-to-zero parasol-claims ksvc (+ its Knative
# Configuration/Revision/Route), the ephemeral claims-db, the demo-client load pod, and (solve / lab) the
# Knative objects the attendee creates — a second revision + tag-split, and the eventing taste's Broker,
# Trigger and PingSource. `oc delete all` clears the Deployments/Services; the ws engine's purge_ns ALSO
# deletes the Knative Serving/Eventing CRs (Service/Broker/Trigger/PingSource are NOT in `all`, so a
# leftover would survive reset and red-fail the next entry verify — the mesh/PDB/NetworkPolicy/Template
# purge-gap class; purge_ns extended in the same slice). {user}-dev, its quota, LimitRange, RBAC and the
# parasol-images image-puller grant are WORKSHOP-LAYER-owned (workshop-config) — like every per-user
# namespace it SURVIVES reset with the same UID; the entry Application owns only the in-namespace objects.
purgeNamespaces:
  - "${USER}-dev"
# serverless-zero-to-hero materializes into the SAME {user}-dev the dev-namespace modules own (platform-orientation-storage-stateful, gitops-fundamentals-registry-images-catalog-governance), so their
# entry apps would deadlock on SharedResourceWarning if they coexisted (ADR-0001 amendment). Same-namespace
# modules are MUTUAL conflicts: ws start/prep/solve evicts the conflicting entry app and purges {user}-dev
# first. Each module below lists serverless-zero-to-hero back (reciprocity completed in this same slice). jobs-batch-kueue ({user}-batch),
# pipelines-fundamentals/trusted-supply-chain ({user}-cicd) and service-mesh-advanced-gateways ({user}-mesh) are disjoint namespaces → they coexist with serverless-zero-to-hero untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# The first ksvc cold start pulls parasol-claims (up to ~1-2 min on a cache-miss node), waits on claims-db
# (wave 0), then reconciles the Knative revision — a longer window than the engine's 300s default.
waitSeconds: 420
# Representative serverless-zero-to-hero muscle the generic battery does NOT cover: exec the in-cluster demo-client (the
# load-generator substrate the scale-from-zero beat leans on) and prove it carries curl. Touches only
# {user}-dev (attendee is admin) and no parasol image, so it stays green regardless of the parasol-image
# build state. ${USER} resolves per-run.
smokeCommands:
  - "oc exec deploy/demo-client -n ${USER}-dev -- sh -c 'command -v curl >/dev/null'"
