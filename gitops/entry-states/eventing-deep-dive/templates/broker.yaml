# The default in-memory Broker (MTChannelBasedBroker) — the eventing hub every eventing-deep-dive Trigger attaches to,
# and the sink the seeded PingSource emits into. In-memory needs NO Kafka/Streams subscription (that is
# eventing-deep-dive's optional [ADD-ON]); it is the subscription-free default the core module runs on, so the module
# stays fully on OCP-included Serverless. Present at ENTRY (unlike serverless-zero-to-hero, where the Broker was a solve-only
# taste) because eventing-deep-dive's whole lab is wiring Triggers onto this Broker — the attendee needs the hub from
# the start. sync-wave 2: after the consumer/DLQ ksvcs (wave 1) so a Trigger created against it (wave 3)
# can resolve its subscriber, and after the operator-installed eventing control plane (portfolio).
apiVersion: eventing.knative.dev/v1
kind: Broker
metadata:
  name: default
  namespace: {{ .Values.user }}-dev
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Pin the in-memory broker class explicitly (don't rely on the cluster default-broker-class).
    eventing.knative.dev/broker.class: MTChannelBasedBroker
  labels:
    workshop.redhat.com/module: eventing-deep-dive
    workshop.redhat.com/owner: ogsr
