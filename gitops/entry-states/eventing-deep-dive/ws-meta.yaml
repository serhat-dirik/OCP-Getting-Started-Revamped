# ws reset purges user-created leftovers from these namespaces before re-materializing.
# eventing-deep-dive's entire world lives in {user}-dev (the serverless-zero-to-hero serverless end state it builds on): parasol-claims +
# claims-db + demo-client, the default in-memory Broker, the net-new claims-consumer + claims-dlq
# Knative Services, the seeded PingSource, and (entry) one baseline Trigger + (solve / lab) the
# filtered + dead-letter Triggers the attendee creates. `oc delete all` clears Deployments/Services;
# the ws engine's purge_ns ALSO deletes the Knative Serving/Eventing CRs (Service/Broker/Trigger/
# PingSource are NOT in `all`, so a leftover would survive reset and red-fail the next entry verify —
# the same purge-gap class the engine already handles for serverless-zero-to-hero).
purgeNamespaces:
  - "${USER}-dev"
# eventing-deep-dive materializes into the SAME {user}-dev the dev-namespace modules own (platform-orientation-storage-stateful, gitops-fundamentals-registry-images-catalog-governance) AND the
# serverless-zero-to-hero serverless module — so their entry apps would deadlock on SharedResourceWarning if they coexisted
# (ADR-0001 amendment 2026-07-10: same-namespace modules are MUTUAL conflicts). ws start/prep/solve
# evicts the conflicting entry app and purges {user}-dev first. Each module below lists eventing-deep-dive back
# (reciprocity completed in this same slice). jobs-batch-kueue ({user}-batch), pipelines-fundamentals/trusted-supply-chain ({user}-cicd) and service-mesh-advanced-gateways
# ({user}-mesh) are disjoint namespaces -> they coexist with eventing-deep-dive untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - ai-assisted-development
  - packaging-distributing
# Three scale-to-zero ksvcs (parasol-claims + claims-consumer + claims-dlq) reconcile here; the consumer
# and DLQ sink pull the quay.io showcase image on a cache-miss node (first pull ~1-2 min), then the
# Broker (wave 2) and the PingSource/Trigger wiring (wave 3) reconcile — a longer window than the
# engine's 300s default (a touch beyond serverless-zero-to-hero's 420 for the extra quay pull).
waitSeconds: 480
# Representative eventing-deep-dive muscle the generic battery does NOT cover: exec the in-cluster demo-client (the
# load substrate the eventing beats lean on — curl a ksvc URL / POST a CloudEvent to the Broker) and
# prove it carries curl. Touches only {user}-dev (attendee is admin) and no parasol/showcase image, so
# it stays green regardless of image-pull state. ${USER} resolves per-run.
smokeCommands:
  - "oc exec deploy/demo-client -n ${USER}-dev -- sh -c 'command -v curl >/dev/null'"
