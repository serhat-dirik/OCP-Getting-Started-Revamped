# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally runs the build-test-deploy PipelineRun to completion (a real
# build of the attendee's fork) and leaves the deployed claims app HEALTHY against claims-db —
# the demo/instructor END state. See templates/solve-endstate.yaml.
solve: false
# In-cluster Gitea coordinates: where the source org + the monorepo mirror live. The fork job
# forks {upstreamOrg}/parasol-claims into {user} and seeds .tekton/ from the mirror's pipelines/.
giteaNamespace: gitea
upstreamOrg: parasol
mirrorRepo: ocp-getting-started
