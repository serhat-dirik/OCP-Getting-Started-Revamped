# Ephemeral PostgreSQL for the claims service in {user}-cicd — the datasource the pipeline-built
# app connects to, so the deployed app comes up HEALTHY (the app does drop-and-create at boot and
# crash-loops with no DB). Composed directly (ADR-0001), same shape as the config-multienv/storage-stateful claims-db.
# Ephemeral (emptyDir) — pipelines-fundamentals is about pipelines, not persistence.
---
# why: claims datasource credentials, consumed by BOTH the DB (to init) and the app. HOST is
# included so the pipeline's `oc set env --from=secret/claims-db` gives the app the full contract
# (POSTGRESQL_HOST/DATABASE/USER/PASSWORD; the app defaults PORT to 5432). The DB image ignores HOST.
apiVersion: v1
kind: Secret
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-cicd
  labels:
    app: claims-db
    workshop.redhat.com/module: pipelines-fundamentals
    workshop.redhat.com/owner: ogsr
type: Opaque
stringData:
  POSTGRESQL_HOST: claims-db
  POSTGRESQL_DATABASE: claimsdb
  POSTGRESQL_USER: claims
  POSTGRESQL_PASSWORD: claims-demo-pw
---
# why: the PostgreSQL 15 server the claims app reads/writes; env-driven from the Secret above.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-cicd
  labels:
    app: claims-db
    workshop.redhat.com/module: pipelines-fundamentals
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claims-db
  template:
    metadata:
      labels:
        app: claims-db
        workshop.redhat.com/module: pipelines-fundamentals
    spec:
      containers:
        - name: postgresql
          # Internal imagestream tag (RHEL9 PostgreSQL 15) — already cached, no external pull secret.
          image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: claims-db
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        # Ephemeral on purpose — pipelines-fundamentals does not teach persistence (that is storage-stateful).
        - name: data
          emptyDir: {}
---
# why: the stable in-cluster address the claims app resolves as claims-db.{user}-cicd.svc:5432.
apiVersion: v1
kind: Service
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-cicd
  labels:
    app: claims-db
    workshop.redhat.com/module: pipelines-fundamentals
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: claims-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
