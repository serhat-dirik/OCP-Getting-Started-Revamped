# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M11 (Developer Hub & Golden Paths) uses the SHARED RHDH portal; its per-user footprint is (a) a
# {user}-dev marker, (b) whatever the attendee scaffolds during the lab. The golden-path template
# creates a new Gitea repo + an in-cluster BuildConfig the attendee builds and runs (the template ships NO Argo Application — a deploy/ overlay + register-app step is a queued template revision) into
# {user}-dev (the same student-instance model as M09/M10). Reset must clear (a) the scaffolded
# workloads in {user}-dev — purgeNamespaces — and (b) the attendee's scaffolded Application CRs, which
# live in the student-gitops CONTROL PLANE (ADR-0002 amendment 1), not in a purge namespace —
# purgeApps* below. The scaffolded GITEA repos AND the RHDH catalog Location(s) they registered are
# cleared by the entry chart's own cleanup hook (gitea-scaffold-org.yaml — it creates/empties the
# {user}-svcs org AND deregisters its catalog entries on the shared portal), which runs on every
# start/reset. Neither a Gitea repo nor a catalog Location is a k8s object, so purge_ns can't reach them.
purgeNamespaces:
  - "${USER}-dev"
# Attendee-created Argo Applications (the scaffolded service's deploy app) live in the student-gitops
# control plane and carry .spec.project == proj-{user}; the engine deletes them by project on reset and
# on conflict eviction. This project overlaps M09/M10's (same student instance) — CORRECT: purge is
# per-project, and M11 conflicts with M09/M10, so switching between them cleans attendee apps either way.
purgeAppsNamespace: student-gitops
purgeAppsProject: proj-${USER}
# M11's scaffolded service deploys into {user}-dev — the SAME namespace m01-m05 own AND m09/m10 reach.
# Starting M11 evicts those entry apps + their attendee apps and purges {user}-dev, so the attendee
# starts from a clean dev namespace to scaffold into. m01-m05 AND m09/m10 reciprocally list m11
# (PM-sanctioned both-directions edit 2026-07-11), so switching either direction is clean. m06
# ({user}-batch) and m07 ({user}-cicd) are disjoint.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m12
  - m13
  - m14
  - m15
  - m16
  - m17
  - m19
  - m20
  - m24
  - m25
# The entry hook (gitea-scaffold-org) calls the Gitea API + the RHDH catalog API — quick. solve copies the template
# skeleton into {user}/parasol-golden via the API (~1 min). 300s comfortably outlives both; it is the
# hard ceiling for wait_healthy, not an expected duration.
waitSeconds: 300
