# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → materializes the M11 END state: a representative "already scaffolded" service
# ({user}-svcs/parasol-golden) created from the golden-path skeleton, so instructors get a demo-ready
# post-scaffold world and the end-mode verify has a concrete target. See solve-endstate.yaml. (The
# running deploy of a scaffolded service is an interactive image build in the lab; solve materializes
# the repo outcome, not a built image.)
solve: false
# In-cluster Gitea coordinates. The org + cleanup + solve hooks talk to the Gitea API (admin-credential
# discovery + Sudo, the same idiom as the M04/M09/M10 fork jobs).
giteaNamespace: gitea
# The golden-path scaffolder (publish:gitea) publishes into a Gitea ORGANIZATION, not a personal
# namespace (verified live: the action's checkGiteaOrg rejects a user namespace). Each attendee gets a
# dedicated org {user}-svcs (created + owned by {user}) as their scaffold target — isolated from their
# personal namespace (which holds seeded forks like {user}/claims-config), so cleanup can safely empty
# it. Suffix is a value so the mechanism stays workshop-agnostic.
scaffoldOrgSuffix: svcs
# The name of the demo service `ws solve` scaffolds (end state). The lab lets the attendee choose their
# own service name; solve uses this fixed one.
solveServiceName: parasol-golden
# Provenance marker stamped into each scaffolded repo's description (by the template's publish step and
# by solve) — documents origin; the cleanup empties the whole dedicated org, so this is not the delete
# selector.
scaffoldMarker: "scaffolded from parasol-service-template"
