# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m15
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m15
  materializedFor: {{ .Values.user | quote }}
  # The two namespaces this module spans. Recorded so the attendee and the verify script see the
  # partner namespace (workshop-layer) without a cross-namespace list.
  devNamespace: {{ .Values.user }}-dev
  partnerNamespace: {{ .Values.user }}-partner
