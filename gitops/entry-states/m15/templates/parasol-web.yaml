# The Parasol web frontend — the "web" tier and the front of the north-south story. Shared prebuilt
# image (tag 1.1). ENTRY: ClusterIP Service only (no Route) — the attendee exposes it themselves in
# the exposure lab (edge Route in solve; HTTPRoute on a shared Gateway when an LB provider exists).
---
# why: the running frontend; the "api only from web" NetworkPolicy the attendee writes makes this the
# only pod allowed to reach parasol-claims.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: m15
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-web
  template:
    metadata:
      labels:
        app: parasol-web
        workshop.redhat.com/module: m15
    spec:
      containers:
        - name: parasol-web
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-web:1.1
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the frontend; the attendee's Route/HTTPRoute in the lab targets
# this Service.
apiVersion: v1
kind: Service
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: m15
spec:
  selector:
    app: parasol-web
  ports:
    - name: http
      port: 8080
      targetPort: http
