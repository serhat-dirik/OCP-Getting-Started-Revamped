{{- if .Values.solve }}
# END state for instructor demos / `ws solve m15` / testing: the micro-segmentation + exposure the
# attendee builds by hand. Assert OUTCOMES in verify (a Route answers; the policy blocks an
# unauthorized pod), never the mechanism, so any correct solution stays green (template rule 14).
#
# NetworkPolicies below implement default-deny → precise-allow across the 3 tiers. They are
# correct-by-construction; behavioural proof needs the parasol app images running (parasol-images
# build) and the web→claims REST hop (app-developer work — see the build note spec deltas), so the
# verify end-checks that exercise them are guarded accordingly.
---
# why: the baseline — deny ALL ingress and egress in {user}-dev; every legitimate flow is then
# re-opened explicitly below. This is the "app breaks, now write allows" starting point.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# why: default-deny-egress also blocks DNS — the classic "the fix looks broken for the wrong reason".
# Re-open egress to the cluster DNS service (openshift-dns) for every pod. NOTE the ports are the
# CoreDNS pods' NAMED ports (dns/dns-tcp = containerPort 5353), NOT the Service's port 53: OVN-K
# evaluates a NetworkPolicy egress port against the destination POD's port (post-DNAT), so a rule
# for `port: 53` silently fails to admit DNS (verified live on C1 2026-07-13 — OCP 4.21.22). Named
# ports track the CoreDNS container regardless of number and are what OpenShift's own operators use
# (e.g. openshift-cluster-olm-operator's allow-egress-to-openshift-dns).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: dns
        - protocol: TCP
          port: dns-tcp
---
# why: let the OpenShift router reach the frontend so the edge Route works under default-deny. The
# openshift-ingress namespace carries policy-group.network.openshift.io/ingress (verified on C2) — the
# OVN-Kubernetes-sanctioned selector for admitting ingress-controller traffic through NetworkPolicy.
# [CAPTURE-VERIFY]: end-to-end Route-through-default-deny needs the parasol images running to prove.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-router
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector:
    matchLabels:
      app: parasol-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
---
# why: "api only from web" — parasol-claims accepts ingress on 8080 ONLY from parasol-web pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-claims-from-web
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector:
    matchLabels:
      app: parasol-claims
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: parasol-web
      ports:
        - protocol: TCP
          port: 8080
---
# why: egress counterpart — parasol-web may reach parasol-claims on 8080 (egress is default-denied).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-to-claims-egress
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector:
    matchLabels:
      app: parasol-web
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: parasol-claims
      ports:
        - protocol: TCP
          port: 8080
---
# why: "db only from api" — claims-db accepts ingress on 5432 ONLY from parasol-claims pods. This is
# the one east-west hop that is real today (parasol-claims→claims-db:5432).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-from-claims
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector:
    matchLabels:
      app: claims-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: parasol-claims
      ports:
        - protocol: TCP
          port: 5432
---
# why: egress counterpart — parasol-claims may reach claims-db on 5432 (egress is default-denied).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-claims-to-db-egress
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  podSelector:
    matchLabels:
      app: parasol-claims
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: claims-db
      ports:
        - protocol: TCP
          port: 5432
---
# why: the external workhorse exposure — an edge Route on parasol-web (the deterministic north-south
# path on this bare-metal cluster; `oc create route edge` semantics, never plain oc expose).
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  to:
    kind: Service
    name: parasol-web
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
{{- if .Values.gatewayApi }}
---
# === GATEWAY API END STATE — materialized ONLY when gatewayApi=true (needs a LoadBalancer provider).
# On BareMetal without MetalLB the Gateway stays Programmed=False and gets NO envoy data plane
# (verified live on C2 2026-07-12), so this whole block is off by default. See values.yaml +
# docs/research/m15-build-note.md (Open risks) + PM decision D-M15-5.
# why: a visibly-distinct parasol-claims v2 so the weighted split is observable from the demo-client.
# NOTE: reuses the 1.1 image with a VERSION env as a placeholder — a genuinely distinguishable v2
# image (X-Claims-Version header) is app-developer work (build note appendix).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims-v2
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    version: v2
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-claims
      version: v2
  template:
    metadata:
      labels:
        app: parasol-claims
        version: v2
        workshop.redhat.com/module: m15
    spec:
      containers:
        - name: parasol-claims
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRESQL_HOST
              value: claims-db
            - name: VERSION
              value: v2
          envFrom:
            - secretRef:
                name: claims-db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# why: version-pinned Services so the weighted HTTPRoute can address v1 and v2 as distinct backends.
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims-v1
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: parasol-claims
    version: v1
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims-v2
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: parasol-claims
    version: v2
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# why: a per-user Gateway on the openshift-default GatewayClass (istiod-backed). Per-user keeps the
# entry state self-contained; the shared-multi-tenant variant is a PM/portfolio decision (D-M15-5).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: parasol-gateway
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "parasol-gw-{{ .Values.user }}.{{ .Values.clusterDomain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: parasol-gateway-cert
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
# why: the weighted traffic split — 90% v1 / 10% v2 through the shared Gateway (HTTPRoute weight is
# GA in gateway.networking.k8s.io/v1 on this cluster).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: parasol-claims-split
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  parentRefs:
    - name: parasol-gateway
  rules:
    - backendRefs:
        - name: parasol-claims-v1
          port: 8080
          weight: 90
        - name: parasol-claims-v2
          port: 8080
          weight: 10
---
# why: a cert-manager-issued cert for the Gateway HTTPS listener (self-signed CA ClusterIssuer minted
# by the workshop layer; public ACME is rate-limited for per-user certs — build note D-M15-3).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: parasol-gateway-cert
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m15
    workshop.redhat.com/owner: ogsr
spec:
  secretName: parasol-gateway-cert
  dnsNames:
    - "parasol-gw-{{ .Values.user }}.{{ .Values.clusterDomain }}"
  issuerRef:
    name: {{ .Values.certIssuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
{{- end }}
