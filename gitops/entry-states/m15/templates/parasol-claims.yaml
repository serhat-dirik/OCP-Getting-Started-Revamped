# The claims REST API — the "api" tier. Shared prebuilt image (tag 1.1). ENTRY: reachable only on
# its ClusterIP Service (no Route) — M15's exposure lab is where the attendee chooses and creates
# every north-south path (Route, NodePort, HTTPRoute), so entry ships NONE. The %prod datasource is
# env-driven at Service claims-db (the one real east-west hop today: api→db:5432).
---
# why: the running claims API; talks to the claims-db Service, fronted by parasol-web.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m15
    # Version label — the weighted-HTTPRoute split (solve) routes between v1 and v2 by this label.
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-claims
      version: v1
  template:
    metadata:
      labels:
        app: parasol-claims
        version: v1
        workshop.redhat.com/module: m15
    spec:
      containers:
        - name: parasol-claims
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRESQL_HOST
              value: claims-db
          envFrom:
            # POSTGRESQL_USER / _PASSWORD / _DATABASE — the same Secret the DB was initialized with.
            - secretRef:
                name: claims-db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the claims API — the Service the attendee maps endpoints for,
# breaks a selector on, and fixes in the "trace a packet" opening beat. selector is app-only so a
# weighted split can send it to both versions; the Service fronts v1 and (solve) v2 alike.
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m15
spec:
  selector:
    app: parasol-claims
  ports:
    - name: http
      port: 8080
      targetPort: http
