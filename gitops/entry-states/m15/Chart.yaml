apiVersion: v2
name: m15-entry
description: "M15 Networking for Dev & DevOps — the 3-tier claims app (parasol-web + parasol-claims + ephemeral claims-db) in {user}-dev with ClusterIP-only Services (the attendee builds every exposure themselves), a demo-client UDI pod as the in-cluster verification substrate, and a Layer2 Primary UserDefinedNetwork + workload in the workshop-owned {user}-partner namespace (native L2 isolation, no NetworkPolicy). ws solve materializes the END state: default-deny + precise-allow NetworkPolicies (incl. DNS egress, db-from-claims, claims-from-web), an edge Route on parasol-web, a distinguishable parasol-claims v2, and (gated behind gatewayApi, off by default because it needs a LoadBalancer provider — see values.yaml) a shared Gateway + weighted HTTPRoute + cert-manager Certificate on the listener."
type: application
version: 0.1.2
