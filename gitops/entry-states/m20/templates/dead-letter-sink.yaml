# claims-dlq — the dead-letter sink for the DLQ beat. When a Trigger's subscriber keeps failing (the lab
# kills claims-consumer, or an event it can't handle), Knative retries per the Trigger's delivery spec
# and then routes the exhausted event to this deadLetterSink instead of dropping it. Same scale-to-zero
# showcase image as the consumer, so the attendee can OPEN it and SEE the dead event (envelope + the
# knativeerrordest/knativeerrorcode extension attributes Knative stamps on a dead-lettered event). At
# ENTRY it is deployed but UNWIRED — no Trigger references it yet; the attendee (or ws solve) adds the
# deadLetterSink on the claims-fraud-review Trigger in the retry/DLQ break-fix beat. sync-wave 1.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: claims-dlq
  namespace: {{ .Values.user }}-dev
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: claims-dlq
    workshop.redhat.com/module: m20
spec:
  template:
    metadata:
      name: claims-dlq-v1
      labels:
        app: claims-dlq
        workshop.redhat.com/module: m20
      annotations:
        # min-scale unset (=0): a dead event wakes it from zero (dead-letter delivery is Addressable-resolved
        # and cold-starts the sink), so it costs nothing until the first dead event arrives.
        autoscaling.knative.dev/max-scale: "2"
    spec:
      containers:
        - name: showcase
          image: {{ .Values.consumerImage }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Pin an EXPLICIT readinessProbe — same reason as claims-consumer: an unset probe is Knative-
          # defaulted into the stored revision, and Argo stripping it on re-apply trips the immutable-
          # revision webhook (the M19 6f6ddcf lesson generalized). All fields explicit so nothing defaults.
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
