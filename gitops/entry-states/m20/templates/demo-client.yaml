# The in-cluster load/verification substrate (project demo-client pattern): a long-lived pod with curl so
# the eventing beats drive things pod-to-pod (curl a ksvc URL, POST a CloudEvent to the Broker ingress,
# watch the consumer wake 0->1), with NO dependency on an external LoadBalancer/DNS (which bare-metal C1
# lacks). Deployment (not a bare Pod) so `oc exec deploy/demo-client` is stable across restarts.
# sync-wave 0 (no dependency on the ksvcs or Broker). Same substrate as M19.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-client
  namespace: {{ .Values.user }}-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: demo-client
    workshop.redhat.com/module: m20
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-client
  template:
    metadata:
      labels:
        app: demo-client
        workshop.redhat.com/module: m20
    spec:
      containers:
        - name: client
          # RHEL tools imagestream — always present, no external pull secret, carries curl.
          image: {{ .Values.demoClientImage }}
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # restricted-v2 compliant (random non-root UID) so it admits without any SCC exception.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
