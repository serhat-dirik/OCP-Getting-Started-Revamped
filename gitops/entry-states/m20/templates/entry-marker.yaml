# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it. sync-wave 4 so
# it lands AFTER the ksvc/broker/eventing workloads (waves 0-3) — a present marker means the whole entry
# state synced.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m20
  namespace: {{ .Values.user }}-dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    workshop.redhat.com/module: m20
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m20
  materializedFor: {{ .Values.user | quote }}
  # The single namespace this module spans — M20's eventing world lives entirely in {user}-dev.
  devNamespace: {{ .Values.user }}-dev
