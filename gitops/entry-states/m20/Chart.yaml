apiVersion: v2
name: m20-entry
description: "M20 Eventing Deep-Dive & Serverless Workflows — the M19 serverless END state PLUS the eventing substrate M20 goes deep on, all in the workshop-owned {user}-dev namespace. Materializes: the M19 claims-processor (parasol-claims Knative Service on parasol-images/parasol-claims:1.1 + an ephemeral claims-db so /q/health/ready passes) and demo-client load pod; a default in-memory Broker (MTChannelBasedBroker — subscription-free, no Kafka); a NET-NEW real CloudEvents consumer (claims-consumer, a scale-to-zero Knative Service on the Red Hat quay.io/openshift-knative/showcase image that returns HTTP 200 and DISPLAYS the event — unlike parasol-claims, which 404s CloudEvents, so M19's taste never actually processed one); a dead-letter sink (claims-dlq, same showcase image) for the DLQ beat; and a seeded PingSource + one unfiltered Trigger wiring source->Broker->consumer so an event actually flows and wakes the consumer from zero. The shared OpenShift Serverless control plane (KnativeServing + KnativeEventing 1.17, stable-1.37) is installed by the platform-portfolio serverless stack, NOT this chart; {user}-dev + quota/limits/RBAC + the parasol-images image-puller grant are workshop-layer (Rule 13), NOT this chart. ws solve materializes the module END state — the lab OUTCOMES: an attribute-FILTERED Trigger (spec.filter.attributes) routing to the consumer, and a delivery Trigger with retries + a deadLetterSink to claims-dlq (the retry/DLQ break-fix beat). SonataFlow (Serverless Logic) and the Kafka-backed broker are optional [ADD-ON] deep-dives layered ON this by their own platform-portfolio components, never gated by the core module."
type: application
version: 0.1.0
