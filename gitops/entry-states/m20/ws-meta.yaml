# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M20's entire world lives in {user}-dev (the M19 serverless end state it builds on): parasol-claims +
# claims-db + demo-client, the default in-memory Broker, the net-new claims-consumer + claims-dlq
# Knative Services, the seeded PingSource, and (entry) one baseline Trigger + (solve / lab) the
# filtered + dead-letter Triggers the attendee creates. `oc delete all` clears Deployments/Services;
# the ws engine's purge_ns ALSO deletes the Knative Serving/Eventing CRs (Service/Broker/Trigger/
# PingSource are NOT in `all`, so a leftover would survive reset and red-fail the next entry verify —
# the same purge-gap class the engine already handles for M19).
purgeNamespaces:
  - "${USER}-dev"
# M20 materializes into the SAME {user}-dev the dev-namespace modules own (m01-m05, m09-m17) AND the
# M19 serverless module — so their entry apps would deadlock on SharedResourceWarning if they coexisted
# (ADR-0001 amendment 2026-07-10: same-namespace modules are MUTUAL conflicts). ws start/prep/solve
# evicts the conflicting entry app and purges {user}-dev first. Each module below lists m20 back
# (reciprocity completed in this same slice). m06 ({user}-batch), m07/m08 ({user}-cicd) and m18
# ({user}-mesh) are disjoint namespaces -> they coexist with m20 untouched.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m11
  - m12
  - m13
  - m14
  - m15
  - m16
  - m17
  - m19
# Three scale-to-zero ksvcs (parasol-claims + claims-consumer + claims-dlq) reconcile here; the consumer
# and DLQ sink pull the quay.io showcase image on a cache-miss node (first pull ~1-2 min), then the
# Broker (wave 2) and the PingSource/Trigger wiring (wave 3) reconcile — a longer window than the
# engine's 300s default (a touch beyond M19's 420 for the extra quay pull).
waitSeconds: 480
# Representative M20 muscle the generic battery does NOT cover: exec the in-cluster demo-client (the
# load substrate the eventing beats lean on — curl a ksvc URL / POST a CloudEvent to the Broker) and
# prove it carries curl. Touches only {user}-dev (attendee is admin) and no parasol/showcase image, so
# it stays green regardless of image-pull state. ${USER} resolves per-run.
smokeCommands:
  - "oc exec deploy/demo-client -n ${USER}-dev -- sh -c 'command -v curl >/dev/null'"
