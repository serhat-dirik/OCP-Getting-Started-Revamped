# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true -> renders the module END state (instructor/demo/testing): the eventing lab
# OUTCOMES the attendee builds on the entry substrate — an attribute-FILTERED Trigger
# (spec.filter.attributes) to the consumer, and a delivery Trigger with retries + a deadLetterSink to
# claims-dlq. Entry (false) = the pre-lab world: Broker + seeded PingSource + a real consumer + a DLQ
# sink all deployed, with ONE unfiltered baseline Trigger, and NO filtered/DLQ triggers yet (the
# attendee wires filtering, retries and the dead-letter sink by hand).
solve: false
# Shared prebuilt claims image (workshop image-load step; reached via the in-cluster registry Service),
# same as M19 — parasol-claims is the "claims-processor" (Quarkus REST + PostgreSQL, /api/claims, health
# probes on /q/health/*). Present as the M19 END-state ksvc; it is NOT the CloudEvents sink (it has no
# handler — the reason M19's taste 404'd), so M20 routes events to the net-new showcase consumer instead.
claimsImage: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
# Red Hat OpenShift Serverless eventing SHOWCASE image — the canonical CloudEvents consumer/"event-display"
# from docs.redhat.com (kn service create event-display --image quay.io/openshift-knative/showcase). It
# listens on 8080, returns HTTP 200 to a CloudEvents POST, and DISPLAYS the received event (web UI + logs).
# Used for BOTH the net-new consumer ksvc (claims-consumer) and the dead-letter sink (claims-dlq). A public
# Red Hat quay image — no build step, no external pull secret, pulls on any OCP cluster.
consumerImage: quay.io/openshift-knative/showcase:latest
# In-cluster load/verification pod image (curl/openssl) — the RHEL tools imagestream, always present, no
# external pull secret, admits under restricted-v2 with a random UID. Same demo-client substrate as M19.
demoClientImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
