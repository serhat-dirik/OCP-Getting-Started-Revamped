# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M22's in-namespace state lives entirely in {user}-modernize: the entry marker, the MaaS credentials
# (ConfigMap + Secret), and — at solve / lab — the modernized claims Deployment/Service, plus any Dev
# Spaces DevWorkspace the attendee starts and any MTA analysis artifacts. `oc delete all,pvc` clears
# the Deployments/Services/PVCs; the ws engine's purge_ns ALSO deletes DevWorkspaces (M03+ idiom) and
# any namespaced tackle.konveyor.io CRs (defensive — MTA's per-user portfolio state lives in the shared
# Hub DB, not as k8s CRs, but a future lab beat could drop a namespaced Task/Addon here).
# NOTE: the {user}-modernize NAMESPACE, its quota, LimitRange and RBAC are WORKSHOP-LAYER-owned
# (gitops/workshop-config/templates/per-user-modernize.yaml — the workshop-entries AppProject blacklists
# ResourceQuota/LimitRange, so an entry chart cannot create them; same as {user}-batch/{user}-mesh).
# Like those, the namespace SURVIVES reset with the same UID; the entry Application owns only the
# in-namespace objects.
purgeNamespaces:
  - "${USER}-modernize"
# NO conflictsWith: M22 is the ONLY module that materializes into {user}-modernize (a dedicated
# namespace, like m06's {user}-batch and m18's {user}-mesh). It shares no namespace with any other
# module, so its entry app coexists with every dev-namespace module untouched — no reciprocal edits
# needed (ADR-0001 same-namespace policy). Key omitted deliberately (meta_list returns empty).
# Representative M22 attendee muscle the generic battery does NOT cover: prove the attendee is admin on
# their dedicated {user}-modernize namespace (the workshop-layer per-user-modernize RBAC landed — a new
# namespace/new RBAC, the exact class the generic isolation checks don't reach for this module).
# ${USER} resolves per-run.
smokeCommands:
  - "oc auth can-i create deployment -n ${USER}-modernize"
