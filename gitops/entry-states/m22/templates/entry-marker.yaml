# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it. Also carries
# the attendee-facing coordinates (their legacy repo fork, the shared MTA Hub, the analysis targets)
# so the verify script and the rendered lab can read them without hardcoding.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m22
  namespace: {{ include "m22.namespace" . }}
  labels:
    workshop.redhat.com/module: m22
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m22
  materializedFor: {{ .Values.user | quote }}
  # The single per-user namespace this module spans — M22's modernization world lives in {user}-modernize.
  modernizeNamespace: {{ include "m22.namespace" . }}
  # The legacy migration target the attendee analyzes in MTA (their own Gitea fork).
  legacyRepo: {{ include "m22.legacyRepoUrl" . | quote }}
  # The shared MTA Hub namespace (platform stack) — the console route lives here.
  mtaNamespace: {{ .Values.mtaNamespace | quote }}
  # The MTA analysis targets the lab runs against (assess → analyze arc).
  analysisTargets: "cloud-readiness,openshift,containerization"
