{{- if .Values.solve }}
# ws solve → the module END state: the MODERNIZED Parasol claims service deployed to {user}-modernize.
# This represents the lab outcome "fix the legacy issues → containerize → deploy to OpenShift": the
# legacy Spring-on-Tomcat WAR becomes a modern Quarkus container running on the platform. Entry ships
# NONE of this (the attendee assesses/analyzes/refactors/deploys by hand); solve materializes it for
# instructor/demo/testing. Image-gap-tolerant: asserted PRESENT by verify (the parasol-claims image is
# populated by the workshop image-load step), like the M18/M19 parasol tiers.
---
# why: a distinct workload identity + label so the end-state verify can find the modernized service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims-modernized
  namespace: {{ include "m22.namespace" . }}
  labels:
    app: parasol-claims-modernized
    workshop.redhat.com/module: m22
    modernized: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-claims-modernized
  template:
    metadata:
      labels:
        app: parasol-claims-modernized
        workshop.redhat.com/module: m22
    spec:
      containers:
        - name: parasol-claims
          image: {{ .Values.claimsImage }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
          # Liveness only (no DB in this end state) so the pod reports healthy without external services.
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the modernized claims service.
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims-modernized
  namespace: {{ include "m22.namespace" . }}
  labels:
    app: parasol-claims-modernized
    workshop.redhat.com/module: m22
spec:
  selector:
    app: parasol-claims-modernized
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
