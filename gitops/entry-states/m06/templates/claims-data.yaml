# The shared input dataset for the batch lab: a small, deterministic CSV of claim records the
# monthly-statement / indexed / inference Jobs all read. It is a PVC (not a ConfigMap) on purpose
# — "reuse a seeded PVC as shared input to parallel Jobs" is part of the lesson.
#
# ACCESS MODE = ReadWriteMany. The statement Job (parallelism 3) and inference Job (parallelism 2)
# run pods the scheduler spreads across nodes, and they all mount this volume at once. The default
# block class (RWO) can only attach to one node at a time, so parallel pods on other nodes would
# fail with Multi-Attach — RWX (CephFS here) is required. This is a deliberate deviation from a
# plain "default StorageClass" PVC, and it is itself a teaching point (access modes, callback to
# the storage module).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claims-data
  namespace: {{ include "m06.namespace" . }}
  labels:
    app: claims-data
    workshop.redhat.com/module: m06
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
spec:
  accessModes:
    - {{ .Values.datasetAccessMode }}
  storageClassName: {{ .Values.datasetStorageClass }}
  resources:
    requests:
      storage: {{ .Values.datasetSize }}
---
# Sync-hook Job: seeds claims-data with ~200 deterministic claim rows. Runs on every entry-state
# sync (ws start / reset); BeforeHookCreation clears the prior Job so a re-sync re-fires, and the
# write is idempotent (it rewrites the same file), so re-runs are safe. Wave 1 = after the PVC.
apiVersion: batch/v1
kind: Job
metadata:
  name: claims-data-seed-m06-{{ .Values.user }}
  namespace: {{ include "m06.namespace" . }}
  labels:
    workshop.redhat.com/module: m06
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: claims-data-seed
        workshop.redhat.com/module: m06
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          # ubi9-minimal ships a POSIX shell; the seed is pure shell (no external tools needed).
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 200m, memory: 128Mi}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              OUT=/data/claims.csv
              echo "id,claimant,type,region,amount,status" > "$OUT"
              # Deterministic pseudo-data: fixed lists indexed by the row number, so every seed
              # produces byte-identical content (reproducible shards for the Indexed Job exercise).
              i=1
              while [ "$i" -le 200 ]; do
                names="Rahman Fletcher Das Okonkwo Nguyen Ivanova Silva Haddad Kowalski Reyes"
                types="auto home life travel commercial"
                regions="north south east west central"
                statuses="new triage review approved denied"
                name=$(echo $names   | cut -d' ' -f$(( (i % 10) + 1 )))
                type=$(echo $types    | cut -d' ' -f$(( (i % 5) + 1 )))
                region=$(echo $regions | cut -d' ' -f$(( (i % 5) + 1 )))
                status=$(echo $statuses | cut -d' ' -f$(( (i % 5) + 1 )))
                amount=$(( 500 + (i * 137) % 49500 ))
                printf 'CLM-%04d,%s,%s,%s,%d,%s\n' "$i" "$name" "$type" "$region" "$amount" "$status" >> "$OUT"
                i=$(( i + 1 ))
              done
              echo "seeded $(( $(wc -l < "$OUT") - 1 )) claim rows into $OUT"
              head -3 "$OUT"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: claims-data
