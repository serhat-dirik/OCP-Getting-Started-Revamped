# ws reset purges user-created leftovers from these namespaces before re-materializing.
# agentic-ai's in-namespace state lives entirely in {user}-ai: the entry marker, the MaaS credentials
# (ConfigMap + Secret), the two MCP servers (claims-db, policy-docs) and parasol-agent (Deployments/
# Services/Route). `oc delete all,pvc` clears the Deployments/Services/Routes; the ws engine's purge_ns
# ALSO deletes the hook-created maas-credentials Secret (secret purge) so the next start re-runs the
# copy hook cleanly.
# NOTE: the {user}-ai NAMESPACE, its quota, LimitRange and RBAC are WORKSHOP-LAYER-owned
# (gitops/workshop-config/templates/per-user-ai.yaml — the workshop-entries AppProject blacklists
# ResourceQuota/LimitRange, so an entry chart cannot create them; same as {user}-modernize/{user}-batch).
# Like those, the namespace SURVIVES reset with the same UID; the entry Application owns only the
# in-namespace objects.
purgeNamespaces:
  - "${USER}-ai"
# NO conflictsWith: agentic-ai is the ONLY module that materializes into {user}-ai (a dedicated namespace,
# like jobs-batch-kueue's {user}-batch, service-mesh-advanced-gateways's {user}-mesh, app-modernization's {user}-modernize). It shares no namespace with any
# other module, so its entry app coexists with every dev-namespace module untouched — no reciprocal
# edits needed (ADR-0001 same-namespace policy). Key omitted deliberately (meta_list returns empty).
# Three JVM apps in two sync waves plus the MaaS copy hook (up to ~60s of source-secret retries) take
# longer than a single-app entry state — widen the sync-wait window past the 300s engine default.
waitSeconds: 420
# Representative agentic-ai attendee muscle the generic battery does NOT cover: prove the attendee is admin on
# their dedicated {user}-ai namespace (the workshop-layer per-user-ai RBAC landed — a new namespace/new
# RBAC, the exact class the generic isolation checks don't reach for this module). ${USER} resolves per-run.
smokeCommands:
  - "oc auth can-i create deployment -n ${USER}-ai"
