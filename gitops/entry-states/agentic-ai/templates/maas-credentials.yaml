# MaaS wiring for the parasol-agent in {user}-ai. endpoint + model are NOT secret and live in a
# ConfigMap (attendee-readable, attendee-editable — the lab can point the agent at another model); the
# Bearer key IS a secret and is COPIED at sync time from the platform Lightspeed secret
# (openshift-lightspeed/credentials key apitoken) into a maas-credentials Secret by a hook Job with its
# own ServiceAccount and least-privilege RBAC (get on THAT ONE named source secret; create/patch in
# this namespace only). Same discovery pattern as jobs-batch-kueue/app-modernization, suffixed -agentic-ai-{user}.
#
# PER-CLUSTER MODEL/ENDPOINT (the exact idiom app-modernization established): the Job reads model + endpoint from the
# SAME source secret and converges the maas-config ConfigMap to them, falling back to the chart values
# (values.yaml maasModel/maasEndpoint — default llama-scout-17b, task #67) when the source keys are
# absent. So this one chart still targets a cluster whose Lightspeed secret carries different
# model/endpoint keys without a chart edit.
#
# agentic-ai TWIST vs app-modernization: the agent REQUIRES the key to function, so the Job ALWAYS materializes the
# maas-credentials Secret (wave 1) — with the real token when the source is present, or an EMPTY key on
# a cluster without the [ADD-ON] MaaS entitlement (graceful degradation). Either way the agent
# Deployment (wave 2) can START and report Ready via its MCP clients; a missing/expired key only makes
# the MODEL call return a clean 502 authFailure (the app handles it), never a stuck pod.
---
# why: endpoint + model for the agent + attendee to read (attendee-editable, not sensitive). Helm
# renders the chart-default so this ConfigMap is ALWAYS present (verify hard-checks it, on every
# cluster). The Sync-hook Job below then CONVERGES model/endpoint to the platform's on-cluster values
# when the source Lightspeed secret carries model/endpoint keys; where absent the chart default stands —
# llama-scout-17b (task #67: the per-user MaaS key is model-scoped and only grants this model). selfHeal
# is OFF for entry Applications, so Argo keeps the Job's edit and `ws reset` re-converges — same drift
# class as an attendee's own lab edits to chart-owned objects.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-config
  namespace: {{ include "agentic-ai.namespace" . }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  endpoint: {{ .Values.maasEndpoint | quote }}
  model: {{ .Values.maasModel | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maas-copy-agentic-ai-{{ .Values.user }}
  namespace: {{ include "agentic-ai.namespace" . }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read ONLY the one named source secret in the platform Lightspeed namespace (resourceNames pins
# it to `credentials` — no blanket secret read in a shared namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-agentic-ai-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.maasSourceSecret | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-agentic-ai-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-agentic-ai-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-agentic-ai-{{ .Values.user }}
    namespace: {{ include "agentic-ai.namespace" . }}
---
# why: let the copy Job write the resulting maas-credentials Secret AND converge the maas-config
# ConfigMap's model/endpoint to the platform's on-cluster values — both in {user}-ai.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-agentic-ai-{{ .Values.user }}
  namespace: {{ include "agentic-ai.namespace" . }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    # patch maas-config with the model/endpoint the copy Job resolves (from the source secret or fallback).
    resources: ["configmaps"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-agentic-ai-{{ .Values.user }}
  namespace: {{ include "agentic-ai.namespace" . }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-agentic-ai-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-agentic-ai-{{ .Values.user }}
    namespace: {{ include "agentic-ai.namespace" . }}
---
# Sync-hook Job: converges maas-config (model/endpoint) and materializes maas-credentials (key
# GENAI_API_KEY). Re-runs on every sync (BeforeHookCreation) and is idempotent (apply/patch converge).
# Wave 1 = after the RBAC (wave 0) and before the agent (wave 2), so the Secret exists when the agent
# pod starts. The token is never decoded or logged — the base64 value is passed straight through.
apiVersion: batch/v1
kind: Job
metadata:
  name: maas-copy-agentic-ai-{{ .Values.user }}
  namespace: {{ include "agentic-ai.namespace" . }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: maas-copy-agentic-ai
        workshop.redhat.com/module: agentic-ai
    spec:
      serviceAccountName: maas-copy-agentic-ai-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: copy
          # ose-cli ships oc; no custom image to maintain (same choice as jobs-batch-kueue/app-modernization).
          image: registry.redhat.io/openshift4/ose-cli:latest
          # `oc` is a large Go binary — 128Mi OOMKills it; 512Mi limit gives it headroom.
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          env:
            - name: SRC_NS
              value: {{ .Values.maasSourceNamespace | quote }}
            - name: SRC_SECRET
              value: {{ .Values.maasSourceSecret | quote }}
            - name: SRC_KEY
              value: {{ .Values.maasSourceKey | quote }}
            - name: DST_NS
              value: {{ include "agentic-ai.namespace" . | quote }}
            - name: DST_USER
              value: {{ .Values.user | quote }}
            # Fallback used when the source Lightspeed secret does NOT carry model/endpoint keys: the
            # chart default (values.yaml) stands — llama-scout-17b (task #67; FSC litemaas.model default).
            - name: FALLBACK_MODEL
              value: {{ .Values.maasModel | quote }}
            - name: FALLBACK_ENDPOINT
              value: {{ .Values.maasEndpoint | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ sourcing the MaaS key for the agent from ${SRC_NS}/${SRC_SECRET}…"
              TOKEN_B64=""
              for i in $(seq 1 12); do
                TOKEN_B64="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath="{.data.${SRC_KEY}}" 2>/dev/null || true)"
                [[ -n "$TOKEN_B64" ]] && break
                sleep 5
              done
              # Source the MODEL + ENDPOINT from the SAME Lightspeed secret when the platform set them;
              # fall back to the chart values when they are absent (the source secret typically carries
              # only apitoken → the llama-scout-17b default stands, task #67). Model + endpoint are NOT
              # secret; the apitoken is never decoded or logged (base64 passthrough only).
              SRC_MODEL="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.model}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              SRC_ENDPOINT="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.endpoint}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              MODEL="${SRC_MODEL:-$FALLBACK_MODEL}"
              ENDPOINT="${SRC_ENDPOINT:-$FALLBACK_ENDPOINT}"
              if [[ -z "$TOKEN_B64" ]]; then
                # GRACEFUL DEGRADATION: no [ADD-ON] MaaS entitlement on this cluster. Still materialize an
                # EMPTY-key Secret so the agent Deployment (wave 2) can START and report Ready via its MCP
                # clients; the model call then returns a clean 502 authFailure (the app handles it).
                echo "▶ MaaS source not readable — deploying the agent without a model key (graceful degradation; model calls 401 until a key is wired)."
              elif [[ -n "$SRC_MODEL" ]]; then
                echo "▶ model/endpoint sourced from ${SRC_NS}/${SRC_SECRET}: model=${MODEL}"
              else
                echo "▶ source secret carries no model key — using chart fallback: model=${MODEL}"
              fi
              # Converge the attendee-readable maas-config ConfigMap to the effective values (Helm rendered
              # it with the fallback default). selfHeal is off for entry Apps → Argo keeps this edit; a
              # `ws reset` re-converges it. This is what lets maas-config track the platform's real model
              # on a cluster whose Lightspeed secret carries its own model/endpoint keys.
              oc patch configmap maas-config -n "${DST_NS}" --type merge \
                -p "{\"data\":{\"model\":\"${MODEL}\",\"endpoint\":\"${ENDPOINT}\"}}"
              echo "▶ materializing maas-credentials in ${DST_NS} (token passed through as base64, never logged)…"
              # The agent reads GENAI_API_KEY from this Secret and GENAI_ENDPOINT/GENAI_MODEL from the
              # maas-config ConfigMap (see parasol-agent.yaml). Empty key on the degraded path is valid.
              oc apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: maas-credentials
                namespace: ${DST_NS}
                labels:
                  workshop.redhat.com/module: agentic-ai
                  workshop.redhat.com/user: ${DST_USER}
              type: Opaque
              data:
                GENAI_API_KEY: ${TOKEN_B64}
              EOF
              echo "✅ maas-credentials ready in ${DST_NS} (agent model ${MODEL})"
