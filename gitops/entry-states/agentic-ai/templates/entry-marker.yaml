# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it. Also carries
# the attendee-facing coordinates (the agent Route, the MCP URLs, the module namespace) so the verify
# script and the rendered lab can read them without hardcoding or cross-namespace reads.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-agentic-ai
  namespace: {{ include "agentic-ai.namespace" . }}
  labels:
    workshop.redhat.com/module: agentic-ai
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: agentic-ai
  materializedFor: {{ .Values.user | quote }}
  # The single per-user namespace this module spans — agentic-ai's agent world lives in {user}-ai.
  aiNamespace: {{ include "agentic-ai.namespace" . }}
  # The agent's public endpoint (edge Route). Verify POSTs /agent/ask here for the end-state check.
  agentRoute: {{ printf "https://%s" (include "agentic-ai.agentRouteHost" .) | quote }}
  # The two MCP servers the agent uses as tools (in-cluster SSE), for the attendee/lab to reference.
  claimsDbMcpUrl: {{ .Values.claimsDbMcpUrl | quote }}
  policyDocsMcpUrl: {{ .Values.policyDocsMcpUrl | quote }}
