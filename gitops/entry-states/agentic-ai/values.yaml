# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing). For agentic-ai the entry
# state ALREADY deploys the full agent world (both MCP servers + parasol-agent, Ready), so solve
# materializes the SAME workloads — the entry/end distinction is carried by the verify script's
# mode-split: entry = 3 apps deployed + agent /q/health/ready UP (both MCP clients OK, no token
# spent); end/solve = the agent actually ANSWERED a tool-grounded query (get_claim-grounded).
solve: false

# --- shared prebuilt images (parasol-images, built ONCE, tag 1.0) -----------------------------
# The three agentic-ai app images are built once into the shared parasol-images namespace (binary build,
# immutable tag 1.0) and pulled cross-namespace by the {user}-ai default ServiceAccount — the group
# system:serviceaccounts:{user}-ai holds system:image-puller on parasol-images (workshop-config
# parasol-images-pull.yaml, `ai` suffix). The per-user entry state deploys FROM these; it never runs
# a BuildConfig per user.
agentImage: image-registry.openshift-image-registry.svc:5000/ogsr-parasol-images/parasol-agent:1.0
claimsDbImage: image-registry.openshift-image-registry.svc:5000/ogsr-parasol-images/claims-db:1.0
policyDocsImage: image-registry.openshift-image-registry.svc:5000/ogsr-parasol-images/policy-docs:1.0

# --- MCP wiring (in-cluster HTTP-SSE) ---------------------------------------------------------
# The agent's @McpToolBox({"claims-db","policy-docs"}) connects to the two MCP servers over the
# legacy SSE endpoint (/mcp/sse) at their in-cluster Service names on 8080. claims-db is embedded
# H2 (self-contained → module-independence, rule 2); policy-docs is an embedded corpus. The agent's
# readiness (/q/health/ready) pings BOTH, so a Ready agent has proven its tool wiring.
claimsDbMcpUrl: http://claims-db:8080/mcp/sse
policyDocsMcpUrl: http://policy-docs:8080/mcp/sse

# --- MaaS credentials for the agent (jobs-batch-kueue/app-modernization per-cluster secret-sourcing) ---------------------
# The agent calls an OpenAI-compatible Models-as-a-Service endpoint. endpoint + model are NOT secret
# (attendee-readable maas-config ConfigMap); the Bearer key IS a secret and is COPIED at sync time
# from the platform Lightspeed secret (openshift-lightspeed/credentials key apitoken) into a
# maas-credentials Secret here by a hook Job with its own least-privilege SA. The hook ALSO reads
# model + endpoint from the SAME source secret and converges the ConfigMap to them, falling back to
# these chart values when the source keys are absent. Default model llama-scout-17b: the per-user
# MaaS key is model-scoped and only grants this model (HTTP 401 key_model_access_denied against the
# prior qwen3-14b default — root-caused live by the task #67 QA gate); matches the FSC litemaas.model
# contract default (field-sourced-content-note.md §3). A cluster whose secret carries different
# model/endpoint keys converges to those without a chart edit.
maasEndpoint: https://maas-rhdp.apps.maas.redhatworkshops.io/v1
maasModel: llama-scout-17b
maasSourceNamespace: openshift-lightspeed
maasSourceSecret: credentials
maasSourceKey: apitoken
