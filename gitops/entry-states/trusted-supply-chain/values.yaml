# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → additionally runs the pipeline on the CLEAN main branch (scan passes, image
# Chains-signed): the demo/instructor END state (a scanned, signed image). See solve-endstate.yaml.
solve: false
# In-cluster Gitea coordinates: the fork job forks {upstreamOrg}/parasol-claims into {user} and makes
# the fork's seed-vulnerable branch carry the seeded flaws (older base tag + log4j-core CVE).
giteaNamespace: gitea
upstreamOrg: parasol
mirrorRepo: ocp-getting-started
# Shared trust-stack sources the per-user hook copies FROM (workshop-agnostic secret contracts):
#   stackrox/rox-api-token         → the RHACS CI scan token (minted by the trust stack)
#   openshift-pipelines/chains-cosign-pub → the Tekton Chains cosign PUBLIC key (trust-signing export)
stackroxNamespace: stackrox
pipelinesNamespace: openshift-pipelines
