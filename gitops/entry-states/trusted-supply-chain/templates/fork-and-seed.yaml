# Forks parasol/parasol-claims into THIS attendee's Gitea account AND makes the fork's
# `seed-vulnerable` branch carry the trusted-supply-chain seeded flaws so the scan gate has something to fail on:
#   • Containerfile base tag downgraded to ubi9/openjdk-21:1.18 (older, base-layer CVEs)
#   • pom.xml pinned to log4j-core 2.14.1 (CVE-2021-44228 Log4Shell — trips the trust stack's gate)
# Same Gitea route + admin-credential discovery + Sudo-as-the-user idiom as
# gitops/entry-states/pipelines-fundamentals/templates/fork-and-seed.yaml. It DERIVES the vulnerable delta from the
# fork's own clean main (sed the base tag, inject the log4j dependency) rather than depending on an
# upstream seed-vulnerable branch — so trusted-supply-chain is replicable on a FRESH cluster (the app-repo-seed Job
# only publishes main). Idempotent: re-running re-asserts the same vulnerable state (no-op if already
# vulnerable). All names are -{user} suffixed so concurrent per-user entry states never collide.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trusted-supply-chain-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: trusted-supply-chain
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read the Gitea CR status + operator admin secret + route host to reach the API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trusted-supply-chain-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: trusted-supply-chain
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: ["pfe.rhpds.com"]
    # the rhpds CRD's plural is literally "gitea" (verified live)
    resources: ["gitea"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trusted-supply-chain-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: trusted-supply-chain
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trusted-supply-chain-fork-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: trusted-supply-chain-fork-{{ .Values.user }}
    namespace: {{ .Values.giteaNamespace }}
---
# Argo Sync hook (BeforeHookCreation): re-runs on every ws start / ws reset so the fork + its
# vulnerable seed-vulnerable branch are (re)made idempotently; a pre-existing fork/branch is tolerated.
apiVersion: batch/v1
kind: Job
metadata:
  name: trusted-supply-chain-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: trusted-supply-chain
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: trusted-supply-chain-fork-{{ .Values.user }}
    spec:
      serviceAccountName: trusted-supply-chain-fork-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: fork
          # why ose-cli: ships oc + curl + base64 + sed/awk on every connected cluster; no custom image.
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITEA_NS
              value: {{ .Values.giteaNamespace | quote }}
            - name: TARGET_USER
              value: {{ .Values.user | quote }}
            - name: UPSTREAM_ORG
              value: {{ .Values.upstreamOrg | quote }}
            - name: REPO
              value: "parasol-claims"
            - name: BRANCH
              value: "seed-vulnerable"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              NS="${GITEA_NS}"

              echo "▶ waiting for the Gitea route…"
              for i in $(seq 1 60); do
                HOST="$(oc get route gitea -n "$NS" -o jsonpath='{.spec.host}' 2>/dev/null || true)"
                [[ -n "$HOST" ]] && break
                sleep 10
              done
              [[ -n "${HOST:-}" ]] || { echo "❌ gitea route not found after 10m"; exit 1; }
              GITEA_URL="https://${HOST}"

              echo "▶ discovering admin credentials (retry loop — operator writes them post-setup)…"
              ADMIN_USER="$(oc get gitea gitea -n "$NS" -o jsonpath='{.spec.giteaAdminUser}' 2>/dev/null || echo gitea-admin)"
              ADMIN_PASS=""
              for i in $(seq 1 60); do
                ADMIN_PASS="$(oc get gitea gitea -n "$NS" -o jsonpath='{.status.adminPassword}' 2>/dev/null || true)"
                [[ -z "$ADMIN_PASS" ]] && ADMIN_PASS="$(oc get secret gitea-admin-credentials -n "$NS" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)"
                [[ -n "$ADMIN_PASS" ]] && break
                sleep 10
              done
              [[ -n "$ADMIN_PASS" ]] || { echo "❌ no Gitea admin password after 10m"; exit 1; }
              AUTH="${ADMIN_USER}:${ADMIN_PASS}"

              echo "▶ waiting for the Gitea API…"
              for i in $(seq 1 30); do
                curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null && break
                sleep 10
              done
              curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null || { echo "❌ Gitea API not answering"; exit 1; }

              # --- 1) fork parasol/parasol-claims into the attendee's account -----------------
              if curl -ksf -o /dev/null -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}"; then
                echo "  ✓ ${TARGET_USER}/${REPO} already exists"
              else
                CODE="$(curl -ks -o /tmp/fork.json -w '%{http_code}' -u "$AUTH" -H "Sudo: ${TARGET_USER}" \
                  -X POST "${GITEA_URL}/api/v1/repos/${UPSTREAM_ORG}/${REPO}/forks" \
                  -H 'Content-Type: application/json' -d '{}')"
                case "$CODE" in
                  201|202) echo "  ✓ ${TARGET_USER}/${REPO} fork requested (${CODE})";;
                  409|422) echo "  ✓ ${TARGET_USER}/${REPO} already exists (${CODE})";;
                  *) echo "  ❌ fork ${REPO} failed (HTTP ${CODE}): $(cat /tmp/fork.json)"; exit 1;;
                esac
              fi
              # Fork copies git data asynchronously: wait until main is POPULATED before branching.
              for i in $(seq 1 30); do
                curl -ksf -o /dev/null -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/contents/Containerfile?ref=main" && break
                sleep 4
              done
              curl -ksf -o /dev/null -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/contents/Containerfile?ref=main" \
                || { echo "❌ ${TARGET_USER}/${REPO} main never became ready"; exit 1; }

              # --- 2) ensure the seed-vulnerable branch exists (from main) --------------------
              if curl -ksf -o /dev/null -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/branches/${BRANCH}"; then
                echo "  ✓ branch ${BRANCH} already exists"
              else
                CODE="$(curl -ks -o /tmp/br.json -w '%{http_code}' -u "$AUTH" -H "Sudo: ${TARGET_USER}" \
                  -X POST "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/branches" \
                  -H 'Content-Type: application/json' -d "{\"new_branch_name\":\"${BRANCH}\",\"old_branch_name\":\"main\"}")"
                case "$CODE" in
                  201) echo "  ✓ branch ${BRANCH} created from main";;
                  *) echo "  ❌ create branch ${BRANCH} failed (HTTP ${CODE}): $(cat /tmp/br.json)"; exit 1;;
                esac
              fi

              # helper: PUT a file's new content onto the branch (idempotent — needs the current blob sha)
              put_file() {  # $1=path $2=new_content $3=commit_message
                local path="$1" content="$2" msg="$3" sha b64 body code
                sha="$(curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/contents/${path}?ref=${BRANCH}" 2>/dev/null \
                  | grep -oE '"sha"[[:space:]]*:[[:space:]]*"[0-9a-f]{40}"' | head -1 | grep -oE '[0-9a-f]{40}' || true)"
                b64="$(printf '%s\n' "$content" | base64 -w0)"
                body="$(printf '{"message":"%s","branch":"%s","content":"%s","sha":"%s"}' "$msg" "$BRANCH" "$b64" "$sha")"
                code="$(curl -ks -o /tmp/put.json -w '%{http_code}' -u "$AUTH" -H "Sudo: ${TARGET_USER}" \
                  -H 'Content-Type: application/json' -X PUT \
                  "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/contents/${path}" -d "$body")"
                case "$code" in
                  200|201) return 0;;
                  *) echo "  ❌ PUT ${path} failed (HTTP ${code}): $(cat /tmp/put.json)"; return 1;;
                esac
              }

              # --- 3) assert the OLD base image tag (1.18) in the Containerfile ---------------
              echo "▶ asserting the vulnerable base image tag on ${BRANCH}…"
              CF="$(curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/raw/Containerfile?ref=${BRANCH}")"
              CF_NEW="$(printf '%s' "$CF" | sed -E 's|(openjdk-21):[0-9][0-9.]*|\1:1.18|g; s|(openjdk-21-runtime):[0-9][0-9.]*|\1:1.18|g')"
              if [[ "$CF" != "$CF_NEW" ]]; then
                put_file "Containerfile" "$CF_NEW" "trusted-supply-chain seed: downgrade base image to openjdk-21:1.18 (older, CVE-bearing)"
                echo "  ✓ Containerfile base tag pinned to 1.18"
              else
                echo "  ✓ Containerfile already at 1.18"
              fi

              # --- 4) assert the seeded log4j-core CVE dependency in pom.xml ------------------
              echo "▶ asserting the seeded log4j-core (CVE-2021-44228) dependency on ${BRANCH}…"
              POM="$(curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}/raw/pom.xml?ref=${BRANCH}")"
              # Match the literal injected XML tag, NOT the bare word "log4j-core": the base pom.xml's
              # own SBOM-plugin comment mentions "log4j-core" in prose (it forked onto this branch from
              # main), so a loose grep here found that comment and skipped the real injection every
              # time — the module's core red-gate moment never fired (found via media-capture QA).
              if printf '%s' "$POM" | grep -q '<artifactId>log4j-core</artifactId>'; then
                echo "  ✓ pom.xml already carries log4j-core"
              else
                # Inject before the LAST </dependencies> — the real <dependencies> block. The FIRST
                # </dependencies> closes <dependencyManagement> (version constraints only, NOT an actual
                # dependency), so injecting there would set a version but never pull the jar into the
                # image and the scan gate would not fire. (Verified against the real pom pre-commit.)
                POM_NEW="$(printf '%s' "$POM" | awk '
                  { lines[NR]=$0; if ($0 ~ /<\/dependencies>/) last=NR }
                  END {
                    for (i=1;i<=NR;i++) {
                      if (i==last) {
                        print "    <!-- trusted-supply-chain seeded CVE (do not fix on this branch): log4j-core 2.14.1 = CVE-2021-44228 Log4Shell. -->";
                        print "    <dependency>";
                        print "      <groupId>org.apache.logging.log4j</groupId>";
                        print "      <artifactId>log4j-core</artifactId>";
                        print "      <version>2.14.1</version>";
                        print "    </dependency>";
                      }
                      print lines[i];
                    }
                  }')"
                put_file "pom.xml" "$POM_NEW" "trusted-supply-chain seed: pin log4j-core 2.14.1 (CVE-2021-44228 Log4Shell)"
                echo "  ✓ pom.xml log4j-core 2.14.1 injected"
              fi

              echo "✅ ${TARGET_USER}/${REPO} forked; ${BRANCH} carries the seeded flaws at ${GITEA_URL}/${TARGET_USER}/${REPO}/src/branch/${BRANCH}"
