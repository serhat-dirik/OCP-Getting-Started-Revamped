# MaaS wiring for the mcp-agent-cli in {user}-dev — the M06/M23 hook pattern verbatim, re-pointed from
# {user}-ai to {user}-dev. endpoint + model are NOT secret and live in an attendee-readable ConfigMap
# (maas-config); the Bearer key IS a secret, COPIED at sync time from the platform Lightspeed secret
# (openshift-lightspeed/credentials key apitoken) into a maas-credentials Secret by a hook Job with its
# own ServiceAccount and least-privilege RBAC (get on THAT ONE named source secret; create/patch in
# this namespace only). Names suffixed -m24-{user} so concurrent per-user entry states never collide.
#
# PER-CLUSTER MODEL/ENDPOINT: the Job reads model + endpoint from the SAME source secret and converges
# BOTH config surfaces to them — maas-config (attendee-readable) and maas-config-env (auto-mounted into
# the DevWorkspace as the CLI's GENAI_* env) — falling back to the chart values (values.yaml
# maasModel/maasEndpoint) when the source keys are absent, so this one chart renders llama-scout-17b on a
# cluster whose Lightspeed secret carries model/endpoint keys without editing the qwen3-14b default C1
# relies on.
#
# DEV SPACES AUTO-MOUNT: the maas-credentials Secret AND the maas-config-env ConfigMap are labelled for
# the DevWorkspace Operator (controller.devfile.io/mount-to-devworkspace + watch-secret/watch-configmap,
# annotation mount-as: env), so GENAI_API_KEY (secret) and GENAI_ENDPOINT/GENAI_MODEL (non-secret) are
# injected as env vars into every container of the {user}-dev DevWorkspace — the CLI agent gets all three
# with no attendee wiring and no secretKeyRef/configMapKeyRef in the devfile (which the 2.2.0 schema
# forbids anyway).
#
# GRACEFUL DEGRADATION: the Job ALWAYS materializes maas-credentials (wave 1) — real token when the
# source is present, or an EMPTY key on a cluster without the [ADD-ON] MaaS entitlement — so the
# DevWorkspace + CLI can always start; a missing/expired key only makes the model call return a clean
# 401 the CLI handles, never a stuck object.
---
# why: endpoint + model for the attendee (+ CLI) to read (attendee-editable, not sensitive). Helm
# renders the chart default so this ConfigMap is ALWAYS present (verify hard-checks it); the hook then
# CONVERGES model/endpoint to the platform's on-cluster values when the source secret carries them.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-config
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  endpoint: {{ .Values.maasEndpoint | quote }}
  model: {{ .Values.maasModel | quote }}
---
# why: the CLI agent's GENAI_ENDPOINT/GENAI_MODEL delivered as DevWorkspace ENV. A devfile container env
# (schemaVersion 2.2.0) accepts only a literal `value` — no configMapKeyRef — so, exactly as the
# maas-credentials Secret carries the KEY as an auto-mounted env var, this ConfigMap carries the
# NON-secret endpoint+model under the env-var key NAMES the CLI reads (GENAI_*), auto-mounted as env by
# the DevWorkspace Operator. Helm renders the fallback; the hook CONVERGES it to the per-cluster values
# (C2 → llama-scout-17b), so the workspace is cluster-correct with no devfile edit (kept separate from
# maas-config, whose friendly endpoint/model keys the verify script + attendees read).
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-config-env
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    # Auto-mount every key of this ConfigMap as an env var into the {user}-dev DevWorkspace containers.
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-configmap: "true"
    workshop.redhat.com/owner: ogsr
  annotations:
    controller.devfile.io/mount-as: env
data:
  GENAI_ENDPOINT: {{ .Values.maasEndpoint | quote }}
  GENAI_MODEL: {{ .Values.maasModel | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maas-copy-m24-{{ .Values.user }}
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read ONLY the one named source secret in the platform Lightspeed namespace (resourceNames pins
# it to `credentials` — no blanket secret read in a shared namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-m24-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.maasSourceSecret | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-m24-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-m24-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-m24-{{ .Values.user }}
    namespace: {{ include "m24.namespace" . }}
---
# why: let the copy Job write the resulting maas-credentials Secret AND converge maas-config's
# model/endpoint to the platform's on-cluster values — both in {user}-dev.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-m24-{{ .Values.user }}
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    # patch maas-config with the model/endpoint the copy Job resolves (from the source secret or fallback).
    resources: ["configmaps"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-m24-{{ .Values.user }}
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-m24-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-m24-{{ .Values.user }}
    namespace: {{ include "m24.namespace" . }}
---
# Sync-hook Job: converges maas-config (model/endpoint) and materializes maas-credentials (key
# GENAI_API_KEY, auto-mount-labelled for the DevWorkspace). Re-runs on every sync (BeforeHookCreation)
# and is idempotent (apply/patch converge). Wave 1 = after the RBAC (wave 0) and alongside the app
# layer, so the Secret exists before the workspace starts. The token is never decoded or logged — the
# base64 value is passed straight through.
apiVersion: batch/v1
kind: Job
metadata:
  name: maas-copy-m24-{{ .Values.user }}
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: maas-copy-m24
        workshop.redhat.com/module: m24
    spec:
      serviceAccountName: maas-copy-m24-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: copy
          # ose-cli ships oc; no custom image to maintain (same choice as M06/M23).
          image: registry.redhat.io/openshift4/ose-cli:latest
          # `oc` is a large Go binary — 128Mi OOMKills it; 512Mi limit gives it headroom.
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          env:
            - name: SRC_NS
              value: {{ .Values.maasSourceNamespace | quote }}
            - name: SRC_SECRET
              value: {{ .Values.maasSourceSecret | quote }}
            - name: SRC_KEY
              value: {{ .Values.maasSourceKey | quote }}
            - name: DST_NS
              value: {{ include "m24.namespace" . | quote }}
            - name: DST_USER
              value: {{ .Values.user | quote }}
            # Fallbacks used when the source Lightspeed secret does NOT carry model/endpoint keys (C1):
            # the chart default (values.yaml) is preserved — qwen3-14b on the primary workshop cluster.
            - name: FALLBACK_MODEL
              value: {{ .Values.maasModel | quote }}
            - name: FALLBACK_ENDPOINT
              value: {{ .Values.maasEndpoint | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ sourcing the MaaS key for the agent from ${SRC_NS}/${SRC_SECRET}…"
              TOKEN_B64=""
              for i in $(seq 1 12); do
                TOKEN_B64="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath="{.data.${SRC_KEY}}" 2>/dev/null || true)"
                [[ -n "$TOKEN_B64" ]] && break
                sleep 5
              done
              # Source MODEL + ENDPOINT from the SAME Lightspeed secret when the platform set them; fall
              # back to the chart values when absent (C1's secret has only apitoken → qwen3-14b default).
              # Model + endpoint are NOT secret; the apitoken is never decoded or logged (base64 passthrough).
              SRC_MODEL="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.model}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              SRC_ENDPOINT="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.endpoint}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              MODEL="${SRC_MODEL:-$FALLBACK_MODEL}"
              ENDPOINT="${SRC_ENDPOINT:-$FALLBACK_ENDPOINT}"
              if [[ -z "$TOKEN_B64" ]]; then
                echo "▶ MaaS source not readable — deploying with an EMPTY model key (graceful degradation; model calls 401 until a key is wired)."
              elif [[ -n "$SRC_MODEL" ]]; then
                echo "▶ model/endpoint sourced from ${SRC_NS}/${SRC_SECRET}: model=${MODEL}"
              else
                echo "▶ source secret carries no model key — using chart fallback: model=${MODEL}"
              fi
              # Converge BOTH config surfaces to the effective values (Helm rendered them with the
              # fallback default): the attendee-readable maas-config (keys model/endpoint) AND the
              # DevWorkspace-auto-mounted maas-config-env (keys GENAI_MODEL/GENAI_ENDPOINT — the env-var
              # names the CLI reads). No extra RBAC: the Role above grants configmaps get/update/patch in
              # this ns. selfHeal is off for entry Apps → Argo keeps the edits; a `ws reset` re-converges.
              oc patch configmap maas-config -n "${DST_NS}" --type merge \
                -p "{\"data\":{\"model\":\"${MODEL}\",\"endpoint\":\"${ENDPOINT}\"}}"
              oc patch configmap maas-config-env -n "${DST_NS}" --type merge \
                -p "{\"data\":{\"GENAI_MODEL\":\"${MODEL}\",\"GENAI_ENDPOINT\":\"${ENDPOINT}\"}}"
              echo "▶ materializing maas-credentials in ${DST_NS} (token passed through as base64, never logged)…"
              # The CLI agent reads GENAI_API_KEY from this Secret (auto-mounted into the DevWorkspace as
              # env by the controller.devfile.io labels/annotation below). Empty key on the degraded path
              # is valid. GENAI_ENDPOINT/GENAI_MODEL reach the CLI the same way — from the auto-mounted
              # maas-config-env ConfigMap converged just above (not from a devfile literal).
              oc apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: maas-credentials
                namespace: ${DST_NS}
                labels:
                  workshop.redhat.com/module: m24
                  workshop.redhat.com/user: ${DST_USER}
                  controller.devfile.io/mount-to-devworkspace: "true"
                  controller.devfile.io/watch-secret: "true"
                annotations:
                  controller.devfile.io/mount-as: env
              type: Opaque
              data:
                GENAI_API_KEY: ${TOKEN_B64}
              EOF
              echo "✅ maas-credentials ready in ${DST_NS} (agent model ${MODEL})"
