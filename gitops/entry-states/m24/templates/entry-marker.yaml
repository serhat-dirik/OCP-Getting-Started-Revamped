# Proves the entry-state engine ran for this user+module; ws verify checks it. Also the single source
# of truth that content + verify read for the MCP server image/endpoint, the scoped SA, the seeded
# fault (bad vs good probe path), the neutral CLI image, and the DevWorkspace name — so no
# cross-namespace or registry reads are needed at verify time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m24
  namespace: {{ include "m24.namespace" . }}
  labels:
    workshop.redhat.com/module: m24
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: m24
  materializedFor: {{ .Values.user | quote }}
  namespace: {{ include "m24.namespace" . }}
  # The digest-pinned MCP server image + the in-cluster SSE URL the CLI agent dials.
  mcpServerImage: {{ .Values.mcpServerImage | quote }}
  mcpServiceName: {{ .Values.mcpServiceName | quote }}
  mcpSseUrl: {{ include "m24.mcpSseUrl" . | quote }}
  # The scoped ServiceAccount the MCP server runs as — RBAC on it is the security boundary (ties M14).
  mcpAgentServiceAccount: {{ .Values.mcpAgentSA | quote }}
  # The seeded fault: the deployment name + the WRONG path (entry) vs the CORRECT path (the one-field
  # fix). Content + verify read these so the diagnosis target and the fix are agreed in one place.
  seedName: {{ .Values.seedName | quote }}
  badProbePath: {{ .Values.badProbePath | quote }}
  goodProbePath: {{ .Values.goodProbePath | quote }}
  # The provided neutral CLI client image (shared parasol-images) the DevWorkspace + lab invoke.
  agentCliImage: {{ .Values.agentCliImage | quote }}
  # The Dev Spaces workspace carrying the CLI client configured against MaaS + the MCP server.
  devWorkspaceName: {{ .Values.devWorkspaceName | quote }}
