# ws reset purges user-created leftovers from these namespaces before re-materializing.
# deployment-targets-scheduling's entire world lives in {user}-dev: the multi-component claims app (parasol-web/parasol-claims/
# claims-db), the statement-batch worker, the load generator, and (solve/lab) the anti-affinity/TSC/
# strategy/preStop the attendee adds to parasol-claims + the toleration/nodeSelector on statement-batch
# + the PodDisruptionBudget. `oc delete all` clears the workloads; the engine also purges the PDB the
# lab leaves behind (namespaced, not platform-owned) so a reset returns {user}-dev to the entry baseline.
# The batch-pool node label/taint and any synthetic zones are CLUSTER-SCOPED bootstrap substrate — never
# chart-owned, so reset never touches them (Rule 13). The workshop-layer quota/limits/rbac are untouched.
purgeNamespaces:
  - "${USER}-dev"
# deployment-targets-scheduling materializes the SAME {user}-dev claims stack (parasol-web/parasol-claims/claims-db) that platform-orientation-storage-stateful,
# gitops-fundamentals-securing-apps-keycloak own and that multi-tenancy-workload-security/networking-dev-devops also share {user}-dev with, so their entry apps would deadlock on
# SharedResourceWarning if they coexisted (ADR-0001 amendment). Same-namespace modules are MUTUAL
# conflicts: ws start/prep/solve evicts the conflicting entry app and purges {user}-dev first. Each of
# the modules below lists deployment-targets-scheduling back (reciprocity completed in the same slice). jobs-batch-kueue ({user}-batch) and
# pipelines-fundamentals/trusted-supply-chain ({user}-cicd) are disjoint namespaces → they coexist untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# Representative deployment-targets-scheduling muscle the generic battery does NOT cover: (1) the dedicated batch pool is visible
# to the attendee via platform-observer (proves the cluster-scoped bootstrap substrate deployment-targets-scheduling leans on is
# present — fail-closed if it was never created or a node recycled); (2) the batch worker substrate is a
# real, execable pod. Both run as {user} (nodes read via platform-observer; {user}-dev admin) on
# always-present images, so they stay green regardless of the parasol-images build. ${USER} resolves
# per-run.
smokeCommands:
  - "oc get nodes -l workshop.redhat.com/pool=batch -o name | grep -q ."
  - "oc exec deploy/statement-batch -n ${USER}-dev -- true"
