# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-deployment-targets-scheduling
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: deployment-targets-scheduling
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: deployment-targets-scheduling
  materializedFor: {{ .Values.user | quote }}
  # The single namespace this module spans (unlike networking-dev-devops, deployment-targets-scheduling lives entirely in {user}-dev).
  devNamespace: {{ .Values.user }}-dev
