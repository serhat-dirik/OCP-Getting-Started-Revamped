# The claims REST API — the "api" tier and the star of deployment-targets-scheduling's placement + rollout beats. Shared prebuilt
# image (tag 1.1). ENTRY (solve=false): {{ .Values.claimsReplicas }} replicas that run Hibernate
# drop-and-create (schema env below), so EVERY pod boot reseeds the shared claims-db — the zero-downtime
# fault the lab diagnoses. No scheduling shaping, default RollingUpdate 25%/25%, no PDB. SOLVE (solve=true,
# rendered inline below): schema-management=none + a raised CPU limit + maxUnavailable:0 + anti-affinity/
# TSC + a PDB (solve-endstate.yaml) — the REAL zero-downtime fix. The attendee applies each field in the lab.
---
# why: the running claims API; the workload the attendee spreads (anti-affinity/TSC), rolls under load
# (tuned RollingUpdate + graceful shutdown), and protects with a PDB (solve-endstate.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: deployment-targets-scheduling
    workshop.redhat.com/owner: ogsr
spec:
  replicas: {{ .Values.claimsReplicas }}
  {{- if .Values.solve }}
  # SOLVE — zero-downtime rollout: surge one new pod, never drop below desired (maxUnavailable 0). Entry
  # ships no strategy block (Deployment defaults to RollingUpdate 25%/25%), which the lab tunes.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{- end }}
  selector:
    matchLabels:
      app: parasol-claims
  template:
    metadata:
      labels:
        app: parasol-claims
        workshop.redhat.com/module: deployment-targets-scheduling
    spec:
      {{- if .Values.solve }}
      # SOLVE — hard spread: no two claims replicas on the same node (the anti-affinity "force apart"
      # beat). Required (not preferred) so the distinct-node outcome is deterministic; deployment-targets-scheduling assumes a
      # multi-node cluster (>= claimsReplicas schedulable non-batch nodes — true here: 5 available).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: parasol-claims
              topologyKey: kubernetes.io/hostname
      # SOLVE — even topology spread. spreadTopologyKey defaults to kubernetes.io/hostname (always
      # present); flip it to workshop.redhat.com/zone (synthesized at bootstrap) for the "across zones"
      # narrative. ScheduleAnyway keeps it a soft, portfolio-safe layer on top of the hard anti-affinity.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ .Values.spreadTopologyKey }}
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: parasol-claims
      {{- end }}
      containers:
        - name: parasol-claims
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRESQL_HOST
              value: claims-db
            # THE FAULT (entry) / THE FIX (solve). Entry: drop-and-create → every boot drops+recreates+
            # reseeds the SHARED claims-db from import.sql, so a rolling-update pod wipes the DB out from
            # under the still-serving pod (proven live: a marker row vanishes after one restart). Solve:
            # `none` → pods never touch the schema (the marker SURVIVES a restart); claims-db-seed.yaml
            # populates the DB once instead. This one env var is the heart of the deployment-targets-scheduling zero-downtime fix.
            - name: QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY
              value: {{ if .Values.solve }}"none"{{ else }}"drop-and-create"{{ end }}
          envFrom:
            # POSTGRESQL_USER / _PASSWORD / _DATABASE — the same Secret the DB was initialized with.
            - secretRef:
                name: claims-db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              # THE FAULT (entry) / THE FIX (solve). Entry 500m throttles the JVM cold-start (measured 27s
              # to Ready); solve raises it to 2 so a rolling-update pod starts fast (measured 17s), shrinking
              # the capacity-dip during the roll. requests stay 200m → QoS Burstable, portfolio-safe.
              cpu: {{ if .Values.solve }}"2"{{ else }}"500m"{{ end }}
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the claims API — the load generator and parasol-web target this.
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: deployment-targets-scheduling
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: parasol-claims
  ports:
    - name: http
      port: 8080
      targetPort: http
