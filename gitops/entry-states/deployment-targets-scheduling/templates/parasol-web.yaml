# The Parasol web frontend — the "web" tier, so the app is genuinely multi-component (the spec's entry
# state). Shared prebuilt image (tag 1.1). No scheduling shaping in this module — parasol-claims is the
# workload the attendee places, spreads, rolls, and protects; parasol-web just gives the app a front.
---
# why: the running frontend; a second workload in {user}-dev so placement/spread reasoning has context.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: deployment-targets-scheduling
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-web
  template:
    metadata:
      labels:
        app: parasol-web
        workshop.redhat.com/module: deployment-targets-scheduling
    spec:
      containers:
        - name: parasol-web
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-web:1.1
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the frontend.
apiVersion: v1
kind: Service
metadata:
  name: parasol-web
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-web
    workshop.redhat.com/module: deployment-targets-scheduling
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: parasol-web
  ports:
    - name: http
      port: 8080
      targetPort: http
