# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): default-deny +
# precise-allow NetworkPolicies in {user}-dev, an edge Route on parasol-web, a distinguishable
# parasol-claims v2, and — only when gatewayApi is also true — the shared Gateway + weighted
# HTTPRoute + cert-manager Certificate. Entry (false) = the pre-lab world: the 3-tier app on
# ClusterIP-only Services with no policy and no exposure, which the attendee builds by hand.
solve: false
# The Gateway API end-state (shared Gateway + weighted HTTPRoute + cert-manager cert on the listener)
# is OFF by default. On Cluster 2 (BareMetal, no MetalLB) the OpenShift Gateway API implementation
# provisions the Gateway behind a LoadBalancer Service that stays <pending> — the Gateway never
# reaches Programmed=True and NO envoy data plane is created (verified live 2026-07-12), so the
# manifests would leave `ws solve` Degraded and can't route in-cluster either. They are shipped
# correct-by-construction for a cluster that has an LB provider; flip this true only there.
# See docs/research/m15-build-note.md (Open risks: Gateway external exposure on bare-metal) + the
# PM decision D-networking-dev-devops-5 (MetalLB vs in-cluster-verify).
gatewayApi: false
# Per-namespace Layer2 UDN subnet for {user}-partner. Each partner namespace is its own isolated
# L2 segment, so the same range is safe across users; kept off the default pod (10.128/14) and
# service (172.30/16) networks.
partnerSubnet: "10.20.0.0/16"
# In-cluster verification pod image (curl/openssl) — the RHEL tools imagestream is always present,
# needs no external pull secret, and handles the restricted-v2 random UID. The content builder may
# swap this for a UDI image if a jq-carrying client is wanted.
demoClientImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
# cert-manager ClusterIssuer for the Gateway-listener TLS beat (self-signed CA; only consumed when
# gatewayApi=true). Minted once by the workshop layer, not by this chart. Named here so the solve
# Certificate references it without a cross-namespace read.
certIssuerName: parasol-selfsigned-ca
