# ws reset purges user-created leftovers from these namespaces before re-materializing.
# networking-dev-devops lives in two namespaces:
#   {user}-dev     — the 3-tier claims app (parasol-web/parasol-claims/claims-db), the demo-client
#                    verification pod, and the lab's NetworkPolicies/Route the attendee creates.
#   {user}-partner — the Layer2 Primary UDN + partner workload (native isolation demo). The
#                    namespace itself is WORKSHOP-LAYER (per-user-partner.yaml: created with the
#                    k8s.ovn.org/primary-user-defined-network label AT creation — a UDN hard
#                    requirement — plus quota/limits/RBAC), so like every per-user namespace it
#                    SURVIVES reset; this chart owns only the in-namespace UDN + workload, which the
#                    Argo finalizer prunes. purge here clears the attendee's own test pods.
# UDN reset ordering is safe: purge deletes partner pods first, the finalizer then prunes the UDN,
# and re-materialize re-applies the UDN (sync-wave 0) into the now-empty labeled namespace BEFORE
# the workload (sync-wave 1) — "UDN exists before pods" holds without ever touching the namespace.
purgeNamespaces:
  - "${USER}-dev"
  - "${USER}-partner"
# networking-dev-devops materializes the SAME {user}-dev claims stack (parasol-web/parasol-claims/claims-db) that
# platform-orientation-storage-stateful, gitops-fundamentals-securing-apps-keycloak own and shares {user}-dev with multi-tenancy-workload-security, so their entry apps would deadlock on
# SharedResourceWarning if they coexisted (ADR-0001 amendment). Same-namespace modules are MUTUAL
# conflicts: ws start/prep/solve evicts the conflicting entry app and purges {user}-dev first.
# {user}-partner is networking-dev-devops-only, so it adds no new conflicts. jobs-batch-kueue ({user}-batch) and pipelines-fundamentals/trusted-supply-chain
# ({user}-cicd) are disjoint → they coexist untouched.
conflictsWith:
  - platform-orientation
  - build-deliver
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
# Representative networking-dev-devops muscle the generic battery does NOT cover: exec the in-cluster demo-client
# (the verification substrate this module leans on for every Route/NetworkPolicy/exposure probe)
# and prove it carries curl + openssl. Touches only {user}-dev (attendee is admin) and no app
# image, so it stays green regardless of the parasol-image build state. ${USER} resolves per-run.
smokeCommands:
  - "oc exec deploy/demo-client -n ${USER}-dev -- sh -c 'command -v curl >/dev/null && command -v openssl >/dev/null'"
