# The in-cluster verification substrate (pattern adopted from serhat-dirik/ossm-gateway-demo, D18):
# a long-lived pod with curl/openssl so every networking-dev-devops exercise — Route/HTTPRoute reachability, the
# default-deny→allow NetworkPolicy probes, the api→db hop — is validated pod-to-pod, byte-equivalent
# to production, with NO dependency on an external LoadBalancer/DNS (which bare-metal C2 lacks). A
# Deployment (not a bare Pod) so `oc exec deploy/demo-client` is stable across restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-client
  namespace: {{ .Values.user }}-dev
  labels:
    app: demo-client
    workshop.redhat.com/module: networking-dev-devops
    workshop.redhat.com/owner: ogsr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-client
  template:
    metadata:
      labels:
        app: demo-client
        workshop.redhat.com/module: networking-dev-devops
    spec:
      containers:
        - name: client
          # RHEL tools imagestream — always present, no external pull secret, carries curl + openssl.
          image: {{ .Values.demoClientImage }}
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # restricted-v2 compliant (random non-root UID) so it admits without any SCC exception.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
