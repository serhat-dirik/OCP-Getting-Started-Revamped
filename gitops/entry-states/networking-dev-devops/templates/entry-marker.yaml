# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-networking-dev-devops
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: networking-dev-devops
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: networking-dev-devops
  materializedFor: {{ .Values.user | quote }}
  # The two namespaces this module spans. Recorded so the attendee and the verify script see the
  # partner namespace (workshop-layer) without a cross-namespace list.
  devNamespace: {{ .Values.user }}-dev
  partnerNamespace: {{ .Values.user }}-partner
---
# A marker in {user}-partner too. networking-dev-devops is the first module with a WORKLOAD (partner-workload) in a
# secondary namespace, and `ws prep`'s leftover-detector flags "a purge namespace that has workloads
# but no marker for THIS module" as foreign state to wipe. Without this marker `ws prep networking-dev-devops` sees
# {user}-partner's workload as an orphan, tries to wipe, and (non-interactively, e.g. the G1 cockpit
# smoke) dies "not a terminal and no --yes given" — a false leftover (found at networking-dev-devops G1, 2026-07-13).
# Stamping the module marker here is exactly what the marker is for: "this namespace belongs to networking-dev-devops."
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-networking-dev-devops
  namespace: {{ .Values.user }}-partner
  labels:
    workshop.redhat.com/module: networking-dev-devops
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: networking-dev-devops
  materializedFor: {{ .Values.user | quote }}
  role: partner-udn
