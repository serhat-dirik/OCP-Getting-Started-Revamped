# Materializes the PREBUILT notifications image as an istag in {user}-dev so `helm install` has a
# pullable image — WITHOUT assuming build-deliver built one and WITHOUT a shared parasol-notifications image
# (parasol-images ships claims/fraud/web only). An S2I nodejs BuildConfig builds the zero-dependency
# Node service from the parasol ORG SEED (always present at bootstrap; independent of the per-user
# fork and of build-deliver), and a Sync-hook Job triggers + waits for the build so `ws start` blocks until the
# image is genuinely pullable (no sleep-and-hope). Everything here is `oc delete all`-purgeable, so
# `ws reset` clears the istag/BuildConfig/builds and a re-materialize rebuilds them idempotently.
---
# why: the ImageStream that receives the built image; MUST exist before the build pushes to it.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ .Values.imageName }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: S2I build of the notifications service from the org seed's node/ context → {imageName}:{imageTag}.
# triggers: [] on purpose — the build-runner hook Job starts it deterministically (idempotent),
# instead of auto-firing on create, so `ws start` can BLOCK on build completion.
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: {{ .Values.imageName }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
spec:
  source:
    type: Git
    git:
      # INTERNAL Gitea service URL (no route dependency, disconnected-friendly); public repo →
      # anonymous clone (no source secret). contextDir = the zero-dep Node implementation.
      uri: "http://gitea.{{ .Values.giteaNamespace }}.svc:3000/{{ .Values.buildSourceOrg }}/{{ .Values.buildSourceRepo }}.git"
      ref: main
    contextDir: {{ .Values.buildContextDir | quote }}
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: {{ .Values.builderNamespace }}
        name: {{ .Values.builderImageTag | quote }}
  output:
    to:
      kind: ImageStreamTag
      name: {{ .Values.imageName }}:{{ .Values.imageTag }}
  triggers: []
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 768Mi}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notifications-build-packaging-distributing-{{ .Values.user }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: the build-runner hook needs to START the build (buildconfigs/instantiate), WATCH it to
# completion (builds), and CONFIRM the resulting istag (imagestreams/imagestreamtags) — all in
# {user}-dev only. Least-privilege; no cross-namespace grant.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notifications-build-packaging-distributing-{{ .Values.user }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: ["build.openshift.io"]
    resources: ["buildconfigs/instantiate"]
    verbs: ["create"]
  - apiGroups: ["build.openshift.io"]
    resources: ["builds"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams", "imagestreamtags"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notifications-build-packaging-distributing-{{ .Values.user }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notifications-build-packaging-distributing-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: notifications-build-packaging-distributing-{{ .Values.user }}
    namespace: {{ include "packaging-distributing.namespace" . }}
---
# Sync-hook Job: triggers the S2I build and BLOCKS until the istag is pullable. Re-runs on every sync
# (BeforeHookCreation) and is idempotent — if the istag already exists (ws start twice / a plain
# re-sync) it exits 0 without rebuilding. Wave 2 = after the ImageStream/BuildConfig (wave 0) and the
# fork (wave 1). ose-cli is given 512Mi (oc OOMKills at 256Mi — hard-won).
apiVersion: batch/v1
kind: Job
metadata:
  name: notifications-build-packaging-distributing-{{ .Values.user }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: notifications-build-packaging-distributing-{{ .Values.user }}
    spec:
      serviceAccountName: notifications-build-packaging-distributing-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: build
          image: registry.redhat.io/openshift4/ose-cli:latest
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          env:
            - name: NS
              value: {{ include "packaging-distributing.namespace" . | quote }}
            - name: IS
              value: {{ .Values.imageName | quote }}
            - name: TAG
              value: {{ .Values.imageTag | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # Idempotent: an existing istag means the image is already materialized (re-sync no-op).
              if oc get istag "${IS}:${TAG}" -n "$NS" >/dev/null 2>&1; then
                echo "✅ ${NS}/${IS}:${TAG} already present — skipping build"
                exit 0
              fi
              echo "▶ starting S2I build ${IS} in ${NS} (nodejs, from the parasol org seed)…"
              # --wait blocks until the build reaches a terminal state and returns non-zero on failure.
              if ! oc start-build "bc/${IS}" -n "$NS" --wait; then
                echo "❌ build failed — inspect: oc logs -f bc/${IS} -n ${NS}"
                exit 1
              fi
              echo "▶ confirming the istag populated…"
              for i in $(seq 1 30); do
                if oc get istag "${IS}:${TAG}" -n "$NS" >/dev/null 2>&1; then
                  echo "✅ ${NS}/${IS}:${TAG} ready to pull"
                  exit 0
                fi
                sleep 3
              done
              echo "❌ build completed but istag ${IS}:${TAG} did not appear in ${NS}"
              exit 1
