# Proves the entry-state engine ran for this user+module; ws verify checks it. Also the single source
# of truth that content + verify read for the attendee's fork URL, the prebuilt image ref, and the
# recommended OLM dissection target (so no cross-namespace gitea-route read is needed at verify time).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-packaging-distributing
  namespace: {{ include "packaging-distributing.namespace" . }}
  labels:
    workshop.redhat.com/module: packaging-distributing
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: packaging-distributing
  materializedFor: {{ .Values.user | quote }}
  namespace: {{ include "packaging-distributing.namespace" . }}
  # The Helm lab target: the attendee's own fork of the notifications service.
  notificationsRepo: {{ include "packaging-distributing.notificationsRepoUrl" . | quote }}
  # The prebuilt image the attendee points their Helm chart at (`--set image.repository=…`).
  imageRef: {{ include "packaging-distributing.imageRef" . | quote }}
  imageName: {{ .Values.imageName | quote }}
  imageTag: {{ .Values.imageTag | quote }}
  # The recommended read-only OLM dissection target (installed by the platform, inspected — never
  # mutated — by the attendee via the extended platform-observer). The object NAMES are stored plain;
  # the attendee-facing lesson is to fully-qualify the RESOURCE TYPE in commands (bare `subscription`/
  # `packagemanifest` resolve to the wrong kind live), e.g.
  #   oc get subscriptions.operators.coreos.com <dissectionSubscriptionName> -n <dissectionOperatorNamespace>
  dissectionOperatorNamespace: {{ .Values.dissectionOperatorNamespace | quote }}
  dissectionSubscriptionName: {{ .Values.dissectionSubscription | quote }}
  dissectionPackageName: {{ .Values.dissectionPackage | quote }}
