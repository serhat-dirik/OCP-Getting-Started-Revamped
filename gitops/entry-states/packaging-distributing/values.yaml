# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): the notifications
# app deployed to {user}-dev (Deployment + Service + edge Route), i.e. what the attendee's world
# looks like AFTER `helm install parasol-notifications`. Entry (false) = the pre-lab world: only the
# seeded fork + prebuilt istag + marker, nothing deployed — the attendee runs `helm create`/`install`
# by hand.
solve: false

# --- Gitea seed of the Helm target ------------------------------------------------------------
# The attendee gets a fork {user}/parasol-notifications of the parasol-org seed (app-repo-seed
# publishes parasol/parasol-notifications from apps/parasol-notifications at bootstrap). Same
# admin-credential-discovery + Sudo fork idiom as build-deliver/config-multienv/app-modernization (names suffixed -packaging-distributing-{user}, so
# concurrent per-user entry states never collide in the shared gitea namespace). Idempotent: the
# fork is skipped when {user}/parasol-notifications already exists (e.g. build-deliver forked it) — a re-sync
# is a safe no-op. Compose-don't-chain: this job re-creates the fork itself; it never assumes build-deliver ran.
giteaNamespace: gitea
sourceOrg: parasol
sourceRepo: parasol-notifications
forkRepo: parasol-notifications

# --- Prebuilt notifications image (istag in {user}-dev) ---------------------------------------
# `helm install` needs a pullable image. There is NO shared parasol-notifications image on the
# cluster (parasol-images ships claims/fraud/web only — see the platform report), so this chart
# MATERIALIZES one per user: an S2I nodejs build from the parasol org seed's node/ context into the
# istag {imageName}:{imageTag} in {user}-dev. Built from the ORG SEED (always present at bootstrap),
# NOT the per-user fork and NOT build-deliver — so the image is independent of both (compose-don't-chain). The
# node impl is zero-dependency (Node stdlib only), so the build needs no npm-registry egress and is
# fast + disconnected-friendly. ws reset purges the istag/BuildConfig/builds via `oc delete all`
# (all three are in the `all` category — verified live 2026-07-15).
imageName: parasol-notifications
imageTag: "1.0"
# S2I build source = the parasol org seed over the INTERNAL Gitea service URL (no route dependency,
# works disconnected). node/ context dir = the zero-dep Node implementation (README: port 8080,
# GET /health, SITE env, in-memory store).
buildSourceOrg: parasol
buildSourceRepo: parasol-notifications
buildContextDir: node
# nodejs S2I builder (openshift ns imagestream tag verified present live: nodejs:22-ubi9).
builderNamespace: openshift
builderImageTag: nodejs:22-ubi9

# --- Read-only OLM dissection target (marker/verify only; this chart installs NO operator) -----
# The lab dissects a LIVE operator's bundle read-only via the extended platform-observer ClusterRole.
# Recommended target: the Pipelines operator the attendee's CI/CD ran on all week (Succeeded, 14 owned
# CRDs, channel latest==pipelines-1.22, catalog redhat-operators). Recorded in the marker so content +
# verify agree on one target. NB: fully-qualify subscriptions.operators.coreos.com / packagemanifests
# (bare names resolve to Knative's Subscription / other catalogs — live traps).
dissectionOperatorNamespace: openshift-operators
dissectionSubscription: openshift-pipelines-operator-rh
dissectionPackage: openshift-pipelines-operator-rh
