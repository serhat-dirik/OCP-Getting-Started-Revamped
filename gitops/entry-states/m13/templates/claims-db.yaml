# PostgreSQL for the claims API. M13 is the security module, NOT the storage module, so the DB is
# deliberately EPHEMERAL (emptyDir): the claims image reseeds its fixed sample claims on every boot,
# giving the auth beats reproducible data with zero PVC footprint. Explicit resources so it schedules
# under the {user}-dev quota (Rule 13 — the quota is workshop-layer-owned, never in this chart).
---
# why: the claims datasource credentials, consumed by BOTH the DB (to init) and the app (to connect).
apiVersion: v1
kind: Secret
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: m13
type: Opaque
stringData:
  POSTGRESQL_USER: parasol
  POSTGRESQL_PASSWORD: parasol
  POSTGRESQL_DATABASE: parasol
---
# why: the PostgreSQL 15 server the claims app reads/writes; env-driven from the Secret above.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: m13
spec:
  replicas: 1
  # Recreate: a single writer to one volume — never run two Pods on the same data dir at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claims-db
  template:
    metadata:
      labels:
        app: claims-db
        workshop.redhat.com/module: m13
    spec:
      containers:
        - name: postgresql
          # Internal imagestream tag (RHEL9 PostgreSQL 15) — already cached, no external pull secret.
          image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: claims-db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -h 127.0.0.1 -p 5432"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          # Ephemeral on purpose — M13 needs a reproducible seed, not persistence (that is M05).
          emptyDir: {}
---
# why: the stable in-cluster address the app resolves — claims-db.{user}-dev.svc:5432.
apiVersion: v1
kind: Service
metadata:
  name: claims-db
  namespace: {{ .Values.user }}-dev
  labels:
    app: claims-db
    workshop.redhat.com/module: m13
spec:
  selector:
    app: claims-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
