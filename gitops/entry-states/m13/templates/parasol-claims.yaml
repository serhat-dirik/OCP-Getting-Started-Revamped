# The claims REST API. Runs the shared prebuilt image (tag 1.1 — carries quarkus-oidc, shipped with the
# tenant DISABLED so M01-M12 stay unprotected). ENTRY: unprotected (no OIDC env) — the pre-lab world.
# SOLVE: the OIDC tenant is enabled and /api/claims is enforced as a BEARER resource requiring the
# claims-adjuster realm role — the exact config proved live (401 no-token / 200 adjuster / 403 viewer).
# Enforcement is config-only (quarkus.http.auth.*) so the shipped image needs no rebuild; the in-lab
# @RolesAllowed edit is the code-level variant the module teaches on top.
---
# why: the running claims API; %prod datasource is env-driven at Service claims-db.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parasol-claims
  template:
    metadata:
      labels:
        app: parasol-claims
        workshop.redhat.com/module: m13
    spec:
      containers:
        - name: parasol-claims
          image: image-registry.openshift-image-registry.svc:5000/parasol-images/parasol-claims:1.1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRESQL_HOST
              value: claims-db
            {{- if .Values.solve }}
            # Turn the OIDC tenant ON and point it at this user's realm (workshop Keycloak).
            - name: QUARKUS_OIDC_TENANT_ENABLED
              value: "true"
            - name: QUARKUS_OIDC_AUTH_SERVER_URL
              value: "https://{{ .Values.ssoRoutePrefix }}.{{ .Values.clusterDomain }}/realms/realm-{{ .Values.user }}"
            - name: QUARKUS_OIDC_APPLICATION_TYPE
              value: "service"
            # Keycloak realm roles live under realm_access.roles — map them so the role check matches.
            - name: QUARKUS_OIDC_ROLES_ROLE_CLAIM_PATH
              value: "realm_access/roles"
            # Enforce: /api/claims requires an authenticated caller holding the claims-adjuster role.
            - name: QUARKUS_HTTP_AUTH_PERMISSION_CLAIMS_PATHS
              value: "/api/claims,/api/claims/*"
            - name: QUARKUS_HTTP_AUTH_PERMISSION_CLAIMS_POLICY
              value: "adjuster"
            - name: QUARKUS_HTTP_AUTH_POLICY_ADJUSTER_ROLES_ALLOWED
              value: "claims-adjuster"
            {{- end }}
          envFrom:
            # POSTGRESQL_USER / _PASSWORD / _DATABASE — the same Secret the DB was initialized with.
            - secretRef:
                name: claims-db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
# why: stable in-cluster address for the claims API.
apiVersion: v1
kind: Service
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m13
spec:
  selector:
    app: parasol-claims
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# why: publishes the claims API at parasol-claims-{user}-dev.{clusterDomain} so the attendee can call it
# with and without a bearer token from a terminal/browser.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-dev
  labels:
    app: parasol-claims
    workshop.redhat.com/module: m13
spec:
  to:
    kind: Service
    name: parasol-claims
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
