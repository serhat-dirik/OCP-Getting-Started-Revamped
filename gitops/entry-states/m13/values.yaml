# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → flips parasol-web + parasol-claims from UNPROTECTED to OIDC-protected and adds
# parasol-fraud (the RFC 8693 exchange target). Entry (false) = the pre-lab world the attendee starts in.
solve: false
# Route prefix of the workshop Keycloak (portfolio auth stack: Route `keycloak` in ns `sso-workshop`
# → host keycloak-sso-workshop.<clusterDomain>). The OIDC auth-server-url is built from this + the
# per-user realm: https://<ssoRoutePrefix>.<clusterDomain>/realms/realm-<user>.
ssoRoutePrefix: keycloak-sso-workshop
