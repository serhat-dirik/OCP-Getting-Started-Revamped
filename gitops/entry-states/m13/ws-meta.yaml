# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M13's whole world lives in {user}-dev: parasol-web + parasol-claims + claims-db (entry), plus the
# parasol-fraud service the solve/lab adds. `oc delete all,pvc` clears the workloads; secrets/configmaps
# the attendee created are purged too (ws engine). The per-user realm-{user} in ns sso-workshop is
# workshop-layer state (seeded once, import-once) and is deliberately NOT touched by reset — like every
# other per-user platform object it survives (Rule 13; this chart never ships it).
purgeNamespaces:
  - "${USER}-dev"
# M13 materializes the SAME {user}-dev claims stack (parasol-web/parasol-claims/claims-db) that m01-m05
# and m09-m12 own, so their entry apps would deadlock on SharedResourceWarning if they coexisted. Same-
# namespace modules are MUTUAL conflicts (ADR-0001 amendment): ws start/prep/solve evicts the conflicting
# entry app and purges {user}-dev first. m06 ({user}-batch) and m07/m08 ({user}-cicd) are disjoint → they
# coexist untouched.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m10
  - m11
  - m12
