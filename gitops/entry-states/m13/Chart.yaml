apiVersion: v2
name: m13-entry
description: "M13 Securing Apps with Keycloak — parasol-web (frontend) + parasol-claims API + an ephemeral claims-db in {user}-dev, deployed UNPROTECTED (the OIDC tenant ships disabled, so this is the pre-lab world). The per-user realm-{user} is seeded by the workshop layer. ws solve materializes the END state: parasol-web protected with auth-code+PKCE, parasol-claims as a bearer API enforcing the claims-adjuster role, and parasol-fraud (bearer, aud-guarded) for the RFC 8693 token-exchange encore."
type: application
version: 0.1.0
