# Forks the upstream Parasol source repos into THIS attendee's Gitea account, so the
# lab's S2I / Dockerfile builds clone from a repo the attendee owns (devspaces-inner-loop pushes to it,
# pipelines-fundamentals wires a webhook). Same Gitea route + admin-credential discovery pattern as
# platform-portfolio/components/git-mirror and workshop-config/gitea-user-seed — but
# per-user, and it forks (via the admin "Sudo" header to act as the attendee) instead
# of creating accounts. All names are suffixed -{user} so concurrent per-user entry
# states never collide in the shared gitea namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: build-deliver
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read the Gitea CR status + operator admin secret + route host to reach the API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: build-deliver
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: ["pfe.rhpds.com"]
    # NOTE: the rhpds CRD's plural is literally "gitea" (not "giteas") — verified live.
    resources: ["gitea"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: build-deliver
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-fork-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: gitea-fork-{{ .Values.user }}
    namespace: {{ .Values.giteaNamespace }}
---
# Argo Sync hook (BeforeHookCreation): re-runs on every ws start / ws reset so the fork
# is (re)made idempotently; a pre-existing fork is tolerated. Runs after the RBAC above.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-fork-{{ .Values.user }}
  namespace: {{ .Values.giteaNamespace }}
  labels:
    workshop.redhat.com/module: build-deliver
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: gitea-fork-{{ .Values.user }}
    spec:
      serviceAccountName: gitea-fork-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: fork
          # why ose-cli: ships oc + curl on every connected cluster; no custom image.
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITEA_NS
              value: {{ .Values.giteaNamespace | quote }}
            - name: TARGET_USER
              value: {{ .Values.user | quote }}
            - name: UPSTREAM_ORG
              value: {{ .Values.upstreamOrg | quote }}
            - name: REPOS
              value: "parasol-claims parasol-notifications"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              NS="${GITEA_NS}"

              echo "▶ waiting for the Gitea route…"
              for i in $(seq 1 60); do
                HOST="$(oc get route gitea -n "$NS" -o jsonpath='{.spec.host}' 2>/dev/null || true)"
                [[ -n "$HOST" ]] && break
                sleep 10
              done
              [[ -n "${HOST:-}" ]] || { echo "❌ gitea route not found after 10m"; exit 1; }
              GITEA_URL="https://${HOST}"

              echo "▶ discovering admin credentials (retry loop — operator writes them post-setup)…"
              ADMIN_USER="$(oc get gitea gitea -n "$NS" -o jsonpath='{.spec.giteaAdminUser}' 2>/dev/null || echo gitea-admin)"
              ADMIN_PASS=""
              for i in $(seq 1 60); do
                ADMIN_PASS="$(oc get gitea gitea -n "$NS" -o jsonpath='{.status.adminPassword}' 2>/dev/null || true)"
                [[ -z "$ADMIN_PASS" ]] && ADMIN_PASS="$(oc get secret gitea-admin-credentials -n "$NS" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)"
                [[ -n "$ADMIN_PASS" ]] && break
                sleep 10
              done
              [[ -n "$ADMIN_PASS" ]] || { echo "❌ no Gitea admin password after 10m (CR status + gitea-admin-credentials secret)"; exit 1; }
              AUTH="${ADMIN_USER}:${ADMIN_PASS}"

              echo "▶ waiting for the Gitea API…"
              for i in $(seq 1 30); do
                curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null && break
                sleep 10
              done
              curl -ksf -u "$AUTH" "${GITEA_URL}/api/v1/version" >/dev/null || { echo "❌ Gitea API not answering"; exit 1; }

              FAIL=0
              for REPO in ${REPOS}; do
                # Already forked? (fork is async; a prior run may have created it.)
                if curl -ksf -o /dev/null -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}"; then
                  echo "  ✓ ${TARGET_USER}/${REPO} already exists"
                  continue
                fi
                # Fork parasol/<repo> INTO the attendee's account by acting as them (Sudo header).
                CODE="$(curl -ks -o /tmp/fork.json -w '%{http_code}' -u "$AUTH" -H "Sudo: ${TARGET_USER}" \
                  -X POST "${GITEA_URL}/api/v1/repos/${UPSTREAM_ORG}/${REPO}/forks" \
                  -H 'Content-Type: application/json' -d '{}')"
                case "$CODE" in
                  201|202) echo "  ✓ ${TARGET_USER}/${REPO} fork requested (${CODE})";;
                  409|422) echo "  ✓ ${TARGET_USER}/${REPO} already exists (${CODE})";;
                  *) echo "  ❌ fork ${REPO} failed (HTTP ${CODE}): $(cat /tmp/fork.json)"; FAIL=$((FAIL + 1)); continue;;
                esac
                # Fork is asynchronous — poll until the new repo answers (bounded).
                for i in $(seq 1 30); do
                  curl -ksf -o /dev/null -u "$AUTH" "${GITEA_URL}/api/v1/repos/${TARGET_USER}/${REPO}" && { echo "    ↳ ${TARGET_USER}/${REPO} ready"; break; }
                  sleep 4
                done
              done

              [[ "$FAIL" -eq 0 ]] || { echo "❌ ${FAIL} fork(s) failed for ${TARGET_USER}"; exit 1; }
              echo "✅ forks ready for ${TARGET_USER} at ${GITEA_URL}"
