# ws reset purges user-created leftovers (workloads/builds/services/routes/pvcs) from
# these namespaces before re-materializing — build-deliver's entry state is "an EMPTY dev namespace
# plus the Gitea forks". The forks themselves are NOT purged (they are entry state; the
# fork job re-creates them idempotently on the next start).
purgeNamespaces:
  - "${USER}-dev"
# Modules whose entry/solve charts materialize the SAME named workloads (parasol-claims /
# claims-db in ${USER}-dev). Coexisting Argo apps deadlock over them (SharedResourceWarning,
# both OutOfSync — G3-config-multienv evidence), so `ws start`/`ws solve` evicts these before materializing.
# platform-orientation is listed too: it shares {user}-dev, and same-namespace modules are conflicts by policy
# (2026-07-10). Only cross-namespace modules (jobs-batch-kueue {user}-batch) truly coexist.
conflictsWith:
  - platform-orientation
  - devspaces-inner-loop
  - config-multienv
  - storage-stateful
  - gitops-fundamentals
  - gitops-at-scale
  - developer-hub-golden-paths
  - observability-health-scale
  - securing-apps-keycloak
  - multi-tenancy-workload-security
  - networking-dev-devops
  - deployment-targets-scheduling
  - registry-images-catalog-governance
  - serverless-zero-to-hero
  - eventing-deep-dive
  - ai-assisted-development
  - packaging-distributing
