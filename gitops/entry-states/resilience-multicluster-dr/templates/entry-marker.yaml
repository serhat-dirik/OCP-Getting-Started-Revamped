# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it. resilience-multicluster-dr spans THREE
# namespaces (client + site-a + site-b). `ws prep` iterates every namespace in ws-meta purgeNamespaces and
# flags any that has workloads but no ws-entry-<module> marker as a "foreign leftover" — so EACH of the
# three needs its own marker or prep never converges (the two-namespace lesson from the prior resilience-multicluster-dr build).
# The verify script asserts the marker only in the client ns (the primary); the site markers make site-a /
# site-b legibly resilience-multicluster-dr-owned to the prep heuristic.
{{- range $ns := list (include "resilience-multicluster-dr.clientNs" .) (include "resilience-multicluster-dr.siteANs" .) (include "resilience-multicluster-dr.siteBNs" .) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-resilience-multicluster-dr
  namespace: {{ $ns }}
  labels:
    workshop.redhat.com/module: resilience-multicluster-dr
    workshop.redhat.com/user: {{ $.Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: resilience-multicluster-dr
  materializedFor: {{ $.Values.user | quote }}
  clientNamespace: {{ include "resilience-multicluster-dr.clientNs" $ }}
  siteANamespace: {{ include "resilience-multicluster-dr.siteANs" $ }}
  siteBNamespace: {{ include "resilience-multicluster-dr.siteBNs" $ }}
{{- end }}
