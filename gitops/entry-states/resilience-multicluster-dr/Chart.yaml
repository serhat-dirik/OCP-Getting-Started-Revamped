apiVersion: v2
name: resilience-multicluster-dr-entry
description: "Resilience, Multi-Cluster & DR — APPLICATION-LEVEL cross-site failover simulated on a single cluster with THREE workshop-owned per-user namespaces, all enrolled in the shared OSSM3 mesh. {user}-site-a and {user}-site-b each run a RESILIENT claims service (a light env-driven responder that echoes its SITE, at 3 replicas + PodDisruptionBudget + topologySpreadConstraints + HorizontalPodAutoscaler + probes); {user}-client runs the external curl-loop client and the mesh ingress GATEWAY (the stable endpoint, pinned to site-a's locality so the mesh prefers the primary). Entry ships NO failover routing — the stable endpoint 404s until the attendee wires it. ws solve materializes the END state: the ServiceEntry + DestinationRule (locality LB + outlier detection) + VirtualService (retries) that route primary->site-a with automatic failover->site-b, plus a ws-solve-resilience-multicluster-dr marker. The OSSM3 (istio-system) and Skupper v2 / RHSI operators are installed by the platform-portfolio mesh + resilience stacks, NOT this chart; the three namespaces are created + quota'd + mesh-labelled by the workshop layer (per-user-resilience.yaml), NOT this chart (Rule 13)."
type: application
version: 0.2.0
