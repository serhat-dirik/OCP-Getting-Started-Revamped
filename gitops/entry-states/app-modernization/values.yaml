# Injected by ws start (helm parameters user, clusterDomain, solve); defaults here serve local
# `helm template` dev.
user: user1
clusterDomain: apps.example.com
# ws solve sets true → renders the module END state (instructor/demo/testing): the MODERNIZED claims
# service deployed to {user}-modernize (the outcome of "fix issues → containerize → deploy to
# OpenShift"). Entry (false) = the pre-lab world: only the seeded legacy repo + marker + MaaS creds,
# nothing deployed — the attendee assesses, analyzes, fixes, and deploys by hand.
solve: false

# --- Gitea seed of the legacy migration target ------------------------------------------------
# The attendee gets a fork {user}/parasol-legacy-claims of the parasol-org seed (app-repo-seed
# publishes parasol/parasol-legacy-claims from apps/parasol-legacy-claims at bootstrap). MTA
# analyzes this repo's SOURCE. Same admin-credential-discovery + Sudo fork idiom as config-multienv/gitops-fundamentals/gitops-at-scale.
giteaNamespace: ogsr-gitea
sourceOrg: parasol
sourceRepo: parasol-legacy-claims
forkRepo: parasol-legacy-claims

# --- Shared MTA Hub (platform-portfolio mta stack) --------------------------------------------
# Informational for the marker/verify; this chart never installs MTA (Rule 13 / workshop-agnostic).
mtaNamespace: openshift-mta

# --- MaaS credentials for Developer Lightspeed for MTA ([ADS]) --------------------------------
# The AI refactor calls an OpenAI-compatible Models-as-a-Service endpoint. The endpoint + model are
# not secrets (ConfigMap); the Bearer token is COPIED at sync time from the platform Lightspeed
# secret into {user}-modernize by a hook Job (same pattern as jobs-batch-kueue). BEST-EFFORT / graceful
# degradation: if the source secret is absent (a cluster without the [ADS] entitlement), the hook
# logs and exits 0 — the [OCP] MTA assess/analyze/replatform flow is unaffected. The resulting
# maas-credentials Secret is auto-mounted into the Dev Spaces workspace (Che automount label).
maasEndpoint: https://maas-rhdp.apps.maas.redhatworkshops.io/v1
maasModel: qwen3-14b
maasSourceNamespace: openshift-lightspeed
maasSourceSecret: credentials
maasSourceKey: apitoken

# --- solve: the modernized claims service image ----------------------------------------------
# The modern counterpart to the legacy Tomcat WAR — the Parasol claims service as a Quarkus
# container (parasol-images, reached via the in-cluster registry). Deployed to {user}-modernize at
# solve to represent "modernized + containerized + deployed to OpenShift". {user}-modernize's SA
# group holds system:image-puller on parasol-images (workshop-config parasol-images-pull.yaml).
claimsImage: image-registry.openshift-image-registry.svc:5000/ogsr-parasol-images/parasol-claims:1.1
