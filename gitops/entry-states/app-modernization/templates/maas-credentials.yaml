# Developer Lightspeed for MTA ([ADS]) LLM wiring for {user}-modernize. The endpoint + model are NOT
# secrets and live in a ConfigMap; the Bearer token IS a secret and is COPIED at sync time from the
# platform Lightspeed secret (openshift-lightspeed/credentials key apitoken) into a maas-credentials
# Secret here, by a hook Job with its own ServiceAccount and least-privilege RBAC (get on THAT ONE
# named source secret; create/update secrets only in this namespace). Same discovery pattern as jobs-batch-kueue,
# suffixed -app-modernization-{user}.
#
# THREE app-modernization-specific twists vs jobs-batch-kueue:
#   1. GRACEFUL DEGRADATION (entitlement split): if the source secret is absent (a cluster without the
#      [ADS] MaaS entitlement) the Job logs and exits 0 — the [OCP] MTA assess/analyze/replatform flow
#      is unaffected; only the AI refactor beat is unavailable. The verify script treats MaaS as
#      optional/INFO.
#   2. The resulting Secret carries the Che automount label/annotation so Dev Spaces mounts the keys
#      into the app-modernization workspace as env GENAI_API_KEY + GENAI_MODEL + GENAI_ENDPOINT for the MTA extension.
#   3. PER-CLUSTER MODEL/ENDPOINT: the Job also reads model + endpoint from the SAME source secret and
#      converges both the maas-config ConfigMap and the Secret to them, falling back to the chart values
#      (values.yaml maasModel/maasEndpoint — default llama-scout-17b, task #67) when the source keys are
#      absent. This lets one chart target a cluster whose MaaS key is scoped to a different model without
#      editing the chart.
---
# why: endpoint + model for the MTA extension / attendee to read (attendee-editable, not sensitive).
# Helm renders the chart-default (values.yaml) model/endpoint so this ConfigMap is ALWAYS present (the
# verify script hard-checks it, on every cluster incl. non-[ADS] ones). The Sync-hook Job below then
# CONVERGES model/endpoint to the platform's on-cluster values when the source Lightspeed secret carries
# model/endpoint keys; where those keys are absent the chart default stands — llama-scout-17b (task #67:
# the per-user MaaS key is model-scoped and only grants this model). selfHeal is OFF for entry
# Applications (ws render_app), so Argo keeps the Job's edit and `ws reset` re-converges — the same
# drift class as an attendee's own lab edits to chart-owned objects.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-config
  namespace: {{ include "app-modernization.namespace" . }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  endpoint: {{ .Values.maasEndpoint | quote }}
  model: {{ .Values.maasModel | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maas-copy-app-modernization-{{ .Values.user }}
  namespace: {{ include "app-modernization.namespace" . }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: read ONLY the one named source secret in the platform Lightspeed namespace (resourceNames
# pins it to `credentials` — no blanket secret read in a shared namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-app-modernization-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.maasSourceSecret | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-app-modernization-{{ .Values.user }}
  namespace: {{ .Values.maasSourceNamespace }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-app-modernization-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-app-modernization-{{ .Values.user }}
    namespace: {{ include "app-modernization.namespace" . }}
---
# why: let the copy Job write the resulting maas-credentials secret AND converge the maas-config
# ConfigMap's model/endpoint to the platform's on-cluster values — both in {user}-modernize.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-copy-app-modernization-{{ .Values.user }}
  namespace: {{ include "app-modernization.namespace" . }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    # patch maas-config with the model/endpoint the copy Job resolves (from the source secret or fallback).
    resources: ["configmaps"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maas-copy-app-modernization-{{ .Values.user }}
  namespace: {{ include "app-modernization.namespace" . }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: maas-copy-app-modernization-{{ .Values.user }}
subjects:
  - kind: ServiceAccount
    name: maas-copy-app-modernization-{{ .Values.user }}
    namespace: {{ include "app-modernization.namespace" . }}
---
# Sync-hook Job: copies the apitoken into maas-credentials (key GENAI_API_KEY). Re-runs on every sync
# (BeforeHookCreation) and is idempotent (apply of the same Secret). Wave 1 = after the RBAC. The token
# is never decoded or logged — the base64 value is passed straight through into the target Secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: maas-copy-app-modernization-{{ .Values.user }}
  namespace: {{ include "app-modernization.namespace" . }}
  labels:
    workshop.redhat.com/module: app-modernization
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: maas-copy-app-modernization
        workshop.redhat.com/module: app-modernization
    spec:
      serviceAccountName: maas-copy-app-modernization-{{ .Values.user }}
      restartPolicy: Never
      containers:
        - name: copy
          # ose-cli ships oc; no custom image to maintain (same choice as jobs-batch-kueue).
          image: registry.redhat.io/openshift4/ose-cli:latest
          # `oc` is a large Go binary — 128Mi OOMKills it; 512Mi limit gives it headroom.
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          env:
            - name: SRC_NS
              value: {{ .Values.maasSourceNamespace | quote }}
            - name: SRC_SECRET
              value: {{ .Values.maasSourceSecret | quote }}
            - name: SRC_KEY
              value: {{ .Values.maasSourceKey | quote }}
            - name: DST_NS
              value: {{ include "app-modernization.namespace" . | quote }}
            - name: DST_USER
              value: {{ .Values.user | quote }}
            # Fallback used when the source Lightspeed secret does NOT carry model/endpoint keys: the
            # chart default (values.yaml) stands — llama-scout-17b (task #67; FSC litemaas.model default).
            - name: FALLBACK_MODEL
              value: {{ .Values.maasModel | quote }}
            - name: FALLBACK_ENDPOINT
              value: {{ .Values.maasEndpoint | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ looking for the [ADS] MaaS source ${SRC_NS}/${SRC_SECRET}…"
              TOKEN_B64=""
              for i in $(seq 1 12); do
                TOKEN_B64="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath="{.data.${SRC_KEY}}" 2>/dev/null || true)"
                [[ -n "$TOKEN_B64" ]] && break
                sleep 5
              done
              if [[ -z "$TOKEN_B64" ]]; then
                # GRACEFUL DEGRADATION: no [ADS] entitlement on this cluster. The [OCP] MTA core
                # (assess/analyze/replatform) is unaffected — only Developer Lightspeed is disabled.
                echo "▶ [ADS] MaaS source not readable — Developer Lightspeed for MTA disabled; [OCP] MTA core unaffected. Skipping."
                exit 0
              fi
              # Source the MODEL + ENDPOINT from the SAME Lightspeed secret when the platform set them;
              # fall back to the chart values when they are absent (the source secret typically carries
              # only apitoken → the llama-scout-17b default stands, task #67). Model + endpoint are NOT
              # secret; the apitoken is never decoded or logged (base64 passthrough only).
              SRC_MODEL="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.model}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              SRC_ENDPOINT="$(oc get secret "${SRC_SECRET}" -n "${SRC_NS}" -o jsonpath='{.data.endpoint}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              MODEL="${SRC_MODEL:-$FALLBACK_MODEL}"
              ENDPOINT="${SRC_ENDPOINT:-$FALLBACK_ENDPOINT}"
              if [[ -n "$SRC_MODEL" ]]; then
                echo "▶ model/endpoint sourced from ${SRC_NS}/${SRC_SECRET}: model=${MODEL}"
              else
                echo "▶ source secret carries no model key — using chart fallback: model=${MODEL}"
              fi
              # Converge the attendee-readable maas-config ConfigMap to the effective values (Helm rendered
              # it with the fallback default). selfHeal is off for entry Apps → Argo keeps this edit; a
              # `ws reset` re-converges it. This is what lets maas-config track the platform's real model
              # on a cluster whose Lightspeed secret carries its own model/endpoint keys.
              oc patch configmap maas-config -n "${DST_NS}" --type merge \
                -p "{\"data\":{\"model\":\"${MODEL}\",\"endpoint\":\"${ENDPOINT}\"}}"
              echo "▶ materializing maas-credentials in ${DST_NS} (token passed through as base64, never logged)…"
              MODEL_B64="$(printf %s "$MODEL" | base64 | tr -d '\n')"
              ENDPOINT_B64="$(printf %s "$ENDPOINT" | base64 | tr -d '\n')"
              # The Che automount label/annotation makes Dev Spaces mount this Secret's keys as env vars into
              # the app-modernization workspace: GENAI_API_KEY + GENAI_MODEL + GENAI_ENDPOINT → the MTA VS Code extension.
              oc apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: maas-credentials
                namespace: ${DST_NS}
                labels:
                  workshop.redhat.com/module: app-modernization
                  workshop.redhat.com/user: ${DST_USER}
                  controller.devfile.io/mount-to-devworkspace: "true"
                annotations:
                  controller.devfile.io/mount-as: env
              type: Opaque
              data:
                GENAI_API_KEY: ${TOKEN_B64}
                GENAI_MODEL: ${MODEL_B64}
                GENAI_ENDPOINT: ${ENDPOINT_B64}
              EOF
              echo "✅ maas-credentials ready in ${DST_NS} ([ADS] Developer Lightspeed wired: key + model ${MODEL})"
