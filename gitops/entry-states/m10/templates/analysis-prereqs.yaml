# Per-user canary-analysis prerequisites in {user}-prod — the PLATFORM half of M10's automated
# analysis (the attendee's AnalysisTemplate in the fork references these by name). The job-provider
# AnalysisTemplate runs its probe Job under the claims-analysis SA and reads the m10-canary-control
# ConfigMap knob; both must exist BEFORE the attendee converts prod to a Rollout, so the entry state
# owns them (not the fork). Deliberately NOT the Prometheus/thanos-querier + cluster-monitoring-view
# path the build note sketched: the job provider needs only a namespaced configmaps-read grant, so the
# per-user footprint is one SA + a tiny Role — no cluster-scoped monitoring RBAC (see the
# progressive-delivery stack README for the metrics-source decision).
#
# These are plain resources (not Argo hooks): the entry app owns them, so they are pruned on reset and
# re-created on the next start. The verdict knob defaults to "pass" (healthy) — the attendee flips it
# to "fail" to trigger the deterministic auto-rollback beat.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claims-analysis
  namespace: {{ .Values.user }}-prod
  labels:
    workshop.redhat.com/module: m10
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
---
# why: the analysis probe Job reads the m10-canary-control ConfigMap to honor the verdict knob.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claims-analysis
  namespace: {{ .Values.user }}-prod
  labels:
    workshop.redhat.com/module: m10
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claims-analysis
  namespace: {{ .Values.user }}-prod
  labels:
    workshop.redhat.com/module: m10
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claims-analysis
subjects:
  - kind: ServiceAccount
    name: claims-analysis
    namespace: {{ .Values.user }}-prod
---
# Deterministic analysis knob: verdict=pass → real canary health probe; verdict=fail → forced failed
# assessment (the "ship a bad release" beat). Mutable by the attendee (oc patch) — the analysis Job
# reads it fresh on every run.
apiVersion: v1
kind: ConfigMap
metadata:
  name: m10-canary-control
  namespace: {{ .Values.user }}-prod
  labels:
    workshop.redhat.com/module: m10
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  verdict: "pass"
