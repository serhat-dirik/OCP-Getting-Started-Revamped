# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
# Lives in {user}-gitops (M10's home namespace: where the attendee's Argo CD Applications live).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m10
  namespace: {{ .Values.user }}-gitops
  labels:
    workshop.redhat.com/module: m10
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m10
  materializedFor: {{ .Values.user | quote }}
