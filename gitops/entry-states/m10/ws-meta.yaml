# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M10's entry state is the M09 END STATE (claims GitOps-managed in {user}-dev + {user}-stage via two
# student Applications) + a {user}/claims-config fork extended with the rollouts/ + applicationset
# source + per-user analysis prereqs in {user}-prod. During the lab the attendee converts the envs to
# an ApplicationSet and converts {user}-prod to an Argo Rollout (canary + analysis). Reset must clear
# (a) claims workloads in dev/stage/prod — purgeNamespaces — and (b) the attendee's Application/
# ApplicationSet CRs, which under ADR-0002 amendment 1 (option B) live in the student-gitops CONTROL
# PLANE, not in a purge namespace — purgeApps* below. The fork is NOT purged (entry state), but the
# fork job RE-ASSERTS its canonical content on every start/reset (factory-fresh). {user}-prod is
# purged too (M10 reaches prod, unlike M09) so a canary/analysis left mid-flight is cleared; the
# analysis SA + m10-canary-control knob are re-materialized by the entry hooks. {user}-gitops is
# purged (workspace/marker ns) so any kustomize scratch is cleared; purge_ns keeps the current marker.
purgeNamespaces:
  - "${USER}-gitops"
  - "${USER}-dev"
  - "${USER}-stage"
  - "${USER}-prod"
# Attendee-created Argo Applications AND ApplicationSets live outside every purge namespace
# (student-gitops control plane), so the engine deletes them by AppProject: ws reset AND conflict
# eviction call purge_apps, which removes every Application in purgeAppsNamespace whose
# .spec.project == purgeAppsProject. This project overlaps m09's (same student instance, same
# proj-{user}) — that is CORRECT: purge is per-project, and both modules' resets clean attendee apps.
# (ApplicationSet-generated child Applications also carry proj-{user}; deleting the ApplicationSet
# prunes them, and any that outlive it are swept by the same project selector.)
purgeAppsNamespace: student-gitops
purgeAppsProject: proj-${USER}
# M10 deploys claims into {user}-dev/stage (M09 end state) AND {user}-prod (Rollout), the SAME
# namespaces m01-m05 own AND m09 reaches. Starting M10 evicts those entry apps + their attendee apps
# (gc calls purge_apps for each conflicting module) and purges dev/stage/prod, so the attendee starts
# clean. m01-m05 AND m09 reciprocally list m10 (PM-sanctioned both-directions edit 2026-07-11), so
# switching either direction is clean. m06 ({user}-batch) and m07 ({user}-cicd) are disjoint.
conflictsWith:
  - m01
  - m02
  - m03
  - m04
  - m05
  - m09
  - m11
  - m12
  - m13
  - m14
  - m15
  - m16
  - m17
  - m19
  - m20
  - m24
  - m25
# The entry hook BLOCKS while the two M09-end-state student Applications deploy claims into
# {user}-dev and {user}-stage (~4-6 min cold: image pull + claims-db + app startup, both envs); solve
# adds a third (prod Rollout) synced to Healthy. ws start/solve wait windows must outlive it; the
# hook Jobs' activeDeadlineSeconds (900) is the hard stop.
waitSeconds: 900
