# Pipelines-as-Code anchor for the attendee's fork: PaC matches an incoming Gitea webhook to this
# Repository by URL, then runs the fork's .tekton/pull-request.yaml. Pre-created so the PaC half of
# M07 is one step away — the attendee adds the Gitea webhook (+ its secret) pointing at the PaC
# controller route as the LAB exercise (left manual on purpose). URL is derived from the cluster
# ingress domain (route "gitea" in namespace "gitea" → gitea-gitea.<domain>).
#
# git_provider is REQUIRED for a Gitea webhook provider: PaC rejects the webhook with "failed to find
# git_provider details in repository spec" without it (verified on-cluster 2026-07-10). It is shipped
# here (not left to an attendee `oc patch`, which Argo would revert on the next entry-app sync) and
# references a Secret the attendee CREATES in the lab — `gitea-pac-secret`, holding a Gitea token
# (key `token`) and a shared webhook secret (key `webhook-secret`). The CR referencing a not-yet-
# existing Secret is inert: PaC only reads it when a webhook actually arrives.
apiVersion: pipelinesascode.tekton.dev/v1alpha1
kind: Repository
metadata:
  name: parasol-claims
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m07
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
spec:
  url: https://gitea-{{ .Values.giteaNamespace }}.{{ .Values.clusterDomain }}/{{ .Values.user }}/parasol-claims
  git_provider:
    type: gitea
    url: https://gitea-{{ .Values.giteaNamespace }}.{{ .Values.clusterDomain }}
    secret:
      name: gitea-pac-secret
      key: token
    webhook_secret:
      name: gitea-pac-secret
      key: webhook-secret
