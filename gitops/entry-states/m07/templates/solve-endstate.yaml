{{- if .Values.solve }}
# END state for instructor demos (`ws solve m07`): actually RUN the build-test-deploy pipeline so
# the module's outcome — a pipeline-built, DB-backed claims app — really exists. The PostSync hook
# Job launches the PipelineRun and WAITS for it to succeed: "demo-ready" must not print while the
# pipeline still has minutes to go and Topology is empty (caught live, first cycle 2026-07-10 — the
# original fire-and-forget let `ws solve` report ready ~7 min early). The blocking hook keeps the
# Argo sync OPERATION Running, which ws's wait now gates on (operationState.phase), sized by
# ws-meta `waitSeconds` — the pipeline is ~9 min; window 1200s covers a cold cluster.
#
# Job pod templates are immutable, so re-solve must recreate the Job: the BeforeHookCreation delete
# policy + the -{user}-suffixed name handle that. The PipelineRun uses generateName (unique per run)
# and a per-run volumeClaimTemplate PVC (auto-pruned), so re-solve never wedges on immutability/PVCs.
# backoffLimit 0: a retry would launch a SECOND PipelineRun beside a possibly-live first — fail loud.
apiVersion: v1
kind: ConfigMap
metadata:
  name: m07-solve-run-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m07
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  # The PipelineRun the solve Job submits — the same plain run the attendee starts from the console
  # (SA pipeline + a per-run workspace PVC). No per-task memory overrides: the -cicd namespace default
  # container limit is sized for these Maven/Quarkus builds in per-user-limits.yaml, so a plain run does
  # not OOM. All Pipeline params default (shared repo, own-namespace image target), so none are set here.
  pipelinerun.yaml: |
    apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: solve-parasol-claims-
      labels:
        app.kubernetes.io/part-of: parasol-claims
        workshop.redhat.com/module: m07
    spec:
      pipelineRef:
        name: parasol-claims-build-test-deploy
      taskRunTemplate:
        serviceAccountName: pipeline
      workspaces:
        - name: shared-workspace
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: m07-solve-{{ .Values.user }}
  namespace: {{ .Values.user }}-cicd
  labels:
    workshop.redhat.com/module: m07
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    # PostSync: run after claims-db + the Pipeline have synced, so the launched run finds them.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 1200
  template:
    metadata:
      labels:
        app: m07-solve-{{ .Values.user }}
    spec:
      # The operator-provisioned pipeline SA (edit) can create PipelineRuns in its own namespace.
      serviceAccountName: pipeline
      restartPolicy: Never
      volumes:
        - name: solve
          configMap:
            name: m07-solve-run-{{ .Values.user }}
      containers:
        - name: solve
          image: registry.redhat.io/openshift4/ose-cli:latest
          volumeMounts:
            - name: solve
              mountPath: /solve
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "▶ launching the build-test-deploy pipeline (solve end-state)…"
              PR="$(oc create -o name -f /solve/pipelinerun.yaml)"
              echo "  ✓ started ${PR#*/} — waiting for it (build+test+deploy ≈ 9 min)…"
              for i in $(seq 1 110); do
                s="$(oc get "$PR" -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || true)"
                case "$s" in
                  True)
                    echo "  ✓ pipeline Succeeded — parasol-claims deployed and wired to claims-db"
                    exit 0;;
                  False)
                    echo "  ❌ pipeline FAILED — inspect: tkn pipelinerun logs ${PR##*/}"
                    exit 1;;
                esac
                sleep 10
              done
              echo "  ❌ pipeline still not finished after ~18 min — inspect: oc get ${PR}"
              exit 1
{{- end }}
