# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M07's entry state is the build-test-deploy Pipeline + an ephemeral claims-db in {user}-cicd
# (plus the per-user Gitea fork, which the fork job re-creates idempotently and reset does NOT
# purge). The lab runs pipelines that create PipelineRuns, TaskRun pods, per-run PVCs
# (volumeClaimTemplate) and a parasol-claims Deployment — `oc delete all,pvc` clears them back
# to the entry state (the platform-owned quota/limitrange/rbac and the pipeline SA are untouched).
purgeNamespaces:
  - "${USER}-cicd"
# M07 shares {user}-cicd with M08 (both materialize the parasol-claims pipeline world there), so the
# two are MUTUAL conflicts (ADR-0001 amendment 4: same-namespace modules must declare each other, both
# directions). Starting/preparing M07 evicts M08's entry app + purges {user}-cicd, and vice versa.
# M01-M05 ({user}-dev) and M06 ({user}-batch) are disjoint namespaces → they still coexist with M07.
# M27 (DevSecOps) also materializes a parasol-claims pipeline + claims-db in {user}-cicd → mutual conflict.
conflictsWith:
  - m08
  - m27
# The solve hook BLOCKS while the build-test-deploy pipeline runs (~9 min; cold cluster longer),
# so ws start/solve wait windows must outlive it. Engine default is 300s; the solve Job's own
# activeDeadlineSeconds (1200) is the hard stop.
waitSeconds: 1200
