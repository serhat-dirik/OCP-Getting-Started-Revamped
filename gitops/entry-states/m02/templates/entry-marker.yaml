# Proves the entry-state engine ran for this user+module; ws verify checks it (DATA=2).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m02
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m02
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: m02
  materializedFor: {{ .Values.user | quote }}
