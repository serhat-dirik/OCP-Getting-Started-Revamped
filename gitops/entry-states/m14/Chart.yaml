description: "M14 Multi-Tenancy & Workload Security — reframes the standing {user}-dev/stage/prod as a 'payments team' sandbox: seeds 2 synthetic teammate ServiceAccounts (payments-ci, payments-ops) to govern, a workload ServiceAccount (root-demander), and a root-demanding Deployment (scaled to 0, forces runAsUser:0) the attendee scales up to watch restricted-v2 reject at admission. ws solve materializes the END state: the workload FIXED to run non-root (running), plus the team RBAC (payments-ci edit-in-dev/view-in-prod, payments-ops a custom 'deployer' Role — deployments yes, secrets no). Quotas/limits are reused from the workshop layer, never chart-owned."
