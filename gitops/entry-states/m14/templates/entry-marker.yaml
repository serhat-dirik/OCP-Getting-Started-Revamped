# Proves the entry-state engine ran for this user+module; ws verify + ws prep check it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m14
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m14
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
data:
  module: m14
  materializedFor: {{ .Values.user | quote }}
  # The 3 namespaces this attendee governs as the "payments team" (their standing dev/stage/prod,
  # reframed). Recorded so the attendee and the verify script see the sandbox without a cross-ns read.
  team: "{{ .Values.user }}-dev {{ .Values.user }}-stage {{ .Values.user }}-prod"
