{{- if .Values.solve }}
# END state for instructor demos / `ws solve m14` / testing: the "payments team" RBAC the attendee
# builds by hand in the lab. All bindings are NAMESPACED (never a ClusterRole/ClusterRoleBinding) so
# the sandbox can't escape — the spec's central watchout. The workshop-entries AppProject permits
# namespaced Roles/RoleBindings (it blacklists only ResourceQuota/LimitRange), so these sync cleanly.
# Subjects are the synthetic teammate SAs from teammate-sas.yaml (always present).
---
# why: teammate payments-ci gets `edit` in {user}-dev — a developer who can build and run in dev.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-ci-edit-dev
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m14
    workshop.redhat.com/user: {{ .Values.user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: payments-ci
    namespace: {{ .Values.user }}-dev
---
# why: the SAME teammate gets only `view` in {user}-prod — read-only in production (different access
# per environment is the cross-namespace RBAC lesson). The SA is referenced in its {user}-dev home.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-ci-view-prod
  namespace: {{ .Values.user }}-prod
  labels:
    workshop.redhat.com/module: m14
    workshop.redhat.com/user: {{ .Values.user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: payments-ci
    namespace: {{ .Values.user }}-dev
---
# why: the custom least-privilege Role — manage Deployments (and watch pods) but NO secrets access.
# This is the "author a scoped Role that can't read secrets" beat; contrast with the built-in `edit`
# (which CAN read secrets) bound to payments-ci above.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m14
    workshop.redhat.com/user: {{ .Values.user | quote }}
rules:
  # Full lifecycle on Deployments (including scale) — a CI identity's core job.
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read pods to observe rollouts — deliberately NO secrets/configmaps rule (the whole point).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
# why: teammate payments-ops (the CI/automation identity) gets the custom `deployer` Role — it can
# ship Deployments but cannot read the team's Secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-ops-deployer-dev
  namespace: {{ .Values.user }}-dev
  labels:
    workshop.redhat.com/module: m14
    workshop.redhat.com/user: {{ .Values.user | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployer
subjects:
  - kind: ServiceAccount
    name: payments-ops
    namespace: {{ .Values.user }}-dev
{{- end }}
