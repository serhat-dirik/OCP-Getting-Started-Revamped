apiVersion: v2
name: ai-assisted-development-entry
description: "AI-Assisted Development on OpenShift (vibe coding, safely) — the per-user AI-assist world in the workshop-owned {user}-dev namespace: an entry marker; a DIGEST-PINNED OpenShift/Kubernetes MCP server (containers/kubernetes-mcp-server v0.0.65) run as a dedicated least-privilege ServiceAccount mcp-agent whose ONLY grant is a namespaced RoleBinding to the built-in `view` ClusterRole (read-only on {user}-dev, no secrets, no cross-namespace) — so RBAC, not the server's --read-only flag, is the security boundary (the CVE-2026-46519 lesson); a DETERMINISTIC broken deployment (parasol-claims:1.0 with a wrong readinessProbe path → Running 0/1, one probe-404 event, no restart loop) that the agent diagnoses read-only and later fixes with a one-field patch once the attendee grants a scoped write; MaaS credentials wired via the jobs-batch-kueue/agentic-ai hook (apitoken copied from openshift-lightspeed/credentials into a maas-credentials Secret, model+endpoint sourced per-cluster with a chart-values fallback) and auto-mounted into the workspace; and a Dev Spaces DevWorkspace (started:false) carrying the neutral mcp-agent-cli client configured against MaaS + the in-cluster MCP server. All state is namespaced in {user}-dev (non-invasive; nothing cluster-wide). {user}-dev (quota/limits/RBAC) is workshop-layer-owned (per-user-namespaces.yaml), NOT this chart — this chart only fills it, so ai-assisted-development shares {user}-dev and conflictsWith that cohort. ws solve renders the END state: the seeded deployment's probe patched to the correct path (Running 1/1), i.e. the outcome after the agent's scoped-write fix."
type: application
version: 0.1.2
