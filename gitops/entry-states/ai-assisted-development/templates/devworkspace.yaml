# The Dev Spaces workspace that carries the neutral mcp-agent-cli client configured against MaaS + the
# in-cluster MCP server. Co-located in {user}-dev so: (a) the MCP server is reachable by short DNS, and
# (b) the auto-mounted maas-credentials Secret (GENAI_API_KEY) is same-namespace. started:false → the
# entry state creates ZERO workspace pods (no quota/token cost); the attendee starts it in the lab.
# EDITOR RESOLUTION — design call #40, CLOSED 2026-07-18 (full decision + rationale at the
# `contributions` field below): the che-code editor resolves via the in-cluster Dev Spaces dashboard
# editor API, permanently — this is no longer an interim fix. ws reset purges DevWorkspaces
# (devspaces-inner-loop+ idiom).
#
# CREDS/CONFIG INTO THE WORKSPACE (all cluster-correct, no devfile edit): GENAI_API_KEY arrives via the
# DevWorkspace Operator auto-mount of the labelled maas-credentials Secret, and GENAI_ENDPOINT/GENAI_MODEL
# via the auto-mounted maas-config-env ConfigMap — both CONVERGED per-cluster by the hook (see
# maas-credentials.yaml; chart default llama-scout-17b, task #67). A devfile container env (schemaVersion
# 2.2.0) can't configMapKeyRef, so these three are injected by the operator, NOT hardcoded here —
# hardcoding model/endpoint here would pin one model onto every cluster regardless of what its MaaS key
# actually grants. Only static, non-MaaS env is literal below.
apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspace
metadata:
  name: {{ .Values.devWorkspaceName }}
  namespace: {{ include "ai-assisted-development.namespace" . }}
  labels:
    workshop.redhat.com/module: ai-assisted-development
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
spec:
  started: false
  routingClass: che
  contributions:
    # DECISION (#40, closed 2026-07-18): this dashboard-API uri is the PERMANENT editor-resolution
    # mechanism, not an interim step, against the 3-criteria bar (reliable start / survives operator
    # upgrades / simplest-that-works):
    # 1. Reliable start, no external registry: in-cluster svc DNS only. The DS 3.x embedded PLUGIN
    #    registry is OpenVSX-proxy-only and serves no editor devfiles — the earlier bare plugin-registry
    #    `id:` 404'd ("plugin editor does not specify a registryUrl"). The DASHBOARD's editor API is a
    #    different, working path: verified Running on C2 (a cluster with zero custom Dev Spaces config).
    # 2. Survives operator upgrades: this is Eclipse Che's OWN documented pattern for injecting an editor
    #    into a DevWorkspace authored via the Kubernetes API (see "Managing workspaces with Kubernetes
    #    APIs", Eclipse Che docs) — a maintained integration surface, not a reverse-engineered path.
    # 3. Simplest that satisfies 1+2: considered and rejected a custom che-code "editor definition"
    #    ConfigMap in the controller namespace (Che's "Configuring editors definitions" admin mechanism).
    #    That mechanism is for CUSTOM/non-bundled editors; che-code ships BUNDLED with every Dev Spaces
    #    install and already resolves through this same endpoint with zero admin config — the ConfigMap
    #    would add a portfolio-owned resource in openshift-devspaces for no robustness gain.
    # cheDashboardService/-Namespace/-Port (values.yaml) keep the host out of the literal so a future
    # rename is a values override, not a template edit. cheEditorId is the che-editor query id. This is
    # the MCP-capable IDE surface ai-assisted-development's in-IDE beat runs in.
    - name: editor
      uri: {{ include "ai-assisted-development.cheEditorUri" . | quote }}
  template:
    schemaVersion: 2.2.0
    metadata:
      name: {{ .Values.devWorkspaceName }}
    components:
      - name: tools
        container:
          # The Dev Spaces Universal Developer Image (oc + JDK 21) — the terminal the attendee runs the
          # CLI agent from. Pulled with the cluster global pull secret (registry.redhat.io).
          image: {{ .Values.udiImage }}
          memoryLimit: 2Gi
          mountSources: true
          env:
            # GENAI_ENDPOINT / GENAI_MODEL / GENAI_API_KEY are auto-mounted as env by the DevWorkspace
            # Operator (maas-config-env ConfigMap + maas-credentials Secret), converged per-cluster — so
            # they are deliberately NOT listed here (a devfile env can't configMapKeyRef, and a literal
            # would pin one model onto every cluster regardless of what its MaaS key actually grants).
            # The in-cluster MCP server the CLI agent binds its tools to (SSE on the short Service DNS).
            - name: MCP_SERVER_URL
              value: {{ include "ai-assisted-development.mcpSseUrl" . | quote }}
            # Client-side read-only filter (defence-in-depth). --allow-writes / MCP_READ_ONLY=false flips
            # it; on-cluster it is then RBAC, not this flag, that stops a disallowed write.
            - name: MCP_READ_ONLY
              value: {{ .Values.mcpReadOnly | quote }}
            # Caps the agentic loop → bounds MaaS token spend.
            - name: MCP_MAX_STEPS
              value: {{ .Values.maxSteps | quote }}
            # The provided neutral CLI image the lab runs (e.g. `oc run mcp-agent-cli --image=$AGENT_CLI_IMAGE …`).
            - name: AGENT_CLI_IMAGE
              value: {{ .Values.agentCliImage | quote }}
