# The OpenShift/Kubernetes MCP server (upstream Go containers/kubernetes-mcp-server, digest-pinned).
# It runs as the scoped mcp-agent SA (wave 0) → in-cluster it auto-detects the projected SA token and
# acts with EXACTLY that identity's RBAC (the view RoleBinding on {user}-dev). No kubeconfig, no admin
# token anywhere. Served over HTTP: SSE at /sse, Streamable HTTP at /mcp (the CLI agent dials /sse).
# --read-only + --toolsets core,config are defence-in-depth (small surface, bounded token spend); the
# SA's RBAC is the actual boundary. Wave 1 = after the SA/binding (wave 0).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcpServiceName }}
  namespace: {{ include "ai-assisted-development.namespace" . }}
  labels:
    app: {{ .Values.mcpServiceName }}
    app.kubernetes.io/component: mcp-server
    workshop.redhat.com/module: ai-assisted-development
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mcpServiceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcpServiceName }}
        workshop.redhat.com/module: ai-assisted-development
    spec:
      # The pod's identity IS the security boundary — it runs as mcp-agent, whose only grant is
      # read-only `view` on {user}-dev. automountServiceAccountToken stays true (the server needs the
      # projected token to reach the API as this SA).
      serviceAccountName: {{ .Values.mcpAgentSA }}
      containers:
        - name: mcp-server
          image: {{ .Values.mcpServerImage }}
          args:
            - --port
            - {{ .Values.mcpPort | quote }}
            - --toolsets
            - {{ .Values.mcpToolsets | quote }}
            {{- if .Values.mcpReadOnly }}
            # Defence-in-depth ONLY — hides mutating tools at discovery. RBAC (the view binding) is what
            # actually denies a write, even if this flag were flipped (CVE-2026-46519).
            - --read-only
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpPort }}
          # TCP readiness: the server is Ready once it binds the HTTP port. (SSE at /sse is a streaming
          # endpoint — an httpGet probe would hang — so a socket check is the correct, non-flaky probe.)
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcpPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mcpPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 300m, memory: 256Mi}
          # restricted-v2 compliant: no privilege escalation, all caps dropped, non-root, seccomp default.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
# why: stable in-cluster address the CLI agent + the DevWorkspace dial (name MUST be mcpServiceName).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcpServiceName }}
  namespace: {{ include "ai-assisted-development.namespace" . }}
  labels:
    app: {{ .Values.mcpServiceName }}
    workshop.redhat.com/module: ai-assisted-development
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: {{ .Values.mcpServiceName }}
  ports:
    - name: http
      port: {{ .Values.mcpPort }}
      targetPort: http
