apiVersion: v2
name: m23-entry
description: "M23 Agentic AI on OpenShift — the per-user agent world in the workshop-owned {user}-ai namespace: an entry marker, MaaS credentials wired via the M06/M22 hook pattern (apitoken copied from openshift-lightspeed/credentials into a maas-credentials Secret; model + endpoint sourced per-cluster from the SAME secret with a chart-values fallback, so C2 renders llama-scout-17b while C1 stays qwen3-14b), and the deployed app layer — the two MCP servers (claims-db, policy-docs) THEN parasol-agent (Quarkus LangChain4j direct-to-MaaS, @McpToolBox over HTTP-SSE). All three run from the SHARED prebuilt parasol-images (built once, tag 1.0), not a per-user build. {user}-ai (quota/limits/RBAC) is created by the workshop layer (per-user-ai.yaml), NOT this chart (same as {user}-modernize/{user}-batch). The graded path is direct-to-MaaS; the later Llama Stack / TrustyAI guardrails / vector-db components are a separate platform phase. ws solve proves the END state (the agent answers a tool-grounded query — POST /agent/ask 'status of claim CLM-1001?' → a get_claim-grounded answer)."
type: application
version: 0.1.0
