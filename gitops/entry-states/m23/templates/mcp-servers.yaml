# The two Parasol MCP servers the agent uses as tools, deployed from the shared parasol-images (tag
# 1.0). sync-wave "1" puts them BEFORE the agent (wave 2): the agent's readiness (/q/health/ready)
# pings both MCP servers, so they must be up first or the agent never reports Ready. Both are
# self-contained (claims-db = embedded H2 seeded CLM-1001..CLM-1030; policy-docs = embedded corpus) so
# M23 depends on no other module (rule 2). Service names are load-bearing: the agent reaches them at
# http://claims-db:8080/mcp/sse and http://policy-docs:8080/mcp/sse.
---
# why: the claims MCP server — exposes get_claim / list_claims_by_status / get_claim_history over SSE.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-db
  namespace: {{ include "m23.namespace" . }}
  labels:
    app: claims-db
    app.kubernetes.io/component: mcp-server
    workshop.redhat.com/module: m23
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claims-db
  template:
    metadata:
      labels:
        app: claims-db
        workshop.redhat.com/module: m23
    spec:
      containers:
        - name: claims-db
          image: {{ .Values.claimsDbImage }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
---
# why: stable in-cluster address the agent's claims-db MCP client dials (name MUST be claims-db).
apiVersion: v1
kind: Service
metadata:
  name: claims-db
  namespace: {{ include "m23.namespace" . }}
  labels:
    app: claims-db
    workshop.redhat.com/module: m23
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: claims-db
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# why: the policy-docs MCP server — exposes search_policies / get_policy / list_policies over SSE.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-docs
  namespace: {{ include "m23.namespace" . }}
  labels:
    app: policy-docs
    app.kubernetes.io/component: mcp-server
    workshop.redhat.com/module: m23
    workshop.redhat.com/user: {{ .Values.user | quote }}
    workshop.redhat.com/owner: ogsr
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-docs
  template:
    metadata:
      labels:
        app: policy-docs
        workshop.redhat.com/module: m23
    spec:
      containers:
        - name: policy-docs
          image: {{ .Values.policyDocsImage }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
---
# why: stable in-cluster address the agent's policy-docs MCP client dials (name MUST be policy-docs).
apiVersion: v1
kind: Service
metadata:
  name: policy-docs
  namespace: {{ include "m23.namespace" . }}
  labels:
    app: policy-docs
    workshop.redhat.com/module: m23
    workshop.redhat.com/owner: ogsr
spec:
  selector:
    app: policy-docs
  ports:
    - name: http
      port: 8080
      targetPort: http
