# The attendee's entry point into Kueue. A LocalQueue is namespaced and holds NO quota; it is a
# pointer from a name in {user}-batch (user-queue) to the per-user ClusterQueue cq-{user} that
# actually carries the quota. Jobs opt in to admission control with a label:
#   kueue.x-k8s.io/queue-name: user-queue
# apiVersion is v1beta2 — the served/storage version on Kueue 1.3.x (v1beta1 is still served for
# compatibility, but new objects should target v1beta2, which is what `oc get` returns).
# SkipDryRunOnMissingResource lets Argo apply this even before the CRD is fully registered.
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: user-queue
  namespace: {{ include "m23.namespace" . }}
  labels:
    workshop.redhat.com/module: m23
    workshop.redhat.com/user: {{ .Values.user | quote }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  clusterQueue: {{ include "m23.clusterQueue" . }}
