# Proves the entry-state engine ran for this user+module; ws verify checks it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-entry-m23
  namespace: {{ include "m23.namespace" . }}
  labels:
    workshop.redhat.com/module: m23
    workshop.redhat.com/user: {{ .Values.user | quote }}
data:
  module: m23
  materializedFor: {{ .Values.user | quote }}
  # The batch world lives here, not in {user}-dev — this module's namespace is {user}-batch.
  namespace: {{ include "m23.namespace" . }}
  localQueue: user-queue
  clusterQueue: {{ include "m23.clusterQueue" . | quote }}
