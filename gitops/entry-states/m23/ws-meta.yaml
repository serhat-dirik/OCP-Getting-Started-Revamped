# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M23's whole world lives in {user}-batch (a module-extra namespace this chart owns), so the
# purge removes every Job/CronJob/Pod the attendee created AND the claims-data PVC — the ws CLI
# runs `oc delete all,pvc --all` here. The chart then re-materializes the namespace, the seeded
# dataset, the LocalQueue, and the MaaS credentials, so a reset returns a clean entry state.
# NOTE: the namespace itself is chart-owned (unlike the workshop-layer {user}-dev/stage/... which
# survive reset) — deleting the entry Application prunes it; the purge below only clears user
# workloads in case the namespace is being reused without a full Application delete.
purgeNamespaces:
  - "${USER}-batch"
