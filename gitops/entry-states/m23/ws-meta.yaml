# ws reset purges user-created leftovers from these namespaces before re-materializing.
# M23's in-namespace state lives in {user}-batch, so the purge removes every Job/CronJob/Pod the
# attendee created AND the chart-owned claims-data PVC — the ws CLI runs `oc delete all,pvc --all`
# here. The chart then re-materializes the seeded dataset, the LocalQueue, and the MaaS credentials,
# so a reset returns a clean entry state.
# NOTE: the {user}-batch NAMESPACE, its quota, its LimitRange, and its RBAC are WORKSHOP-LAYER-owned
# (gitops/workshop-config/templates/per-user-batch.yaml — the workshop-entries AppProject blacklists
# ResourceQuota/LimitRange, so an entry chart cannot create them; G3-M23 F1). Like {user}-dev/stage/
# prod/cicd, the namespace SURVIVES reset with the same UID — the entry Application owns only the
# in-namespace objects listed above, and deleting it prunes those, never the namespace.
purgeNamespaces:
  - "${USER}-batch"
