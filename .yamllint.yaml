---
# yamllint config for all repo YAML (Antora playbooks, Helm values, kustomize,
# GitHub workflows, Vale rules). 2-space indent; long lines warn, do not fail.
extends: default

# Generated / vendored trees are not ours to lint; Helm templates ({{ }}) are not plain YAML.
ignore: |
  node_modules/
  www/
  .cache/
  gitops/workshop-config/templates/
  gitops/entry-states/*/templates/

rules:
  indentation:
    spaces: 2
    indent-sequences: consistent
  line-length:
    max: 140
    level: warning
  # `on:` in GitHub workflows must not be rewritten to a boolean; only allow
  # explicit true/false as truthy values, and don't police mapping keys.
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
  # antora.yml, Vale rules, and kustomize bases legitimately omit the `---` marker.
  document-start: disable
  # Inline "why this CR exists" comments sit one space off the content.
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
